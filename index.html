  {q:"On the 2-Day Call you learn there is a language barrier: the homeowner speaks limited English but their bilingual teenager will translate. What is the BEST approach?",o:["Proceed as normal since you have a translator present","Reschedule and request an adult family member or professional translator who can handle financial discussions","Bring a bilingual colleague if available, or confirm the teenager is comfortable translating financial and technical decisions, and plan to use more visual documentation during the process","Simplify your presentation and use mostly pictures"],c:2,e:"A teenager translating creates power dynamics and potential accuracy issues with financial discussions. The ideal solution is a bilingual colleague. If that is not available, confirming the teenager's comfort level AND supplementing with heavy visual documentation gives you the best chance of clear communication."},
  {q:"You plant the financing seed on the 2-Day Call. The customer says, 'We don't believe in financing, we only pay cash for everything.' You later discover during the inspection that the scope is likely $18,000+. When is the RIGHT time to re-introduce financing?",o:["During the presentation, immediately after building the proposal and before revealing the total number","Only if the customer brings it up again at the close","During the inspection when you realize the scope is large","Never; respect their stated preference and only present the cash price"],c:0,e:"Respecting their preference does not mean abandoning your process. Re-introducing financing BEFORE the number lands allows the customer to consider it as a tool rather than a lifeline. During the inspection is too early (no proposal context). At the close is too late (feels like a rescue). Never re-introducing it could cost them a solution they need."},
  ],
},
mod2:{
  foundation:[
  {q:"Who should lead the walk-around during the Customer Walk-Around?",o:["The inspector should lead to control the flow","The customer should lead","It does not matter who leads","The inspector leads outside, the customer leads inside"],c:1,e:"Let the customer lead the walk-around. This gives them ownership and reveals what they care most about, which is critical information for your proposal."},
  {q:"What is the single most important question to ask during the walk-around?",o:["\"When did you first notice the problem?\"","\"Have you gotten other quotes?\"","\"What's your biggest concern?\"","\"How long have you lived here?\""],c:2,e:"'What's your biggest concern?' reveals the emotional driver behind the call. This is the key to framing your proposal around what matters most to the customer."},
  {q:"What is the minimum number of photos you should take during a full inspection?",o:["5-10","12-20","25-30","As many as possible"],c:1,e:"A minimum of 12-20 photos ensures you have thorough documentation for the presentation. Every photo becomes evidence that supports your proposal."},
  {q:"When should you start photographing during the inspection?",o:["Only during the full inspection after the walk-around","In front of the customer during the walk-around","After the inspection when writing up the proposal","Only when you find a problem"],c:1,e:"Start photographing in front of the customer during the walk-around. This demonstrates thoroughness and begins building the evidence base they will see in the presentation."},
  {q:"What does the Door Knock transition involve?",o:["Knocking on the front door after the exterior inspection to present findings","Knocking on the door to show you are finished, displaying physical proof of effort, and asking for 15 minutes to organize","Knocking on doors inside the home to check for sticking","A specific knock pattern that signals you are from Apex"],c:1,e:"The Door Knock is a transition moment. You knock to signal completion, show your dirty clothes as physical proof of effort, and ask for 15 minutes to organize before the sit-down presentation."},
  {q:"During the exterior inspection, what should you evaluate?",o:["Grade, drainage, downspouts, and cracks","Paint condition, landscaping, and roof age","Window seals, siding material, and gutter size","Soil type, tree roots, and sprinkler placement"],c:0,e:"The exterior inspection focuses on grade, drainage, downspouts, and cracks. These are the primary exterior indicators of foundation issues."},
  {q:"How many moisture readings should you take at minimum?",o:["1","3 or more","Only where you see visible water","Moisture readings are optional"],c:1,e:"Take a minimum of 3 or more moisture readings. Multiple readings create comparison data and provide documented evidence for the presentation."},
  {q:"What should you measure cracks with?",o:["Your finger width as a reference","A tape measure only","A scale reference included in the photograph","Cracks do not need to be measured"],c:2,e:"Crack measurements should include a scale reference in the photograph. This creates documented, verifiable evidence rather than subjective estimates."},
  {q:"What should you check during the interior inspection?",o:["Floors, doors, and drywall","Paint colors, furniture placement, and lighting","Appliance age, electrical panels, and plumbing","Window brand, HVAC condition, and insulation"],c:0,e:"Interior inspection focuses on floors (slope), doors (sticking/gaps), and drywall (cracks). These are the visible interior symptoms of foundation problems."},
  {q:"How should you measure floor slope?",o:["By eye based on experience","With a level","By rolling a ball across the floor","By asking the customer where they notice unevenness"],c:1,e:"Use a level to measure floor slope. This provides objective, documented data rather than subjective impressions."},
  ],
  advanced:[
  {q:"During the walk-around, the customer keeps pointing out cosmetic issues like drywall cracks and a sticking door. You suspect the real problem is in the crawl space they have not mentioned. What do you do?",o:["Redirect them to the crawl space immediately since that is where the real problem is","Let them finish showing you their concerns, acknowledge each one, then transition to the full inspection which will include the crawl space","Tell them those are just symptoms and the real issue is underneath","Focus only on what they showed you since those are their concerns"],c:1,e:"Let the customer feel heard first. Their concerns are valid symptoms. Cutting them off to redirect undermines trust. The full inspection will naturally include the crawl space, and your documentation will connect their visible concerns to the underlying cause."},
  {q:"You are in the crawl space and find active moisture at 32% but the customer told you during the walk-around that their biggest concern is a cracked brick on the exterior. How does this affect your approach?",o:["Focus the proposal on the brick crack since that is what they care about","Focus the proposal on the moisture since that is the bigger structural threat","Document both thoroughly and connect them during the presentation, leading with their concern and bridging to the moisture issue as a related finding","Recommend they call a mason for the brick and you handle the moisture"],c:2,e:"Start with their stated concern to show you listened, then bridge to the moisture finding as connected evidence. This honors the customer's priorities while ensuring the full scope is addressed."},
  {q:"You have completed the full inspection and have 18 photos, 4 moisture readings, and detailed crack measurements. The customer says, 'Can you just email me the proposal? I have to run.' What is your response?",o:["Email the proposal since you have all the documentation you need","Reference the agenda they agreed to, explain the sit-down takes 15 minutes, and emphasize they will want to see the photos and data you documented","Leave the proposal on the table and tell them to call when they have reviewed it","Quickly present the proposal in 5 minutes before they leave"],c:1,e:"An emailed proposal almost never closes. Reference the process they committed to during the Warm-Up. A customer who saw a 90-minute inspection deserves to see the evidence. Frame the sit-down as brief and valuable."},
  {q:"Why is a customer who watched a 90-minute inspection fundamentally different from one who saw a 20-minute glance?",o:["They are more tired and just want to get it over with","They have witnessed the thoroughness of your work and have emotional investment in the evidence you collected","They feel guilty about the time you spent and are more likely to buy out of obligation","There is no meaningful difference if the findings are the same"],c:1,e:"A customer who watched 90 minutes of thorough work has witnessed your competence and has emotional investment in the process. They are buying your expertise and diligence, not just a repair. A 20-minute glance communicates that the problem is simple, which makes the price seem high."},
  {q:"During the crawl space inspection, you find moisture, water staining, and wood damage. You also notice termite damage that is outside your scope. How should you handle the termite finding?",o:["Ignore it since it is outside your scope","Include termite treatment in your proposal as an add-on","Document it, photograph it, and mention it to the customer as something they should address separately, demonstrating your honesty","Tell the customer their termite problem is worse than the foundation issue"],c:2,e:"Documenting and honestly disclosing findings outside your scope builds trust. It demonstrates that you are looking out for the customer, not just selling your services. This reinforces the Trust Unlocking Moment."},
  {q:"After the Door Knock, why should you NOT clean up your dirty clothes before the sit-down?",o:["There is not enough time to change","Dirty clothes are physical proof of the effort you invested in their inspection","Customers prefer a casual appearance","It saves time during the transition"],c:1,e:"Dirty clothes are physical proof of effort. When you sit at the kitchen table covered in crawl space debris, the customer sees tangible evidence that you worked hard. Cleaning up erases that visual proof."},
  {q:"You are taking measurements during the walk-around and the customer says, 'The last company didn't need to measure anything. They just looked and gave me a price.' What is the best response?",o:["Explain that the other company was cutting corners","Acknowledge that different companies have different approaches, then explain that your measurements ensure the proposal is accurate and specific to their home","Tell them measurements are required by Apex policy","Speed up your measurements to match their expectation"],c:1,e:"Never badmouth competitors directly. Position your thoroughness as a benefit to the customer. Measurements ensure accuracy, which protects the customer from over- or under-scoped proposals."},
  {q:"You are doing the inspection and realize you forgot your moisture meter in the truck. The customer is following you around. What should you do?",o:["Skip the moisture readings and estimate based on visual inspection","Excuse yourself professionally to grab the meter, maintaining the standard of thorough documentation","Ask the customer if they have noticed any moisture issues and use their input instead","Complete the rest of the inspection and come back for moisture readings another day"],c:1,e:"Never skip documentation to avoid minor awkwardness. Excuse yourself to grab the tool. Cutting corners on data collection weakens your proposal and credibility during the presentation."},
  {q:"The customer's crawl space has a very tight access point. You can get in but it will be difficult. The customer says, 'You don't need to go down there, just look from the opening.' What do you do?",o:["Respect their suggestion and inspect from the opening","Enter the crawl space fully because incomplete data leads to incomplete proposals and undermines your credibility","Send the customer a follow-up with a camera on a pole later","Decline the inspection since you cannot do a thorough job"],c:1,e:"An incomplete inspection produces an incomplete proposal. Getting into the crawl space, even when difficult, demonstrates commitment and ensures your documentation is thorough. This is also where the most critical findings often are."},
  {q:"During the inspection, the customer asks you to explain what you are seeing as you go. How should you balance this with the Apex process?",o:["Give detailed explanations of every finding in real time","Tell them you will explain everything during the presentation and stay silent during the inspection","Provide brief, factual observations without conclusions, and let them know you will connect everything during the sit-down","Only explain the problems, not the normal areas"],c:2,e:"Brief factual observations keep the customer engaged without front-loading your presentation. Saying too much during the inspection robs the presentation of its impact. Saying nothing makes the customer feel excluded."},
  ],
  expert:[
  {q:"You complete a thorough inspection and find the home has very minor cosmetic cracking, normal moisture, and no structural concerns. The customer clearly expected significant findings. What is the BEST course of action?",o:["Find something to recommend so you do not waste the appointment","Tell them their home is fine and leave","Walk them through all your documentation showing what normal looks like, validate their decision to have it checked, and explain what to monitor going forward","Recommend preventative work to justify the appointment"],c:2,e:"This is the Trust Unlocking Moment in action. Showing your documentation of normal conditions proves your integrity. This customer becomes a referral source because you did not sell them something they did not need. Walking through the data also educates them on what to watch for."},
  {q:"During the customer walk-around, the homeowner reveals their biggest concern is their home's resale value, not the structural issue itself. How should this change your inspection documentation strategy?",o:["It should not change anything; document the same way regardless","Focus documentation on the most visible cosmetic issues since those affect resale","Ensure your documentation includes before-condition evidence that can be compared to post-repair conditions, and photograph areas that a buyer's inspector would flag","Take fewer photos since resale-focused customers care more about price than process"],c:2,e:"A resale-motivated customer needs documentation that tells a story for a future buyer's inspector. Before-condition photos paired with repair documentation become proof of proactive maintenance. This shifts the frame from 'cost' to 'investment in home value.'"},
  {q:"You are in the crawl space and find moisture readings of 19% on floor joists. There is no visible rot or water. The customer has no moisture complaints. How do you handle this in documentation?",o:["Note it as normal since there is no visible damage","Document it as a critical finding requiring immediate repair","Document the elevated readings with exact locations and photos, classify them as elevated but pre-damage, and prepare to present them as a progression risk during the education phase","Skip it since 19% is borderline and might scare the customer unnecessarily"],c:2,e:"19% is elevated (normal is 12-15%) but below active rot (28%+). This is the progression window. Documenting it accurately lets you educate the customer on what happens if left untreated without overstating current damage. Skipping it or exaggerating it both damage credibility."},
  {q:"You finish the exterior inspection and discover a neighbor watching from their yard. They approach and ask what you are doing. What is the BEST way to handle this?",o:["Explain you are doing a foundation inspection and give them your card","Tell them to ask the homeowner and walk away","Give a brief, professional answer without disclosing specific findings about the homeowner's property, and offer your card if they have interest in their own home","Ignore them and continue your inspection"],c:2,e:"The neighbor is a potential lead, but the homeowner's privacy comes first. A brief, professional response that does not disclose specific findings protects your customer while leaving the door open for a future opportunity."},
  {q:"During the inspection, you find evidence of a previous repair by another company that was done incorrectly. The customer does not know it was done wrong. How do you handle this?",o:["Photograph it and plan to use it in the presentation to show why the competitor failed","Photograph it objectively, document what you observe factually, and plan to present it during education as 'what we found' without making it about the competitor","Skip it since calling out another company's work looks petty","Tell the customer immediately that the previous repair was botched"],c:1,e:"Document factually without editorializing. During the presentation, present what you found and what it means for the home. Let the evidence speak. Attacking the competitor looks petty. Skipping it means you are not addressing a real issue. Blurting it out during the inspection robs the presentation of structure."},
  {q:"The customer follows you during the entire exterior inspection but says they will not go into the crawl space with you. After the crawl space inspection, they seem disengaged. What happened and how do you recover?",o:["They got bored waiting. Speed up the rest of the process.","Their engagement broke when they could not witness the work. Use the Door Knock to re-engage them by showing your dirty clothes, the photos, and expressing urgency about getting them the 15-minute sit-down.","They lost interest. Ask if they want to reschedule the presentation.","Nothing happened. Proceed normally with the presentation."],c:1,e:"A customer who watches 90 minutes of work is emotionally invested. When they cannot see the crawl space portion, that investment pauses. The Door Knock with dirty clothes and a preview of findings re-establishes the connection and transitions their engagement to the presentation."},
  {q:"You are measuring floor slope with a level and the customer says, 'My husband already measured that and it is half an inch off.' Do you trust their measurement or take your own?",o:["Trust their measurement to save time and show respect","Take your own measurement but do not contradict theirs if they are close","Take your own measurement, document it, and if it differs, present both data points respectfully and explain how you measured","Tell them homeowner measurements are unreliable and take your own"],c:2,e:"Always document your own measurements for accuracy and liability. If the numbers differ, presenting both respectfully shows transparency. The customer sees you are thorough without dismissing their effort. Your professional measurement becomes the documented standard for the proposal."},
  {q:"During the inspection, you realize the scope is much larger than what was discussed on the 2-Day Call. The customer seems to expect a small job. At what point do you recalibrate their expectations?",o:["During the inspection as you find each issue","Wait until the full presentation when you have all evidence organized","Drop hints during the inspection but save the full recalibration for the presentation's education phase where you can connect all findings systematically","On the phone before coming back for the presentation"],c:2,e:"Dumping bad news during the inspection creates anxiety without context. Waiting for the presentation risks sticker shock. The best approach is to let small observations during the inspection start shifting their frame, then use the education phase to connect everything. This builds understanding gradually rather than hitting them with a surprise."},
  {q:"You complete the inspection with 20 photos, 5 moisture readings, and detailed measurements. Your findings are moderate: some elevated moisture, minor cracking, slight floor slope. A less experienced inspector might call this a big job or a small job depending on interpretation. How should you approach documentation?",o:["Document conservatively to avoid overselling","Document aggressively to ensure the customer takes it seriously","Document exactly what you found with precise measurements and readings, and let the data speak during the presentation without interpreting it optimistically or pessimistically","Document the worst-case interpretation to protect yourself legally"],c:2,e:"Precise, unbiased documentation is the foundation of credibility. When findings are moderate, the temptation is to shade them one direction. Let the numbers and photos speak. During the education phase, benchmarks (like 12-15% normal moisture) give the customer the context to interpret the data themselves."},
  {q:"You are photographing the exterior and the customer says, 'Don't take pictures of the backyard, it's a mess and I don't want anyone to see it.' Your inspection requires documenting the backyard grading and drainage. What do you do?",o:["Skip the backyard photos and note your findings verbally instead","Explain that the photos are only used for their proposal and inspection report, are not shared publicly, and that backyard drainage is a critical factor in foundation health","Take the photos anyway without discussing it further","Ask them to clean up the backyard before you photograph it"],c:1,e:"Address the concern directly. The customer's worry is about embarrassment, not the inspection itself. Explaining the photos' purpose (private documentation) and the backyard's importance (drainage affects the foundation) resolves the concern without skipping critical evidence."},
  ],
},
mod3:{
  foundation:[
  {q:"During the Photo Review, which areas should you show the customer FIRST?",o:["The areas with the most serious problems","The areas that are normal and in good condition","The areas the customer mentioned during the walk-around","The most expensive repair areas"],c:1,e:"Show normal areas first. This builds credibility by proving you are objective and not just looking for problems. When you then show concerns, the customer trusts your assessment."},
  {q:"What is the purpose of the Education Before Proposal phase?",o:["To impress the customer with technical knowledge","To stall before presenting the price","To help the customer understand the mechanism, progression, and solution approach before seeing numbers","To upsell additional services"],c:2,e:"Education covers what causes the problem, what happens if nothing is done, and how the solution works. A customer who understands buys the solution. A customer who does not understand negotiates on price."},
  {q:"What is considered a normal moisture reading?",o:["0-5%","12-15%","19-25%","28%+"],c:1,e:"Normal moisture in wood is 12-15%. Elevated is 19%+, and active rot begins at 28%+. These benchmarks are critical for the education phase."},
  {q:"At what moisture level does active rot begin?",o:["15%","19%","28%+","35%+"],c:2,e:"Active rot begins at 28%+ moisture. This is a critical benchmark for helping customers understand progression from elevated moisture to structural damage."},
  {q:"Every line item in the proposal should be tied to what?",o:["Industry standard pricing","What competitors typically recommend","Documented evidence from the inspection","The customer's stated budget"],c:2,e:"Every line item must be tied to documented evidence. 'This is here because of photo #4' makes each item defensible and prevents the customer from viewing any item as unnecessary."},
  {q:"When should you introduce financing during the presentation?",o:["After presenting the total price","Only if the customer objects to the price","Before revealing the total number","Financing should not be discussed during the presentation"],c:2,e:"Introduce financing BEFORE revealing the total number. This ensures the customer has the payment tool in mind before they see the price, preventing sticker shock."},
  {q:"What does 'right-sizing' the proposal mean?",o:["Making the proposal as large as possible to maximize revenue","Matching the proposal to the customer's budget","Recommending exactly what the evidence supports, not over- or under-scoping","Making the proposal smaller to make it easier to close"],c:2,e:"Right-sizing means the proposal matches the documented evidence. Over-scoping damages trust. Under-scoping leaves the customer with unresolved problems. Every item should be justified by evidence."},
  {q:"Why should you use the customer's own language when reviewing photos?",o:["It makes you sound less technical","It helps the customer feel heard and creates connection between their concerns and your findings","It simplifies the presentation","Customers do not understand technical terminology"],c:1,e:"Using the customer's language shows you listened during the walk-around and creates a direct connection between what they told you they were worried about and what you found."},
  {q:"What is the key difference between a customer who understands the problem and one who does not?",o:["The one who understands asks more questions","The one who understands buys the solution; the one who does not negotiates on price","The one who understands wants a bigger scope","There is no meaningful difference in buying behavior"],c:1,e:"A customer who understands the mechanism, progression, and solution buys the solution because they see its value. A customer who does not understand has only the price to evaluate, so they negotiate."},
  {q:"What three things does the Education phase cover?",o:["Price, timeline, and warranty","Mechanism, progression, and solution approach","Materials, labor, and permits","Competitors, reviews, and certifications"],c:1,e:"The Education phase covers: mechanism (what causes the problem), progression (what happens if nothing is done), and solution approach (how you fix it). This framework creates understanding that supports the proposal."},
  ],
  advanced:[
  {q:"During the Photo Review, you show a normal area first and the customer says, 'Why are you showing me things that are fine? Get to the problems.' How do you handle this?",o:["Skip to the problem areas since the customer is impatient","Briefly explain that showing normal areas establishes a baseline so they can see the contrast when you show the areas of concern, then transition to the findings","Tell them this is part of the process and they need to be patient","Show them all the problem photos at once to satisfy their urgency"],c:1,e:"Explain the reason briefly: normal areas create a baseline that makes the problems meaningful. Then move forward. Do not abandon the approach, but do not belabor it either. The customer needs to understand the method, not sit through a lecture about it."},
  {q:"You are presenting moisture benchmarks and the customer says, 'My reading was 19%. That doesn't sound that bad.' How do you use the progression framework?",o:["Agree that 19% is not critical and minimize the finding","Tell them 19% is very bad and needs immediate attention","Explain that 19% is elevated above normal (12-15%), and while not yet at active rot (28%+), it represents the progression window where damage accelerates if the moisture source is not addressed","Show them a chart of moisture damage costs over time"],c:2,e:"The progression framework is key here. 19% is elevated, not catastrophic. Minimizing it loses the sale. Exaggerating it damages credibility. Placing it on the progression spectrum educates the customer about trajectory and creates urgency without dishonesty."},
  {q:"You are building the proposal and realize one line item is not clearly supported by a specific photo or measurement. What should you do?",o:["Include it anyway since you know it is needed based on experience","Remove it from the proposal since you cannot tie it to evidence","Go back and document the evidence you need, or note it as a professional recommendation based on related findings, with clear explanation","Add it and hope the customer does not question it"],c:2,e:"Every line item should ideally be tied to specific evidence. If you missed documenting something, go get the evidence or at minimum clearly explain the professional reasoning that connects it to documented findings. Unsupported line items invite objections."},
  {q:"The customer understands the problem and the solution, but when you present the proposal they say, 'That's more line items than I expected.' What is the best response?",o:["Offer to remove some line items to simplify it","Walk through each line item and connect it back to the specific evidence that justifies it","Explain that foundation repair is complex and requires multiple steps","Combine line items to make the proposal look shorter"],c:1,e:"The strength of an evidence-based proposal is that every line item has a reason. Walking through each one with 'this is here because of photo #4, this addresses the drainage we saw on the east side' transforms a long proposal into a thorough, justified plan."},
  {q:"During the education phase, the customer keeps asking about DIY solutions they found online. How should you handle this?",o:["Dismiss the DIY solutions as ineffective","Acknowledge what they found, explain why the specific conditions in their home require professional-grade solutions, and use their findings as a bridge to the mechanism and progression education","Tell them they are welcome to try DIY but you cannot guarantee the results","Show them examples of failed DIY foundation work"],c:1,e:"Never dismiss a customer's research. Acknowledge it, then bridge to why their specific situation needs professional intervention. Their research actually shows engagement; redirect that energy into understanding the full mechanism and progression."},
  {q:"You present the proposal and the customer says, 'The company yesterday gave me a much simpler proposal with just one number.' What is the strategic advantage of your detailed approach?",o:["You have no advantage; simpler proposals are easier to accept","Your itemized proposal shows transparency and allows the customer to see exactly what they are paying for and why, making it harder to compare on price alone","Your proposal is more professional looking","Your detailed proposal justifies a higher price"],c:1,e:"A single-number proposal is a black box that invites price comparison. An itemized, evidence-based proposal shows the customer exactly what each dollar covers and why. This shifts the comparison from price to value and scope."},
  {q:"You are about to reveal the total number. How should you frame the transition from education to price?",o:["Say 'Now for the hard part' and present the number","Summarize the findings, confirm the customer understands the scope, re-introduce financing as a payment tool, then present the number","Present the number quickly before the customer loses interest","Ask the customer to guess what they think it will cost"],c:1,e:"The transition should feel natural: summarize what you found and what it needs, confirm understanding, ensure financing is in play as a tool, then present the number. This sequence means the number arrives in context rather than in a vacuum."},
  {q:"The customer's spouse was not engaged during the inspection but is now sitting in on the presentation. They are hearing everything for the first time. How do you adjust?",o:["Ignore the spouse and present as normal","Start the entire process over for the spouse's benefit","Use the Photo Review as an opportunity to bring the spouse up to speed, spending extra time connecting each photo to the customer's original concerns and the findings","Ask the spouse to review the proposal after and provide their input later"],c:2,e:"The Photo Review becomes your tool for catching up the disengaged spouse. Extra time on photos and findings brings them into the same understanding level. Ignoring them risks a post-appointment veto. Restarting wastes the engaged customer's investment."},
  {q:"During the Photo Review, the customer says, 'That crack looks like it's been there since the house was built.' How do you respond without damaging trust?",o:["Tell them they are wrong based on your expertise","Agree with them to avoid confrontation","Acknowledge it is possible, then show your measurement data and explain what the current measurements indicate regardless of when it started, focusing on whether it is active or stable","Tell them the age of the crack does not matter"],c:2,e:"Never dismiss the customer's observation. Acknowledge it could be original, then shift to what the data shows today. Active vs stable matters more than original vs new. Your measurements and documentation let the evidence answer the question objectively."},
  {q:"You present a right-sized proposal and the customer says, 'I've been saving money for this. Can you add [unnecessary item] since you're already going to be here?' What do you do?",o:["Add it since the customer is willing to pay","Explain that adding unnecessary work would not be honest, and describe exactly what you would recommend monitoring instead","Add it but give them a discount on the added item","Tell them you can only do what is in the proposal"],c:1,e:"Right-sizing means recommending exactly what the evidence supports. Adding unnecessary work for revenue violates the Trust Unlocking Moment. Explain what you found, what you recommend, and what you would monitor. This builds long-term trust and referrals."},
  ],
  expert:[
  {q:"You show normal areas first during the Photo Review and the customer says, 'Good, so it sounds like there's nothing wrong.' You actually have significant findings to present. How do you transition without making it feel like a bait-and-switch?",o:["Say 'Well, actually there are some real problems' and switch to the bad news","Use the normal areas as a baseline and transition with 'Now let me show you where things start to change' to create contrast naturally","Apologize for the confusion and jump to the problems","Stop showing normal areas for the rest of the presentation"],c:1,e:"The phrase 'where things start to change' creates a natural transition from baseline to concern. It uses the normal areas as a reference point rather than false reassurance. The customer sees the contrast rather than feeling misled."},
  {q:"During the education phase, you explain the progression of moisture damage. The customer, who is a contractor, challenges you: 'I've seen framing at 22% that lasted 20 years with no rot.' How do you respond?",o:["Defer to their experience since they are a contractor","Tell them they are wrong and cite industry standards","Acknowledge that variables like ventilation, wood species, and exposure patterns affect timelines, while noting that the benchmark ranges represent where risk increases significantly, and their home's specific conditions matter most","Change the subject to avoid the confrontation"],c:2,e:"A knowledgeable customer is testing your depth. Acknowledging variables shows sophistication. Benchmarks are guidelines, not absolutes. Redirect to their home's specific conditions. This earns respect from a contractor without backing down from your professional assessment."},
  {q:"You are building the proposal and you believe the home needs 12 piers at roughly $800 each. However, 8 piers would address the worst areas and the remaining 4 address minor slope. The customer has expressed budget concerns. What is the right-sized proposal?",o:["Propose 8 piers to fit their budget and avoid the objection","Propose 12 piers because that is what the home needs regardless of budget","Present the full 12-pier recommendation with evidence, then clearly explain which 4 address minor slope and what the trade-off would be if they chose to defer those, giving them an informed choice","Propose 12 piers and offer a discount to fit their budget"],c:2,e:"Right-sizing is not about reducing scope to fit a budget. It is about presenting the full evidence-based recommendation and then being transparent about trade-offs if the customer needs to prioritize. The customer makes an informed choice rather than a blind one."},
  {q:"The customer understood the education perfectly and says, 'I get it, the moisture is the root cause and if we don't address it the wood damage will spread. But I've also been told by a plumber that regrading the yard would fix the water issue.' How do you handle this without dismissing the plumber?",o:["Tell them the plumber is wrong and your solution is better","Agree with the plumber and remove moisture-related items from your proposal","Acknowledge that grading is one factor in moisture management, validate the plumber's input, and explain how your recommendation works alongside or independently of grading to address the specific conditions you documented in their crawl space","Tell them to do the grading first and call you if they still have problems"],c:2,e:"The plumber's advice may be partially valid. Dismissing it insults the customer's trusted source. Your job is to show how your solution addresses the documented conditions specifically, and how grading may complement but not replace what you are recommending. Position your scope alongside their other information, not against it."},
  {q:"You introduce financing before the number, present a $14,500 proposal, and the customer says, 'I appreciate the thoroughness but your education section scared me into thinking it's urgent. Is it really?' How do you answer honestly without losing urgency?",o:["Tell them yes, it is extremely urgent and could fail any day","Admit that it is not urgent and they can wait","Be transparent about the timeline: explain what the current readings indicate, what progression looks like over months vs years, and let them understand that while not an emergency today, the conditions will worsen and costs increase over time","Tell them the education was just for context and they should not be scared"],c:2,e:"Honesty builds trust. Manufactured urgency backfires. Be transparent about the realistic timeline. Elevated moisture at 19% is not collapsing tomorrow, but it is progressing. Frame the decision as cost-of-waiting rather than panic. Customers respect honest urgency assessment and are more likely to move forward with a trustworthy advisor."},
  {q:"You present a thorough, evidence-based proposal and the customer says, 'This looks great but I want to get one more quote for comparison.' You know from experience that the competitor will likely give a much lower price with a less thorough scope. What is the MOST effective response?",o:["Match whatever price the competitor will offer","Tell them the competitor will lowball them and do inferior work","Respect their decision, review what makes your proposal evidence-based, leave your documentation, and suggest specific questions they should ask the next company about scope, documentation, and what is included vs excluded","Offer a discount if they sign today"],c:2,e:"You cannot stop a customer from shopping. But you can arm them with the right questions. When they ask the competitor about documentation, scope specifics, and inclusions, the comparison reveals scope differences rather than price differences. Your thorough proposal becomes the standard they measure against."},
  {q:"During the proposal presentation, the customer notices you recommended fixing a drainage issue on the east side, but during the walk-around they told you they already have a landscaper scheduled to regrade that area next month. You missed this detail. What do you do?",o:["Remove the drainage line item and reduce the price without discussing it","Acknowledge the oversight, ask for details about the landscaper's plan, and determine whether their regrading addresses the specific drainage concern you documented or if additional work is still needed","Keep the line item and tell them your solution is better than regrading","Apologize profusely and offer a discount on the overall proposal"],c:1,e:"Acknowledging the oversight shows honesty. Asking about the landscaper's plan shows thoroughness. The regrading might fully address the drainage, partially address it, or not address the specific issue you found. The right answer depends on the details, not on ego or revenue."},
  {q:"You are presenting the proposal to a couple. The wife understands the education and is ready to move forward. The husband has been quiet and suddenly says, 'I don't see why we can't just put a sump pump in and call it a day.' He is proposing a partial solution. How do you handle the split dynamic?",o:["Side with the wife since she is already on board","Focus on convincing the husband that he is wrong","Address the husband's suggestion directly and respectfully, explain what a sump pump addresses vs what it does not, and connect back to the specific findings that require more than water removal, letting the evidence answer his question","Offer a sump-pump-only option as a compromise"],c:2,e:"Never take sides in a couple. Address the husband's suggestion with respect and evidence. Explain what a sump pump does and does not solve. Use your documentation to show the specific conditions that require the full scope. The evidence resolves the disagreement, not your persuasion."},
  {q:"You are mid-presentation and the power goes out in the customer's home. Your tablet with all photos and data is at 15% battery. How do you adapt?",o:["Reschedule the presentation for another day","Rush through the remaining photos before the tablet dies","Prioritize showing the most critical findings and evidence, narrate the remaining documentation from your notes, and use the printed proposal as the primary discussion tool","Stop the presentation and wait for the power to return"],c:2,e:"Adapt, do not abandon. Prioritize the most impactful evidence on the tablet while you have battery, supplement with verbal narration from your notes, and lean on the printed proposal. The customer has invested 90+ minutes. Rescheduling risks losing that investment entirely. Professional adaptability demonstrates competence."},
  {q:"A customer who perfectly understood the education phase and agreed your proposal is right-sized says: 'I believe everything you showed me. But honestly, I just can't bring myself to spend $16,000 on something nobody sees. If this were a kitchen remodel I'd write the check today.' What is the MOST effective reframe?",o:["Explain that foundation repair adds to resale value just like a kitchen remodel","Tell them foundation problems will make the kitchen remodel pointless if the floors are sinking","Acknowledge the emotional reality that invisible repairs feel different, then bridge to the concept that the foundation is what protects every visible investment in the home, and that their 90-minute inspection documented exactly what that protection requires","Offer a payment plan that makes the monthly cost similar to a kitchen remodel"],c:2,e:"This objection is emotional, not logical. They already understand the problem. Acknowledging the emotional truth (invisible work feels different) validates them. Then reframe: the foundation protects every visible dollar they have and will invest. The 90-minute inspection they witnessed documents that protection specifically."},
  ],
},
mod4:{
  foundation:[
  {q:"When presenting the price, should you lead with the lump sum or the monthly payment?",o:["Always lead with the lump sum for full transparency","Lead with the monthly payment","Present both at the same time","Let the customer ask which one they want to see first"],c:1,e:"Lead with the monthly payment. It frames the investment in manageable terms rather than a large lump sum, which can trigger sticker shock."},
  {q:"What is the correct first ask after presenting the proposal?",o:["\"What do you think?\"","\"Does this fit your budget?\"","\"How would you like to move forward?\"","\"Would you like some time to think about it?\""],c:2,e:"'How would you like to move forward?' assumes forward motion and invites a decision. It is direct without being pushy."},
  {q:"Why should you NEVER say 'What do you think?' after presenting the proposal?",o:["It sounds unprofessional","It invites deliberation instead of decision","It makes you seem unsure of your proposal","It is not in the Apex script"],c:1,e:"'What do you think?' opens the door to deliberation, opinions, and stalling. 'How would you like to move forward?' directs the conversation toward action."},
  {q:"What should you do BEFORE attempting to diagnose an objection?",o:["Offer a discount","Ask what specifically they are still working through","Restate the benefits of your proposal","Show them more photos from the inspection"],c:1,e:"Always diagnose first with 'What specifically are you still working through?' before responding. You need to understand whether the objection is about value, cash flow, scope, timing, or something else entirely."},
  {q:"When is it appropriate to offer a discount?",o:["As soon as the customer hesitates","When the competitor has a lower price","Only after diagnosing whether the objection is about value vs cash flow, and never before diagnosing","Discounts should be offered proactively to close faster"],c:2,e:"Never discount before diagnosing. If the objection is cash flow, financing solves it without discounting. If it is value, re-education solves it. Discounting before diagnosing trains customers to negotiate and erodes your margins."},
  {q:"Most closes happen on which ask?",o:["The first ask","The second ask","The third ask","The fourth ask or later"],c:1,e:"Most closes happen on the second ask, after the specific objection has been addressed. Many salespeople give up after the first ask, leaving deals on the table."},
  {q:"What should you leave on the kitchen table when you depart?",o:["Just your business card","Proposal, referral book, card, and financing terms","The proposal and a note asking them to call","Nothing; take everything with you"],c:1,e:"The leave-behind package includes the proposal, referral book, business card, and financing terms. These materials continue selling after you leave and give the customer everything they need to make a decision."},
  {q:"What does 'right-sizing' mean in the context of handling objections?",o:["Reducing the price to match the customer's budget","Adjusting the scope only with explicit trade-off communication","Adding more line items to justify the price","Matching the competitor's scope"],c:1,e:"Right-sizing during the close means only adjusting scope when you clearly communicate the trade-off: 'We can remove this item, and here is what that means for your home.' The customer makes an informed choice."},
  {q:"What should the second ask follow?",o:["A longer pause to let the customer think","Addressing the specific objection the customer raised","Offering a lower price","Showing additional photos from the inspection"],c:1,e:"The second ask comes after you have addressed the specific objection. Once the concern is resolved, ask again. Waiting or adding information without asking creates stalling."},
  {q:"What is a Leave-Behind's primary purpose?",o:["To remind the customer of your visit","To provide materials that continue selling after you leave and give the customer what they need to make a decision","To satisfy Apex documentation requirements","To make the customer feel important"],c:1,e:"The leave-behind continues the sales conversation after you leave. The proposal shows the evidence-based plan, the referral book provides social proof, and the financing terms remove cash flow barriers."},
  ],
  advanced:[
  {q:"You present the monthly payment and the customer says, 'That monthly payment sounds reasonable, but $14,500 is just a lot of money.' What does this tell you about their objection?",o:["They cannot afford it at all","Their objection is about cash flow, not value, and financing is likely the solution","Their objection is about the total value of the work","They are negotiating for a discount"],c:1,e:"When the monthly payment sounds reasonable but the total feels high, this is a cash flow objection, not a value objection. The customer accepts the value but struggles with the lump sum. Financing directly addresses this without discounting."},
  {q:"After the first ask, the customer says, 'I need to think about it.' What is the correct diagnostic response?",o:["Give them time and call back in a few days","Offer a same-day discount to create urgency","Ask, 'Of course. What specifically are you still working through?' to diagnose the real concern","Leave the proposal and tell them to call when they are ready"],c:2,e:"'I need to think about it' is not an objection, it is a shield. Behind it is a specific concern: price, scope, timing, spouse approval, or something else. Diagnosing with 'What specifically are you still working through?' uncovers the real issue."},
  {q:"The customer says, 'I got a quote from another company for $8,000 for the same work.' You know their scope is less thorough. How do you respond?",o:["Match their price to win the deal","Tell the customer the other company is going to do a bad job","Ask to see the competitor's proposal and walk through scope differences item by item, letting the customer see what is and is not included in each","Offer to beat their price by 10%"],c:2,e:"Never attack competitors or engage in price wars. Ask to see the competitor's proposal and compare scope side by side. When the customer sees the difference in what is included, the price difference has context. Your itemized, evidence-based proposal makes this comparison powerful."},
  {q:"You address the customer's objection about price by explaining the financing options. They seem satisfied. What should you do next?",o:["Wait for them to say they are ready","Ask a second time: 'Great, so how would you like to move forward?'","Start filling out the paperwork","Give them a moment to discuss it privately"],c:1,e:"After addressing the objection, ask again. Most closes happen on the second ask. Do not wait for the customer to volunteer; ask directly. Hesitating after resolving the concern creates a vacuum that invites new objections."},
  {q:"The customer says, 'I want to do this but I need to talk to my financial advisor first.' How do you handle this?",o:["Accept it and schedule a follow-up call","Tell them their financial advisor will talk them out of it","Acknowledge their process, ask what specific financial question they need answered, and offer to be available by phone when they speak with the advisor so you can provide any technical details","Offer a bigger discount to close today"],c:2,e:"Respect their process while staying involved. Ask what specific financial question needs answering since you may be able to address it now. Offering to be available during the advisor call keeps you in the conversation rather than being shut out."},
  {q:"You are about to do the second ask and the customer says, 'We want to wait until spring since it's November.' How do you handle seasonal stalling?",o:["Accept it and schedule a spring follow-up","Explain that foundation problems worsen over winter, use their documented findings to show what progression could look like over 4-5 months, and offer scheduling flexibility","Offer a winter discount to incentivize closing now","Tell them you have limited spring availability to create urgency"],c:1,e:"Use their own documented evidence and the progression education to show what waiting costs. Moisture, freeze-thaw cycles, and ongoing settlement do not pause for seasons. Pair this with scheduling flexibility rather than manufactured urgency."},
  {q:"During the close, the customer asks, 'What happens if you start the work and find more problems?' What is the best answer?",o:["Tell them the price is guaranteed and nothing will change","Explain your process for handling unforeseen conditions: you will communicate immediately, document any new findings, and get their approval before any scope changes with clear cost implications","Tell them it rarely happens and not to worry about it","Add a 20% contingency to the proposal to cover unknowns"],c:1,e:"Customers fear hidden costs. Explain your transparent process for handling surprises: immediate communication, documentation, and customer approval before changes. This builds trust and directly addresses the fear driving the question."},
  {q:"The customer wants to move forward but says, 'Can you start next week?' Your schedule is booked for 3 weeks. How do you handle this without losing the close?",o:["Promise next week and figure out scheduling later","Tell them 3 weeks is the soonest and take it or leave it","Close the deal today with the 3-week timeline, explain that the wait means crews are in demand which reflects quality, and offer to lock in their spot with the agreement","Refer them to another company that can start sooner"],c:2,e:"Close the deal now, not later. Frame the wait positively: demand reflects quality. Locking in their spot with a signed agreement prevents them from shopping during the wait. A signed customer with a 3-week wait is better than a prospect who 'wants to think about it.'"},
  {q:"After presenting the proposal, both spouses agree the work is needed but disagree about timing. The wife wants to do it now and the husband wants to wait until after the holidays. How do you navigate this?",o:["Side with the wife since she wants to act now","Suggest they discuss it privately and call you when they decide","Acknowledge both perspectives, then use the documented evidence to discuss what waiting could cost vs the holiday financial concern, and ask if scheduling the work for after the holidays while locking in today's pricing could satisfy both","Offer a holiday discount to convince the husband"],c:2,e:"Never take sides. Acknowledge both positions. Find a creative solution that addresses both concerns: scheduling post-holiday work at today's pricing. This gives the husband his timing and the wife her commitment to action. Both feel heard."},
  {q:"You close the deal and the customer signs. As you are packing up, they say, 'I hope I'm making the right decision.' How do you handle buyer's remorse in the moment?",o:["Ignore it since they already signed","Reassure them by referencing specific findings from their inspection and remind them why the work is necessary based on the evidence they saw","Tell them they can cancel if they change their mind","Offer to reduce the scope so they feel better about the price"],c:1,e:"Post-signature doubt is normal. Reinforce the decision by anchoring it to the specific evidence they saw and understood during the process. The 90 minutes of documentation and education becomes the foundation for their confidence."},
  ],
  expert:[
  {q:"You ask 'How would you like to move forward?' and the customer responds with a counter: 'I'll move forward at $11,000 instead of $14,500.' You know the full scope is necessary. What is the BEST sequence of actions?",o:["Accept $11,000 and reduce scope accordingly","Reject the counter and hold firm at $14,500","Diagnose what is behind the number: ask what about $14,500 concerns them, determine if it is value or cash flow, then either re-educate on value or solve with financing before discussing any scope adjustment with clear trade-offs","Split the difference at $12,750"],c:2,e:"A counter-offer is a symptom, not a diagnosis. $11,000 might mean 'I can't afford $14,500' (cash flow) or 'I don't think it's worth $14,500' (value). Each requires a different response. Diagnose first, then address the root cause. Only discuss scope reduction with explicit trade-offs as a last resort."},
  {q:"The customer says, 'We want to move forward, but only if you can guarantee the problem won't come back.' You know no foundation company can guarantee against all future movement. What is the MOST honest and effective response?",o:["Guarantee the work to close the deal","Tell them no one can guarantee that and risk losing the deal","Explain specifically what your warranty covers and for how long, what your solution is designed to do, and what factors are outside anyone's control, positioning your thoroughness as the best possible protection","Offer an extended warranty at additional cost"],c:2,e:"Honesty is the only option. A false guarantee is a liability. Being vague loses trust. The best response is specific: here is what the warranty covers, here is what the solution addresses, here is what no one can control. Your thorough process and documentation position your work as the most reliable approach."},
  {q:"You have addressed the customer's price objection, done the second ask, and they say, 'We just need to sleep on it.' You have already done everything correctly. What is your best move?",o:["Push for a third ask to close tonight","Accept it gracefully, confirm what specifically they want to think through, set a specific follow-up time for tomorrow, and leave the full Leave-Behind package on the kitchen table","Offer a same-day-only discount to create final urgency","Tell them sleeping on it usually means no and ask what the real issue is"],c:1,e:"After two solid asks, pushing harder creates resistance. Accept gracefully but do not leave without: understanding what they are thinking about, a specific callback time, and the full leave-behind. The proposal, referral book, and financing terms continue working overnight. Manufactured urgency at this point damages trust."},
  {q:"The customer is ready to close but asks you to remove the vapor barrier from the proposal to lower the price. You know the vapor barrier is essential for the moisture solution to work long-term. How do you handle this right-sizing request?",o:["Remove it since the customer gets to decide their scope","Refuse to remove it and hold your full proposal","Explain the specific trade-off: removing the vapor barrier means the moisture remediation lacks long-term protection, show the documented moisture readings that justify it, and let the customer make an informed decision while being clear about the consequence","Offer to discount the vapor barrier instead of removing it"],c:2,e:"Right-sizing requires explicit trade-off communication. You cannot refuse to adjust scope, but you must ensure the customer understands exactly what they are giving up. Use the documented evidence to show why the vapor barrier is part of the solution. An informed customer who declines is better than an uninformed one who later has problems."},
  {q:"You left a complete Leave-Behind and the customer calls you 3 days later saying, 'We showed your proposal to my wife's uncle who is a contractor and he said you're overcharging by 40%.' How do you handle this remote third-party influence?",o:["Offer a 40% discount to match the uncle's assessment","Tell them the uncle is not a foundation specialist and does not know what he is talking about","Acknowledge the uncle's input, ask specifically which line items he questioned, and offer to walk through your documentation and evidence for each item so the customer can share that context with the uncle","Invite the uncle to a meeting to discuss the scope"],c:2,e:"Third-party influencers are powerful but usually lack context. Ask specifically which items were questioned. Walk through your evidence for those items. Give the customer the ammunition to educate the uncle. Your evidence-based documentation is your defense. Attacking the uncle's credibility attacks the customer's trusted source."},
  {q:"During the close, the customer says, 'If I sign today, what can you do for me on price?' This is a classic negotiation tactic. What is the Apex approach?",o:["Offer a 5% same-day discount since they are committing","Tell them the price is the price, take it or leave it","Acknowledge their question, reiterate that the proposal is right-sized to their documented needs, and redirect: 'The proposal is built on exactly what your home needs. What I can do is make sure the financing works for your monthly budget. What payment range works for you?'","Offer to throw in an additional service for free"],c:2,e:"Do not discount a right-sized proposal. Do not be adversarial either. Redirect from total price to monthly payment. This answers their question (what can you do for me) with a legitimate tool (financing) rather than a margin-eroding discount. The pivot to monthly payment reframes affordability."},
  {q:"You are on the second ask and the customer says, 'I want to do this, but my neighbor just had her foundation done by another company for much less and she says it's fine.' You know the competitor does lighter-scope work. What is the MOST effective response?",o:["Tell them the neighbor's repair will probably fail","Offer to match the competitor's price","Ask what the neighbor had done, genuinely listen, then explain that every home's needs are different and walk through your documented evidence showing what specifically their home requires and why, without disparaging the neighbor's choice","Tell them to call the neighbor's company if price is their priority"],c:2,e:"The neighbor's experience is real social proof. Dismissing it dismisses the customer's trusted source. Ask genuinely about the neighbor's scope, then redirect to YOUR home's documented needs. Different homes need different solutions. Your evidence shows what THIS home requires. Respect the neighbor's choice while differentiating your recommendation."},
  {q:"The customer signs the agreement. As you place the Leave-Behind materials on the kitchen table, the customer's adult daughter (who was not part of the appointment) walks in and says, 'Mom, you didn't sign anything did you? I told you to wait for me.' The customer looks uncertain. What do you do?",o:["Quickly pack up and leave before the situation escalates","Tell the daughter the decision has been made and the contract is binding","Calmly offer to walk the daughter through the key findings, photos, and evidence so she has the same information her mother used to make the decision, and let the family discuss while you remain available for questions","Tell the customer she can cancel within the rescission period if she changes her mind"],c:2,e:"A new influencer arriving post-close requires composure, not defensiveness. The daughter needs the information the mother received. Your evidence-based process is your strongest asset here. Walk her through the key findings briefly. If your process was sound, the evidence will support the decision."},
  {q:"A customer who was ready to close says, 'I just realized my home warranty might cover this. Let me check first.' You are fairly certain a standard home warranty will not cover foundation repair. What is the best play?",o:["Tell them home warranties never cover foundation work","Wait for them to find out on their own and call you back","Acknowledge their thought, share that in your experience most home warranties exclude foundation structural repair, suggest they check their specific policy, and ask to schedule a follow-up call for tomorrow so you can answer any questions after they review their coverage","Offer to call the warranty company on their behalf"],c:2,e:"Share your knowledge honestly without being dismissive. Most home warranties exclude foundation work, but their specific policy might be different. Encouraging them to check while scheduling a follow-up keeps the relationship warm and demonstrates confidence that the truth supports your position."},
  {q:"You have done everything right: thorough inspection, excellent education, evidence-based proposal, financing introduced properly, good first ask, diagnosed the objection, addressed it, and done the second ask. The customer still says no. What is the Apex approach to this situation?",o:["Keep asking until they say yes or ask you to leave","Leave immediately and move on to the next prospect","Accept the decision professionally, ask if you can follow up in a few weeks, ensure the Leave-Behind is complete on the kitchen table, and leave the door open for future contact without pressure","Offer your best possible price as a final attempt"],c:2,e:"Not every appointment closes, even with perfect execution. Professionalism in a loss builds long-term reputation. The leave-behind continues working. A follow-up timeline keeps the relationship alive. Many 'no' decisions become 'yes' weeks or months later when the customer is ready. Pushing past a genuine no damages trust permanently."},
  ],
},
mod5:{
  foundation:[
  {q:"How many touches are in the post-appointment follow-up system?",o:["3","4","5","7"],c:2,e:"The 5-Touch System provides structured follow-up from same-day contact through a day-21 final follow-up."},
  {q:"What is the first touch in the 5-Touch System?",o:["A follow-up phone call","A same-day thank-you text within 2 hours","An email with a proposal recap","A handwritten thank-you card"],c:1,e:"Touch 1 is a same-day thank-you text sent within 2 hours of the appointment."},
  {q:"When does Touch 2 (the follow-up call) occur?",o:["Same day","Day 2","Day 5","Day 7"],c:1,e:"Touch 2 is a follow-up call on day 2 after the appointment."},
  {q:"What type of message is Touch 3 on day 5?",o:["A pricing reminder","A value-add message","A discount offer","A scheduling confirmation"],c:1,e:"Touch 3 on day 5 is a value-add message that provides additional helpful information to the customer."},
  {q:"After how long does a customer typically 'mentally move on' from your appointment?",o:["6 hours","24 hours","48 hours","1 week"],c:1,e:"Research shows the 24-hour follow-up window is critical. After that, customers mentally move on."},
  {q:"When is the BEST time to ask for referrals?",o:["During the initial appointment","After every completed install","30 days after the job","Only if the customer brings it up"],c:1,e:"Ask for referrals after every install when customer satisfaction is at its highest."},
  {q:"How do self-generated leads compare to purchased leads in close rate?",o:["About the same","Close at 2-3x the rate","Close at half the rate","Close at 5x the rate"],c:1,e:"Self-generated leads close at 2-3x the rate of purchased leads and cost a fraction."},
  {q:"Within what timeframe should you follow up on a referral?",o:["1 week","48 hours","24 hours","Same business day"],c:2,e:"Follow up on referrals within 24 hours. The referring customer's credibility is on the line."},
  {q:"What is the most common mistake reps make with follow-up?",o:["Following up too aggressively","Doing one follow-up then giving up","Calling too early in the morning","Sending too many emails"],c:1,e:"Most reps do one follow-up then give up. The 5-Touch System prevents this by providing a structured cadence."},
  {q:"When asking for referrals, you should be specific by mentioning which types of people?",o:["Business partners and investors","Neighbors, family members, and coworkers","Real estate agents and contractors","Social media followers"],c:1,e:"Be specific when asking: 'Is there anyone you know — a neighbor, family member, coworker — who might be dealing with something similar?'"},
  ],
  advanced:[
  {q:"A customer seemed interested during the appointment but hasn't returned your day-2 call. It's now day 5. What should you do?",o:["Call again immediately — they might have missed it","Send a value-add message as planned in the 5-Touch System","Assume they're not interested and move on","Show up at their home unannounced"],c:1,e:"Stick to the system. Day 5 is the scheduled value-add message (Touch 3). Deviating from the cadence either by skipping steps or doubling up on calls can feel pushy."},
  {q:"A pending customer says, 'I need to think about it.' What is the recommended response approach?",o:["Give them a week of silence to think","Ask 'What would need to happen for you to feel comfortable moving forward?'","Offer an immediate discount to close now","Tell them the price goes up next week"],c:1,e:"This open-ended question surfaces specific concerns you can address, rather than guessing what's holding them back."},
  {q:"You completed an install and the homeowner is thrilled. Before asking for referrals, you should:",o:["Wait a week so they can live with the repair first","Ask immediately while satisfaction is highest","Send a text asking for referrals later that evening","Only ask if they bring up knowing someone"],c:1,e:"Ask after every install when satisfaction is highest. Waiting diminishes enthusiasm and reduces referral likelihood."},
  {q:"A customer says, 'We want to get two more quotes before deciding.' How do you create urgency honestly?",o:["Tell them your price expires today","Explain that foundation conditions won't self-correct and may worsen","Say competitors will give them bad information","Offer to match any lower quote on the spot"],c:1,e:"Creating urgency honestly means stating the factual reality: conditions won't self-correct. Never guilt or pressure — let the truth create appropriate urgency."},
  {q:"You receive a referral from a past customer on Monday afternoon. When should you contact the referral?",o:["Next Monday to give them time","By Tuesday afternoon at the latest","Within the hour","After you research their property first"],c:1,e:"Follow up on referrals within 24 hours. Monday afternoon to Tuesday afternoon keeps you within that critical window."},
  {q:"After calling the referral, what else should you do?",o:["Nothing — the referral is now your lead","Send a thank-you to the person who referred them","Post about the referral on social media","Send the referrer a gift card"],c:1,e:"Always thank the referrer by calling them back. This encourages future referrals and maintains the relationship."},
  {q:"A customer went silent after Touch 3. It's now day 10. You should:",o:["Give up — three attempts is enough","Proceed with Touch 4 check-in as scheduled","Send a strongly worded message about their foundation getting worse","Have your manager call them instead"],c:1,e:"Follow the system. Touch 4 is a day-10 check-in. Most reps quit after one or two attempts — the system is designed to persist professionally."},
  {q:"You're converting a pending customer who says, 'I just can't afford it right now.' The best approach is to:",o:["Immediately offer a lower price","Ask what would need to happen for them to feel comfortable moving forward","Explain financing options and ask what payment structure works for their budget","Tell them they can't afford NOT to fix it"],c:2,e:"While asking what they need is good, when someone specifically cites affordability, addressing the financial concern directly with financing options is the most helpful next step."},
  {q:"What makes Touch 5 (day 21) different from earlier touches?",o:["It's the first email in the sequence","It's the final professional follow-up — the last scheduled contact","It includes a final discount offer","It's when you ask for referrals"],c:1,e:"Touch 5 on day 21 is the final professional follow-up. It closes the loop respectfully whether or not the customer moves forward."},
  {q:"You just completed an install and want to ask for a referral. Which phrasing is most effective?",o:["'Know anyone who needs foundation work?'","'Is there anyone you know — a neighbor, family member, coworker — who might be dealing with something similar?'","'Can you post about us on Facebook?'","'Would you give us a five-star review?'"],c:1,e:"Being specific with categories (neighbor, family member, coworker) prompts the customer to mentally scan their network rather than giving a vague 'no.'"},
  ],
  expert:[
  {q:"A customer you met on Monday responds enthusiastically to your Touch 1 text but then goes completely dark. It's now day 10. You've followed the 5-Touch System perfectly. Your manager asks if you should drop by their house. What's the best call?",o:["Yes — showing up demonstrates commitment and hustle","No — continue the 5-Touch System with Touch 4 as planned","Yes — but only if you're in the neighborhood already","No — skip to Touch 5 and close it out"],c:1,e:"Stick to the system. Showing up unannounced can feel intrusive and damage trust. The 5-Touch System is designed to maintain professional persistence without crossing boundaries."},
  {q:"You have a customer who said 'yes' to the repair but keeps delaying the scheduling call. They're responsive to texts but won't commit to a date. What's really happening and what should you do?",o:["They're just busy — keep texting until they pick a date","They likely have an unvoiced concern — ask what would need to happen for them to feel comfortable moving forward","They've decided against it — stop following up","They're waiting for another quote — offer a discount"],c:1,e:"Responsive but non-committal behavior signals an unaddressed concern. The key question 'What would need to happen...' surfaces the real objection rather than playing an endless scheduling game."},
  {q:"A past customer gives you a referral but says, 'Don't tell them I sent you — they're private people.' How should you handle this?",o:["Respect their wish completely and cold-approach the referral","Ignore the request and use the referrer's name anyway for credibility","Decline the referral since you can't use it effectively","Thank the referrer, contact the referral without using the name, but mention you've worked in the area"],c:3,e:"Respect the referrer's boundary while still leveraging proximity. Saying you've done work in the neighborhood provides credibility without violating trust. Always honor the referrer's wishes."},
  {q:"You consistently get referrals from installs but rarely from appointments that don't close. A colleague suggests asking for referrals even from no-sale appointments. Is this a good idea?",o:["No — only satisfied install customers give good referrals","Yes — anyone who experienced your professionalism may know someone who needs help","No — it looks desperate to ask after someone declined your service","Yes — but only if the customer gave a positive reason for not buying"],c:1,e:"Even no-sale customers experienced your expertise and professionalism. They may know someone who needs foundation work. The instruction is to ask after every install, but expanding to professional non-sale interactions can also yield results."},
  {q:"It's 11:30 PM and you just realized you forgot to send the same-day thank-you text to a customer you saw at 4 PM. What should you do?",o:["Send it now — the 2-hour window already passed, so any same-day contact counts","Wait until 8 AM tomorrow — a late-night text is unprofessional and the 24-hour window still applies","Send it at 6 AM to catch them first thing","Skip Touch 1 and start with Touch 2 on day 2"],c:1,e:"An 11:30 PM text is unprofessional and could irritate the customer. Sending first thing in the morning still falls within the 24-hour window before they mentally move on, and preserves your professional image."},
  {q:"You've been following the 5-Touch System for 8 months and notice your day-5 value-add messages get the most responses. Should you restructure the system to send value-add messages earlier?",o:["Yes — if day 5 works best, move it to day 2 for faster conversions","No — the system is designed with intentional spacing and shouldn't be changed","Yes — test moving it to day 3 while keeping the rest of the cadence intact","No — response rate on one touch doesn't mean the sequence should change"],c:2,e:"The system provides a framework, not an immutable rule. If data shows value-add content resonates, testing a small adjustment while preserving the overall cadence is smart. Wholesale restructuring is risky, but refusing to optimize is also a mistake."},
  {q:"Two reps debate follow-up strategy. Rep A says the 24-hour window means you must close on the first visit or lose the deal. Rep B says the 5-Touch System means patience always wins. Who's right?",o:["Rep A — urgency is everything in sales","Rep B — persistence always beats speed","Neither — the 24-hour window means first follow-up is critical, while the 5-Touch System provides structure for the remaining process","Both — it depends on the customer"],c:2,e:"Rep A misinterprets urgency as same-day closing pressure. Rep B confuses patience with passivity. The truth is the 24-hour window emphasizes immediate first follow-up, and the 5-Touch System structures the rest. Speed AND persistence matter."},
  {q:"A customer from 6 months ago calls and says they're ready to move forward. You had completed all 5 touches with no response. They say your day-21 message stuck with them. What's the key lesson?",o:["Follow-up pays off even when there's no immediate response","You should keep following up beyond the 5-touch system","Day 21 is the most important touch","Customers always come back eventually if the product is good"],c:0,e:"This validates the entire 5-Touch System. Not every touch gets a response, but each one builds familiarity and trust. The system works even when it seems like it isn't. The lesson isn't that day 21 is magic — it's that consistent follow-up accumulates."},
  {q:"You ask a satisfied install customer for a referral and they say, 'I don't really know anyone.' You should:",o:["Accept it and move on — pushing harder is rude","Say 'That's okay' and then prompt with specific categories: neighbor, family member, coworker","Ask them to post on social media instead","Leave your card and say 'If you think of anyone...'"],c:1,e:"'I don't know anyone' is usually a reflexive response, not a considered one. Prompting with specific categories (neighbor, family member, coworker) helps them mentally scan their network. This isn't pushy — it's helpful specificity."},
  {q:"Your company gives you purchased leads that close at 20%. Your self-generated referral leads close at 55%. Your manager wants you to spend more time calling purchased leads to hit volume targets. How do you handle this?",o:["Focus entirely on purchased leads — manager knows best","Ignore the manager and only work referrals","Present the data: self-gen leads close at 2-3x the rate and cost a fraction, then propose a balanced approach that prioritizes referral generation","Comply but secretly spend less time on purchased leads"],c:2,e:"Data-driven advocacy is the professional approach. Self-generated leads close at 2-3x the rate and cost a fraction, but completely ignoring purchased leads or your manager isn't sustainable. Propose a balanced pipeline strategy backed by your numbers."},
  ],
},
mod6:{
  foundation:[
  {q:"According to customer psychology principles, buying decisions are:",o:["Purely rational cost-benefit analyses","Emotional first, then justified rationally","Based entirely on price","Random and unpredictable"],c:1,e:"Decisions are emotional first, then justified rationally second. Understanding this is fundamental to effective selling."},
  {q:"What does 'loss aversion' mean in customer psychology?",o:["Customers hate losing arguments","Losses are felt roughly 2x as powerfully as equivalent gains","Customers always choose the cheapest option","People avoid making any decisions"],c:1,e:"Loss aversion means losses are felt roughly 2x as powerfully as equivalent gains. This is why cost-of-inaction framing is more motivating than benefit-of-action framing."},
