  {q:"A realtor says that crawl space encapsulation is not needed because the home has been fine for 30 years without it. How do you respond?",o:["They are correct; if the home has lasted 30 years, it does not need encapsulation","Wood decay and moisture damage are cumulative and progressive. The fact that the home has stood for 30 years of unchecked moisture exposure means the damage is likely further along, not that it is immune to it.","Encapsulation is only needed for new homes with modern construction","You agree with the realtor to maintain the relationship"],c:1,e:"Moisture damage is cumulative. Thirty years of exposure does not prove the home is fine; it means the home has had 30 years of progressive deterioration. Wood decay, mold growth, and structural weakening advance slowly but continuously."},
  {q:"What is the role of termination bar in a crawl space encapsulation?",o:["It holds the floor liner down to prevent movement from air circulation","It mechanically secures the vapor barrier to the foundation wall at the top edge, creating an airtight seal between the liner and the wall","It prevents termites from entering behind the liner","It is a structural reinforcement for the top of the foundation wall"],c:1,e:"Termination bar is a mechanical fastening strip that secures the vapor barrier to the wall and creates an airtight seal at the top edge. Without it, the liner can sag and air can pass behind it."},
  {q:"Why must all foundation vents be permanently sealed during encapsulation?",o:["Building codes require sealed vents with encapsulation","In humid climates, open vents introduce warm moist air that condenses in the cool crawl space, counteracting the encapsulation. The sealed envelope only works if all air pathways are controlled.","Vents allow pests to enter the sealed crawl space","Vents are no longer needed because the dehumidifier provides air circulation"],c:1,e:"Open vents defeat the purpose of encapsulation by continuously introducing uncontrolled humid air. The entire concept depends on sealing the space and controlling the air environment with a dehumidifier."},
  {q:"A homeowner is concerned about radon in their crawl space. How does encapsulation relate to radon mitigation?",o:["Encapsulation eliminates radon completely","Encapsulation can help reduce radon levels by sealing the soil surface, but it is not a certified radon mitigation system. A dedicated radon test and potential sub-membrane depressurization system may be needed.","Encapsulation has no effect on radon whatsoever","Encapsulation makes radon worse by trapping it under the barrier"],c:1,e:"The vapor barrier can reduce radon entry by sealing the soil surface, but encapsulation alone is not a radon mitigation system. If radon levels are elevated, a dedicated sub-membrane depressurization system should be discussed with a radon specialist."},
  ],
  expert:[
  {q:"A crawl space has been encapsulated by a competitor. The liner is 6-mil, no dehumidifier is installed, two vents are still open, and several pipe penetrations are unsealed. The homeowner is satisfied because the crawl space 'looks clean.' What do you do?",o:["Compliment the work since the homeowner is happy and offer to check back in a year","Explain that the system has four critical deficiencies: the liner is below the 12-mil minimum, there is no dehumidifier, vents are open, and penetrations are unsealed. The cosmetic appearance masks a system that will not control moisture effectively.","Recommend only adding a dehumidifier since that is the most important missing element","Recommend tearing everything out and starting over"],c:1,e:"All four deficiencies must be communicated honestly. A 6-mil liner is puncture-prone, no dehumidifier means trapped moisture stays, open vents introduce uncontrolled humid air, and unsealed penetrations break the envelope. Looks are deceiving; the system will fail to control moisture."},
  {q:"A homeowner asks: 'If the crawl space is sealed, won't that trap mold inside and make it worse?' This is a common objection. What is the correct response?",o:["Yes, mold should be treated before encapsulation and then the sealed environment with dehumidification keeps humidity below mold's growth threshold, preventing recurrence. Sealing without dehumidification would be a valid concern.","No, mold cannot grow in a sealed space regardless of humidity","Yes, which is why vents should be left partially open for airflow","Mold is killed by the chemicals in the vapor barrier material"],c:0,e:"The homeowner's concern has some logic. Existing mold should be addressed before sealing. But the sealed and dehumidified environment creates conditions hostile to mold (below 60% RH). The key is that encapsulation PLUS dehumidification prevents recurrence. Without the dehumidifier, their concern would be valid."},
  {q:"You measure a crawl space at 62% RH. Wood MC is 18%. No standing water. No wall staining. The homeowner has a tight budget. A full encapsulation with dehumidifier would cost $8,000. They ask if anything less would help. What is the most honest recommendation?",o:["Full encapsulation or nothing; partial solutions do not work","Just install a dehumidifier; skip the barrier","The readings are just barely past threshold. A staged approach starting with a quality vapor barrier on the floor and sealed vents, with dehumidifier added when budget allows, would be better than nothing and give meaningful improvement immediately.","Wait until the readings get worse before spending money"],c:2,e:"Honesty matters. The readings are barely elevated. A staged approach with the barrier first and dehumidifier second gives immediate improvement. It is not as good as the full system, but it is responsible and builds trust. Insisting on all-or-nothing when the situation is borderline is not in the customer's best interest."},
  {q:"A homeowner's crawl space was encapsulated a year ago by your company. They call to report a musty smell returning. You measure RH at 67%. The liner, sealed vents, and penetrations all check out. The dehumidifier is running. What is the most likely issue?",o:["The liner has developed micro-tears that are invisible to the eye","The dehumidifier may have lost capacity due to a dirty filter, failing compressor, or being undersized for the actual conditions. Alternatively, a new bulk water source may have developed that exceeds the dehumidifier's capacity.","The musty smell is coming from the home above, not the crawl space","Encapsulation naturally loses effectiveness after one year and needs renewal"],c:1,e:"If the envelope is intact but RH is rising, the dehumidifier is the likely culprit. A dirty filter, failing compressor, or undersized unit cannot keep up. A new water source (broken pipe, changed drainage) could also overwhelm the dehumidifier. Systematic troubleshooting is needed."},
  {q:"A homeowner asks if they can use their crawl space for storage after encapsulation. What is the nuanced answer?",o:["Yes, encapsulation makes the crawl space fully suitable for any storage","Limited lightweight storage is possible if items do not puncture the liner and do not block airflow to the dehumidifier. Heavy items, sharp objects, and items blocking the dehumidifier or access paths should be avoided. Clarify that it is a conditioned utility space, not a living area.","No, nothing should ever be stored in an encapsulated crawl space","Only if they add a second dehumidifier to handle the added moisture from stored items"],c:1,e:"The answer is nuanced. Light storage is possible with precautions: protect the liner from puncture, do not block dehumidifier airflow, and maintain clear access for inspection. It is not a basement or attic. Setting realistic expectations prevents future issues."},
  {q:"An energy auditor tells a homeowner they should insulate the crawl space floor (between the joists) rather than encapsulate. The auditor says it is cheaper and accomplishes the same thing. Is this correct?",o:["Yes, floor insulation is an equivalent alternative to encapsulation","No. Floor insulation does not address the root cause: moisture. Insulation between joists in a vented crawl space will absorb moisture, sag, and become a habitat for mold and pests. Encapsulation addresses the moisture source, which is the actual problem.","Floor insulation is better than encapsulation for energy savings","Both approaches are equally effective but encapsulation lasts longer"],c:1,e:"Floor insulation in a vented, humid crawl space is a well-documented failure. The insulation absorbs moisture from the crawl space air, sags, grows mold, and loses R-value. It treats a symptom (heat loss) while ignoring the disease (moisture). Encapsulation addresses the root cause."},
  {q:"Two neighboring homes have identical construction. One was encapsulated five years ago and the other was not. The encapsulated home's owner claims their energy bills dropped 20% and they have had no pest issues. The other home has a mold-covered crawl space, cupping floors, and high energy bills. A skeptic says this is anecdotal. How do you use this ethically?",o:["Use it as definitive proof that encapsulation works for all homes","Dismiss it because anecdotal evidence is unreliable","Present it as a compelling real-world comparison while being transparent that individual results vary based on home condition, HVAC efficiency, and other factors. Use it to illustrate the potential impact without making it a guarantee.","Only share the positive case study without mentioning the comparison"],c:2,e:"Real-world comparisons are powerful but must be presented honestly. It is a compelling illustration of potential outcomes, not a guarantee. Acknowledging that results vary based on individual conditions demonstrates integrity and sets realistic expectations."},
  {q:"A customer is considering both encapsulation and a new HVAC system. Their HVAC contractor says to do the HVAC first. What is the correct order and why?",o:["HVAC first so the new system can manage crawl space moisture","Encapsulation first, because the current moisture load from the crawl space affects HVAC sizing. If HVAC is installed first, it will be oversized for the reduced load after encapsulation, leading to short cycling and poor humidity control.","Order does not matter; both systems operate independently","Both should be done simultaneously for the best result"],c:1,e:"Encapsulation should come first. It reduces the moisture load on the HVAC system by 40-50% of the air volume coming from below. If the HVAC is sized before encapsulation, it will be sized for a much higher moisture load and will be oversized after encapsulation, leading to inefficient short cycling."},
  {q:"A homeowner in a flood zone asks if encapsulation will protect their crawl space from flood water. What is the honest answer?",o:["Yes, the sealed barrier will keep flood water out","Encapsulation is designed for soil moisture vapor and normal groundwater, not flood events. Flood water can overwhelm, lift, or damage the barrier. In flood zones, drainage capacity and barrier attachment must be designed for the potential volume. Encapsulation helps with day-to-day moisture but is not a flood barrier.","No, encapsulation is incompatible with flood zone properties","Yes, if the liner is upgraded to a 20-mil thickness"],c:1,e:"Honesty is critical in flood zones. Encapsulation is designed for moisture management, not flood protection. Flood water can float the liner, overwhelm seals, and carry debris. It is beneficial for normal conditions but the homeowner must understand its limitations during flood events."},
  {q:"A homeowner has a crawl space with HVAC ductwork. Visible condensation is forming on the ducts and dripping onto the dirt floor. A previous contractor recommended only insulating the ductwork. Is that sufficient?",o:["Yes, duct insulation will stop condensation and solve the moisture problem","Duct insulation reduces condensation on the ducts but does not address the root cause: a humid crawl space environment. The humid air will still damage wood, promote mold, and reduce HVAC efficiency. Encapsulation addresses the environment itself, which also resolves the duct condensation.","Duct insulation is unnecessary if the crawl space is encapsulated","The ductwork should be replaced with a ductless system"],c:1,e:"Duct insulation treats a symptom. The root cause is a humid crawl space environment that damages everything in it. Encapsulation with dehumidification controls the environment, which resolves duct condensation AND protects all other components. Duct insulation alone leaves the underlying environment unchanged."},
  ],
},
jt4:{
  foundation:[
  {q:"What is the density of polyurethane foam used for concrete lifting?",o:["0.5-1 lb/ft3","2-4 lbs/ft3","50-75 lbs/ft3","100+ lbs/ft3"],c:1,e:"Polyurethane foam weighs only 2-4 lbs per cubic foot, compared to mudjacking slurry at 100+ lbs/ft3. This lightweight nature is one of its primary advantages."},
  {q:"How large are the injection holes for polyurethane lifting?",o:["1/4 inch","5/8 inch (penny-sized)","1-2 inches","3-4 inches"],c:1,e:"Polyurethane injection holes are 5/8 inch, roughly the size of a penny. This is significantly less invasive than the 1-2 inch holes required for mudjacking."},
  {q:"How long does polyurethane take to cure after injection?",o:["5 minutes","15 minutes","2-4 hours","24-48 hours"],c:1,e:"Polyurethane cures in approximately 15 minutes, allowing the surface to be used almost immediately. Mudjacking requires 24-48 hours of cure time."},
  {q:"What is the most important step BEFORE lifting any settled concrete?",o:["Measuring the exact thickness of the slab","Evaluating the root cause of settlement to determine if soil conditions are addressed","Cleaning the surface of the concrete","Getting a permit from the local building department"],c:1,e:"Always evaluate the root cause before lifting. If the underlying soil condition that caused settlement is unchanged, the concrete may re-settle after lifting. Understanding why it sank prevents repeat failures."},
  {q:"What is a key advantage of polyurethane over mudjacking material in areas with water exposure?",o:["Polyurethane is cheaper than mudjacking material","Polyurethane is waterproof and non-erosive, so it will not wash out like mudjacking slurry can","Polyurethane is heavier and more stable in wet soil","Polyurethane expands more in wet conditions"],c:1,e:"Polyurethane is waterproof and non-erosive. Mudjacking slurry is cement-based and can erode or wash out over time when exposed to water, potentially leading to re-settlement."},
  {q:"What floor slope measurement warrants a professional evaluation?",o:["Any visible slope regardless of measurement","1/2 inch over 8 feet","1 inch over 8 feet","3 inches over 8 feet"],c:2,e:"A slope of 1 inch over 8 feet is significant and warrants evaluation. A slope of 2 or more inches over 8 feet is considered an urgent structural concern."},
  {q:"Why is precise measurement of settlement critical before concrete lifting?",o:["To calculate the exact volume of polyurethane needed for the job","To provide an exact documented measurement like '1.5 inches over 8 feet' rather than subjective descriptions like 'it looks uneven'","To satisfy insurance requirements for a claim","To determine if the concrete is worth saving or should be replaced"],c:1,e:"Exact documentation like '1.5 inches over 8 feet' provides a professional standard for evaluating severity, planning the repair, and demonstrating the results. Subjective descriptions lack the precision needed for proper assessment."},
  {q:"What is the typical settlement pattern for garage floors?",o:["Settlement at the edges where the slab meets the walls","Settlement in the center where fill soil beneath the slab compresses","Uniform settlement across the entire slab","Settlement only near the garage door opening"],c:1,e:"Garage floors typically settle in the center because the slab often rests on fill soil that was brought in during construction. Over time, this fill compresses or washes out, leaving the center unsupported."},
  {q:"Why does mudjacking add to the problem of already settled concrete?",o:["Mudjacking is more expensive than polyurethane","Mudjacking slurry weighs 100+ lbs/ft3, adding significant weight to soil that already failed to support the original load","Mudjacking requires larger holes that weaken the slab","Mudjacking takes too long to cure"],c:1,e:"Mudjacking slurry at 100+ lbs/ft3 adds enormous weight to soil that has already demonstrated it cannot support the existing load. Polyurethane at 2-4 lbs/ft3 adds virtually no additional weight."},
  {q:"What is the typical settlement pattern for a stoop (front step)?",o:["The stoop settles evenly into the ground","The stoop pulls away from the house, creating a gap","The stoop tilts toward the house","Only the top step settles while the base remains stable"],c:1,e:"Stoops typically pull away from the house because the fill soil behind the foundation wall compresses or erodes. The stoop tilts forward and separates from the home."},
  ],
  advanced:[
  {q:"A homeowner has a driveway with settlement at the joints where sections meet. This is a very common pattern. What is the most likely cause?",o:["The concrete mix was too weak at the joints","The joints are where the backfill from construction meets native soil, creating a transition zone with different compaction and settlement rates","Tree roots pushed the slabs apart at the joints","Frost heave lifted some sections and not others"],c:1,e:"Driveway joints often align with the transition between backfill (disturbed, loosely compacted soil from construction) and native (undisturbed, naturally compacted) soil. These zones settle at different rates, creating the offset."},
  {q:"A pool deck has settled, with the worst settlement occurring on the side farthest from the pool shell. Why does this pattern occur?",o:["The pool water is heavier on the near side, pushing it down and lifting the far side","The concrete nearest the pool shell is supported by the rigid shell structure, while the outer edge rests on backfill that compresses over time","Pool chemicals leaked into the soil on the far side and dissolved it","The far side was poured on a different day with a different concrete mix"],c:1,e:"The pool shell acts as a rigid support for nearby concrete. The further the deck extends from the shell, the more it depends on backfill soil, which is looser and more prone to compression and erosion."},
  {q:"A homeowner has a sidewalk with a 1-inch trip hazard at a joint. They ask if it really needs to be fixed or if it is just cosmetic. What do you explain?",o:["It is purely cosmetic and only needs fixing if they are planning to sell","Trip hazards are a significant liability. A 1-inch offset can cause falls, especially for elderly visitors or children. Many municipalities have codes requiring repair of trip hazards, and homeowner's insurance may not cover injuries on known hazards.","It only matters if the sidewalk is on public property","One inch is within normal tolerance and does not need repair"],c:1,e:"Trip hazards are a serious liability concern, not just cosmetic. Falls from uneven sidewalks cause injuries, and homeowners can be held liable. A known hazard that is not repaired can create even greater legal exposure."},
  {q:"A homeowner had mudjacking done three years ago and the same slab has re-settled. They want a permanent fix. What do you tell them about why it failed?",o:["The mudjacking contractor did poor work","Mudjacking slurry at 100+ lbs/ft3 added significant weight to soil that already could not support the original slab. The added weight accelerated re-settlement. Additionally, the slurry can erode over time, especially with water exposure.","Mudjacking always fails after three years","The soil was not compacted before mudjacking, which is a standard requirement"],c:1,e:"Mudjacking adds massive weight (100+ lbs/ft3 of slurry) to already failing soil. This additional load can accelerate settlement. The slurry can also erode or wash out. Polyurethane at 2-4 lbs/ft3 avoids adding meaningful weight."},
  {q:"A customer's garage floor has 2.5 inches of settlement over 8 feet. They want to just lift it and be done. What concern should you raise?",o:["The injection holes will be too visible in a garage floor","2.5 inches over 8 feet exceeds the 'urgent structural concern' threshold of 2 inches. The root cause must be investigated. This level of settlement may indicate a significant subsurface void or soil failure that could affect the foundation, not just the slab.","Polyurethane cannot lift more than 2 inches","The garage door will not work properly after the floor is lifted"],c:1,e:"At 2+ inches over 8 feet, this is an urgent structural concern, not just cosmetic settlement. The severity suggests significant soil failure or voiding that could also affect the foundation. Root cause investigation is essential before any lifting."},
  {q:"What is the typical settlement pattern for concrete around a home's foundation where the stoop, patio, and driveway all show settlement?",o:["Random settlement unrelated to the foundation","This pattern typically indicates backfill settlement. All of these slabs rest on fill soil that was placed during construction around the foundation. As backfill consolidates, all adjacent concrete settles.","The weight of the house is pushing adjacent concrete down","Poor drainage caused erosion under all three areas simultaneously"],c:1,e:"When multiple slabs around the foundation all show settlement, the common factor is usually backfill soil. During construction, soil is excavated, then replaced loosely around the foundation. Over time, this fill compresses, causing everything it supports to settle."},
  {q:"A homeowner asks why you cannot just add more concrete on top of the settled slab to make it level. Why is that a poor approach?",o:["Building codes do not allow adding concrete on top of existing slabs","Adding concrete on top adds more weight to already failing soil, does not address the void beneath the slab, and creates a thicker slab that is harder to repair in the future. It is treating the symptom, not the cause.","The new concrete will not bond to the old concrete","It is more expensive than polyurethane injection"],c:1,e:"Overlaying adds more weight to already failing soil, leaves the subsurface void in place, and does not address root cause. The additional weight can cause further settlement, and the void beneath can continue to grow."},
  {q:"How does polyurethane injection compare to mudjacking for cold weather applications?",o:["Both work equally well in cold weather","Neither can be used in cold weather","Polyurethane cures through a chemical reaction and works in cold conditions, while mudjacking slurry requires adequate temperature for cement hydration and can be affected by freezing","Mudjacking is better in cold weather because the slurry generates heat"],c:2,e:"Polyurethane cures through an exothermic chemical reaction independent of ambient temperature. Mudjacking relies on cement hydration, which is slower and can be compromised by cold temperatures, limiting its seasonal usefulness."},
  {q:"A customer has a patio that slopes toward their home's foundation. What is the additional urgency beyond just cosmetic unevenness?",o:["There is no additional urgency; all settled concrete is equally important","A patio sloping toward the foundation directs surface water toward the basement or crawl space, potentially causing water intrusion. Lifting the patio restores proper drainage away from the home.","The slope will eventually cause the patio to slide into the foundation","The patio concrete will deteriorate faster when sloped toward the house"],c:1,e:"A patio sloping toward the home directs rainwater and surface runoff into the foundation, which can contribute to basement water intrusion or crawl space moisture. Proper slope away from the home is critical for water management."},
  {q:"A homeowner's concrete was lifted by another company and re-settled within a year. They are skeptical that poly injection will work. How do you address their concern?",o:["Guarantee it will not re-settle with your product","Acknowledge their concern and explain that the previous failure likely occurred because the root cause was not addressed. You will evaluate the subsurface condition and soil stability before lifting to determine if the soil can support the slab long-term.","Offer a discount to offset the risk of re-settlement","Tell them to replace the slab entirely instead of trying to lift it again"],c:1,e:"Acknowledge the skepticism, then differentiate through process. The key is evaluating root cause before lifting. If soil conditions have not changed, any lift may re-settle. Proper assessment of the subsurface condition is what separates a reliable repair from a repeat failure."},
  ],
  expert:[
  {q:"A garage floor has 1.75 inches of settlement in the center. The homeowner says a competitor told them it is a structural foundation problem needing piers. You observe no cracks in the foundation walls, no sticking doors, and no settlement of the house itself. Who is right?",o:["The competitor, because 1.75 inches is always a structural issue","Garage floor center settlement without any other structural indicators is most likely fill soil compression under the slab, not a foundation issue. The foundation walls and home showing no distress confirms this. Poly injection to fill the void and lift the slab is the appropriate repair.","Neither, the floor should just be replaced","You cannot determine the cause without a soil boring test"],c:1,e:"Center settlement in a garage with no other structural distress is the classic fill soil compression pattern. The house is not settling; only the slab over fill soil is. The competitor is likely upselling piers for a problem that poly injection can solve."},
  {q:"You are evaluating a 15-year-old home with settled concrete in three areas: the stoop has pulled 1.5 inches from the house, the driveway has 1 inch of offset at the third joint, and the patio slopes 0.75 inches toward the foundation. The homeowner wants to prioritize one area. Which do you recommend first?",o:["The stoop, because it is the largest settlement at 1.5 inches","The driveway, because it is the most visible to visitors","The patio, because it is actively directing water toward the foundation, which can cause water intrusion and compound existing problems. The other two are not creating secondary damage.","All three must be done simultaneously or not at all"],c:2,e:"The patio is creating active secondary damage by directing water toward the foundation. The stoop and driveway, while unsightly, are not causing additional problems to the home. Prioritizing the patio prevents water intrusion while the homeowner budgets for the other repairs."},
  {q:"A homeowner has a large concrete patio (600 sq ft) with 2 inches of settlement on one end and is level on the other. They ask if you can lift just the settled half. What is the nuance here?",o:["Yes, lift only the settled half to save money","No, the entire patio must be lifted uniformly","You can lift the settled area, but the transition zone in the middle may create a slight crown as the lifted section meets the level section. The homeowner should understand that the goal is to restore practical levelness and eliminate trip hazards, not achieve laser precision across 600 sq ft.","The patio is too large for polyurethane injection"],c:2,e:"Large slabs present a nuance: lifting one end creates a transition zone where the lifted area meets the level area. Setting realistic expectations about what 'level' means across 600 sq ft is essential. The goal is eliminating the significant slope and trip hazards, not perfection."},
  {q:"A homeowner with a settled driveway asks: 'The settlement happened slowly over 10 years. Can't I just leave it?' The offset at the worst joint is 1.25 inches. What is the complete picture?",o:["Yes, if it took 10 years to get this bad, it will take another 10 to get worse","The settlement is unlikely to stabilize on its own. Soil conditions that caused settlement are ongoing. Additionally, the 1.25-inch offset is a trip hazard liability, water pools at the low joint accelerating concrete deterioration, and the value issue compounds over time as settlement progresses.","They should wait until it reaches 2 inches before taking action","Leave it if it does not bother them visually"],c:1,e:"Settlement is progressive, not self-limiting. The conditions causing it continue. The current state presents liability (trip hazard), accelerating damage (water pooling), and compounding costs (more material needed as settlement increases). Waiting makes the problem worse and the repair more expensive."},
  {q:"You inject polyurethane under a settled patio and achieve 1.5 inches of lift, restoring it to level. Three months later the homeowner calls and says a 6-foot section has re-settled about 0.5 inches. What is the most likely cause?",o:["The polyurethane failed and decomposed under the slab","The localized re-settlement suggests a void or loose soil pocket deeper than the foam reached. The foam filled the immediate void but the soil beneath it continued to consolidate. A secondary injection targeting the deeper void may be needed.","You used insufficient material during the initial injection","The slab is cracked beneath the surface and the halves are settling independently"],c:1,e:"Polyurethane does not decompose. Localized re-settlement in one section suggests a deeper soil issue below the foam layer. The initial injection filled the immediate void, but deeper soil consolidation continued. Targeted re-injection at greater depth can address this."},
  {q:"A home has a slab-on-grade foundation (no basement or crawl space). Interior floors are sloping 1.5 inches over 8 feet. The homeowner asks if poly injection can level the floors. What is the critical distinction you must make?",o:["Yes, poly injection can lift any concrete slab to level","Slab-on-grade interior floors are the structural foundation of the home, not independent flatwork. A 1.5-inch slope may indicate foundation settlement requiring a pier evaluation. Poly injection may be appropriate for minor releveling, but if structural settlement is the cause, piers may be needed first to stabilize the foundation before any slab lifting.","No, interior floors cannot be lifted with polyurethane","Only if the home is single-story"],c:1,e:"Slab-on-grade floors ARE the foundation. Unlike a settled driveway or patio, a sloping slab-on-grade floor may indicate the foundation itself is settling. Piers may be needed to stabilize the foundation first. Simply lifting the slab without addressing structural settlement is treating the symptom."},
  {q:"A commercial client has a warehouse floor with multiple settled areas. They want you to lift the floor but do not want any downtime. The warehouse is full of heavy racking with product. What must you address?",o:["Proceed normally since poly injection causes minimal disruption","The live load from heavy racking may have caused or contributed to the settlement. Lifting the floor under active load risks uneven lifting and continued settlement once the load is reapplied. The racking must be evaluated as a potential cause, and at minimum, heavy loads near injection points should be temporarily relocated.","Refuse the job because warehouses are outside your scope","Charge a premium for working around the existing racking"],c:1,e:"Heavy racking may be a contributing cause of the settlement. Injecting under a slab with significant live load creates unpredictable lifting behavior and risks the same settlement recurring. The load must be evaluated as a factor and managed during the repair."},
  {q:"A homeowner has a 4-inch concrete slab that has settled 1 inch. A competitor recommends tearing it out and pouring a new slab for $12,000. Your poly injection estimate is $3,500. The homeowner asks why the competitor did not offer injection. What is the honest answer?",o:["The competitor is trying to overcharge them","Some situations genuinely require replacement (severely cracked or structurally compromised slabs), but settlement alone is not typically one of them. Many concrete contractors do not offer injection because it is not their service. The homeowner should evaluate whether the slab is structurally sound apart from the settlement. If so, lifting is appropriate and far less expensive.","Replacement is always the better option; injection is a shortcut","The competitor does not know about polyurethane injection"],c:1,e:"Honesty requires acknowledging that replacement IS sometimes right (for severely damaged slabs). But settlement alone on a structurally sound slab is a lifting job, not a replacement job. Many concrete contractors recommend what they offer. The customer deserves to know their options."},
  {q:"A homeowner points to a crack in their settled concrete and asks if poly injection will fix the crack too. How do you set proper expectations?",o:["Yes, the foam will fill and seal the crack from below","Poly injection addresses the settlement by filling the void beneath the slab and lifting it. If the crack was caused by settlement, lifting may close the gap partially. But injection does not repair the crack itself, and pre-existing cracks may not fully close or may reappear as hairlines. Managing this expectation prevents dissatisfaction.","No, the crack means the slab needs to be replaced instead of lifted","The crack must be repaired with epoxy before injection"],c:1,e:"This is an expectation-setting moment. Settlement cracks may partially close when the slab is leveled, but injection does not repair cracks. Being upfront about this prevents the homeowner from expecting perfection and builds trust through transparency."},
  {q:"You are evaluating a driveway where settlement has created a 1-inch lip right at the garage floor transition. The garage floor itself is level. The homeowner is most concerned about this specific trip hazard. Can you lift just the first 3 feet of driveway to eliminate the lip?",o:["Yes, target just the first few feet for a quick, inexpensive repair","You can target the transition area, but injecting under only a small section risks lifting it too high relative to the rest of the driveway. The best approach is to assess the full extent of settlement and create a lifting plan that blends the transition smoothly into the remaining driveway, which may require injection over a wider area than just the first 3 feet.","No, the entire driveway must be lifted or nothing","The transition should be fixed with a concrete ramp rather than lifting"],c:1,e:"Lifting only a tiny section creates a risk of over-lifting and creating a new offset. Proper concrete lifting requires a plan that considers the entire settlement profile and creates smooth transitions. The repair area often needs to be larger than just the visible problem spot."},
  ],
},
jt5:{
  foundation:[
  {q:"What is the core principle behind structural pier systems?",o:["Adding weight to the foundation to press it deeper into the soil","Transferring the load from failing surface soil to deep load-bearing strata","Replacing the existing foundation with a new one","Filling voids beneath the foundation with concrete"],c:1,e:"Structural piers transfer the building's load from shallow, failing soil to deep, stable load-bearing strata. This is the fundamental engineering principle behind all pier systems."},
  {q:"How are push piers driven into the ground?",o:["They are dropped into pre-drilled holes","They are hydraulically driven using the structure's own weight as resistance","They are hammered in with a pile driver","They are screwed in with a torque motor"],c:1,e:"Push piers are hydraulically driven using the structure's weight as resistance. When the pier reaches refusal (it can no longer advance), this confirms it has reached a load-bearing stratum."},
  {q:"How are helical piers installed?",o:["Hydraulically pushed using building weight as resistance","Dropped into augered holes and grouted in place","Screwed into the ground using a hydraulic torque motor, with capacity verified by torque correlation","Vibrated into the ground with an impact hammer"],c:2,e:"Helical piers have steel helical plates on a shaft and are screwed into the ground by a hydraulic torque motor. Installation torque directly correlates to bearing capacity, allowing real-time verification."},
  {q:"What type of foundation cracking indicates SETTLEMENT?",o:["Horizontal cracks at mid-wall height","Stair-step cracks in block walls, diagonal cracks at corners, or vertical cracks in poured walls","Surface crazing with no pattern","Cracks that only appear when wet"],c:1,e:"Settlement cracks follow predictable patterns: stair-step in block (differential settlement), diagonal at corners (racking), and vertical in poured walls (pulling apart). These indicate downward foundation movement."},
  {q:"What do horizontal cracks in a foundation wall indicate?",o:["Foundation settlement requiring piers","Normal concrete curing shrinkage","Lateral soil pressure pushing the wall inward, NOT settlement","Water damage from poor exterior grading"],c:2,e:"Horizontal cracks indicate LATERAL SOIL PRESSURE pushing the wall inward. This is a completely different problem from settlement. Recommending piers for horizontal cracking is the most dangerous diagnostic error."},
  {q:"What is the typical depth range for push piers?",o:["5-10 feet","10-20 feet","30-60+ feet","100+ feet"],c:2,e:"Push piers typically reach depths of 30-60+ feet, driven until refusal confirms they have reached load-bearing strata. The depth varies based on local soil conditions."},
  {q:"What is the typical depth range for helical piers in the Florida Panhandle?",o:["5-10 feet","15-25 feet","40-50 feet","60+ feet"],c:1,e:"In the Florida Panhandle, helical piers typically reach 15-25 feet. The depth depends on where competent bearing soil is encountered, as verified by installation torque readings."},
  {q:"Which pier type is best for heavy structures like masonry or two-story homes?",o:["Helical piers","Push piers","Micro piles","Caissons"],c:1,e:"Push piers are best for heavy structures because they use the structure's weight as resistance during installation. Heavier buildings provide more resistance, allowing the piers to be driven to greater depths and higher capacities."},
  {q:"What is the primary goal of a pier installation?",o:["Lifting the foundation back to its original grade","Stabilization — stopping further movement permanently","Raising the home above flood elevation","Increasing the home's resale value"],c:1,e:"Stabilization is the primary goal: stopping further movement permanently. Lift often occurs as well, but should never be promised as guaranteed full restoration to original grade."},
  {q:"What does it mean when a push pier reaches 'refusal'?",o:["The pier has broken and cannot go deeper","The pier has reached a stratum strong enough to resist further driving, confirming adequate bearing capacity","The hydraulic equipment has reached its maximum power","The pier has reached the maximum length allowed by code"],c:1,e:"Refusal means the pier has reached soil or rock dense enough to resist the hydraulic driving force. This confirms the pier has reached a competent load-bearing stratum capable of supporting the structure's weight."},
  ],
  advanced:[
  {q:"A homeowner has stair-step cracks in their block foundation wall. The cracks are wider at the top than the bottom. What does this pattern indicate?",o:["The wall is being pushed inward by soil pressure","The foundation is settling differentially, with one section dropping more than the adjacent section, causing the wall to rotate. Wider at the top indicates the settlement is pulling the upper portion away.","The cracks are from thermal expansion and are not structural","The mortar joints were not mixed properly during construction"],c:1,e:"Cracks wider at the top indicate rotation. The foundation is settling unevenly, pulling the upper wall away from the stable section. This differential settlement pattern is classic indication for pier stabilization."},
  {q:"A homeowner asks why they need piers when their neighbor's identical home next door has no foundation problems. What explains this?",o:["The neighbor's home was built better","Soil conditions can vary dramatically over short distances. Differences in fill soil, drainage patterns, tree root systems, plumbing leaks, or even slight elevation changes can cause one home to settle while its neighbor does not.","The neighbor probably has the same problems but has not noticed yet","Different construction crews built the two homes with different quality"],c:1,e:"Soil conditions are highly variable. Fill soil depth, drainage, vegetation, underground water flow, and even previous land use can differ across a property line. Identical homes on different soil conditions will perform differently."},
  {q:"Which pier type is better suited for a light structure with cracked footings and tight access, such as a single-story home with damaged block footings on a narrow lot?",o:["Push piers, because they always reach deeper","Helical piers, because they do not depend on structure weight for installation, work with damaged footings, and require less equipment space","Both work equally well in all situations","Neither; the footings must be replaced before piers can be installed"],c:1,e:"Helical piers are ideal here. Push piers require structure weight for driving resistance, which a light structure may not provide. Helicals are screwed in by torque motor regardless of building weight. They also work with cracked footings and require smaller equipment."},
  {q:"How should you frame the lift potential when discussing pier installation with a homeowner?",o:["Promise to return the home to its original grade to close the sale","Honestly explain that stabilization is the primary goal and that lift usually occurs, but full restoration to original grade cannot be guaranteed. Frame it as: 'Stop movement permanently and recover as much elevation as safely possible.'","Do not mention lift at all since it creates unrealistic expectations","Tell them lift depends on how much they are willing to spend"],c:1,e:"Honest framing builds trust and prevents post-installation disappointment. The correct approach is: stabilization first, lift as a secondary benefit. The language 'stop movement permanently and recover as much elevation as safely possible' sets the right expectation."},
  {q:"A homeowner has diagonal cracks radiating from the upper corners of windows and doors. The cracks are wider at the top. What is happening?",o:["The windows and doors were installed incorrectly","The structure is experiencing racking due to differential settlement, which concentrates stress at rigid openings. The cracks indicate the foundation is moving unevenly and the frame is distorting.","Temperature changes are causing the openings to shift seasonally","The cracks are only cosmetic drywall issues"],c:1,e:"Diagonal cracks at openings are classic settlement indicators. Windows and doors are rigid openings in the structure. When the foundation settles unevenly, stress concentrates at these openings, causing diagonal cracks. This is racking and indicates differential settlement."},
  {q:"A homeowner is getting quotes from multiple companies. One competitor quoted 15 push piers. You believe only 10 are needed based on the settlement pattern and structural load analysis. How do you handle this?",o:["Match the competitor's count of 15 to seem equally thorough","Explain your engineering rationale for 10 piers, showing where settlement is occurring and how 10 piers address the load-bearing needs. Over-piering is not more effective and costs the homeowner unnecessarily.","Quote 8 piers to undercut the competition","Tell the homeowner the competitor is padding the quote"],c:1,e:"Explain your engineering reasoning transparently. Show the settlement pattern and how your pier layout addresses it. More piers does not always mean better results. Integrity in your recommendation builds trust and demonstrates expertise over a competitor who may be overselling."},
  {q:"What is the significance of sloping floors as a settlement indicator?",o:["Sloping floors are always caused by joists, not the foundation","Sloping floors indicate differential settlement — one area of the foundation has dropped more than another. The direction and magnitude of the slope helps map the settlement pattern and determine pier placement.","Sloping floors are normal in homes older than 20 years","Sloping floors only matter if they exceed 3 inches over 8 feet"],c:1,e:"Sloping floors are one of the most reliable settlement indicators. The slope direction and magnitude help map exactly where and how much the foundation has settled, which directly informs pier placement."},
  {q:"A home has settlement cracks in the interior drywall AND the exterior block. The drywall cracks appeared first, months before exterior cracks. What does this timeline suggest?",o:["The interior cracks are unrelated to the exterior cracks","Settlement began subtly and progressed. Interior drywall cracked first because it is less tolerant of movement than masonry. The fact that block has now cracked indicates the settlement is significant and continuing.","The HVAC system is drying out the drywall","The home has two separate problems that happen to coincide"],c:1,e:"Drywall cracks at lower movement thresholds than masonry. Interior cracks appearing first is an early warning. When the exterior block eventually cracks, it confirms the movement is progressive and has reached a magnitude that even masonry cannot absorb."},
  {q:"How does torque correlation work with helical piers to verify capacity?",o:["The installer measures how deep the pier goes and estimates capacity","The installation torque (resistance to turning) directly correlates to bearing capacity through an empirical formula. Higher torque readings mean the helical plates are engaging stronger soil, confirming adequate support capacity.","A load test is performed after every pier is installed","The pier manufacturer provides a standard capacity regardless of installation torque"],c:1,e:"Torque correlation is an engineering method where installation torque is multiplied by a capacity-to-torque ratio (established by the manufacturer and verified by field testing) to calculate bearing capacity. This provides real-time verification during installation."},
  {q:"A potential customer says their home was built on clay soil and wants to know if that matters. How does clay soil affect foundations?",o:["Clay soil is the most stable foundation soil","Clay soil expands when wet and shrinks when dry, creating cyclical movement that can push foundations up during wet periods and allow settling during dry periods. This cycle causes progressive structural damage over time.","Clay soil only affects homes without a foundation","Clay soil is only a problem in cold climates with freeze-thaw cycles"],c:1,e:"Clay soil is one of the most problematic soils for foundations because its volume changes dramatically with moisture content. Wet clay expands (heaving), dry clay shrinks (settling). This cycle stresses the foundation repeatedly."},
  ],
  expert:[
  {q:"A home has BOTH horizontal cracks at mid-wall height AND stair-step cracks at one corner. A salesperson from another company proposes piers along the entire perimeter. What is wrong with this approach?",o:["Nothing; a full perimeter pier system addresses all foundation issues","The horizontal cracks indicate lateral soil pressure requiring wall reinforcement, NOT piers. The stair-step cracks indicate settlement in the corner, which DOES need piers. Proposing piers for the horizontal cracking section is the most dangerous diagnostic error — it addresses the wrong problem and leaves the wall reinforcement issue untreated.","The home needs to be demolished and rebuilt","Only the corner with stair-step cracks needs piers; the horizontal crack is cosmetic"],c:1,e:"This is the most dangerous diagnostic error in the industry. Horizontal cracks = lateral pressure needing wall reinforcement. Stair-step cracks = settlement needing piers. Two different problems, two different solutions. Piers do nothing for lateral pressure."},
  {q:"A homeowner's poured concrete foundation has a vertical crack that is 1/4 inch wide at the top and hairline at the bottom. The wall shows no inward bowing. What is the most likely cause?",o:["Lateral soil pressure pushing the wall inward","The foundation is experiencing differential settlement. The wider opening at the top indicates the wall is being pulled apart as one section drops, with rotation causing the V-shape. Piers at the settling section would stabilize it.","Normal concrete shrinkage from curing","Frost damage from exposed exterior wall"],c:1,e:"A vertical crack wider at the top in a poured wall indicates the wall is being pulled apart by differential settlement. One section is dropping, creating rotation. No inward bowing rules out lateral pressure. This is a pier candidate."},
  {q:"You are evaluating a two-story masonry home with significant settlement at the front-left corner. Push piers are the clear choice. The homeowner asks how many piers are needed for just that corner. What factors determine the answer?",o:["Standard practice is two piers per corner regardless of conditions","The number depends on the linear footage of affected wall, the structural load at that section (two-story masonry is heavy), the pier capacity rating, soil conditions, and how far the settlement extends along the wall from the corner. A structural analysis determines exact count.","One pier at the corner point is sufficient","The pier manufacturer specifies exactly how many per corner"],c:1,e:"Pier count is an engineering calculation based on load (two-story masonry is very heavy), pier capacity, extent of settlement along the wall, and soil conditions. Simply counting corners is not engineering. Each job requires analysis."},
  {q:"A light, single-story frame home has settlement but the structure weighs significantly less than the rated driving resistance needed for push piers. What is the risk, and what is the alternative?",o:["Use push piers anyway and add ballast weight to the structure during installation","Push piers may not reach adequate depth if the structure cannot provide sufficient reaction force. The piers could stop driving before reaching competent bearing strata, providing a false sense of security. Helical piers are the better choice because they do not depend on structure weight.","Push piers work the same regardless of structure weight","Neither pier type works for light structures"],c:1,e:"Push piers use building weight as driving resistance. A light structure may not provide enough reaction force, causing piers to stop short of competent soil. This is a false refusal. Helical piers are torque-driven and independent of structure weight, making them the correct choice."},
  {q:"A homeowner received two proposals: Company A proposes 8 push piers at $1,200 each ($9,600). Company B proposes 12 helical piers at $800 each ($9,600). Both total the same price. The home is a two-story brick on a standard lot. Which proposal is more appropriate?",o:["Company B, because more piers means more support","For a heavy two-story brick home, push piers are typically more appropriate because the structure provides excellent driving resistance, and push piers reach deeper bearing strata (30-60+ ft vs 15-25 ft for helicals). Company A's approach is likely better engineered despite fewer piers. However, the specific soil conditions and settlement pattern should ultimately determine the best system.","Company A, because push piers are always better than helicals","Both proposals are equally valid since the total cost is the same"],c:1,e:"Two-story brick is heavy, making it ideal for push piers. The building provides excellent reaction force, and push piers reach deeper, more stable strata. More helical piers at a shallower depth may not provide equivalent long-term performance. But the answer acknowledges that soil data should confirm the choice."},
  {q:"During a pier installation, the push pier reaches 42 feet and then encounters a sudden drop in resistance before reaching refusal again at 47 feet. What does this likely mean?",o:["The pier equipment malfunctioned temporarily","The pier passed through a competent layer into a weaker zone before reaching a second, deeper bearing stratum. If the installation stopped at 42 feet, the pier would be resting on a layer with a void or weak zone beneath it. Continuing to true refusal at 47 feet ensures the pier is seated in a reliable stratum.","The soil is too variable for piers at this location","The pier sections were improperly connected at 42 feet"],c:1,e:"This is a critical field scenario. The resistance drop at 42 feet indicates the pier punched through a thin competent layer into a weaker zone. Stopping there would be premature. Continuing to 47 feet where sustained refusal resumes ensures the pier is in a truly reliable stratum."},
  {q:"A homeowner's foundation engineer report recommends both piers (for settlement at two corners) AND carbon fiber straps (for a horizontal crack on one wall). The homeowner says they can only afford one repair right now. Which should they prioritize?",o:["Piers first, because settlement is always the more urgent problem","Carbon fiber straps first, because lateral wall failure can be catastrophic","Both problems require evaluation of urgency based on severity. Active settlement risks progressive damage to the entire structure. But a bowing wall under lateral pressure risks inward wall failure. The wall's current inward displacement determines urgency. If bowing is significant (over 2 inches), wall reinforcement is more urgent. If bowing is minor and settlement is active, piers may take priority.","Neither is urgent enough to require immediate attention"],c:2,e:"This requires judgment, not a blanket answer. Both conditions are serious. The relative urgency depends on the severity of each. Significant wall bowing risks catastrophic failure. Active settlement risks progressive structural damage. Evaluating the specific degree of each condition determines priority."},
  {q:"A home has settlement signs including stair-step cracks and sloping floors. The homeowner also mentions that a large oak tree was removed from the front yard three years ago. Could the tree removal be related to the settlement?",o:["No, tree removal would prevent foundation problems, not cause them","Yes. Large tree roots stabilize soil moisture. When a mature tree is removed, roots decay and soil that was previously desiccated by the tree rehydrates and can swell or lose structure. The root decay creates voids. This soil change can trigger settlement, especially in clay soils.","Only if the tree was within 5 feet of the foundation","Tree removal only causes heaving, never settlement"],c:1,e:"Mature tree removal can trigger settlement through multiple mechanisms: root decay creates subsurface voids, the loss of root structure reduces soil cohesion, and changing moisture patterns (soil that was dry rehydrates) can cause clay expansion and subsequent reconsolidation."},
  {q:"A homeowner has a foundation settlement problem but is also planning to add a second-story addition. They ask if piers should be installed before or after the addition. What is the correct answer?",o:["Before, so the existing settlement is fixed first","After, because the additional weight will compress the soil naturally","The pier system must be designed to account for the FUTURE load of the two-story structure, not just the current single-story load. If piers are installed based on current loads and then a second story is added, the piers may be underdesigned for the additional weight. The structural engineer must design the pier system for the final, post-addition load.","The addition cannot be built on a home that needs piers"],c:2,e:"This is a critical engineering consideration. Piers must be designed for the final load, not the current load. If the piers are designed for a single-story and then a second story is added, the increased load may exceed pier capacity, causing renewed settlement."},
  {q:"You encounter a home where the previous owner installed piers on one side of the house 5 years ago. The OTHER side is now showing settlement. The homeowner is frustrated. Is this a failure of the previous pier installation?",o:["Yes, the piers must have been installed incorrectly","Not necessarily. The piered side is now stabilized and rigid, while the unpiered side continues to settle on the same problematic soil. The differential between the stabilized section and the still-settling section can actually accelerate visible damage because one side is locked while the other moves. This is a known phenomenon, not a failure.","Yes, the piers caused the other side to settle by transferring load","No, the two sides are completely independent"],c:1,e:"This is a commonly misunderstood situation. Piers locked one side of the foundation while the other side continued to settle on the same soil. The increasing differential between the rigid (piered) section and the moving (unpiered) section makes the settlement more obvious and the structural effects more pronounced."},
  ],
},

// ---- DEBOUNCED SAVE ----
let _saveTimer=null;
function saveState(){
  // Save to localStorage as fallback
  localStorage.setItem('apex_trainer_reps',JSON.stringify(reps));
  localStorage.setItem('apex_trainer_assignments',JSON.stringify(assignments));
  // Debounced Firestore save
  if(!currentUid)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const r=reps[currentRep];
    if(r){
      db.collection('users').doc(currentUid).update({
        points:r.points||0, streak:r.streak||0, lastActive:r.lastActive||null,
        completedModules:r.completedModules||[], quizScores:r.quizScores||{},
        fcReviews:r.fcReviews||0, drillsCompleted:r.drillsCompleted||0,
        drillsPerfect:r.drillsPerfect||0, badges:r.badges||[],
        activityLog:(r.activityLog||[]).slice(0,100)
      }).catch(e=>console.warn('Save failed:',e));
    }
    // Save assignments
    Object.entries(assignments).forEach(([aid,a])=>{
      db.collection('assignments').doc(aid).set(a).catch(e=>console.warn('Assignment save failed:',e));
    });
  },2000);
}

async function loadUserData(uid){

      name:d.name||'Unknown', points:d.points||0, streak:d.streak||0,
      lastActive:d.lastActive||null, completedModules:d.completedModules||[],
      quizScores:d.quizScores||{}, fcReviews:d.fcReviews||0,
      drillsCompleted:d.drillsCompleted||0, drillsPerfect:d.drillsPerfect||0,
      badges:d.badges||[], activityLog:d.activityLog||[]
    };
    return d.role||'rep';
  }
  return null;
}

  const snap=await db.collection('users').get();

}

// ---- REAL-TIME LISTENERS ----
let _usersUnsub=null;
let _assignUnsub=null;

function startRealtimeSync(){
  // Listen for changes to all user docs
  _usersUnsub=db.collection('users').onSnapshot(snap=>{
    snap.docChanges().forEach(change=>{
      const d=change.doc.data();
      const uid=change.doc.id;
      if(change.type==='removed'){
        delete reps[uid];
      }else{
        reps[uid]={
          name:d.name||'Unknown', points:d.points||0, streak:d.streak||0,
          lastActive:d.lastActive||null, completedModules:d.completedModules||[],
          quizScores:d.quizScores||{}, fcReviews:d.fcReviews||0,
          drillsCompleted:d.drillsCompleted||0, drillsPerfect:d.drillsPerfect||0,
          badges:d.badges||[], activityLog:d.activityLog||[], role:d.role||'rep'
        };
      }
    });
    // Re-render views that show multi-user data
    renderBoard();
    if(isManager)renderManager();
  });

  // Listen for assignment changes
  _assignUnsub=db.collection('assignments').onSnapshot(snap=>{
    snap.docChanges().forEach(change=>{
      if(change.type==='removed'){
        delete assignments[change.doc.id];
      }else{
        assignments[change.doc.id]=change.doc.data();
      }
    });
    if(currentRep)renderHome();
    if(isManager)renderManager();
  });
}

function stopRealtimeSync(){
  if(_usersUnsub){_usersUnsub();_usersUnsub=null;}
  if(_assignUnsub){_assignUnsub();_assignUnsub=null;}
}

// ---- GOOGLE SIGN-IN ----
function googleSignIn(){
  const provider=new firebase.auth.GoogleAuthProvider();
  document.getElementById('authButtons').style.display='none';
  document.getElementById('authLoading').style.display='block';
  document.getElementById('authLoading').textContent='Signing in...';
  // Try popup first, fall back to redirect if blocked
  auth.signInWithPopup(provider).catch(e=>{
    console.error('Popup sign-in failed, trying redirect:',e.code,e.message);
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request'){
      return auth.signInWithRedirect(provider);
    }
    document.getElementById('authLoading').style.display='none';
    document.getElementById('authButtons').style.display='flex';
    showToast('Sign-in failed: '+e.message,'toast-streak');
  });
}

      };
    }
    // Load all users and assignments for leaderboard/manager
    await loadAllUsers();

// ---- STREAK ----
function updateStreak(){
  if(!currentRep)return;
  const r=reps[currentRep];
  const today=new Date().toDateString();
  if(r.lastActive===today)return;
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(r.lastActive===yesterday){r.streak=(r.streak||0)+1;}
  else if(r.lastActive!==today){r.streak=1;}
  r.lastActive=today;
  saveState();
}

// ---- POINTS & GAMIFICATION ----
function addPoints(pts,reason){
  if(!currentRep)return;
  const r=reps[currentRep];
  r.points=(r.points||0)+pts;
  r.activityLog=r.activityLog||[];
  r.activityLog.unshift({action:reason,pts,time:new Date().toISOString()});
  if(r.activityLog.length>100)r.activityLog=r.activityLog.slice(0,100);
  saveState();
  showToast(`+${pts} points: ${reason}`,'toast-points');
  checkBadges();
  updateTopBar();
}

function checkBadges(){
  if(!currentRep)return;
  const r=reps[currentRep];
  r.badges=r.badges||[];
  BADGES.forEach(b=>{
    if(!r.badges.includes(b.id)&&b.check(r)){
      r.badges.push(b.id);
      saveState();
      setTimeout(()=>showToast(`Badge earned: ${b.name} ${b.icon}`,'toast-badge'),800);
    }
  });
}

function getLevel(pts){
  return LEVELS.find(l=>pts>=l.min&&pts<=l.max)||LEVELS[0];
}

function updateTopBar(){
  if(!currentRep)return;

  document.getElementById('tbPts').textContent=`${r.points||0} pts`;

}

// ---- MODULE VIEWER ----
let currentModuleId=null;
let currentSlide=0;

let moduleOpenTime=null; // timestamp when module was opened

function getMinTime(mod){
  // Minimum minutes based on slide count: ~1.5 min per slide, minimum 5 min
  return Math.max(5, Math.round(mod.slides.length * 1.5));
}

function hasPassedQuiz(modId){
  if(!currentRep)return false;
  const r=reps[currentRep];
  const score=r.quizScores&&r.quizScores[modId];
  return score&&score.best>=80;
}

function getTimeSpent(){
  if(!moduleOpenTime)return 0;
  return Math.floor((Date.now()-moduleOpenTime)/60000); // minutes
}

function openModule(id){
  currentModuleId=id;
  currentSlide=0;
  mvViewMode='slides';
  moduleOpenTime=Date.now();
  const mod=MODULES.find(m=>m.id===id);
  document.getElementById('mvTitle').textContent=mod.title;
  renderModuleSlides(mod);
  document.getElementById('moduleViewer').classList.add('on');
  logActivity('Opened: '+mod.title);
  // Start timer update for bottom bar
  if(window._mvTimer)clearInterval(window._mvTimer);
  window._mvTimer=setInterval(()=>updateModuleBottom(mod),30000); // update every 30s
}

let mvViewMode='slides'; // 'slides' or 'notes'

function renderModuleSlides(mod){
  let html='';

  // View toggle if deck has Google Slides
  if(mod.slidesId){
    html+=`<div class="slides-toggle">
      <div class="slides-toggle-btn ${mvViewMode==='slides'?'active':''}" onclick="mvViewMode='slides';renderModuleSlides(MODULES.find(m=>m.id==='${mod.id}'))">&#127902; Slide Deck</div>
      <div class="slides-toggle-btn ${mvViewMode==='notes'?'active':''}" onclick="mvViewMode='notes';renderModuleSlides(MODULES.find(m=>m.id==='${mod.id}'))">&#128218; Study Notes</div>
    </div>`;
  }

  if(mod.slidesId && mvViewMode==='slides'){
    // Embedded Google Slides viewer
    html+=`<div class="slides-embed">
      <iframe src="https://docs.google.com/presentation/d/${mod.slidesId}/embed?start=false&loop=false&delayms=60000" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
    </div>`;
    // Compact notes below the deck
    html+=`<div class="sec-header">Slide Notes</div>`;
    mod.slides.forEach((s,i)=>{
      html+=`<div style="margin-bottom:12px;padding:12px;background:var(--dark3);border-radius:8px;cursor:pointer;" onclick="this.querySelector('.mv-notes').classList.toggle('show')">
        <div style="font-size:13px;font-weight:600;color:var(--white);">Slide ${i+1}: ${s.t}</div>
        <div class="mv-notes" style="margin-top:8px;">${s.n||'No notes for this slide.'}</div>
      </div>`;
    });
  } else {
    // Full text study notes view (original layout)
    mod.slides.forEach((s,i)=>{
      html+=`<div class="mv-slide" id="slide-${i}">
        <div class="mv-slide-num">Slide ${i+1} of ${mod.slides.length}</div>
        <div class="mv-slide-title">${s.t}</div>
        <div class="mv-slide-content">${s.c}</div>
        ${s.n?`<div class="mv-notes-toggle" onclick="this.nextElementSibling.classList.toggle('show')">&#128218; Speaker Notes</div>
        <div class="mv-notes">${s.n}</div>`:''}
      </div>`;
    });
  }

  document.getElementById('mvBody').innerHTML=html;
  document.getElementById('mvProgress').textContent=`${mod.slides.length} slides`;
  updateModuleBottom(mod);
}

function updateModuleBottom(mod){
  const done=currentRep&&(reps[currentRep].completedModules||[]).includes(mod.id);
  if(done){
    document.getElementById('mvBottom').innerHTML=
      `<div style="font-size:13px;color:var(--green);">&#9989; Completed</div><button class="mv-nav-btn mv-prev" onclick="closeModule()">Close</button>`;
    return;
  }

  const minTime=getMinTime(mod);
  const timeSpent=getTimeSpent();
  const timeMet=timeSpent>=minTime;
  const hasQuiz=!!QUIZZES[mod.id];
  const quizPassed=hasPassedQuiz(mod.id);
  const canComplete=timeMet&&(!hasQuiz||quizPassed);

  let statusHtml='<div style="display:flex;flex-direction:column;gap:4px;">';

  // Time requirement
  if(timeMet){
    statusHtml+=`<div style="font-size:11px;color:var(--green);">&#9989; ${minTime} min study time met</div>`;
  }else{
    statusHtml+=`<div style="font-size:11px;color:var(--gray);">&#9203; ${timeSpent}/${minTime} min study time</div>`;
  }

  // Quiz requirement
  if(hasQuiz){
    if(quizPassed){
      statusHtml+=`<div style="font-size:11px;color:var(--green);">&#9989; Quiz passed</div>`;
    }else{
      statusHtml+=`<div style="font-size:11px;color:var(--orange);">&#10060; Pass quiz (80%+) to complete</div>`;
    }
  }

  statusHtml+='</div>';

  let btnHtml;
  if(canComplete){
    btnHtml=`<button class="mv-complete-btn" onclick="completeModule('${mod.id}')">&#9989; Mark Complete</button>`;
  }else if(!timeMet&&(!hasQuiz||quizPassed)){
    btnHtml=`<button class="mv-nav-btn mv-prev" style="opacity:.5;cursor:not-allowed;" disabled>&#9203; Keep studying...</button>`;
  }else{
    btnHtml=`<button class="mv-complete-btn" style="background:var(--blue);" onclick="closeModule();startQuiz('${mod.id}')">&#10068; Take Quiz</button>`;
  }

  document.getElementById('mvBottom').innerHTML=statusHtml+btnHtml;
}

function closeModule(){
  document.getElementById('moduleViewer').classList.remove('on');
  currentModuleId=null;
  moduleOpenTime=null;
  if(window._mvTimer){clearInterval(window._mvTimer);window._mvTimer=null;}
}

function completeModule(id){
  if(!currentRep)return;
  const r=reps[currentRep];
  r.completedModules=r.completedModules||[];
  if(!r.completedModules.includes(id)){
    r.completedModules.push(id);
    // Mark assignments completed
    Object.entries(assignments).forEach(([aid,a])=>{
      if(a.repId===currentRep&&a.moduleId===id){
        a.status='completed';
        db.collection('assignments').doc(aid).update({status:'completed'}).catch(e=>console.warn(e));
      }
    });
    saveState();
    addPoints(100,'Completed module');
    renderTrain();renderHome();
  }
  closeModule();
}

function logActivity(action){
  if(!currentRep)return;
  const r=reps[currentRep];
  r.activityLog=r.activityLog||[];
  r.activityLog.unshift({action,pts:0,time:new Date().toISOString()});
  saveState();
}

// ---- QUIZ PAGE ----
const TIER_INFO={
  foundation:{label:'Foundation',color:'var(--blue)',icon:'&#128218;',desc:'Basic recall & concepts'},
  advanced:{label:'Advanced',color:'var(--orange)',icon:'&#127941;',desc:'Scenario application'},
  expert:{label:'Expert',color:'var(--red)',icon:'&#128142;',desc:'Nuanced judgment calls'}
};

function getTierScore(modId,tier){
  if(!currentRep)return null;
  const r=reps[currentRep];
  const key=tier==='foundation'?modId:modId+'_'+tier;
  return r.quizScores&&r.quizScores[key]?r.quizScores[key]:null;
}

function isTierUnlocked(modId,tier){
  if(tier==='foundation')return true;
  if(tier==='advanced'){
    const s=getTierScore(modId,'foundation');
    return s&&s.best>=80;
  }
  if(tier==='expert'){
    const s=getTierScore(modId,'advanced');
    return s&&s.best>=80;
  }
  return false;
}

function renderQuiz(){
  let html='<div class="sec-header">Module Quizzes</div>';
  MODULES.forEach(m=>{
    if(!QUIZZES[m.id])return;
    const tiers=QUIZZES[m.id];

    // Determine highest unlocked/passed tier
    let highestPassed=null;
    ['foundation','advanced','expert'].forEach(t=>{
      const s=getTierScore(m.id,t);
      if(s&&s.best>=80)highestPassed=t;
    });

    const tierDots=['foundation','advanced','expert'].map(t=>{
      const s=getTierScore(m.id,t);
      const unlocked=isTierUnlocked(m.id,t);
      const passed=s&&s.best>=80;
      const info=TIER_INFO[t];
      const dotColor=passed?'var(--green)':unlocked?(s?'var(--orange)':'var(--gray-d)'):'var(--dark4)';
      return `<div style="width:10px;height:10px;border-radius:50%;background:${dotColor};" title="${info.label}: ${passed?s.best+'%':unlocked?'Unlocked':'Locked'}"></div>`;
    }).join('');

    const bestScore=getTierScore(m.id,'expert')||getTierScore(m.id,'advanced')||getTierScore(m.id,'foundation');
    const best=bestScore?bestScore.best:null;
    const color=best!==null?(best>=80?'var(--green)':best>=60?'var(--orange)':'var(--red)'):'var(--gray)';

    html+=`<div class="mod-item" onclick="showQuizTiers('${m.id}')">
      <div class="mod-icon" style="background:${m.color}20;color:${m.color}">${m.icon}</div>
      <div class="mod-info">
        <div class="mod-name">${m.title}</div>
        <div class="mod-desc">3 tiers &middot; 30 questions</div>
        <div style="display:flex;gap:4px;margin-top:4px;">${tierDots}</div>
      </div>
      <div style="text-align:right;">
        ${highestPassed?`<div style="font-size:11px;padding:3px 8px;border-radius:10px;background:${TIER_INFO[highestPassed].color}20;color:${TIER_INFO[highestPassed].color};font-weight:700;">${TIER_INFO[highestPassed].label}</div>`:(best!==null?`<div style="font-size:14px;font-weight:700;color:${color};">${best}%</div>`:'<div style="font-size:12px;color:var(--gray);">Start</div>')}
      </div>
    </div>`;
  });
  document.getElementById('pg-quiz').innerHTML=html;
}

function showQuizTiers(modId){
  const mod=MODULES.find(m=>m.id===modId);
  const tiers=QUIZZES[modId];
  if(!tiers)return;

  let html=`<button class="mv-nav-btn mv-prev" style="margin-bottom:16px;" onclick="renderQuiz()">&#8592; Back</button>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">${mod.title}</div>
    <div style="font-size:13px;color:var(--gray);margin-bottom:20px;">Pass each tier at 80%+ to unlock the next level</div>`;

  ['foundation','advanced','expert'].forEach(tier=>{
    const info=TIER_INFO[tier];
    const unlocked=isTierUnlocked(modId,tier);
    const score=getTierScore(modId,tier);
    const passed=score&&score.best>=80;
    const qs=tiers[tier]||[];

    if(unlocked){
      html+=`<div class="mod-item" onclick="startQuiz('${modId}','${tier}')" style="border-color:${passed?'var(--green)':info.color}20;">
        <div class="mod-icon" style="background:${info.color}20;color:${info.color}">${info.icon}</div>
        <div class="mod-info">
          <div class="mod-name">${info.label}</div>
          <div class="mod-desc">${info.desc} &middot; ${qs.length} questions</div>
        </div>
        <div style="text-align:right;">
          ${passed?`<div style="font-size:16px;font-weight:700;color:var(--green);">${score.best}% &#9989;</div>`:(score?`<div style="font-size:16px;font-weight:700;color:var(--orange);">${score.best}%</div><div style="font-size:10px;color:var(--gray);">Need 80%</div>`:`<div style="font-size:12px;color:${info.color};">&#9654; Start</div>`)}
        </div>
      </div>`;
    }else{
      html+=`<div class="mod-item" style="opacity:.4;cursor:not-allowed;">
        <div class="mod-icon" style="background:var(--dark4);">&#128274;</div>
        <div class="mod-info">
          <div class="mod-name">${info.label}</div>
          <div class="mod-desc">Pass ${tier==='advanced'?'Foundation':'Advanced'} at 80%+ to unlock</div>
        </div>
        <div style="font-size:12px;color:var(--gray);">Locked</div>
      </div>`;
    }
  });

  document.getElementById('pg-quiz').innerHTML=html;
}

let quizState={};

function startQuiz(modId,tier){
  tier=tier||'foundation';
  const tiers=QUIZZES[modId];
  if(!tiers)return;
  const qs=tiers[tier]||tiers.foundation||[];
  if(!qs.length)return;
  const mod=MODULES.find(m=>m.id===modId);
  quizState={modId,tier,questions:shuffle([...qs]),current:0,correct:0,answered:[]};
  renderQuizQuestion();
  switchTab('quiz');
}

function renderQuizQuestion(){
  const s=quizState;
  if(s.current>=s.questions.length){return renderQuizResults();}
  const q=s.questions[s.current];
  const mod=MODULES.find(m=>m.id===s.modId);
  const tierInfo=TIER_INFO[s.tier||'foundation'];
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button class="mv-nav-btn mv-prev" onclick="showQuizTiers('${s.modId}')">&#8592; Quit</button>
    <div style="font-size:12px;padding:3px 10px;border-radius:12px;background:${tierInfo.color}20;color:${tierInfo.color};font-weight:700;">${tierInfo.label}</div>
    <div style="font-size:13px;color:var(--gray);">Q${s.current+1}/${s.questions.length}</div>
  </div>
  <div class="pbar" style="margin-bottom:20px;"><div class="pbar-fill" style="width:${(s.current/s.questions.length)*100}%;background:var(--blue);"></div></div>
  <div class="quiz-card">
    <div class="quiz-q">${q.q}</div>
    <div id="quizOpts">`;
  q.o.forEach((opt,i)=>{
    html+=`<button class="quiz-opt" id="qopt-${i}" onclick="answerQuiz(${i})">${opt}</button>`;
  });
  html+=`</div><div class="quiz-explain" id="quizExplain">${q.e}</div></div>`;
  document.getElementById('pg-quiz').innerHTML=html;
}

function answerQuiz(idx){
  const s=quizState;
  const q=s.questions[s.current];
  if(s.answered.includes(s.current))return;
  s.answered.push(s.current);
  const correct=idx===q.c;
  if(correct)s.correct++;
  document.getElementById('qopt-'+idx).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById('qopt-'+q.c).classList.add('correct');
  document.getElementById('quizExplain').classList.add('show');
  document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
  setTimeout(()=>{s.current++;renderQuizQuestion();},2500);
}

function renderQuizResults(){
  const s=quizState;
  const pct=Math.round((s.correct/s.questions.length)*100);
  const passed=pct>=80;
  const mod=MODULES.find(m=>m.id===s.modId);
  const tier=s.tier||'foundation';
  const tierInfo=TIER_INFO[tier];
  const scoreKey=tier==='foundation'?s.modId:s.modId+'_'+tier;

  if(currentRep){
    const r=reps[currentRep];
    r.quizScores=r.quizScores||{};
    if(!r.quizScores[scoreKey]||pct>r.quizScores[scoreKey].best){
      r.quizScores[scoreKey]={best:pct,last:pct,date:new Date().toISOString()};
    }else{
      r.quizScores[scoreKey].last=pct;
      r.quizScores[scoreKey].date=new Date().toISOString();
    }
    // Also update base modId score for quiz gate (use best across all tiers)
    if(tier!=='foundation'){
      const baseScore=r.quizScores[s.modId];
      if(!baseScore||pct>baseScore.best){
        r.quizScores[s.modId]={best:pct,last:pct,date:new Date().toISOString()};
      }
    }
    saveState();
    const tierPts=tier==='expert'?75:tier==='advanced'?60:50;
    if(passed)addPoints(tierPts,tierInfo.label+' quiz passed: '+mod.title);
    else addPoints(15,'Quiz attempted: '+mod.title);
    checkBadges();
  }

  const nextTier=tier==='foundation'?'advanced':tier==='advanced'?'expert':null;
  const unlockedNext=nextTier&&passed;

  let html=`<div class="quiz-score">
    <div style="font-size:64px;margin-bottom:12px;">${passed?'&#127942;':'&#128170;'}</div>
    <div style="font-size:12px;padding:4px 12px;border-radius:12px;background:${tierInfo.color}20;color:${tierInfo.color};font-weight:700;display:inline-block;margin-bottom:8px;">${tierInfo.label} Tier</div>
    <div class="quiz-score-num" style="color:${passed?'var(--green)':'var(--orange)'};">${pct}%</div>
    <div class="quiz-score-label">${s.correct} of ${s.questions.length} correct</div>
    <div style="font-size:16px;font-weight:600;color:${passed?'var(--green)':'var(--orange)'};margin-bottom:8px;">${passed?'Passed!':'Keep studying - 80% required to pass'}</div>
    ${unlockedNext?`<div style="font-size:14px;color:var(--gold);margin-bottom:16px;">&#128275; ${TIER_INFO[nextTier].label} tier unlocked!</div>`:''}
    ${tier==='foundation'&&passed?`<div style="font-size:12px;color:var(--green);margin-bottom:16px;">Module completion unlocked</div>`:''}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="mv-complete-btn" style="margin:4px;" onclick="startQuiz('${s.modId}','${tier}')">Retry ${tierInfo.label}</button>
      ${unlockedNext?`<button class="mv-complete-btn" style="margin:4px;background:${TIER_INFO[nextTier].color};" onclick="startQuiz('${s.modId}','${nextTier}')">Start ${TIER_INFO[nextTier].label} &#9654;</button>`:''}
      <button class="mv-nav-btn mv-prev" style="margin:4px;" onclick="showQuizTiers('${s.modId}')">Back to Tiers</button>
    </div>
  </div>`;
  document.getElementById('pg-quiz').innerHTML=html;
}

function startDrill(){

}

function startDrillCat(cat){
  const pool=DRILLS.filter(d=>d.cat===cat);

function renderDrillScenario(){
  const d=drillState.drill;
  const shuffled=shuffle(d.opts.map((o,i)=>({...o,origIdx:i})));
  let html=`<button class="mv-nav-btn mv-prev" style="margin-bottom:16px;" onclick="renderDrills()">&#8592; Back</button>
    <div class="drill-scenario">
      <div class="drill-cat">${d.cat}</div>
