<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Apex Sales Trainer</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --red:#C0392B; --red-l:#E05040; --red-d:#8B1A1A; --dark:#0C0C0C; --dark2:#141414;
  --dark3:#1C1C1C; --dark4:#242424; --dark5:#2C2C2C; --border:rgba(255,255,255,0.07);
  --gray:#777; --gray-l:#AAA; --gray-d:#555; --white:#F4F2EE; --gold:#C9A84C;
  --green:#27AE60; --green-d:#1E8449; --blue:#2980B9; --blue-d:#1A5276;
  --purple:#8E44AD; --orange:#E67E22; --teal:#16A085;
  --radius:12px; --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--white);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6;}
*{-webkit-user-select:none;user-select:none;}
input,textarea,select{-webkit-user-select:text;user-select:text;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}

/* SPLASH / REP SELECT */
#splash{position:fixed;inset:0;z-index:200;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s var(--ease),transform .6s var(--ease);}
#splash.out{opacity:0;transform:scale(1.03);pointer-events:none;}
.sp-bar{position:absolute;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red),var(--red-l));}
.sp-bar.top{top:0;}.sp-bar.bot{bottom:0;}
.sp-inner{display:flex;flex-direction:column;align-items:center;gap:20px;animation:riseIn .8s var(--ease) forwards;}
@keyframes riseIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.sp-title{font-family:Georgia,serif;font-size:38px;letter-spacing:2px;text-transform:uppercase;color:var(--white);text-align:center;line-height:1.1;}
.sp-sub{font-size:14px;color:var(--red-l);font-style:italic;letter-spacing:.5px;}
.sp-div{width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--gray),transparent);}
.sp-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-top:10px;}
#repSelect{width:260px;padding:14px 18px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:15px;cursor:pointer;appearance:none;text-align:center;}
#repSelect option{background:var(--dark2);color:var(--white);}
.sp-btn{margin-top:8px;padding:14px 48px;background:var(--red);border:none;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(192,57,43,.35);transition:all .2s;}
.sp-btn:hover{background:var(--red-l);transform:translateY(-1px);}
.sp-btn:active{transform:scale(.97);}
.sp-mgr{margin-top:16px;font-size:12px;color:var(--gray);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.sp-mgr:hover{color:var(--white);}

/* APP SHELL */
#app{display:none;flex-direction:column;width:100%;height:100%;}
#app.on{display:flex;}

/* TOP BAR */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(12,12,12,.97);border-bottom:1px solid var(--border);z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{font-family:Georgia,serif;font-size:18px;color:var(--white);letter-spacing:1px;text-transform:uppercase;}
.topbar-logo span{color:var(--red);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.topbar-streak{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--orange);}
.topbar-pts{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.5px;}
.topbar-level{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.topbar-user{font-size:13px;color:var(--gray-l);cursor:pointer;}
.topbar-user:hover{color:var(--white);}

/* BOTTOM NAV */
.bnav{flex-shrink:0;display:flex;justify-content:space-around;padding:8px 4px 12px;background:rgba(12,12,12,.98);border-top:1px solid var(--border);z-index:50;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--gray);font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer;padding:4px 8px;transition:color .2s;min-width:52px;}
.bnav-btn svg{width:22px;height:22px;fill:currentColor;transition:fill .2s;}
.bnav-btn.on{color:var(--red-l);}
.bnav-btn.on svg{fill:var(--red-l);}

/* MAIN SCROLL AREA */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:20px;animation:pgIn .3s var(--ease);}
.page.on{display:block;}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-title{font-size:16px;font-weight:700;color:var(--white);}
.card-sub{font-size:12px;color:var(--gray);}
.card-badge{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700;letter-spacing:.5px;}

/* PROGRESS BAR */
.pbar{width:100%;height:6px;background:var(--dark4);border-radius:3px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s var(--ease);}

/* SECTION HEADERS */
.sec-header{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:700;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* MODULE LIST */
.mod-item{display:flex;align-items:center;gap:14px;padding:16px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s;}
.mod-item:hover{border-color:var(--red);background:var(--dark3);}
.mod-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.mod-info{flex:1;min-width:0;}
.mod-name{font-size:14px;font-weight:700;color:var(--white);margin-bottom:2px;}
.mod-desc{font-size:12px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-status{font-size:20px;flex-shrink:0;}
.mod-slides{font-size:11px;color:var(--gray-d);}

/* MODULE VIEWER */
#moduleViewer{position:fixed;inset:0;z-index:100;background:var(--dark);display:none;flex-direction:column;}
#moduleViewer.on{display:flex;}
.mv-top{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mv-back{background:none;border:none;color:var(--gray-l);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.mv-back:hover{color:var(--white);}
.mv-title{font-size:14px;font-weight:700;color:var(--white);text-align:center;flex:1;}
.mv-progress{font-size:12px;color:var(--gray);}
.mv-body{flex:1;overflow-y:auto;padding:24px 20px;max-width:800px;margin:0 auto;width:100%;}
.mv-slide{margin-bottom:28px;}
.mv-slide-num{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:8px;}
.mv-slide-title{font-size:20px;font-weight:700;color:var(--white);margin-bottom:10px;line-height:1.3;}
.mv-slide-content{font-size:14px;color:var(--gray-l);line-height:1.8;}
.mv-slide-content p{margin-bottom:10px;}
.mv-slide-content ul{margin:8px 0 8px 20px;}
.mv-slide-content li{margin-bottom:6px;}
.mv-slide-content strong{color:var(--white);}
.mv-slide-content .script-box{background:var(--dark3);border-left:3px solid var(--red);padding:14px 16px;border-radius:0 8px 8px 0;margin:10px 0;font-style:italic;}
.mv-slide-content .avoid-box{background:rgba(192,57,43,.08);border-left:3px solid var(--red);padding:12px 16px;border-radius:0 8px 8px 0;margin:10px 0;color:var(--red-l);}
.mv-slide-content .tip-box{background:rgba(39,174,96,.08);border-left:3px solid var(--green);padding:12px 16px;border-radius:0 8px 8px 0;margin:10px 0;color:#6fcf97;}
.mv-notes-toggle{font-size:12px;color:var(--blue);cursor:pointer;margin-top:8px;display:inline-block;}
.mv-notes-toggle:hover{text-decoration:underline;}
.mv-notes{display:none;margin-top:10px;padding:14px;background:var(--dark3);border-radius:8px;font-size:13px;color:var(--gray);line-height:1.7;}
.mv-notes.show{display:block;}
.mv-bottom{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.mv-nav-btn{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.mv-prev{background:var(--dark4);color:var(--gray-l);}
.mv-prev:hover{background:var(--dark5);color:var(--white);}
.mv-next{background:var(--red);color:#fff;}
.mv-next:hover{background:var(--red-l);}
.mv-complete-btn{padding:12px 32px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;}
.mv-complete-btn:hover{background:var(--green-d);}

/* QUIZ */
.quiz-card{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;}
.quiz-q{font-size:16px;font-weight:600;color:var(--white);margin-bottom:16px;line-height:1.5;}
.quiz-opt{display:block;width:100%;text-align:left;padding:14px 16px;background:var(--dark3);border:2px solid var(--border);border-radius:10px;color:var(--gray-l);font-size:14px;cursor:pointer;margin-bottom:8px;transition:all .2s;line-height:1.4;}
.quiz-opt:hover{border-color:var(--gray);color:var(--white);}
.quiz-opt.selected{border-color:var(--blue);background:rgba(41,128,185,.1);color:var(--white);}
.quiz-opt.correct{border-color:var(--green);background:rgba(39,174,96,.12);color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(192,57,43,.1);color:var(--red-l);}
.quiz-explain{margin-top:12px;padding:12px 16px;background:var(--dark4);border-radius:8px;font-size:13px;color:var(--gray-l);line-height:1.6;display:none;}
.quiz-explain.show{display:block;}
.quiz-timer{font-size:24px;font-weight:700;color:var(--orange);text-align:center;margin-bottom:16px;}
.quiz-score{text-align:center;padding:40px 20px;}
.quiz-score-num{font-size:64px;font-weight:700;margin-bottom:8px;}
.quiz-score-label{font-size:14px;color:var(--gray);margin-bottom:20px;}

/* FLASHCARDS */
.fc-card{width:100%;max-width:420px;margin:20px auto;perspective:1000px;cursor:pointer;}
.fc-inner{position:relative;width:100%;min-height:280px;transition:transform .5s var(--ease);transform-style:preserve-3d;}
.fc-card.flipped .fc-inner{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
.fc-front{background:linear-gradient(135deg,var(--dark2),var(--dark3));border:1px solid var(--border);}
.fc-back{background:linear-gradient(135deg,#1a0905,#200c08);border:1px solid rgba(192,57,43,.3);transform:rotateY(180deg);}
.fc-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);position:absolute;top:16px;left:16px;}
.fc-text{font-size:17px;font-weight:600;color:var(--white);line-height:1.5;}
.fc-back .fc-text{font-size:15px;font-weight:400;color:var(--gray-l);line-height:1.7;}
.fc-actions{display:flex;gap:12px;margin-top:16px;justify-content:center;}
.fc-btn{padding:12px 28px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.fc-know{background:var(--green);color:#fff;}
.fc-again{background:var(--orange);color:#fff;}
.fc-counter{text-align:center;font-size:13px;color:var(--gray);margin-bottom:12px;}

/* DRILL */
.drill-scenario{background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;}
.drill-cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:8px;}
.drill-objection{font-size:18px;font-weight:700;color:var(--white);margin-bottom:6px;line-height:1.4;}
.drill-context{font-size:13px;color:var(--gray);margin-bottom:16px;font-style:italic;}

/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.lb-rank{font-size:20px;font-weight:700;width:36px;text-align:center;flex-shrink:0;}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:#C0C0C0;}
.lb-rank.bronze{color:#CD7F32;}
.lb-name{flex:1;font-size:14px;font-weight:600;color:var(--white);}
.lb-pts{font-size:14px;font-weight:700;color:var(--gold);}
.lb-level{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;letter-spacing:.5px;}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;}
.badge{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 8px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);text-align:center;}
.badge.earned{border-color:var(--gold);background:rgba(201,168,76,.05);}
.badge-icon{font-size:32px;filter:grayscale(1) opacity(.3);}
.badge.earned .badge-icon{filter:none;}
.badge-name{font-size:11px;font-weight:600;color:var(--gray);}
.badge.earned .badge-name{color:var(--white);}

/* MANAGER */
.mgr-stat{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.mgr-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
.mgr-tab{padding:8px 16px;border-radius:20px;background:var(--dark3);border:1px solid var(--border);color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.mgr-tab.on{background:var(--red);border-color:var(--red);color:#fff;}
.mgr-rep-row{display:flex;align-items:center;gap:12px;padding:14px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.mgr-rep-row:hover{border-color:var(--red);}

/* ASSIGN MODAL */
.modal-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.on{display:flex;}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:700;color:var(--white);margin-bottom:16px;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--gray);font-size:20px;cursor:pointer;}
.chk-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--dark3);border-radius:8px;margin-bottom:6px;cursor:pointer;}
.chk-row:hover{background:var(--dark4);}
.chk-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--red);}
.chk-row label{font-size:14px;color:var(--gray-l);cursor:pointer;}
.modal-btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;}
.modal-btn:hover{background:var(--red-l);}
.modal input[type="date"]{width:100%;padding:12px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:14px;margin:8px 0;}
.modal select{width:100%;padding:12px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:14px;margin:8px 0;appearance:none;}

/* LEVEL COLORS */
.lvl-rookie{background:var(--gray-d);color:#fff;}
.lvl-apprentice{background:var(--blue-d);color:#fff;}
.lvl-pro{background:var(--green-d);color:#fff;}
.lvl-closer{background:var(--purple);color:#fff;}
.lvl-elite{background:linear-gradient(135deg,var(--gold),#D4A017);color:#000;}

/* TOAST */
.toast{position:fixed;top:20px;right:20px;z-index:300;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;transform:translateX(120%);transition:transform .4s var(--ease);max-width:320px;}
.toast.show{transform:translateX(0);}
.toast-success{background:var(--green);}
.toast-points{background:var(--gold);color:#000;}
.toast-badge{background:var(--purple);}
.toast-streak{background:var(--orange);}

/* CERTIFICATE */
.cert{background:linear-gradient(135deg,#1a1005,#0f0a02);border:2px solid var(--gold);border-radius:16px;padding:40px;text-align:center;margin:20px 0;}
.cert-title{font-family:Georgia,serif;font-size:28px;color:var(--gold);margin-bottom:8px;}
.cert-name{font-size:22px;font-weight:700;color:var(--white);margin:16px 0;}
.cert-detail{font-size:14px;color:var(--gray-l);margin-bottom:6px;}
.cert-date{font-size:12px;color:var(--gray);margin-top:16px;}

/* RESPONSIVE */
@media(max-width:600px){
  .sp-title{font-size:28px;}
  .topbar{padding:8px 14px;}
  .topbar-logo{font-size:15px;}
  .page{padding:14px;}
  .mv-body{padding:18px 14px;}
  .badge-grid{grid-template-columns:repeat(3,1fr);}
}
/* SLIDE EMBED */
.slides-embed{position:relative;width:100%;padding-bottom:56.25%;margin-bottom:20px;border-radius:var(--radius);overflow:hidden;background:var(--dark3);border:1px solid var(--border);}
.slides-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}
.slides-toggle{display:flex;gap:8px;margin-bottom:16px;}
.slides-toggle-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--dark3);color:var(--gray);text-align:center;transition:all .2s;}
.slides-toggle-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

/* ROLE PLAY */
.rp-textarea{width:100%;min-height:120px;padding:16px;background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);color:var(--white);font-size:14px;line-height:1.6;resize:vertical;font-family:inherit;}
.rp-textarea:focus{outline:none;border-color:var(--red);}
.rp-textarea::placeholder{color:var(--gray-d);}
.rp-submit{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .2s;}
.rp-submit:hover{background:var(--red-l);}
.rp-submit:disabled{background:var(--gray-d);cursor:not-allowed;}
.rp-feedback{margin-top:20px;padding:20px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius);}
.rp-score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 12px;}
.rp-scores-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:16px 0;}
.rp-score-item{text-align:center;padding:8px 4px;background:var(--dark3);border-radius:8px;}
.rp-score-item .num{font-size:20px;font-weight:700;}
.rp-score-item .label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.rp-model{margin-top:16px;padding:14px;background:rgba(39,174,96,.08);border-left:3px solid var(--green);border-radius:0 8px 8px 0;}
.rp-tip{margin-top:12px;padding:14px;background:rgba(201,168,76,.08);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;}
.rp-loading{text-align:center;padding:40px;color:var(--gray);}
.rp-loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--dark4);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--gray);}

<script>

// ---- TRAINING CONTENT DATA ----
const MODULES = [
// === SECTION 1: CORE SALES PROCESS ===
{
  id:'mod1', section:'core', title:'Pre-Inspection Phase', icon:'&#128222;',
  desc:'2-Day Call, 30-Min Call, Warm-Up & Agenda',
  slidesId:'1c4vz58W9HrFl21wHZnmMMOXB_u3KGnYp-o4Bi7FQvxQ',
  color:'var(--red)', slides:[
    {t:'The Pre-Inspection Phase',c:'<p>Everything before you ring the doorbell determines whether you close. Three touchpoints build trust, establish control, and ensure you\'re walking into the right room with the right people.</p><p><strong>Step 1:</strong> 2-Day Out Call &mdash; Confirm, Qualify, Protect your time</p><p><strong>Step 2:</strong> 30-Minute Out Call &mdash; Logistics, Set the stage</p><p><strong>Step 3:</strong> Warm-Up & Agenda &mdash; Trust, Credibility, Take control</p><div class="tip-box">Confirming all decision-makers are present is the single highest-leverage action a rep can take before arriving on site.</div>',n:'Most reps think the sale begins when they walk in the door. Top closers know the sale begins the moment they confirm the appointment.'},
    {t:'2-Day Out Call',c:'<p>This is not a courtesy call &mdash; it is a qualification checkpoint. A two-minute conversation now prevents a wasted 3-hour appointment later.</p><ul><li><strong>All DMs Present:</strong> Confirm every decision-maker will be there. If a spouse or co-owner can\'t make it, offer to reschedule rather than proceed without them.</li><li><strong>Verify Scope:</strong> Confirm you can address their issue. Get enough detail to know you\'re the right company.</li><li><strong>Read the Customer:</strong> Listen for urgency, skepticism, or distraction. Adjust your expectations.</li><li><strong>Time Commitment:</strong> Ensure they\'ve blocked 2-3 hours. A customer expecting 45 minutes is a customer who will rush your close.</li></ul><div class="avoid-box">A rep who skips the DM confirmation and goes straight to the inspection is playing a harder game than they need to.</div>',n:'This is the most undervalued call in the entire sales process. Decision-maker confirmation is the single most predictive variable in whether a high-ticket appointment closes.'},
    {t:'2-Day Out Call Script',c:'<div class="script-box">"Hi [Name], this is [Your Name] with Apex Foundation Specialists. I have you down for an inspection on [Day] &mdash; I wanted to touch base and make sure everything still works on your end."</div><p><strong>Goal:</strong> Confirm the appointment is still on.</p><div class="script-box">"Will everyone who is part of making decisions about the home be able to be there? I want to make sure we can answer everyone\'s questions in one visit."</div><p><strong>Goal:</strong> Get a direct yes or no on decision-makers.</p><div class="script-box">"Can you tell me a little more about what you\'re seeing? I want to make sure I bring the right tools."</div><p><strong>Goal:</strong> Validate scope. Listen for crawl space vs. slab, water vs. structural.</p><div class="script-box">"Plan on setting aside about 2 to 3 hours. Also &mdash; we do work with some great financing options if that ever comes in handy."</div><p><strong>Goal:</strong> Plant time expectation and financing seed early.</p>',n:'The financing seed planted here lands as a standard professional service. When introduced at the close in response to a price concern, it feels like a concession. Same information, completely different psychological framing.'},
    {t:'30-Minute Out Call',c:'<p>Under 3 minutes. This call controls where you enter and pre-commits the customer to a structured sit-down.</p><ul><li><strong>Ask Where to Park:</strong> Signals you are organized and considerate. Gives you a natural opener on arrival.</li><li><strong>Request a Sit-Down First:</strong> Pre-commits the customer to a structured conversation. Prevents the "just go look at it" dynamic.</li></ul><div class="script-box">"Hey [Name], it\'s [Your Name] with Apex &mdash; I\'m about 30 minutes out. Quick question: where\'s the best place for me to park? And when I get there, would it be alright if we sit down for just a few minutes before I start? I like to understand your concerns first so I know exactly what to focus on."</div><div class="tip-box">This call is not about parking &mdash; it is about making your first physical interaction feel expected and orchestrated.</div>',n:'Without the sit-down request, many homeowners open the door and say "it\'s out back." Now the rep is in the crawl space before they\'ve built any rapport.'},
    {t:'Warm-Up & Agenda',c:'<p>Converts a stranger into a trusted advisor in under 10 minutes. The agenda eliminates anxiety and puts you in control.</p><ol><li><strong>Introduce Yourself & Apex</strong> &mdash; Name, role, how long you\'ve been doing this work. 20 seconds max.</li><li><strong>Ask How They Found You</strong> &mdash; Surfaces referral source and warms the conversation. If referral, use that connection immediately.</li><li><strong>Lay Out the Agenda</strong> &mdash; Walk them through exactly what today will look like. Reduces anxiety.</li><li><strong>Set Benchmarks for Normal</strong> &mdash; Tell them what normal looks like before you inspect, so they have a reference point.</li></ol>',n:'By the time the rep sits down at the kitchen table, they are in the most important 10 minutes of the entire appointment.'},
    {t:'The Agenda Script',c:'<div class="script-box">"Thanks for having me in. Before I get started, let me tell you what today is going to look like.<br><br>First, I\'d love to hear from you &mdash; you know this house better than anyone. Tell me what you\'ve been noticing.<br><br>Then I\'m going to do a complete inspection &mdash; interior, exterior, and the crawl space. I\'ll take detailed photos and measurements.<br><br>When I\'m done, I\'ll need about 15 minutes to clean up and put some numbers together. Then I\'d like to sit back down and go through everything I found.<br><br>I\'ll show you the photos, explain what\'s normal and what isn\'t, and if there\'s something that needs to be addressed, we\'ll talk about the best options.<br><br>The whole process usually runs about 2 to 3 hours. Does that work for you today?"</div><p><strong>Why it works:</strong></p><ul><li>Asking them first makes them feel heard and gives you diagnostic intel</li><li>Listing interior, exterior, and crawl space raises perceived value</li><li>The \'15 minutes to clean up\' framing previews the door knock</li><li>"Does that work?" is a micro-yes that locks in commitment</li></ul>',n:'New reps should practice this out loud until it sounds completely natural. The goal is not memorization but that every beat lands naturally.'},
    {t:'The Trust Unlocking Moment',c:'<div class="script-box">"I\'ll be upfront with you &mdash; if I get in there and it turns out this isn\'t something we can help with, or the timing just isn\'t right for your situation, I\'ll tell you that honestly. My job is to give you an accurate picture of what\'s going on, not to sell you something you don\'t need."</div><ul><li><strong>Disarms Skepticism:</strong> Homeowners expect a pitch. This tells them they won\'t get one.</li><li><strong>Increases Credibility:</strong> Honesty about not overselling makes every finding more believable.</li><li><strong>Separates Apex:</strong> Almost no competitor says this. You instantly become a trusted advisor.</li></ul><div class="tip-box">Delivery is everything: this should feel like a natural extension of the agenda, not a formal announcement. Reps who add this line consistently report that customers visibly relax.</div>',n:'This is the single highest-trust move in the entire warm-up. Field data shows measurable close rate improvement from this single sentence.'},
    {t:'Pre-Inspection Checklist',c:'<p><strong>Step 01 &mdash; 2-Day Out Call:</strong></p><ul><li>Appointment confirmed</li><li>All decision-makers committed to attend</li><li>Scope verified</li><li>2-3 hour time block communicated</li><li>Financing mentioned casually</li><li>Full address and access notes</li></ul><p><strong>Step 02 &mdash; 30-Minute Out Call:</strong></p><ul><li>Called customer from the road</li><li>Parking location confirmed</li><li>Sit-down conversation pre-committed</li><li>Approximate ETA communicated</li></ul><p><strong>Step 03 &mdash; Warm-Up & Agenda:</strong></p><ul><li>Introduced yourself and Apex briefly</li><li>Asked how they found you</li><li>Full agenda delivered at the table</li><li>Trust-unlocking moment included</li><li>Benchmarks for normal established</li><li>Customer confirmed agenda &mdash; micro-yes obtained</li></ul><div class="avoid-box">A skipped step is a gift to the competitor who doesn\'t skip it.</div>',n:'Have each rep score their last three appointments against this checklist and identify which items were incomplete on any job they didn\'t close.'}
  ]
},
{
  id:'mod2', section:'core', title:'Inspection Phase', icon:'&#128269;',
  desc:'Customer Walk-Around, Full Inspection, Door Knock',
  slidesId:'1aQzWbWH0h5Wn6Da6FOuqk9dIyDBFE3w5JgE-kQeVwCM',
  color:'var(--blue)', slides:[
    {t:'The Inspection Phase',c:'<p>Three steps that turn data collection into trust building. The way you gather information says everything about who you are.</p><p><strong>Step 1:</strong> Customer Walk-Around &mdash; Listen, Gather, Build rapport</p><p><strong>Step 2:</strong> Full Inspection &mdash; Document, Measure, Photograph</p><p><strong>Step 3:</strong> Post-Inspection Door Knock &mdash; Prove effort, Set the table</p><div class="tip-box">The inspection is not just about finding problems &mdash; it is about building the evidence base that makes your proposal undeniable.</div>',n:'Most reps treat the inspection as the necessary work they do before the real sales conversation. That\'s backwards. The inspection IS the sales conversation.'},
    {t:'Customer Walk-Around',c:'<p>Before you form a single opinion, let the customer show you their home through their eyes.</p><ul><li><strong>Let Them Lead:</strong> Ask them to show you what they\'ve noticed. Walk behind them. Don\'t jump ahead.</li><li><strong>Start Documenting Now:</strong> Begin photographing during the walk-around in front of the customer.</li><li><strong>Take Measurements:</strong> Begin gathering key readings as you go &mdash; moisture levels, floor slope, crack widths.</li><li><strong>Listen More Than Talk:</strong> Every detail they give you is intelligence for your proposal.</li></ul>',n:'The instinct for an experienced rep is to immediately go check the things they know matter. Resist that instinct. Let the customer take you where they want to go first.'},
    {t:'Walk-Around Questions',c:'<ul><li><strong>"How long have you been noticing this?"</strong> &mdash; Establishes timeline. Active vs. historic movement.</li><li><strong>"Has it gotten worse, stayed the same, or improved?"</strong> &mdash; Gauges rate of change and urgency.</li><li><strong>"Have you noticed anything else &mdash; doors sticking, cracks in drywall, uneven floors?"</strong> &mdash; Surfaces secondary symptoms.</li><li><strong>"Have you done anything to address it so far?"</strong> &mdash; Reveals prior repair attempts.</li><li><strong>"What\'s your biggest concern about it?"</strong> &mdash; Identifies the emotional driver for your proposal.</li><li><strong>"Is there anything else you want me to look at while I\'m here?"</strong> &mdash; Closes the walk-around. Confirms customer felt heard.</li></ul>',n:'"What\'s your biggest concern?" is the most important question. The answer tells you what to lead with in your proposal.'},
    {t:'Full Inspection',c:'<p>Now you conduct your own complete inspection &mdash; independent, systematic, documented.</p><p><strong>Exterior:</strong></p><ul><li>Grade and drainage around the foundation</li><li>Downspout termination and runoff direction</li><li>Cracks in brick, block, or poured concrete</li><li>Stair-step cracking in masonry</li></ul><p><strong>Interior:</strong></p><ul><li>Floors &mdash; slope, bounce, soft spots</li><li>Doors and windows &mdash; sticking, gaps, alignment</li><li>Drywall cracks &mdash; diagonal, horizontal, vertical</li></ul><p><strong>Crawl Space / Basement:</strong></p><ul><li>Moisture levels and humidity readings</li><li>Standing water or active moisture staining</li><li>Wood degradation &mdash; beams, joists, sill plates</li><li>Structural movement indicators</li></ul>',n:'A customer who watched you spend 90 minutes in their crawl space, emerge dirty, and sit down with organized photos is a fundamentally different customer than one who watched a 20-minute glance.'},
    {t:'Documentation Standards',c:'<p>Minimum documentation per inspection:</p><ul><li><strong>12-20 photos</strong> per appointment</li><li><strong>3+ moisture readings</strong> per crawl space</li><li><strong>Crack measurements</strong> with reference scale</li><li><strong>Floor slope measurements</strong> with level</li><li><strong>Comprehensive notes</strong> for proposal</li></ul><div class="tip-box">Every photo, every measurement, every minute the customer watches you work is building the case your proposal will rest on.</div><p><strong>Photo requirements:</strong></p><ul><li>Foundation exterior (full perimeter)</li><li>Moisture meter readings with meter visible in frame</li><li>Water staining and moisture evidence</li><li>Structural damage (wood rot, mold)</li><li>Grade and drainage around foundation</li></ul>',n:'Documentation is the differentiator. The rep who documents thoroughly has evidence. The rep who doesn\'t has opinions.'},
    {t:'Post-Inspection Door Knock',c:'<p>When you emerge from the crawl space or finish the inspection, the door knock is a physical proof of effort no competitor delivers.</p><ul><li><strong>Knock on the door</strong> &mdash; even though they know you\'re there. This is theater that works.</li><li><strong>Show visible effort</strong> &mdash; dirty clothes, crawl space debris. Don\'t clean up first.</li><li><strong>Ask for 15 minutes</strong> to organize findings, clean up, and prepare the presentation.</li><li><strong>Set the transition:</strong> "I found some things I want to show you. Give me 15 minutes to get organized."</li></ul><div class="tip-box">The door knock transitions from inspection to presentation. The customer now expects a professional debrief, not a quick quote.</div>',n:'This moment is where the rep\'s perceived value is at its highest. They\'ve seen you work. Now they\'re ready to listen.'}
  ]
},
{
  id:'mod3', section:'core', title:'Presentation Phase', icon:'&#128202;',
  desc:'Photo Review, Education, Building the Proposal',
  slidesId:'1MTySgD-0H8_trQCNg82Qqoy7y_hRGvTD4TqHIYDVnMs',
  color:'var(--green)', slides:[
    {t:'The Presentation Phase',c:'<p>Educate before you propose. The presentation turns inspection evidence into customer understanding.</p><p><strong>Step 1:</strong> Photo Review &mdash; Show what you found, in order</p><p><strong>Step 2:</strong> Education &mdash; Explain what\'s normal and what isn\'t</p><p><strong>Step 3:</strong> Build the Proposal &mdash; Connect every recommendation to evidence</p><div class="tip-box">The customer who understands the problem buys the solution. The customer who doesn\'t understand the problem negotiates on price.</div>',n:'The presentation is where all of the trust built in the previous phases converts to understanding. Understanding is what closes.'},
    {t:'Photo Review',c:'<p>Sit down at the table and walk through every photo in sequence.</p><ul><li><strong>Start with what\'s normal</strong> &mdash; Show areas where things look good. This builds credibility before you show problems.</li><li><strong>Then show the concerns</strong> &mdash; Each photo should tell a story. What it shows, why it matters.</li><li><strong>Use their language</strong> &mdash; Reference what they told you during the walk-around. "Remember when you mentioned the door sticking? Here\'s what\'s causing that."</li><li><strong>Let them react</strong> &mdash; Pause after showing each finding. Let it land before moving on.</li></ul><div class="tip-box">The photos are your evidence. Present them like a case, not like a sales pitch. Evidence-based presentations close at significantly higher rates.</div>',n:'Starting with what\'s normal is critical. When you show good areas first, the problems that follow carry more weight because the customer trusts your calibration.'},
    {t:'Education Before Proposal',c:'<p>Before presenting numbers, ensure the customer understands:</p><ul><li><strong>The mechanism</strong> &mdash; What is causing the problem (not just what the symptom is)</li><li><strong>The progression</strong> &mdash; What happens if nothing is done, specifically</li><li><strong>The solution approach</strong> &mdash; How each component addresses a specific finding</li><li><strong>The benchmarks</strong> &mdash; What normal looks like vs. what they have</li></ul><div class="script-box">"Based on what I found today, here\'s what\'s happening and why. The moisture readings I took were [X]%. Normal for this region is 12-15%. At 19% you start seeing elevated risk, and at 28% you\'re in active rot territory. You\'re at [X]%, which means [specific consequence]."</div>',n:'A customer who understands the mechanism buys because they believe. A customer who doesn\'t understand buys because they trust &mdash; or more likely, they don\'t buy at all.'},
    {t:'Building the Proposal',c:'<p>Every line item in the proposal connects to something you documented.</p><ul><li><strong>Component by component</strong> &mdash; Walk through each item and explain what it does and why it\'s there</li><li><strong>Reference the evidence</strong> &mdash; "This component is in the proposal because of what I showed you in photo #4"</li><li><strong>Right-size the solution</strong> &mdash; Don\'t over-scope or under-scope. Both hurt trust.</li><li><strong>Introduce financing before the number</strong> &mdash; "Before I show you the investment, let me mention that we work with two financing programs..."</li></ul><div class="script-box">"Let me show you what I\'m recommending and why each piece is there. Everything I\'m about to show you ties directly back to what we documented during the inspection."</div>',n:'Introducing financing before the number is a critical sequence. It normalizes the financing option before sticker shock can set in.'}
  ]
},
{
  id:'mod4', section:'core', title:'Close Phase', icon:'&#9989;',
  desc:'The Ask, Objection Handling, Right-Sizing, Second Ask',
  slidesId:'1rjsiqZuEPL-Bptpgh0KprmySWWiddMlNoPafwQcPo8s',
  color:'var(--purple)', slides:[
    {t:'The Close Phase',c:'<p>The close is not a technique. It is the natural result of the right conversation.</p><p>If you\'ve done the work in the previous phases, the close should feel like a conclusion, not a negotiation.</p><ul><li><strong>The First Ask</strong> &mdash; Direct, confident, earned</li><li><strong>Objection Handling</strong> &mdash; Diagnose, acknowledge, inform</li><li><strong>Right-Sizing</strong> &mdash; Adjust scope only with explicit trade-off communication</li><li><strong>The Second Ask</strong> &mdash; After addressing concerns, ask again</li><li><strong>The Leave-Behind</strong> &mdash; If they don\'t close today, leave something that sells for you</li></ul>',n:'The close rate is determined long before the close happens. Every step in the process has been a deposit into a trust account that you now withdraw from.'},
    {t:'The First Ask',c:'<div class="script-box">"Based on everything we\'ve gone through today, I believe this is the right solution for your home. The total investment is $[X]. With financing through [Upgrade/GoodLeap], that breaks down to about $[Y] per month. How would you like to move forward?"</div><ul><li><strong>Be direct</strong> &mdash; Don\'t hedge, apologize, or soften the number</li><li><strong>Present the monthly</strong> &mdash; Lead with the monthly payment, not just the total</li><li><strong>Ask a closing question</strong> &mdash; "How would you like to move forward?" not "What do you think?"</li></ul><div class="avoid-box">Never say "What do you think?" as a closing question. It invites deliberation instead of decision.</div>',n:'The ask must feel earned. If you\'ve done the work, this moment should feel natural for both the rep and the customer.'},
    {t:'The Second Ask',c:'<p>After addressing an objection, ask again. Most reps address the concern and then stop &mdash; waiting for the customer to close themselves.</p><div class="script-box">"I understand your concern about [X], and I think we\'ve addressed that. Given what we\'ve discussed, would you like to go ahead and get this scheduled?"</div><ul><li><strong>Address the specific concern</strong> &mdash; Don\'t re-pitch the entire proposal</li><li><strong>Transition naturally</strong> &mdash; Connect the resolution to the decision</li><li><strong>Ask confidently</strong> &mdash; You\'ve earned the right to ask again</li></ul><div class="tip-box">The second ask is where a significant portion of closes happen. The rep who stops after the first objection leaves money on the table every single day.</div>',n:'The abandoned close is one of the most common failure patterns. "I need to think about it" gets met with "okay, take your time" and the rep leaves.'},
    {t:'The Leave-Behind',c:'<p>If the customer doesn\'t close today, leave something that sells for you when you\'re not there.</p><ul><li><strong>The proposal document</strong> &mdash; Physical copy, organized, professional</li><li><strong>The referral book</strong> &mdash; Before/after photos from local jobs</li><li><strong>Your card with direct number</strong></li><li><strong>Financing pre-qualification</strong> &mdash; If they qualified, leave the terms</li></ul><div class="script-box">"I\'m going to leave this with you. Take your time looking through it. If you have any questions at all, my direct number is on the card. I\'ll follow up with you in a couple of days."</div><div class="tip-box">The leave-behind continues the conversation after you leave. A professional proposal and referral book sitting on the kitchen table is a powerful ongoing sales tool.</div>',n:'The leave-behind is your proxy when you\'re not in the room. Make it count.'}
  ]
},
{
  id:'mod5', section:'core', title:'Post-Appointment Follow-Up', icon:'&#128241;',
  desc:'5-Touch System, Converting Pending, Referral Capture',
  slidesId:'1JlCeJN5ZRiwPA0GVpJwutckHmuQ1aenpzbU8iqp0Wrw',
  color:'var(--teal)', slides:[
    {t:'Post-Appointment Follow-Up',c:'<p>The 5-Touch Follow-Up System ensures no pending job falls through the cracks.</p><ul><li><strong>Touch 1 &mdash; Same Day:</strong> Thank-you text within 2 hours. Brief, personal, professional.</li><li><strong>Touch 2 &mdash; Day 2:</strong> Follow-up call. "Just wanted to see if you had any questions after looking through everything."</li><li><strong>Touch 3 &mdash; Day 5:</strong> Value-add message. Share a relevant article, tip, or local reference.</li><li><strong>Touch 4 &mdash; Day 10:</strong> Check-in call. "Wanted to make sure you have everything you need to make your decision."</li><li><strong>Touch 5 &mdash; Day 21:</strong> Final professional follow-up. Clear next step or close the loop.</li></ul><div class="tip-box">Within 24 hours is the follow-up window. After that, the customer has mentally moved on and re-engagement is significantly harder.</div>',n:'Most reps do one follow-up, then give up. The 5-touch system is designed so that no rep can claim they "tried" without actually completing the sequence.'},
    {t:'Converting Pending Jobs',c:'<p>A pending job is not a lost job &mdash; it is an opportunity in progress.</p><ul><li><strong>Understand the delay</strong> &mdash; Ask directly: "What would need to happen for you to feel comfortable moving forward?"</li><li><strong>Address specific concerns</strong> &mdash; If it\'s price, present financing. If it\'s timing, offer scheduling flexibility. If it\'s trust, share references.</li><li><strong>Create urgency honestly</strong> &mdash; "The conditions I documented aren\'t going to self-correct. Each season adds to the progression."</li><li><strong>Stay professional</strong> &mdash; Never guilt, pressure, or make the customer feel bad for not closing.</li></ul>',n:'The rep who follows up professionally and persistently will convert a significant percentage of pending jobs that lesser follow-up would have lost.'},
    {t:'Referral Capture',c:'<p>Ask for referrals after every install &mdash; not before, not during.</p><div class="script-box">"Now that you\'ve seen the work and how everything turned out, is there anyone you know &mdash; a neighbor, family member, coworker &mdash; who might be dealing with something similar? I\'d love to take just as good care of them."</div><ul><li><strong>After the install</strong> &mdash; When satisfaction is highest</li><li><strong>Be specific</strong> &mdash; "A neighbor, family member, coworker" is better than "anyone"</li><li><strong>Make it easy</strong> &mdash; "Just a name and number, and I\'ll take it from there"</li><li><strong>Follow up on every referral</strong> within 24 hours</li></ul><div class="tip-box">Self-generated leads (referrals, past customer calls) close at 2-3x the rate of purchased leads and cost a fraction.</div>',n:'The referral ask is the highest-ROI activity a rep can do. One referral per install compounds into a self-sustaining pipeline.'}
  ]
},
{
  id:'mod6', section:'core', title:'Customer Psychology', icon:'&#129504;',
  desc:'How Homeowners Decide, Emotional Drivers, Buyer Types',
  slidesId:'1ADBv8gkgjdY-8n9rxDZvFG4JLoYlvAAD6tcift26Fw4',
  color:'var(--orange)', slides:[
    {t:'How Customers Decide',c:'<p>Homeowners make decisions emotionally first, then justify them rationally. Understanding this is the foundation of effective selling.</p><ul><li><strong>Emotional decision</strong> &mdash; "I feel like this is the right thing to do"</li><li><strong>Rational justification</strong> &mdash; "The numbers make sense and the evidence supports it"</li></ul><p><strong>Loss Aversion:</strong> People feel losses roughly twice as powerfully as equivalent gains. Framing the cost of inaction (what they lose by waiting) is more motivating than framing the benefit of action (what they gain by fixing it).</p><div class="tip-box">The customer who understands what they\'re protecting is more motivated than the customer who understands what they\'re buying.</div>',n:'Loss aversion is the single most powerful psychological principle in home services sales. Used ethically, it helps customers see the real cost of delay.'},
    {t:'The Four Emotional Drivers',c:'<p>Every homeowner\'s primary concern falls into one of four categories:</p><ul><li><strong>Fear & Loss:</strong> "My house is going to fall apart." "We\'ll lose everything." &mdash; Lead with stabilization, protection, preventing the worst outcome.</li><li><strong>Protection & Safety:</strong> "I need to keep my family safe." &mdash; Lead with health risks (mold, air quality), structural integrity, peace of mind.</li><li><strong>Financial & Equity:</strong> "I\'m trying to protect my investment." "We\'re selling soon." &mdash; Lead with home value, resale impact, cost of delayed repair.</li><li><strong>Pride & Quality:</strong> "I take care of my home." &mdash; Lead with craftsmanship, thoroughness, doing it right the first time.</li></ul><div class="tip-box">The walk-around question "What\'s your biggest concern?" reveals which driver is primary. Frame the entire proposal around that driver.</div>',n:'Misidentifying the emotional driver leads to proposals that answer questions the customer isn\'t asking.'},
    {t:'The Four Buyer Personalities',c:'<ul><li><strong>The Analytical:</strong> Wants data, measurements, comparisons. Give them the numbers and let them process. Don\'t rush.</li><li><strong>The Skeptic:</strong> Has been burned before or expects to be oversold. Lead with honesty, encourage second opinions, welcome scrutiny.</li><li><strong>The Decisive:</strong> Knows the problem, wants the solution, ready to move. Be efficient. Don\'t over-explain. Present clearly and ask.</li><li><strong>The Relationship-Driven:</strong> Buys from people they like and trust. Invest in rapport. Share local references. Make them feel they\'re in good hands.</li></ul><div class="avoid-box">The biggest mistake is treating every customer the same way. The Analytical needs time; the Decisive needs efficiency. Mismatch kills deals.</div>',n:'Read the customer in the first 10 minutes and adjust your approach. The warm-up phase gives you all the information you need to identify their type.'}
  ]
},
{
  id:'mod7', section:'core', title:'Self-Generated Leads', icon:'&#127793;',
  desc:'Lead Economics, Referral Systems, Building Pipeline',
  slidesId:'14UWjXsAcjDolo6xFTUdE_9id3X3nbhCSYhtTm4TNHd0',
  color:'#C9A84C', slides:[
    {t:'The Economics of Leads',c:'<p>Understanding lead economics is the difference between working hard and working smart.</p><ul><li><strong>Purchased leads:</strong> Cost $150-400+ each. Close rate: 15-25%. You\'re competing with every other company who bought the same lead.</li><li><strong>Self-generated leads:</strong> Cost nearly $0. Close rate: 40-65%. The customer already trusts you before you arrive.</li></ul><p><strong>The math is simple:</strong> A rep who generates 3-5 self-generated leads per week can build a pipeline that outperforms purchased leads in both close rate and profitability.</p><div class="tip-box">Self-generated leads are the highest-leverage activity in a sales rep\'s career. Every referral, every past-customer call, every neighborhood door knock is an investment in a pipeline that compounds over time.</div>',n:'Most reps rely entirely on company-provided leads. The top earners generate 30-50% of their own pipeline.'},
    {t:'Building Your Referral Engine',c:'<ul><li><strong>Ask after every install</strong> &mdash; Make it a non-negotiable habit</li><li><strong>Follow up on referrals within 24 hours</strong> &mdash; Speed matters. The referring customer\'s credibility is on the line.</li><li><strong>Thank the referrer</strong> &mdash; Call them back and let them know you reached out. This encourages future referrals.</li><li><strong>Leverage the referral book</strong> &mdash; Before/after photos from local jobs are the most powerful self-generated lead tool.</li><li><strong>Neighborhood marketing</strong> &mdash; After a visible install, knock on doors nearby. "We just finished some work for your neighbor and I wanted to introduce myself."</li></ul><div class="script-box">"Hi, I\'m [Name] with Apex Foundation Specialists. We just completed some work for the [Neighbor Name]s down the street and I wanted to introduce myself in case you ever have any questions about your foundation or crawl space. Here\'s my card."</div>',n:'One referral per install, consistently executed, compounds into a self-sustaining pipeline within 6 months.'}
  ]
},

{
  id:'jt1', section:'jobtype', title:'Basement Drainage', icon:'&#127754;',
  desc:'Hydrostatic Pressure, Interior Drain Systems, Sump Pumps',
  slidesId:'1Gfth6WxndhTMH72MlegHBr-McIy4P4gvNWHwKH_gfyc',
  color:'var(--blue)', slides:[
    {t:'Basement Drainage Overview',c:'<p>Basement drainage addresses <strong>hydrostatic pressure</strong> &mdash; the force exerted by water-saturated soil against below-grade foundation walls and floor slabs.</p><p>Water weighs ~62 lbs per cubic foot. When soil becomes saturated, the accumulated weight pushes against every surface, increasing by ~0.43 psi per foot of depth below the water table.</p><div class="tip-box"><strong>Key Concept:</strong> The correct approach is pressure relief through interior drainage &mdash; not pressure resistance through sealants.</div>',n:'Surface sealants fail because under sustained hydrostatic pressure, the coating\'s bond strength is eventually exceeded.'},
    {t:'Where Water Enters',c:'<ul><li><strong>Cove Joint (most common):</strong> Where basement floor meets foundation wall. Always has a slight gap.</li><li><strong>Wall Pores:</strong> Hydrostatic pressure forcing water through porous concrete. Shows as uniform dampness + efflorescence.</li><li><strong>Vertical/Diagonal Wall Cracks:</strong> Settlement or concrete shrinkage provides a direct path.</li><li><strong>Horizontal Wall Cracks:</strong> LATERAL SOIL PRESSURE &mdash; requires wall reinforcement evaluation. Drainage alone is not enough.</li><li><strong>Floor Slab Seepage:</strong> Water table above floor level pushes water upward.</li><li><strong>Window Wells:</strong> Below-grade windows concentrate surface water.</li></ul><div class="avoid-box"><strong>Critical:</strong> Horizontal cracks indicate lateral soil pressure pushing the wall inward &mdash; not just water entry. This is a structural issue requiring wall reinforcement evaluation.</div>',n:'Always distinguish between water entry (drainage problem) and structural movement (reinforcement problem). Misdiagnosis is the most common failure.'},
    {t:'Interior Drainage System Components',c:'<ul><li><strong>Trench:</strong> 12-18" wide saw-cut along interior perimeter at footing</li><li><strong>Drain Pipe:</strong> 4" perforated PVC in washed gravel, sloped min 1/8" per foot toward sump</li><li><strong>Wall Gap/Conduit:</strong> Small gap between new concrete and wall so seepage drains into channel</li><li><strong>Floor Restoration:</strong> Trench refilled with concrete, finished flush. System is invisible when complete.</li><li><strong>Sump Basin + Pump:</strong> 18-24" basin at lowest point, float-activated submersible pump, check valve</li><li><strong>Battery Backup + Sealed Cover:</strong> NON-OPTIONAL in this region. FEMA recommends sealed covers for soil gas prevention.</li></ul>',n:'The wall gap/conduit is often skipped by less thorough contractors. This is a key scope differentiator to highlight in competitive comparisons.'}
  ]
},
{
  id:'jt2', section:'jobtype', title:'Crawl Space Drainage', icon:'&#128167;',
  desc:'Vapor vs Bulk Water, Perimeter Drain, Sump Systems',
  slidesId:'1Yh8TCRNLr-w2lsCqi6mtnZg08kzmpr_pu6VftvygXcw',
  color:'var(--teal)', slides:[
    {t:'The Critical Distinction: Vapor vs Bulk Water',c:'<p>The most important diagnostic skill in crawl space moisture work is telling vapor and bulk water apart.</p><ul><li><strong>Vapor indicators:</strong> High RH (>60%), elevated wood MC (>19%), condensation, musty odor. No standing water.</li><li><strong>Bulk water indicators:</strong> Standing water, water staining on walls, silt deposits, efflorescence on block walls.</li></ul><p><strong>Solutions:</strong></p><ul><li><strong>Vapor:</strong> Encapsulation (vapor barrier, sealed vents, dehumidifier). A sump pump has zero effect on vapor.</li><li><strong>Bulk water:</strong> Interior perimeter drain and sump pump. Encapsulation alone cannot stop bulk water.</li><li><strong>When both exist:</strong> Drainage must be installed FIRST, then encapsulation.</li></ul><div class="avoid-box">Installing liner before drainage in an actively wet crawl space traps water beneath the liner.</div>',n:'This distinction drives the entire scope recommendation. Getting it wrong leads to callbacks and lost trust.'},
    {t:'System Components',c:'<ul><li><strong>Perimeter Drain:</strong> 4" perforated PVC along interior perimeter at footing, sloped 1/8" per foot min toward sump</li><li><strong>Gravel Bed + Filter Fabric:</strong> Washed gravel surrounding pipe, geotextile wrap prevents siltation</li><li><strong>Sump Basin:</strong> Perforated plastic, minimum 18" deep, 18-24" diameter, at lowest point</li><li><strong>Primary Pump:</strong> Submersible, float-activated, 1/3-1/2 HP, 1,500-3,000+ GPH</li><li><strong>Battery Backup:</strong> 12V deep-cycle marine battery. Replace every 3-5 years. NON-OPTIONAL.</li><li><strong>Discharge:</strong> Minimum 6 feet from foundation, path permanently draining away</li><li><strong>Clean-out Ports:</strong> Every 10-20 feet; flush every 3-5 years</li></ul><div class="avoid-box">Battery backup is non-negotiable for this region. Major storms &mdash; when you most need the pump &mdash; are exactly when you lose power.</div>',n:'A primary pump without backup leaves the system defenseless during the conditions it was installed to handle. Always include battery backup in scope.'}
  ]
},
{
  id:'jt3', section:'jobtype', title:'Crawl Space Encapsulation', icon:'&#128737;',
  desc:'Moisture Control, Liner Systems, Dehumidifier Sizing',
  slidesId:'1d9Y00nSst1f1WPGOZn6qurQixD5WaXysgVzTzcTtCzg',
  color:'var(--green)', slides:[
    {t:'Encapsulation Overview',c:'<p>Encapsulation seals the crawl space from ground moisture vapor and outside air, creating a controlled environment that protects the structure above.</p><p><strong>The Problem:</strong> An unsealed crawl space in the Florida Panhandle allows 10-15 gallons of soil moisture vapor per day into the space. With 40-50% of first-floor air coming from the crawl space (stack effect), this moisture directly affects the living space.</p><p><strong>Key Numbers:</strong></p><ul><li>Normal wood MC: 12-15%</li><li>Elevated risk: 19%+</li><li>Active rot threshold: 28%+</li><li>Safe crawl space RH: Below 60% (55% preferred)</li><li>Energy savings: 15%+ reduction in annual HVAC costs</li></ul>',n:'The stack effect is the most powerful selling point for encapsulation. 40-50% of first-floor air comes from the crawl space &mdash; whatever is in the crawl space, the family is breathing.'},
    {t:'System Components',c:'<ul><li><strong>Vapor Barrier (Liner):</strong> Minimum 12-mil reinforced polyethylene. Covers floor wall-to-wall, sealed at seams and perimeter.</li><li><strong>Wall Coverage:</strong> Liner extends up foundation walls, sealed to wall with termination bar or adhesive.</li><li><strong>Penetration Sealing:</strong> Every pipe, wire, and penetration sealed. Often skipped by competitors.</li><li><strong>Vent Sealing:</strong> All crawl space vents permanently sealed or replaced with sealed covers.</li><li><strong>Dehumidifier:</strong> Commercial-grade, sized to space. 70-pint minimum for most crawl spaces. Drain to sump or exterior.</li><li><strong>Insulation:</strong> When applicable, closed-cell foam on rim joists and/or walls.</li></ul><div class="tip-box"><strong>Competitor gap:</strong> The three most commonly missing components in competitor proposals are: properly sized dehumidifier, penetration sealing, and specific liner mil rating.</div>',n:'An encapsulation without a properly sized dehumidifier is like installing a car engine without oil. The system needs active moisture management to perform.'}
  ]
},
{
  id:'jt4', section:'jobtype', title:'Poly Injection (Concrete Lifting)', icon:'&#11014;',
  desc:'Slab Leveling, Material Science, Settlement Patterns',
  slidesId:'1Z5NsP3GnTLq-DD0PxsrrliIpo8qPQXFJLQ2ZrVgDfJY',
  color:'var(--orange)', slides:[
    {t:'Poly Injection Overview',c:'<p>Polyurethane injection lifts and levels settled concrete slabs by injecting expanding structural foam beneath the slab through small drilled ports.</p><p><strong>Key advantages over mudjacking:</strong></p><ul><li>Material weight: 2-4 lbs/ft3 (vs. mudjacking at 100+ lbs/ft3)</li><li>Hole size: 5/8" penny-sized (vs. 1-2" holes for mudjacking)</li><li>Cure time: 15 minutes (vs. 24-48 hours)</li><li>Waterproof and non-erosive &mdash; won\'t wash out</li></ul><div class="avoid-box"><strong>Important:</strong> Always evaluate root cause. If the soil condition that caused the settlement hasn\'t changed, lifting without addressing the cause may result in re-settlement.</div>',n:'Mudjacking uses heavy slurry that adds weight to already failing soil. Polyurethane is a fraction of the weight and doesn\'t create additional load.'},
    {t:'Settlement Patterns',c:'<ul><li><strong>Garage floors:</strong> Most common. Typically settles toward the center where fill soil compacts.</li><li><strong>Driveways:</strong> Settlement at joints and near foundation where backfill soil meets native soil.</li><li><strong>Pool decks:</strong> Settlement away from the pool shell as surrounding soil compacts.</li><li><strong>Sidewalks:</strong> Trip hazards at joints where one section settles relative to another.</li><li><strong>Stoops/Porches:</strong> Pulling away from the house as fill soil beneath compacts.</li></ul><p><strong>Floor slope thresholds:</strong></p><ul><li>1" per 8 feet: Significant &mdash; warrants evaluation</li><li>2"+ per 8 feet: Urgent structural concern</li></ul>',n:'Always measure and document the exact settlement before proposing. "It looks uneven" is not documentation &mdash; "1.5 inches of displacement over 8 feet" is.'}
  ]
},
{
  id:'jt5', section:'jobtype', title:'Structural Piers', icon:'&#127959;',
  desc:'Push Piers vs Helical, Load Transfer, Settlement Signs',
  slidesId:'1HSwr3bqY1L0aQH3RKi9akanUTFl6HfL_rf3N8hCiVXc',
  color:'var(--red)', slides:[
    {t:'Structural Piers Overview',c:'<p>Steel shafts driven deep beneath a settling foundation, bypassing unstable near-surface soil and transferring the home\'s weight to load-bearing strata below.</p><p><strong>The Core Principle &mdash; Load Transfer:</strong> The failing soil near the surface cannot support the home\'s weight. Piers bypass that soil entirely, reaching down to competent load-bearing material that has never moved.</p>',n:'Settlement stops because the load is no longer relying on the soil that was failing. This is the fundamental concept to communicate.'},
    {t:'Reading the Signs of Settlement',c:'<ul><li><strong>Stair-step cracks (brick/block):</strong> Classic differential settlement. Foundation dropped at one corner.</li><li><strong>Diagonal cracks at door/window corners:</strong> Foundation dropping differentially, racking frames out of square.</li><li><strong>Vertical cracks in poured concrete:</strong> Differential settlement pulling wall apart.</li><li><strong>Horizontal cracks in block walls:</strong> LATERAL PRESSURE &mdash; NOT settlement. Requires wall reinforcement.</li><li><strong>Cracks wider at top than bottom:</strong> Foundation is rotating.</li><li><strong>Sloping floors:</strong> 1"/8ft = significant. 2"+/8ft = urgent.</li></ul><div class="avoid-box"><strong>Critical Diagnostic:</strong> Horizontal cracks indicate lateral soil pressure &mdash; not settlement. Never propose only piers for horizontal cracking.</div>',n:'The most dangerous diagnostic error is recommending piers for horizontal cracking. That is a lateral pressure problem requiring wall reinforcement.'},
    {t:'Push Piers vs Helical Piers',c:'<p><strong>Push Piers:</strong></p><ul><li>Hydraulically driven using the structure\'s own weight as resistance</li><li>Driven until refusal &mdash; confirms load-bearing depth reached</li><li>Best for: Heavy structures, poured concrete footings, masonry, two-story homes</li><li>Depth: 30-60+ feet to refusal</li></ul><p><strong>Helical Piers:</strong></p><ul><li>Steel shaft with helical plates, screwed in by hydraulic torque motor</li><li>Capacity verified by correlating torque to bearing capacity</li><li>Best for: Lighter structures, cracked footings, tight access, new construction</li><li>Depth: Typically 15-25 feet in Panhandle geology</li></ul><div class="tip-box">Stabilization is always the primary goal. Lift is what usually also happens &mdash; but never promise full restoration to original grade.</div>',n:'The honest framing: "Our primary goal is to stop the movement permanently and recover as much elevation as the structure will safely allow."'}
  ]
}
];

  {q:"How long should the 30-Minute Call last?",o:["Under 3 minutes","Exactly 30 minutes","10-15 minutes","5-7 minutes"],c:0,e:"Despite its name, the 30-Minute Call should be kept under 3 minutes. It is a brief touch-point, not a lengthy conversation."},
  {q:"Why do you ask the customer where to park during the 30-Minute Call?",o:["To avoid getting a parking ticket","To make sure your truck fits in their driveway","To put the customer in a helper role","To confirm you have the correct address"],c:2,e:"Asking where to park puts the customer in a helper role and subtly shifts the dynamic. It is about orchestrating the arrival, not logistics."},
  {q:"How long should your self-introduction take during the Warm-Up?",o:["Under 20 seconds","1-2 minutes","3-5 minutes","As long as needed to build rapport"],c:0,e:"Your introduction should be under 20 seconds. The warm-up is about the customer, not about you."},
  {q:"What is the Trust Unlocking Moment?",o:["Showing the customer your company certifications","Telling the customer you will be honest if you cannot help them","Offering a money-back guarantee","Sharing a testimonial from a previous customer"],c:1,e:"The Trust Unlocking Moment is when you say: 'If this isn't something we can help with, I'll tell you honestly.' This signals integrity and lowers the customer's guard."},
  {q:"What should you ask the customer after laying out the full agenda?",o:["\"Do you have any questions before we start?\"","\"Does that work for you today?\"","\"Are you ready to get started?\"","\"Is there anything you'd like to add?\""],c:1,e:"The micro-yes 'Does that work for you today?' gets the customer to agree to the process. It is a small commitment that sets the tone for the rest of the appointment."},
  {q:"What information should you verify during the 2-Day Call?",o:["The customer's credit score","Scope of work, decision-makers present, time block, address/access","Competitor bids the customer has received","The customer's budget range"],c:1,e:"The 2-Day Call covers scope verification, decision-maker confirmation, setting the 2-3 hour time block, mentioning financing, and getting address/access details."},
  {q:"During the Warm-Up, what question helps you understand the customer's entry point?",o:["\"What is your budget for this project?\"","\"How did you find us?\"","\"Have you had other companies look at this?\"","\"How long have you lived here?\""],c:1,e:"Asking 'How did you find us?' reveals the customer's entry point and helps you understand their awareness level and expectations."},
  ],
  advanced:[
  {q:"A homeowner says on the 2-Day Call: 'My husband travels for work but I handle all the house stuff.' What is the best response?",o:["Accept that she is the sole decision-maker and schedule the appointment","Probe further to confirm she has full authority to make financial decisions for the household","Insist that both spouses must be present or you cannot come out","Schedule the appointment and plan to leave a proposal for the husband to review"],c:1,e:"Never assume. Probe further with something like 'So if we find something and the numbers work, you're comfortable moving forward that day?' A missing decision-maker is a gift to your competitor."},
  {q:"You mention financing casually on the 2-Day Call and the customer says, 'Oh we won't need financing, we'll pay cash.' What do you do?",o:["Skip financing entirely for the rest of the process","Tell them financing usually gets better rates than paying cash","Acknowledge it casually and move on without removing financing from your process","Ask them their exact budget so you can right-size the proposal"],c:2,e:"Acknowledge their preference but do not remove financing from your process. Many 'cash buyers' change their mind when they see the full scope. The seed has been planted and should remain available."},
  {q:"During the Warm-Up, the customer skips pleasantries and says, 'Look, I've had three companies out here already. Just tell me your price.' What is the correct Apex approach?",o:["Give a rough ballpark range to earn their respect","Acknowledge their frustration, then reset by laying out the agenda and the value of the full process","Tell them you cannot give a price without an inspection and leave if they push back","Ask what the other companies quoted so you can beat it"],c:1,e:"Acknowledge their frustration to validate them, then professionally reset expectations by laying out the agenda. The Trust Unlocking Moment is especially powerful here."},
  {q:"What is the strategic risk of NOT asking where to park on the 30-Minute Call?",o:["You might block the driveway and upset the customer","You lose an opportunity to put the customer in a helper role before you arrive","The customer may not be home when you arrive","You will not know if the property is accessible for your equipment"],c:1,e:"The parking question is not about logistics. It is about shifting the customer into a cooperative, helpful mindset before you even arrive. Missing it means arriving as a stranger rather than someone they are already helping."},
  {q:"A customer on the 2-Day Call says they only have 1 hour available. How should you handle this?",o:["Accept the 1-hour window and plan to work faster","Explain the process takes 2-3 hours and reschedule to a time that works","Show up and run over the time limit since they will be engaged","Do the inspection in 1 hour and email the proposal later"],c:1,e:"A compressed appointment leads to a rushed inspection and weak presentation. Reschedule to a time when the customer can commit the full 2-3 hours. A proper process requires proper time."},
  {q:"Why does laying out the full agenda during the Warm-Up matter strategically?",o:["It shows the customer you are organized and professional","It gives the customer control over the appointment flow","It sets benchmarks for normal so the customer knows what to expect and commits to the full process","It is required by Apex company policy"],c:2,e:"Laying out the agenda sets benchmarks for what a normal appointment looks like. When the customer agrees, they have committed to the full process including the sit-down presentation and discussion of numbers."},
  {q:"You arrive for an appointment and discover the homeowner's adult son is also present but was not mentioned. What is your best move?",o:["Ignore the son and focus on the homeowner","Include the son in the process since he may be an unofficial decision-maker","Ask the son to leave so you can focus on the homeowner","Reschedule because you did not account for this dynamic"],c:1,e:"An unexpected person at the appointment is often an unofficial decision-maker or influencer. Include them in the process. Ignoring them risks having them undermine the deal after you leave."},
  {q:"The customer says on the 2-Day Call: 'I've already looked up foundation repair costs online and I know what this should cost.' What is the best approach?",o:["Ask what price they found and match it","Tell them online prices are inaccurate and they should trust your expertise","Acknowledge their research and explain that your process documents exactly what their home needs so the proposal is specific to their situation","Send them your price list before the appointment"],c:2,e:"Acknowledge their effort without validating or challenging the numbers. Redirect to the value of a home-specific, evidence-based proposal. This respects the customer while protecting your process."},
  {q:"What happens when financing is introduced for the first time at the close instead of during the 2-Day Call?",o:["The customer sees it as a generous offer","It lands as a concession rather than a standard service","It has no impact on the customer's perception","The customer is more likely to accept financing"],c:1,e:"When financing appears for the first time at the close, it feels like a concession or a sales tactic. When seeded early, it lands as a standard part of how Apex does business."},
  {q:"During the Warm-Up, the customer mentions they are also getting a quote from a competitor tomorrow. How should you use this information?",o:["Rush through your process to close before the competitor arrives","Badmouth the competitor to discourage the second appointment","Use it as motivation to execute the full Apex process thoroughly, knowing your process IS your differentiator","Offer a discount to close the deal today"],c:2,e:"The Apex process is your competitive advantage. A 2-3 hour thorough inspection and evidence-based presentation will outperform a competitor's quick bid. Execute the process, do not shortcut it."},
  ],
  expert:[
  {q:"A customer on the 2-Day Call says both spouses will be home but adds, 'My wife probably won't sit in on the whole thing.' What is the MOST effective response?",o:["Say 'No problem, I can catch her up at the end.'","Explain that the process works best when both are part of the full conversation, and frame it around making sure they both have the same information to make a decision they are comfortable with","Tell them you require both decision-makers present for the entire appointment","Accept the situation and plan to leave detailed paperwork for the wife"],c:1,e:"Demanding attendance feels aggressive. Accepting absence risks a stall. The best move frames full participation around THEIR benefit: having equal information to make a comfortable decision together."},
  {q:"You are about to do the Warm-Up and the customer opens the door while on a phone call, waves you in, and mouths 'Give me a minute.' What do you do?",o:["Start the inspection on your own to use the time efficiently","Wait quietly until they finish, then begin the full Warm-Up and agenda","Hand them your card and start walking the exterior","Begin setting up your materials at the kitchen table to signal readiness"],c:1,e:"Starting without the Warm-Up and agenda means the customer has not committed to the process. Wait patiently, then execute the full opening. Skipping the Warm-Up to save time actually costs you the framework that makes the rest of the appointment work."},
  {q:"On the 30-Minute Call, the customer says, 'Actually, can you just give me a ballpark over the phone? If it's in our range we'll schedule.' What is the best play?",o:["Give a wide range like '$5,000 to $25,000 depending on what we find'","Politely decline and explain that every home is different, then redirect to the value of the in-person process","Tell them the average job is around $10,000 to set expectations","Say you are not allowed to give phone estimates per company policy"],c:1,e:"Any number you give becomes an anchor that works against you. A wide range sounds evasive. A specific number is a trap. 'Company policy' sounds bureaucratic. The best move redirects to why the in-home process produces an accurate, fair proposal specific to their home."},
  {q:"You confirm decision-makers on the 2-Day Call. At the door, the homeowner says, 'My husband got called into work but said whatever I decide is fine.' Which response demonstrates the best judgment?",o:["Proceed with the full process since you have verbal confirmation of authority","Reschedule because you must have both decision-makers present, no exceptions","Proceed with the full process but plan to call the husband during the close to confirm his buy-in","Do the inspection only and schedule a separate close when both are present"],c:2,e:"This is a judgment call. Rescheduling may lose the deal. Proceeding blindly risks a stall. The best balance is to execute the process fully and incorporate a phone call to the husband at decision time. This respects the wife's stated authority while securing genuine buy-in."},
  {q:"During the Warm-Up, you deliver the Trust Unlocking Moment and the customer responds, 'That's what the last guy said too, and then he tried to sell me $30,000 worth of work I didn't need.' What is the BEST response?",o:["Apologize for their bad experience and promise you are different","Ask what company it was so you can differentiate yourself","Acknowledge their experience directly, then explain that your process documents everything with photos and data so THEY can see exactly what needs attention and what does not","Tell them you only recommend what is necessary and move on to the inspection"],c:2,e:"The customer is testing you. Promises are cheap. The best response acknowledges their skepticism without defensiveness and redirects to the evidence-based process. Let the documentation prove your integrity, do not just claim it."},
  {q:"A customer who found you through a referral says during the Warm-Up, 'Our neighbor said you guys were great. Let's skip the walkthrough and just tell me what you'd do.' How do you handle this?",o:["Honor the referral relationship by being flexible and giving a quick overview","Thank them for the referral, acknowledge the trust, but explain that every home is different and the full process ensures your recommendation is specific to their situation","Tell them the full process is mandatory and proceed without further discussion","Do an abbreviated inspection and then sit down for the full presentation"],c:1,e:"Referral customers arrive with trust but can also arrive with shortcuts. Skipping the process means your proposal has no evidential foundation. Acknowledge the trust, then reframe the full process as respecting their home specifically rather than applying a generic solution."},
  {q:"You are on the 2-Day Call and the customer mentions they have already had a structural engineer's report done. How does this change your approach?",o:["Skip the inspection since the engineer's report covers everything","Ask the customer to email you the report so you can prepare a proposal in advance","Acknowledge the report as valuable and explain that your inspection will build on that information with specific documentation for the repair scope, then request to see the report at the appointment","Tell the customer that engineering reports often miss things and your inspection is more thorough"],c:2,e:"An engineer's report is an asset, not a threat. It adds credibility to the problem. Your inspection adds the repair-specific documentation. Dismissing the report insults the customer's investment. Using it alongside your process strengthens your position."},
  {q:"The Warm-Up agenda includes setting benchmarks for normal. Why is this MORE important than building personal rapport?",o:["It is not more important; rapport always comes first in sales","Because benchmarks create a framework that makes the customer feel safe committing to a 2-3 hour process and prevents them from shortcutting the appointment later","Because Apex policy requires it before you start the inspection","Because personal rapport makes customers less likely to buy"],c:1,e:"Rapport without structure leads to friendly conversations that do not close. Setting benchmarks creates a shared framework that the customer agrees to. When they later want to skip the sit-down or say 'just email me the quote,' you can reference the process they already agreed to."},
