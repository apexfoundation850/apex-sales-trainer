function answerDrill(idx,correct,explanation){
  if(drillState.answered)return;
  drillState.answered=true;
  document.getElementById('dopt-'+idx).classList.add(correct?'correct':'wrong');
  document.getElementById('drillExplain').textContent=explanation;
  document.getElementById('drillExplain').classList.add('show');
  document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');

  if(currentRep){
    const r=reps[currentRep];
    r.drillsCompleted=(r.drillsCompleted||0)+1;

    addPoints(correct?30:10,correct?'Drill correct':'Drill attempted');

      <button class="mv-nav-btn mv-prev" style="margin:8px;" onclick="renderDrills()">Back to Drills</button>
    </div>`;
  },1000);
}

function startRolePlay(cat){
  const pool=cat?ROLEPLAY_SCENARIOS.filter(s=>s.cat===cat):ROLEPLAY_SCENARIOS;
  rpState={scenario:pool[Math.floor(Math.random()*pool.length)],loading:false,feedback:null};
  renderRolePlay();
}

async function submitRolePlay(){
  const response=document.getElementById('rpResponse').value.trim();
  if(!response)return showToast('Type your response first','toast-streak');
  if(response.length<20)return showToast('Give a more complete response','toast-streak');

  rpState.loading=true;
  rpState.repResponse=response;
  renderRolePlay();

  try{
    const res=await fetch('/api/roleplay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        scenario:rpState.scenario.scenario+' Context: '+rpState.scenario.context,
        repResponse:response,
        category:rpState.scenario.cat
      })
    });
    if(!res.ok)throw new Error('API error');
    rpState.feedback=await res.json();
    rpState.loading=false;

    // Award points
    if(currentRep){
      const score=rpState.feedback.overall_score||0;
      const pts=score>=80?50:score>=60?30:15;
      addPoints(pts,'Role play: '+rpState.scenario.cat);
      const r=reps[currentRep];
      r.drillsCompleted=(r.drillsCompleted||0)+1;
      if(score>=80)r.drillsPerfect=(r.drillsPerfect||0)+1;
      saveState();
      checkBadges();
    }
  }catch(e){
    console.error('Role play error:',e);
    rpState.loading=false;
    rpState.feedback={error:true,feedback:'Could not get AI feedback. Check your connection and try again.'};
  }

  renderRolePlay();
}

function renderRolePlayFeedback(){
  const fb=rpState.feedback;
  if(fb.error){
    return `<div class="card"><p style="color:var(--red);">${fb.feedback}</p>
      <button class="mv-complete-btn" style="margin-top:12px;" onclick="rpState.feedback=null;rpState.loading=false;renderRolePlay()">Try Again</button></div>`;
  }

  const score=fb.overall_score||0;
  const color=score>=80?'var(--green)':score>=60?'var(--orange)':'var(--red)';
  const border=score>=80?'rgba(39,174,96,.4)':score>=60?'rgba(230,126,34,.4)':'rgba(192,57,43,.4)';
  const label=score>=80?'Strong Response':score>=60?'Good Foundation':'Needs Work';

  let html=`<button class="mv-nav-btn mv-prev" style="margin-bottom:16px;" onclick="rpState.scenario=null;rpState.feedback=null;renderRolePlay()">&#8592; Back to Scenarios</button>

    <div class="drill-scenario" style="opacity:.7;font-size:13px;">
      <div class="drill-cat">${rpState.scenario.cat}</div>
      <div style="color:var(--gray-l);margin-bottom:6px;">${rpState.scenario.scenario}</div>
      <div style="color:var(--gray);font-style:italic;">Your response: "${rpState.repResponse}"</div>
    </div>

    <div class="rp-feedback" style="border-color:${border};">
      <div class="rp-score-ring" style="border:4px solid ${color};color:${color};">${score}</div>
      <div style="text-align:center;font-size:16px;font-weight:700;color:${color};margin-bottom:4px;">${label}</div>

      <div class="rp-scores-grid">
        ${Object.entries(fb.scores||{}).map(([k,v])=>{
          const c=v>=4?'var(--green)':v>=3?'var(--orange)':'var(--red)';
          return `<div class="rp-score-item"><div class="num" style="color:${c}">${v}/5</div><div class="label">${k}</div></div>`;
        }).join('')}
      </div>

      <div style="font-size:14px;color:var(--gray-l);line-height:1.7;margin:16px 0;">${fb.feedback||''}</div>

      ${fb.better_response?`<div class="rp-model">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:6px;">Model Response</div>
        <div style="font-size:13px;color:var(--gray-l);line-height:1.7;font-style:italic;">${fb.better_response}</div>
      </div>`:''}

      ${fb.tip?`<div class="rp-tip">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">Pro Tip</div>
        <div style="font-size:13px;color:var(--gray-l);line-height:1.7;">${fb.tip}</div>
      </div>`:''}
    </div>

    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="mv-complete-btn" style="flex:1;" onclick="startRolePlay('${rpState.scenario.cat}')">Next Scenario</button>
      <button class="mv-nav-btn mv-prev" style="flex:1;" onclick="startRolePlay()">Random</button>
    </div>`;

  return html;
}

// ---- LEADERBOARD PAGE ----
function renderBoard(){
  const sorted=Object.entries(reps).sort((a,b)=>(b[1].points||0)-(a[1].points||0));

  let html='<div class="sec-header">Leaderboard</div>';
  sorted.forEach(([id,r],i)=>{
    const lvl=getLevel(r.points||0);
    const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    html+=`<div class="lb-row">
      <div class="lb-rank ${rankCls}">${i+1}</div>
      <div class="lb-name">${r.name}</div>
      <span class="lb-level ${lvl.cls}">${lvl.name}</span>
      <div class="lb-pts">${r.points||0} pts</div>
    </div>`;
  });

  // Badges
  if(currentRep){
    html+=`<div class="sec-header">Badges</div><div class="badge-grid">`;
    BADGES.forEach(b=>{
      const earned=(reps[currentRep].badges||[]).includes(b.id);
      html+=`<div class="badge ${earned?'earned':''}">
        <div class="badge-icon">${b.icon}</div>
        <div class="badge-name">${b.name}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('pg-board').innerHTML=html;
}

// ---- MANAGER DASHBOARD ----
let mgrTab='overview';

function renderManager(){
  let html=`<div class="sec-header">Manager Dashboard</div>
    <div class="mgr-tabs">
      <div class="mgr-tab ${mgrTab==='overview'?'on':''}" onclick="mgrTab='overview';renderManager()">Overview</div>
      <div class="mgr-tab ${mgrTab==='reps'?'on':''}" onclick="mgrTab='reps';renderManager()">Reps</div>
      <div class="mgr-tab ${mgrTab==='assign'?'on':''}" onclick="mgrTab='assign';renderManager()">Assign</div>
      <div class="mgr-tab ${mgrTab==='grades'?'on':''}" onclick="mgrTab='grades';renderManager()">Grades</div>
      <div class="mgr-tab ${mgrTab==='manage'?'on':''}" onclick="mgrTab='manage';renderManager()">Settings</div>
    </div>`;

  if(mgrTab==='overview'){
    const totalReps=Object.keys(reps).length;
    const avgPts=totalReps?Math.round(Object.values(reps).reduce((a,r)=>a+(r.points||0),0)/totalReps):0;
    const avgCompletion=totalReps?Math.round(Object.values(reps).reduce((a,r)=>a+((r.completedModules||[]).length/MODULES.length*100),0)/totalReps):0;
    const activeToday=Object.values(reps).filter(r=>r.lastActive===new Date().toDateString()).length;

    html+=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div class="card" style="text-align:center;"><div style="font-size:28px;font-weight:700;color:var(--white);">${totalReps}</div><div style="font-size:11px;color:var(--gray);">Total Reps</div></div>
        <div class="card" style="text-align:center;"><div style="font-size:28px;font-weight:700;color:var(--green);">${activeToday}</div><div style="font-size:11px;color:var(--gray);">Active Today</div></div>
        <div class="card" style="text-align:center;"><div style="font-size:28px;font-weight:700;color:var(--gold);">${avgPts}</div><div style="font-size:11px;color:var(--gray);">Avg Points</div></div>
        <div class="card" style="text-align:center;"><div style="font-size:28px;font-weight:700;color:var(--blue);">${avgCompletion}%</div><div style="font-size:11px;color:var(--gray);">Avg Completion</div></div>
      </div>`;

    // Rep summary
    Object.entries(reps).forEach(([id,r])=>{
      const lvl=getLevel(r.points||0);
      const pct=Math.round((r.completedModules||[]).length/MODULES.length*100);
      html+=`<div class="mgr-rep-row">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:var(--white);">${r.name}</div>
          <div style="font-size:12px;color:var(--gray);">${r.points||0} pts &middot; ${(r.completedModules||[]).length}/${MODULES.length} modules &middot; Streak: ${r.streak||0}</div>
          <div class="pbar" style="margin-top:6px;"><div class="pbar-fill" style="width:${pct}%;background:var(--blue);"></div></div>
        </div>
        <span class="lb-level ${lvl.cls}">${lvl.name}</span>
      </div>`;
    });
  }

  if(mgrTab==='reps'){
    Object.entries(reps).forEach(([id,r])=>{
      const lvl=getLevel(r.points||0);
      const lastAct=r.lastActive||'Never';
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:16px;font-weight:700;">${r.name}</div>
          <span class="lb-level ${lvl.cls}">${lvl.name}</span>
        </div>
        <div style="font-size:13px;color:var(--gray);margin-bottom:4px;">Points: ${r.points||0} &middot; Streak: ${r.streak||0} days</div>
        <div style="font-size:13px;color:var(--gray);margin-bottom:4px;">Modules: ${(r.completedModules||[]).length}/${MODULES.length} &middot; Last Active: ${lastAct}</div>
        <div style="font-size:13px;color:var(--gray);margin-bottom:8px;">Quizzes Taken: ${Object.keys(r.quizScores||{}).length} &middot; FC Reviews: ${r.fcReviews||0} &middot; Drills: ${r.drillsCompleted||0}</div>
        ${r.activityLog&&r.activityLog.length?`<div style="font-size:11px;color:var(--gray-d);border-top:1px solid var(--border);padding-top:8px;">Recent: ${r.activityLog.slice(0,3).map(a=>a.action).join(' | ')}</div>`:''}
      </div>`;
    });
  }

  if(mgrTab==='assign'){
    html+=`<div class="card">
      <div class="card-title" style="margin-bottom:12px;">Assign Training</div>
      <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px;">Select Rep</label>
      <select id="assignRep" style="width:100%;padding:12px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:14px;margin-bottom:12px;">
        <option value="">-- Choose Rep --</option>
        <option value="__all__">All Reps</option>
        ${Object.entries(reps).map(([id,r])=>`<option value="${id}">${r.name}</option>`).join('')}
      </select>
      <label style="font-size:12px;color:var(--gray);display:block;margin-bottom:4px;">Select Modules</label>
      <div id="assignModules">
        ${MODULES.map(m=>`<div class="chk-row"><input type="checkbox" id="am-${m.id}" value="${m.id}"><label for="am-${m.id}">${m.title}</label></div>`).join('')}
      </div>
      <label style="font-size:12px;color:var(--gray);display:block;margin:12px 0 4px;">Due Date (optional)</label>
      <input type="date" id="assignDue">
      <button class="modal-btn" onclick="submitAssignment()">Assign Training</button>
    </div>`;

    // Current Assignments
    const active=Object.entries(assignments).filter(([_,a])=>a.status!=='completed');
    if(active.length){
      html+=`<div class="sec-header">Active Assignments</div>`;
      active.forEach(([aid,a])=>{
        const rep=reps[a.repId];
        const mod=MODULES.find(m=>m.id===a.moduleId);
        if(!rep||!mod)return;
        html+=`<div class="mgr-stat">
          <div><span style="font-weight:600;color:var(--white);">${rep.name}</span> <span style="color:var(--gray);">&rarr;</span> ${mod.title}</div>
          <div>${a.dueDate?'Due: '+a.dueDate:''} <span style="cursor:pointer;color:var(--red);margin-left:8px;" onclick="deleteAssignment('${aid}')">&#10005;</span></div>
        </div>`;
      });
    }
  }

  if(mgrTab==='grades'){
    html+=`<table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="border-bottom:1px solid var(--border);">
        <th style="text-align:left;padding:10px;color:var(--gray);">Rep</th>
        <th style="text-align:center;padding:10px;color:var(--gray);">Modules</th>
        <th style="text-align:center;padding:10px;color:var(--gray);">Avg Quiz</th>
        <th style="text-align:center;padding:10px;color:var(--gray);">Cards</th>
        <th style="text-align:center;padding:10px;color:var(--gray);">Drills</th>
      </tr>`;
    Object.entries(reps).forEach(([id,r])=>{
      const qs=r.quizScores||{};
      const quizAvg=Object.keys(qs).length?Math.round(Object.values(qs).reduce((a,s)=>a+s.best,0)/Object.keys(qs).length):'-';
      const quizColor=quizAvg==='-'?'var(--gray)':quizAvg>=80?'var(--green)':quizAvg>=60?'var(--orange)':'var(--red)';
      html+=`<tr style="border-bottom:1px solid var(--border);">
        <td style="padding:10px;font-weight:600;color:var(--white);">${r.name}</td>
        <td style="text-align:center;padding:10px;">${(r.completedModules||[]).length}/${MODULES.length}</td>
        <td style="text-align:center;padding:10px;color:${quizColor};font-weight:600;">${quizAvg}${quizAvg!=='-'?'%':''}</td>
        <td style="text-align:center;padding:10px;">${r.fcReviews||0}</td>
        <td style="text-align:center;padding:10px;">${r.drillsCompleted||0}</td>
      </tr>`;
    });
    html+=`</table>`;

    // Detailed quiz scores
    html+=`<div class="sec-header" style="margin-top:20px;">Quiz Scores by Module</div>`;
    Object.entries(reps).forEach(([id,r])=>{
      const qs=r.quizScores||{};
      if(!Object.keys(qs).length)return;
      html+=`<div class="card"><div style="font-weight:600;margin-bottom:8px;">${r.name}</div>`;
      Object.entries(qs).forEach(([modId,score])=>{
        const mod=MODULES.find(m=>m.id===modId);
        const color=score.best>=80?'var(--green)':score.best>=60?'var(--orange)':'var(--red)';
        html+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span style="color:var(--gray-l);">${mod?mod.title:modId}</span>
          <span style="font-weight:700;color:${color};">${score.best}%</span>
        </div>`;
      });
      html+=`</div>`;
    });
  }

  if(mgrTab==='manage'){
    html+=`<div class="card">
      <div class="card-title" style="margin-bottom:8px;">Team Members</div>
      <p style="font-size:12px;color:var(--gray);margin-bottom:12px;">Reps are added automatically when they sign in with Google.</p>
    </div>
    <div class="sec-header">Current Reps</div>`;
    Object.entries(reps).forEach(([id,r])=>{
      const role=r.role||'rep';
      html+=`<div class="mgr-stat">
        <div>
          <span style="font-weight:600;color:var(--white);">${r.name}</span>
          <span style="font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;background:${role==='manager'?'var(--purple)':'var(--dark4)'};color:${role==='manager'?'#fff':'var(--gray)'};">${role}</span>
        </div>
        <div>
          ${role==='rep'?`<span style="cursor:pointer;color:var(--purple);font-size:12px;margin-right:12px;" onclick="promoteToManager('${id}')">Make Manager</span>`:`<span style="cursor:pointer;color:var(--gray);font-size:12px;margin-right:12px;" onclick="demoteToRep('${id}')">Remove Manager</span>`}
          <span style="cursor:pointer;color:var(--orange);font-size:12px;" onclick="resetRep('${id}')">Reset</span>
        </div>
      </div>`;
    });

    html+=`<div class="sec-header" style="margin-top:24px;">Cloud Sync</div>
    <div class="card">
      <p style="font-size:13px;color:var(--gray);margin-bottom:8px;"><span style="color:var(--green);">&#9679; Connected to Firebase</span></p>
      <p style="font-size:12px;color:var(--gray-d);">All progress syncs automatically across devices. Reps sign in with Google to access their data anywhere.</p>
    </div>`;
  }

  document.getElementById('pg-mgr').innerHTML=html;
}

function submitAssignment(){
  const repId=document.getElementById('assignRep').value;
  const due=document.getElementById('assignDue').value;
  const checked=[...document.querySelectorAll('#assignModules input:checked')].map(c=>c.value);
  if(!repId||!checked.length)return showToast('Select a rep and at least one module','toast-streak');

  const targetReps=repId==='__all__'?Object.keys(reps):[repId];
  targetReps.forEach(rid=>{
    checked.forEach(modId=>{
      const aid=rid+'_'+modId+'_'+Date.now();
      assignments[aid]={repId:rid,moduleId:modId,dueDate:due||null,status:'pending',assigned:new Date().toISOString(),assignedBy:currentUid||null};
      db.collection('assignments').doc(aid).set(assignments[aid]).catch(e=>console.warn(e));
    });
  });
  showToast(`Assigned ${checked.length} module(s) to ${targetReps.length} rep(s)`,'toast-success');
  renderManager();
}

function deleteAssignment(aid){
  delete assignments[aid];
  db.collection('assignments').doc(aid).delete().catch(e=>console.warn(e));
  renderManager();
}

function promoteToManager(uid){
  if(!confirm('Make '+reps[uid].name+' a manager?'))return;
  db.collection('users').doc(uid).update({role:'manager'}).then(()=>{
    reps[uid].role='manager';
    renderManager();
    showToast(reps[uid].name+' is now a manager','toast-success');
  });
}

function demoteToRep(uid){
  if(uid===currentUid)return showToast('Cannot demote yourself','toast-streak');
  if(!confirm('Remove manager role from '+reps[uid].name+'?'))return;
  db.collection('users').doc(uid).update({role:'rep'}).then(()=>{
    reps[uid].role='rep';
    renderManager();
    showToast(reps[uid].name+' is now a rep','toast-success');
  });
}

function resetRep(id){
  if(!confirm('Reset all progress for '+reps[id].name+'?'))return;
  const name=reps[id].name;
  const role=reps[id].role||'rep';
  reps[id]={name,points:0,streak:0,lastActive:null,completedModules:[],quizScores:{},fcReviews:0,drillsCompleted:0,drillsPerfect:0,badges:[],activityLog:[],role};
  db.collection('users').doc(id).update({
    points:0,streak:0,lastActive:null,completedModules:[],quizScores:{},
    fcReviews:0,drillsCompleted:0,drillsPerfect:0,badges:[],activityLog:[]
  }).catch(e=>console.warn(e));
  renderManager();
  showToast(`Reset ${name}`,'toast-success');
}

// ---- UTILITIES ----
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
