{id:'objections',title:'Objection Responses',icon:'&#9889;',cards:[
  {f:'"It\'s too expensive"',b:'Don\'t defend price - expand value first. Connect cost to what it prevents. Ask: "Is it the total that concerns you, or is it more about timing and cash flow?"'},
  {f:'"I need to think about it"',b:'Ask diagnostic question: "Can you help me understand what part you\'re still working through? Is it the scope, the timing, or something else?" Never leave without a specific next step.'},
  {f:'"Can you do it for less?"',b:'Hold the scope: "Let me explain what each component does and why it\'s in the proposal, then we can talk about whether financing makes the numbers work better."'},
  {f:'"I want other quotes"',b:'Encourage it: "Absolutely - that\'s the smart move. When comparing, ask: What components? Transferable warranty? Complete scope?" Help them compare intelligently.'},
  {f:'"I want to wait and see"',b:'Make the waiting cost specific: "The moisture reading today was 24%. Rot threshold is 28%. This doesn\'t self-correct." Use specific progression mechanism.'},
  {f:'"Been like this for years"',b:'Validate then reframe: "You\'re right - the home is standing. What I want to add is where you are on the progression curve based on today\'s measurements."'},
  {f:'"I want a second opinion / engineer"',b:'Encourage genuinely: "That\'s exactly the right instinct. I\'d suggest taking our inspection report and photos to the engineer." Welcoming scrutiny IS the credibility signal.'},
  {f:'"Never heard of your company"',b:'Answer specifically: company history, service area, completed jobs, warranty terms. Then pivot to referral book with local before/after photos and reviews.'},
  {f:'"My neighbor said it wasn\'t serious"',b:'Don\'t argue the neighbor. Redirect to your specific measurements: "Your conditions may differ from theirs. The reading I got was [X]. The threshold is [Y]."'},
  {f:'"Another company quoted less"',b:'Ask about scope: "Did their scope include [battery backup / specific component / warranty]? The price difference almost always comes down to scope."'},
  {f:'"Do I really need all of this?"',b:'Answer evidence-first: "Everything in this proposal ties to something I documented. [Component A] is here because of [specific finding]. I can walk you through each one."'},
  {f:'"I read online that [alternative] works"',b:'Engage specifically: "What did you come across? That approach works well when [condition]. In your situation, the issue is [finding], which is why I recommend [approach]."'},
  {f:'"Will this actually last?"',b:'Explain the mechanism: "Repairs fail when root cause isn\'t addressed or scope is incomplete. In your proposal, [cause] is addressed by [component]."'},
  {f:'"Finances are tight right now"',b:'Present financing: "We offer Upgrade and GoodLeap. Depending on approval, monthly payments are often far more manageable. Would it be worth checking? Five minutes, no obligation."'},
  {f:'"Had it done before - came back"',b:'Acknowledge frustration genuinely. Ask what was installed. Explain the specific gap in the previous work and how your proposal closes it.'},
  {f:'"Competitor doesn\'t recommend your approach"',b:'Engage directly: "What did they recommend instead? Their approach works when [condition]. What I found in your home is [finding] - here\'s the specific reason for my recommendation."'},
  {f:'"We\'re selling the house"',b:'Reframe as protection: "That\'s actually one of the best reasons to address this now. Buyers will find it in inspection, and an unresolved issue gives them leverage to renegotiate or walk. A transferable warranty becomes a selling point."'},
  {f:'"My husband/wife isn\'t here"',b:'This is why DM confirmation matters on the 2-day call. If it happens: "I understand. Let me leave you with all the documentation and photos. When can the three of us connect so I can answer their questions too?"'},
  {f:'"Can you just email the quote?"',b:'Resist the urge to comply. "I could, but the numbers won\'t mean much without the context. It\'ll take 15 minutes to walk through. The photos and evidence are what make the proposal make sense."'},
  {f:'"Insurance should cover this"',b:'"I wish it did. Unfortunately, homeowners insurance typically excludes foundation settlement, ground water intrusion, and gradual deterioration. It covers sudden events like burst pipes, not long-term soil movement."'},
  {f:'"I\'ll do it myself"',b:'Respect the instinct, redirect to complexity: "I admire the initiative. The challenge with [specific job type] is [specific technical factor]. The warranty also requires certified installation. Happy to answer any questions either way."'},
  {f:'"This seems like overkill"',b:'"I hear that. Let me walk back through each component and connect it to a specific finding. If something doesn\'t tie to evidence, I\'ll take it out. But I think you\'ll see each piece has a reason."'},
  {f:'"Your warranty doesn\'t matter if you go out of business"',b:'"That\'s a fair concern. Here\'s how we back it: [company history, number of jobs completed, service area stability]. Our warranty is also transferable, which adds resale value regardless."'},
  {f:'"I don\'t want someone in my crawl space"',b:'"I completely understand - it\'s your home. The crew works quickly and professionally, and everything is documented with photos before and after. Most homeowners tell us they wish they\'d done it sooner."'},
  {f:'"The inspector said it was fine"',b:'"Home inspectors do a valuable general overview, but they typically spend 10-15 minutes in a crawl space without moisture meters or specialized tools. Our inspection is 45-60 minutes with documented measurements at multiple points."'},
  {f:'"It\'s just cosmetic"',b:'"That\'s the key question - is it cosmetic or structural? The measurements I took today show [specific reading]. Cosmetic cracks don\'t produce [specific symptom]. Let me show you the difference."'},
  {f:'"I\'m on a fixed income"',b:'Show genuine empathy first. Then: "That\'s exactly why I want to show you the monthly financing option. Many of our customers on fixed incomes find that $[Y]/month is manageable, and it prevents a much larger emergency expense later."'},
  {f:'"We just moved in"',b:'"That\'s actually great timing. Addressing this now means you\'re starting fresh with a protected home instead of inheriting a growing problem. And if the seller didn\'t disclose it, you may have recourse."'},
  {f:'"I want to see how the winter goes"',b:'"I understand wanting to observe. The risk is that freeze-thaw cycles accelerate the exact issues I documented today. Water expands 9% when it freezes. What\'s a [X] reading now could be significantly worse by spring."'},
  {f:'"I already called the city/county"',b:'"That\'s good to check. Typically, municipalities handle public infrastructure - streets, sidewalks, sewer lines. Foundation and drainage on private property falls to the homeowner. What did they tell you?"'}
]},
{id:'jobtypes',title:'Job Type Key Facts',icon:'&#128736;',cards:[
  {f:'Basement Drainage: Most common water entry point',b:'Cove joint - where basement floor meets foundation wall'},
  {f:'Why waterproof coatings fail on basements',b:'Hydrostatic pressure exceeds coating bond strength. Water weighs 62 lbs/ft3 and pressure increases 0.43 psi per foot of depth.'},
  {f:'Crawl Space: Vapor solution',b:'Encapsulation: vapor barrier, sealed vents, dehumidifier. Sump pump has ZERO effect on vapor.'},
  {f:'Crawl Space: Bulk water solution',b:'Interior perimeter drain and sump pump. Encapsulation alone cannot stop bulk water entry.'},
  {f:'Encapsulation: Minimum liner specification',b:'20-mil reinforced polyethylene (120-mil best practice). Covers 100% floor + walls to 6" above grade. Seams: 12" overlap, vapor barrier tape sealed. Lifespan: 25+ years.'},
  {f:'Poly Injection vs Mudjacking: Weight',b:'Poly: 2-4 lbs/ft3. Mudjacking: 100+ lbs/ft3. Heavy slurry adds load to already failing soil.'},
  {f:'Apex Helical Pier Specs',b:'3" galvanized USA steel, dual-flight helix, 1,500 psi working stress, 84,000 lbs per pier (torque-verified). Depth: 15-25 ft. Spacing: 2 ft off corners, every 5 ft. Engineer-stamped. Lifetime transferable warranty.'},
  {f:'Helical Piers: How capacity is verified',b:'Torque correlation during installation - hydraulic torque motor measurements confirm bearing capacity'},
  {f:'Horizontal cracks mean:',b:'LATERAL SOIL PRESSURE - NOT settlement. Requires wall reinforcement evaluation. Never propose only piers or drainage.'},
  {f:'When to install drainage vs encapsulation first',b:'Drainage FIRST when bulk water is present. Installing liner before drainage traps water beneath it.'},
  {f:'Basement: Wall flange purpose',b:'A rigid flange riveted to the foundation wall at the base. Waterproofing membrane material feeds into the flange lip, capturing all wall seepage and directing it into the drain tile. This is the key competitive differentiator -- it prevents the wet stripe at the wall base that competitor systems leave behind.'},
  {f:'Basement: What does efflorescence indicate?',b:'White mineral deposits on basement walls. It means water has been migrating through the concrete, carrying salts to the surface. It confirms moisture intrusion even when walls appear dry.'},
  {f:'Basement: Window well water entry',b:'Window wells collect surface water and direct it against the foundation. Proper drainage, covers, and weep systems prevent entry. Always check window wells during exterior inspection.'},
  {f:'Basement: FEMA sealed window well cover recommendation',b:'FEMA recommends sealed, clear polycarbonate covers to prevent water entry while allowing egress-code light. Unsealed metal grates do not prevent water intrusion.'},
  {f:'Crawl Space Drainage: Geotextile wrap purpose',b:'Filter fabric wrapped around drain pipe and gravel prevents soil fines from clogging the drainage system over time. Without it, the system silts up and fails within years.'},
  {f:'Crawl Space Drainage: Clean-out port spacing',b:'Clean-out ports installed at intervals allow flushing the drain line during maintenance. Recommended service every 3-5 years to maintain flow.'},
  {f:'Crawl Space Drainage: Primary pump GPH range',b:'Primary sump pump should be rated at 2,000-3,000+ GPH (gallons per hour) depending on water volume. Undersized pumps run continuously and burn out prematurely.'},
  {f:'Crawl Space Drainage: Discharge path requirements',b:'Discharge must exit minimum 6 feet from foundation, directed downhill away from the structure. Discharge into a splash block or buried line to prevent re-entry.'},
  {f:'Encapsulation: Penetration sealing importance',b:'Every pipe, wire, and duct that passes through the crawl space barrier is a failure point. Unsealed penetrations allow soil vapor to bypass the entire encapsulation system.'},
  {f:'Encapsulation: Vent sealing method',b:'Vents are sealed with rigid foam board cut to fit, then sealed with spray foam at edges. Open vents defeat the entire conditioned crawl space concept by introducing outside humidity.'},
  {f:'Encapsulation: Wall termination method',b:'Wall terminations are mechanically fastened and foam-sealed -- no termination bar is used. Standard duct tape fails under crawl space humidity and temperature cycling. Mechanical fasteners + foam seal provide durable, airtight attachment.'},
  {f:'Encapsulation: Stack effect mechanics',b:'Warm air rises in the home, creating negative pressure at the lowest level. This draws crawl space air upward through floor penetrations. 40-50% of first-floor air originates from below.'},
  {f:'Encapsulation: 3 most common competitor gaps',b:'1) No dehumidifier or undersized unit (liner alone does not control humidity). 2) Unsealed penetrations (vapor bypasses liner). 3) Thin liner under 20-mil (tears, punctures, short lifespan -- 20-mil minimum, 120-mil best practice).'},
  {f:'Poly: Settlement pattern - Garage slabs',b:'Garage slabs typically settle at the front (apron area) due to poor compaction at the driveway transition. Look for separation between garage floor and driveway.'},
  {f:'Poly: Settlement pattern - Driveways',b:'Driveways settle at joints and where they meet the garage apron or street. Voids form from water erosion along edges and beneath control joints.'},
  {f:'Poly: Settlement pattern - Pool decks',b:'Pool decks settle toward the pool due to backfill settlement around the pool shell. This creates trip hazards and directs surface water into the pool area.'},
  {f:'Poly: Settlement pattern - Sidewalks',b:'Sidewalk panels settle individually, creating trip hazards at joints. Tree roots, poor base compaction, and water erosion are the primary causes. Trip hazard threshold: 1/2 inch.'},
  {f:'Poly: Settlement pattern - Stoops',b:'Stoops settle away from the home because the backfill against the foundation was not properly compacted. This creates a gap between the stoop and the home and a tripping hazard at the door.'},
  {f:'Poly: Root cause evaluation',b:'Always identify WHY the slab settled before lifting. If the root cause (water erosion, poor compaction, organic fill decomposition) is not addressed, the slab will settle again.'},
  {f:'Poly: Slab-on-grade vs flatwork distinction',b:'Slab-on-grade is the structural floor of the home (garage, basement). Flatwork is non-structural exterior concrete (sidewalks, driveways, patios). Structural slabs require more careful evaluation.'},
  {f:'Structural Piers: Stair-step cracks meaning',b:'Stair-step cracks in block or brick follow mortar joints and indicate DIFFERENTIAL SETTLEMENT - one part of the foundation is moving more than another.'},
  {f:'Structural Piers: Diagonal cracks meaning',b:'Diagonal cracks radiating from window/door corners indicate the wall is racking due to foundation movement. The crack points toward the area of greatest settlement.'},
  {f:'Structural Piers: Rotation indicators',b:'Walls leaning inward or outward, gaps at the top of walls, separation between wall and ceiling, and doors that swing open or closed on their own all indicate rotational movement.'},
  {f:'Helical Pier: Why dual-flight helix is superior',b:'Dual-flight configuration distributes load across a larger soil contact area than a single helix, improving capacity and reducing torque variability in inconsistent soils.'},
  {f:'Helical Pier: Engineer stamp importance',b:'Every Apex installation is engineer-stamped. Customers receive stamped documentation -- a permanent record that matters for resale, insurance, and peace of mind. Competitors without an engineer stamp leave no permanent record of the work.'}
]},
{id:'preinspection',title:'Pre-Inspection Mastery',icon:'&#128204;',cards:[
  {f:'What are the 3 phases of pre-inspection?',b:'1) 2-Day Out Call (confirm, qualify, seed financing). 2) 30-Minute Out Call (parking, sit-down commitment). 3) At-the-Door Warm-Up (rapport, agenda, trust unlock).'},
  {f:'Why confirm decision-makers on the 2-day call?',b:'If only one DM is present, you will almost always hear "I need to talk to my spouse." Confirming both parties prevents the most common stall and avoids a wasted 2-3 hour appointment.'},
  {f:'DM confirmation technique - direct approach',b:'"Will everyone who is part of making decisions about the home be able to be there?" Direct, non-assumptive, and lets them volunteer the answer without feeling pressured.'},
  {f:'DM confirmation technique - soft approach',b:'"I want to make sure I can answer everyone\'s questions in one visit - will your [spouse/partner] be available too?" Frames it as service, not sales pressure.'},
  {f:'Scope verification question purpose',b:'Asking "Can you tell me more about what you\'re seeing?" on the 2-day call ensures you bring the right tools, set proper expectations, and arrive prepared. It also starts the customer talking about their problem early.'},
  {f:'How to frame the time commitment',b:'"The whole process takes about two to three hours." State it matter-of-factly. If they push back, explain: "I spend the first part inspecting, then we review findings together. I want you to have a complete picture."'},
  {f:'When and how to seed financing',b:'On the 2-day call, casually mention: "We do work with some great financing options if that ever comes in handy. Just something to keep in mind." This plants the idea without pressure.'},
  {f:'Why ask about parking on the 30-min call?',b:'It\'s a micro-commitment question. It gets them saying yes to a small request, which psychologically primes them to continue saying yes. It also shows professionalism and respect for their property.'},
  {f:'Sit-down pre-commitment script',b:'"Can we sit down for a few minutes before I start?" This establishes that the appointment includes a sit-down conversation - not just a drive-by inspection. It sets the stage for the presentation.'},
  {f:'At-the-door warm-up sequence',b:'1) Genuine compliment about home/yard. 2) Ask how long they\'ve owned it. 3) Let them talk. 4) Transition to agenda. The goal: make them feel heard before you pick up a single tool.'},
  {f:'Agenda delivery at the door',b:'"Here\'s what today looks like: First, I want to hear from you. Then I\'ll do a thorough inspection. After that, I\'ll organize my findings and walk you through everything with photos. Sound good?"'},
  {f:'What is "normal" for wood moisture?',b:'10-12%. State this benchmark BEFORE sharing their reading. Establishing what normal looks like gives context to every elevated number you present.'},
  {f:'What is "normal" crawl space RH?',b:'Below 60% (55% preferred). Present this benchmark during the agenda or warm-up so the customer has a reference point for your findings.'},
  {f:'What is "normal" floor slope?',b:'Essentially level. 1/4 inch per 8 feet is a significant flag. 1+ inch per 8 feet is urgent. Presenting the scale before the measurement builds credibility.'},
  {f:'Trust Unlocking Moment - delivery tips',b:'Deliver it sincerely, with eye contact, early in the conversation. "If I get in there and this isn\'t something we can help with, I\'ll tell you honestly." This single moment builds more trust than any credential.'},
  {f:'How to handle "just give me a number" at the door',b:'"I understand you want to get to the bottom line. To give you an accurate number, I need to see what\'s going on first. Otherwise I\'d just be guessing, and that\'s not fair to you."'},
  {f:'Pre-inspection goal summary',b:'By the time you start inspecting, the customer should: know the agenda, feel heard, trust your honesty, expect a sit-down review, and be aware financing exists. All before you touch a tool.'},
  {f:'What if the customer wants to follow you during inspection?',b:'Welcome it: "Absolutely, come with me. I\'ll show you exactly what I\'m looking at." Having them see conditions firsthand makes your presentation far more credible.'},
  {f:'Mistake: Skipping the pre-inspection',b:'Jumping straight into the crawl space or basement means you present findings to someone who has no context, no rapport with you, and no reason to trust your recommendations. Close rates drop dramatically.'},
  {f:'Pre-inspection checklist items',b:'DM confirmed, scope understood, time commitment set, financing seeded, parking arranged, sit-down committed, tools and documentation ready, benchmarks for normal prepared.'}
]},
{id:'inspection',title:'Inspection Mastery',icon:'&#128269;',cards:[
  {f:'Walk-around protocol: What to do first',b:'Start OUTSIDE. Walk the full perimeter of the home before going inside or underneath. Document grading, gutters, downspout discharge, cracks, window wells, and vegetation against the foundation.'},
  {f:'Walk-around question 1: History',b:'"How long have you lived here, and when did you first start noticing this?" Establishes timeline and helps distinguish new vs long-standing issues.'},
  {f:'Walk-around question 2: Progression',b:'"Has it gotten worse over time, or has it stayed about the same?" Determines velocity of the problem and urgency level.'},
  {f:'Walk-around question 3: Previous work',b:'"Has anyone looked at this before, or have you had any work done on it?" Identifies prior failed repairs and competitor involvement.'},
  {f:'Walk-around question 4: Water patterns',b:'"Do you notice water issues during heavy rains, or does it seem to happen all the time?" Distinguishes between event-driven and chronic moisture issues.'},
  {f:'Walk-around question 5: Interior symptoms',b:'"Have you noticed any doors sticking, cracks in walls, or uneven floors inside?" Connects exterior findings to interior symptoms the homeowner experiences daily.'},
  {f:'Walk-around question 6: Other concerns',b:'"Is there anything else about the house that concerns you?" Opens the door for additional scope and shows you care about the whole home, not just the lead complaint.'},
  {f:'Documentation standard: Photo count',b:'Minimum 12-20 photos per appointment. Every finding must be documented. Photos are your evidence during the presentation - if you didn\'t photograph it, it didn\'t happen.'},
  {f:'Exterior inspection checklist',b:'Grading direction, gutter condition, downspout discharge distance (6 ft min), foundation cracks, window wells, vegetation contact, slab settlement, stoop separation, driveway condition.'},
  {f:'Interior inspection checklist',b:'Door operation (sticking/swinging), wall cracks (location/direction/width), floor slope measurement, baseboard separation, ceiling cracks, window frame gaps, drywall nail pops.'},
  {f:'Crawl space inspection checklist',b:'Moisture meter readings (3+ locations), standing water, vapor barrier condition, insulation condition, wood damage/rot, mold/mildew, structural member condition, plumbing leaks, HVAC ductwork, pest evidence.'},
  {f:'Moisture meter usage protocol',b:'Take 3+ readings at different locations. Read structural wood (joists, sills, posts), not just subfloor. Record each reading with its location. Compare to benchmark: 10-12% normal, 16%+ elevated, 28%+ active rot.'},
  {f:'Crack measurement technique',b:'Use a crack monitor card or ruler. Measure width at the widest point. Note direction (horizontal, vertical, diagonal, stair-step). Photograph with the measuring tool visible in frame.'},
  {f:'Floor slope measurement technique',b:'Use a 4-foot level or laser level. Measure from a reference point (typically an exterior wall) toward the center or opposite wall. Record inches of drop per distance. 1" per 8 ft = significant, warrants evaluation. 2"+ per 8 ft = urgent structural concern.'},
  {f:'Photo requirements for credibility',b:'Include a reference object (tape measure, moisture meter display, crack card) in every diagnostic photo. Wide shots for context, close-ups for detail. Label or narrate each photo during presentation.'},
  {f:'Door knock execution during inspection',b:'If the homeowner is not with you, knock before entering any room or space. Announce yourself: "Just heading into the crawl space now." This builds trust through respect and professionalism.'},
  {f:'Effort display psychology',b:'Customers need to SEE the work you do. Emerge from the crawl space with documentation. Show dirty knees. Display the moisture meter. Effort visibility directly correlates with perceived value of your recommendation.'},
  {f:'What to do when you find nothing wrong',b:'Tell them honestly: "I checked everything and your home looks solid. Here\'s what I looked at and why I can say that with confidence." Honesty when there\'s no sale builds referrals and long-term reputation.'},
  {f:'Mistake: Rushing the inspection',b:'A thorough inspection takes 45-60 minutes minimum. Rushing means missing findings, fewer photos, and a weaker presentation. The inspection IS the sale - it builds the evidence your proposal is based on.'}
]},
{id:'presentation',title:'Presentation Mastery',icon:'&#127912;',cards:[
  {f:'Photo review sequence: What to show first',b:'Show NORMAL readings first. "This joist measured 11% - that\'s healthy." Establishing the baseline makes elevated readings more impactful by contrast. Normal first, then abnormal.'},
  {f:'Education framework during presentation',b:'For each finding: 1) Show the photo. 2) Explain what normal looks like. 3) Show what you found. 4) Explain why it matters. 5) Connect it to the solution component. Evidence drives the recommendation.'},
  {f:'Moisture benchmark presentation',b:'"Normal wood moisture is 10-12%. Anything above 16% is elevated. At 28%, the wood is actively rotting. Here\'s what I found in your crawl space..." Always establish the scale before revealing the number.'},
  {f:'Progression framework',b:'Show where they are on the deterioration timeline. "You\'re at [X reading]. The next stage is [Y]. This doesn\'t reverse on its own because [mechanism]." Make the trajectory specific, not vague.'},
  {f:'How to connect proposal to evidence',b:'Every component in the proposal must tie to a documented finding. "The dehumidifier is in the proposal because your RH reading was 72%. The drain is here because of the standing water I photographed."'},
  {f:'Financing introduction timing',b:'Introduce financing AFTER presenting the total investment, not before. "The total investment is $[X]. Now, let me show you how this looks monthly." Presenting financing first makes the price feel like a problem.'},
  {f:'Monthly payment framing',b:'Always convert the total to a monthly figure: "That\'s about $[Y] per month - less than most car payments." Monthly framing makes large investments feel manageable and comparable to everyday expenses.'},
  {f:'Why to avoid "What do you think?"',b:'"What do you think?" is a vague, passive question that invites vague, passive answers. Instead ask: "Based on everything we\'ve gone through, how would you like to move forward?" Direct and assumptive.'},
  {f:'Value framing vs price defense',b:'Never defend price directly. Instead, expand value: "This system protects your home from [X], prevents [Y], and includes [Z warranty]. The investment covers all of that." Let the scope justify the number.'},
  {f:'Evidence-based vs opinion-based selling',b:'Opinion: "I think you need this." Evidence: "Your reading was 24%. The rot threshold is 28%." Evidence-based recommendations are harder to argue with and build more trust than personal assertions.'},
  {f:'How to present the proposal document',b:'Walk through it line by line. Don\'t hand it over and wait. "Here\'s what I recommend and why: [Component] addresses [finding]. [Next component] addresses [next finding]." You control the narrative.'},
  {f:'Handling the "silent treatment" during presentation',b:'If the customer goes quiet, don\'t fill the silence with talking. Pause, then ask: "What questions do you have so far?" Silence often means they\'re processing, not disengaged.'},
  {f:'Presenting multiple options',b:'If appropriate, offer a primary recommendation and a reduced alternative: "Here\'s the complete solution. If budget is a factor, here\'s a phased approach that addresses the most urgent items first."'},
  {f:'Mistake: Presenting without photos',b:'A verbal description of findings is an opinion. Photos with measurements are evidence. Customers buy evidence, not opinions. If you didn\'t document it, it doesn\'t exist in the presentation.'},
  {f:'Mistake: Skipping the education step',b:'Jumping from findings to price skips the "why it matters" step. Without understanding the mechanism and progression, the customer sees the proposal as arbitrary, not necessary.'},
  {f:'Presenting warranty as value',b:'"This warranty is transferable to the next owner. It\'s not just protection for you - it adds documented value to your home. It\'s something a buyer will see during their inspection."'},
  {f:'Using before/after photos from past jobs',b:'Show relevant before/after photos from completed projects similar to theirs. "Here\'s a home with conditions just like yours. Here\'s what it looked like after." Social proof is more powerful than any script.'},
  {f:'Reading the room during presentation',b:'Watch for: leaning in (engaged), crossed arms (resistant), looking at spouse (checking in), checking phone (disengaged). Adjust pace and engagement based on body language cues.'},
  {f:'Transition from presentation to close',b:'"So that\'s everything I found and what I recommend to address it. The total investment is $[X]. With financing, that\'s about $[Y] per month. How would you like to move forward?"'},
  {f:'Handling technical questions during presentation',b:'Welcome them: "Great question." Answer with evidence, not jargon. If you don\'t know, say so: "I want to give you the right answer - let me check on that and get back to you today."'}
]},
{id:'closing',title:'Close & Follow-Up',icon:'&#127919;',cards:[
  {f:'First ask technique',b:'"Based on everything we\'ve gone through today, I believe this is the right solution. The total investment is $[X], or about $[Y] per month with financing. How would you like to move forward?" Direct, confident, not pushy.'},
  {f:'Second ask timing',b:'After addressing the first objection, circle back: "I understand your concern about [X], and I think we\'ve addressed that. Would you like to go ahead and get this scheduled?" Don\'t wait - ask again after resolving the concern.'},
  {f:'Objection diagnosis questions',b:'When you hear an objection, diagnose before responding: "Can you help me understand - is it the scope, the timing, or something else?" The answer tells you exactly what to address.'},
  {f:'Right-sizing with trade-offs',b:'If the full scope is too much, offer a phased approach: "We can start with the drainage system now and add encapsulation next year. The trade-off is you\'ll continue to have elevated humidity until phase two."'},
  {f:'Leave-behind components',b:'Every appointment should leave behind: 1) Written proposal with scope details. 2) Inspection photos (printed or emailed). 3) Your business card. 4) Financing pre-approval info if applicable. 5) Warranty documentation.'},
  {f:'5-Touch Follow-Up: Touch 1',b:'Same-day thank you text or call: "Thanks for your time today, [Name]. I enjoyed meeting you. If any questions come up, don\'t hesitate to reach out." Within hours of leaving.'},
  {f:'5-Touch Follow-Up: Touch 2',b:'24-48 hour follow-up call: "Hey [Name], I wanted to check in and see if you\'ve had a chance to think things over. Any questions I can answer?" Reference a specific finding from your inspection.'},
  {f:'5-Touch Follow-Up: Touch 3',b:'5-7 day value-add: Share a relevant article, case study, or before/after photo similar to their situation. "Saw this and thought of your home - similar conditions to what we discussed."'},
  {f:'5-Touch Follow-Up: Touch 4',b:'14-day check-in: "Hi [Name], just circling back. Wanted to make sure you had everything you needed to make your decision. Is there anything else I can provide?" Keep it helpful, not pushy.'},
  {f:'5-Touch Follow-Up: Touch 5',b:'30-day final touch: "Hey [Name], I know life gets busy. I wanted to reach out one more time - if the timing isn\'t right now, I completely understand. My offer stands whenever you\'re ready."'},
  {f:'Pending job conversion strategy',b:'Treat every pending proposal as an active opportunity. Each follow-up should add value - new information, a relevant photo, an answer to a question they raised. Never just "checking in" with nothing to offer.'},
  {f:'Referral capture timing',b:'Ask for referrals at the POINT OF SALE or immediately after the job is complete - when satisfaction and trust are highest. Don\'t wait weeks. "Is there anyone you know who might be dealing with something similar?"'},
  {f:'Referral ask script',b:'"Now that you\'ve seen what we do, is there anyone you know - a neighbor, family member, coworker - who might be dealing with something similar? I\'d love to take just as good care of them."'},
  {f:'Neighborhood marketing approach',b:'When you have a job scheduled in a neighborhood: knock 5-10 nearby doors. "We\'re going to be doing some work nearby. If you\'ve ever noticed [common symptom], I\'d be happy to take a quick look at no charge."'},
  {f:'Why the first ask fails (common reasons)',b:'1) Asked too passively ("What do you think?"). 2) Didn\'t connect price to evidence. 3) Didn\'t present financing. 4) Skipped the education step. 5) DM not present. Diagnose which one before making the second ask.'},
  {f:'Handling "Let me sleep on it"',b:'Agree, then set a specific next step: "Absolutely. Can I call you tomorrow at [time] to answer any questions that come up?" Never leave without a scheduled follow-up. Vague next steps die.'},
  {f:'When to stop following up',b:'After 5 touches with no engagement, move them to a long-term nurture list. Don\'t burn the relationship. A short note every 3-6 months keeps the door open without being annoying.'},
  {f:'Closing mistake: Abandoning the close',b:'Saying "Okay, take your time" and leaving without a next step is the abandoned close. You\'ll spend weeks chasing a lead that\'s already gone. Always leave with a scheduled follow-up.'},
  {f:'Closing mistake: Discounting to close',b:'Offering a discount before diagnosing the objection tells the customer your price was arbitrary. Discount only as a last resort, and only with a scope trade-off - never for free.'},
  {f:'Post-close: Setting expectations',b:'After the sale, clearly explain: timeline to installation, what to expect on install day, how the warranty works, and who to call with questions. Managing expectations prevents cancellations.'}
]},
{id:'psychology',title:'Customer Psychology',icon:'&#129504;',cards:[
  {f:'Emotional vs rational decisions',b:'Customers decide emotionally, then justify rationally. Your evidence gives them the rational justification, but the decision is driven by fear of damage, desire for peace of mind, and protecting their family.'},
  {f:'Loss aversion principle (2x rule)',b:'People feel the pain of losing something roughly 2x more than the pleasure of gaining something equal. Frame solutions as preventing loss ("protect your home") rather than gaining benefit ("improve your home").'},
  {f:'Buyer Type 1: Analytical',b:'Recognition: Asks detailed questions, wants data, compares specs. Approach: Lead with numbers, measurements, and documentation. Give them time to process. Don\'t rush. Evidence-heavy presentation.'},
  {f:'Buyer Type 2: Driver',b:'Recognition: Direct, time-conscious, bottom-line focused. Approach: Be concise, get to the point, present the recommendation confidently. Don\'t over-explain. Respect their time.'},
  {f:'Buyer Type 3: Expressive',b:'Recognition: Talkative, emotional, relationship-focused. Approach: Build rapport first, share stories, connect on a personal level. Show enthusiasm. Use before/after photos and testimonials.'},
  {f:'Buyer Type 4: Amiable',b:'Recognition: Agreeable, avoids conflict, seeks reassurance. Approach: Be warm and patient. Reduce perceived risk. Emphasize warranty and support. Don\'t pressure - they need to feel safe.'},
  {f:'Identifying buyer type in first 10 minutes',b:'Watch for: How they greet you (formal vs casual). Questions they ask (data vs feelings). How they make decisions (fast vs deliberate). Who they reference (spouse, neighbor, expert). Adapt your approach accordingly.'},
  {f:'Mismatch consequences',b:'Using a Driver approach on an Amiable buyer feels aggressive. Using an Amiable approach on a Driver wastes their time. Mismatched selling style is the #1 reason technically correct presentations fail to close.'},
  {f:'Four emotional drivers in home repair',b:'1) Fear: "What happens if I don\'t fix this?" 2) Peace of mind: "I want this handled." 3) Pride: "I take care of my home." 4) Protection: "I need to keep my family safe." Identify which one is dominant.'},
  {f:'Anchoring effect in pricing',b:'The first number a customer hears becomes their anchor. Present the total investment before the monthly payment. The large number makes the monthly figure feel small by comparison.'},
  {f:'Social proof in sales',b:'Customers trust other customers more than they trust salespeople. Use: before/after photos of similar local jobs, review counts, referral stories. "Your neighbor on [Street] had the same issue - here\'s what we did."'},
  {f:'Reciprocity principle in sales',b:'When you give value first (thorough inspection, honest assessment, education), customers feel a natural pull to reciprocate. The trust unlocking moment and free education create reciprocity before you ask for the sale.'},
  {f:'Why "trust me" doesn\'t work',b:'Saying "trust me" or leading with credentials tells the customer to rely on your authority. Evidence-based selling lets them reach their own conclusion. People trust what they see more than what they\'re told.'},
  {f:'Cognitive dissonance after the sale',b:'Buyers often feel doubt after committing (buyer\'s remorse). Counter this with immediate reassurance: recap the evidence, confirm the timeline, and reinforce that they made a well-informed decision.'},
  {f:'The power of silence after the ask',b:'After you ask "How would you like to move forward?" - stop talking. The first person to speak loses leverage. Silence feels uncomfortable, but it gives the customer space to process and respond honestly.'}
]},
{id:'competitive',title:'Competitive Positioning',icon:'&#9878;',cards:[
  {f:'How to ask to see a competitor\'s scope',b:'"Do you mind if I take a look at what they proposed? I\'m not here to bash anyone - I just want to make sure you can compare apples to apples." Position it as helping them, not attacking the competitor.'},
  {f:'Component-by-component comparison approach',b:'Go line by line: "They included [X] - great. Do they include [Y]? What about [Z]?" Let the customer discover the gaps themselves. Questions are more persuasive than statements.'},
  {f:'Competitor gap 1: Missing dehumidifier',b:'Many competitors skip the dehumidifier in encapsulation bids. Without it, the sealed space traps humidity instead of controlling it. The liner alone does not remove moisture from the air.'},
  {f:'Competitor gap 2: Unsealed penetrations',b:'Competitors often install liner but don\'t seal around pipes, wires, and ducts. Every unsealed penetration allows soil vapor to bypass the entire encapsulation system. It\'s the most common installation shortcut.'},
  {f:'Competitor gap 3: Thin liner (under 20-mil)',b:'Budget competitors use 6-mil or 10-mil liner. It tears during installation, punctures from foot traffic, and degrades faster. 20-mil reinforced polyethylene is the minimum; 120-mil is best practice for durability. Lifespan: 25+ years with proper installation.'},
  {f:'Never attack competitors',b:'Criticizing other companies makes you look insecure and defensive. Instead, ask questions that let the customer see the scope gaps on their own. "What components did they include?" is more powerful than "They do bad work."'},
  {f:'Scope gap identification technique',b:'Ask these 3 questions about any competitor bid: 1) "What specific components are included?" 2) "What does their warranty cover and for how long?" 3) "Did they do a full inspection with documentation?"'},
  {f:'Warranty comparison approach',b:'"Their warranty covers [X] for [Y] years. Our warranty covers [A] for [B] years and is transferable to the next homeowner. Let me show you exactly what\'s included." Let the comparison speak for itself.'},
  {f:'Why to avoid "you get what you pay for"',b:'This phrase sounds defensive and implies the customer is being cheap. Instead, let the scope comparison do the work: "The price difference almost always comes down to what\'s included. Let me show you."'},
  {f:'Evidence over rhetoric',b:'Never argue about quality in abstract terms. Show specific evidence: documented measurements, installation photos, product specifications, warranty documents. Evidence beats opinions every time.'},
  {f:'When a competitor price is genuinely lower for same scope',b:'Rare, but possible. Acknowledge it: "Their price is competitive. Here\'s what differentiates us: [specific factor - installation team experience, warranty terms, documentation standard]." Don\'t pretend gaps exist when they don\'t.'},
  {f:'Handling "the other guy said you\'re overpriced"',b:'"I appreciate them sharing their opinion. Rather than talking about their company, let me walk you through exactly what\'s in our scope and why. Then you can make the comparison yourself."'},
  {f:'Competitor uses different method objection',b:'"Different approaches work for different situations. Their method works well when [condition]. What I found in your home is [finding], which is why I recommend [approach]. Here\'s the specific reason..."'},
  {f:'How to compete on inspection quality',b:'"Ask the other company how long their inspection took, how many moisture readings they took, and how many photos they documented. Our inspection is 45-60 minutes with 12-20+ documented photos and 3+ moisture readings."'},
  {f:'Positioning when you are the higher bid',b:'Own it: "We\'re probably not the cheapest option. Here\'s why: [specific scope items, warranty, documentation, installation standards]. The question is whether the difference in scope is worth the difference in price."'}
]}
];
