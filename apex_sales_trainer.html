// ---- MODULE VIEWER ----
let currentModuleId=null;
let currentSlide=0;

let moduleOpenTime=null; // timestamp when module was opened

function getModuleStudyTime(modId){
  // Get accumulated study time for this module (in minutes)
  if(!currentRep)return 0;
  const r=reps[currentRep];
  r.studyTimes=r.studyTimes||{};
  return r.studyTimes[modId]||0;
}

function saveModuleStudyTime(){
  // Save accumulated time when closing or leaving a module
  if(!currentModuleId||!moduleOpenTime||!currentRep)return;
  const r=reps[currentRep];
  r.studyTimes=r.studyTimes||{};
  const sessionMins=Math.floor((Date.now()-moduleOpenTime)/60000);
  r.studyTimes[currentModuleId]=(r.studyTimes[currentModuleId]||0)+sessionMins;
  if(currentUid&&sessionMins>0){
    const update={};
    update['studyTimes']=r.studyTimes;
    db.collection('users').doc(currentUid).update(update).catch(e=>console.warn(e));
  }
}

function getMinTime(mod){
  // Minimum minutes based on slide count: ~1.5 min per slide, minimum 5 min
  return Math.max(5, Math.round(mod.slides.length * 1.5));
}

function hasPassedQuiz(modId){
  if(!currentRep)return false;
  const r=reps[currentRep];
  const score=r.quizScores&&r.quizScores[modId];
  return score&&score.best>=80;
}

function getTimeSpent(){
  const persisted=currentModuleId?getModuleStudyTime(currentModuleId):0;
  const session=moduleOpenTime?Math.floor((Date.now()-moduleOpenTime)/60000):0;
  return persisted+session;
}

function openModule(id){
  currentModuleId=id;
  currentSlide=0;
  mvViewMode='slides';
  moduleOpenTime=Date.now();
  const mod=MODULES.find(m=>m.id===id);
  document.getElementById('mvTitle').textContent=mod.title;
  renderModuleSlides(mod);
  document.getElementById('moduleViewer').classList.add('on');
  logActivity('Opened: '+mod.title);
  // Clear quiz lockouts for this module (rep is re-studying)
  if(currentRep){
    const r=reps[currentRep];
    if(r.quizScores){
      ['foundation','advanced','expert'].forEach(t=>{
        const key=t==='foundation'?id:id+'_'+t;
        if(r.quizScores[key]&&r.quizScores[key].failedAt){
          r.quizScores[key].restudied=true;
        }
      });
      saveState();
    }
  }
  // Start timer update for bottom bar
  if(window._mvTimer)clearInterval(window._mvTimer);
  window._mvTimer=setInterval(()=>updateModuleBottom(mod),30000);
}

let mvViewMode='slides'; // 'slides' or 'notes'

function renderModuleSlides(mod){
  let html='';

  // View toggle if deck has Google Slides
  if(mod.slidesId){
    html+=`<div class="slides-toggle">
      <div class="slides-toggle-btn ${mvViewMode==='slides'?'active':''}" onclick="mvViewMode='slides';renderModuleSlides(MODULES.find(m=>m.id==='${mod.id}'))">&#127902; Slide Deck</div>
      <div class="slides-toggle-btn ${mvViewMode==='notes'?'active':''}" onclick="mvViewMode='notes';renderModuleSlides(MODULES.find(m=>m.id==='${mod.id}'))">&#128218; Study Notes</div>
    </div>`;
  }

  if(mod.slidesId && mvViewMode==='slides'){
    // Embedded Google Slides viewer
    html+=`<div class="slides-embed" id="slidesEmbed">
      <iframe src="https://docs.google.com/presentation/d/${mod.slidesId}/embed?start=false&loop=false&delayms=60000" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
      <button onclick="goFullscreen('slidesEmbed')" style="position:absolute;bottom:8px;right:8px;z-index:5;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);">&#x26F6; Fullscreen</button>
    </div>`;
    // Compact notes below the deck
    html+=`<div class="sec-header">Slide Notes</div>`;
    mod.slides.forEach((s,i)=>{
      html+=`<div style="margin-bottom:12px;padding:12px;background:var(--dark3);border-radius:8px;cursor:pointer;" onclick="this.querySelector('.mv-notes').classList.toggle('show')">
        <div style="font-size:13px;font-weight:600;color:var(--white);">Slide ${i+1}: ${s.t}</div>
        <div class="mv-notes" style="margin-top:8px;">${s.n||'No notes for this slide.'}</div>
      </div>`;
    });
  } else {
    // Full text study notes view (original layout)
    mod.slides.forEach((s,i)=>{
      html+=`<div class="mv-slide" id="slide-${i}">
        <div class="mv-slide-num">Slide ${i+1} of ${mod.slides.length}</div>
        <div class="mv-slide-title">${s.t}</div>

        <div class="mv-notes">${s.n}</div>`:''}
      </div>`;
    });
  }

  // Media players for this module
  const modMedia=getMediaForModule(mod.id);
  if(modMedia.length){
    html+=`<div class="sec-header" style="margin-top:20px;">&#127911; Audio & Video</div>`;
    modMedia.forEach(m=>{html+=renderMediaPlayer(m);});
  }

  document.getElementById('mvBody').innerHTML=html;
  document.getElementById('mvProgress').textContent=`${mod.slides.length} slides`;
  updateModuleBottom(mod);

function updateModuleBottom(mod){
  const done=currentRep&&(reps[currentRep].completedModules||[]).includes(mod.id);
  if(done){
    document.getElementById('mvBottom').innerHTML=
      `<div style="font-size:13px;color:var(--green);">&#9989; Completed</div><button class="mv-nav-btn mv-prev" onclick="closeModule()">Close</button>`;
    return;
  }

  const minTime=getMinTime(mod);
  const timeSpent=getTimeSpent();
  const timeMet=timeSpent>=minTime;
  const hasQuiz=!!QUIZZES[mod.id];
  const quizPassed=hasPassedQuiz(mod.id);
  // Module completes based on study time alone. Quiz is unlocked after completion.
  const canComplete=timeMet;

  let statusHtml='<div style="display:flex;flex-direction:column;gap:4px;">';

  // Time requirement
  if(timeMet){
    statusHtml+=`<div style="font-size:11px;color:var(--green);">&#9989; ${minTime} min study time met</div>`;
  }else{
    statusHtml+=`<div style="font-size:11px;color:var(--gray);">&#9203; ${timeSpent}/${minTime} min study time</div>`;
  }

  // Quiz status (informational — quizzes unlock after module completion)
  if(hasQuiz&&quizPassed){
    statusHtml+=`<div style="font-size:11px;color:var(--green);">&#9989; Quiz passed</div>`;
  }

  statusHtml+='</div>';

  let btnHtml;
  if(canComplete){
    btnHtml=`<button class="mv-complete-btn" onclick="completeModule('${mod.id}')">&#9989; Mark Complete</button>`;
  }else{
    btnHtml=`<button class="mv-nav-btn mv-prev" style="opacity:.5;cursor:not-allowed;" disabled>&#9203; Keep studying...</button>`;
  }

  document.getElementById('mvBottom').innerHTML=statusHtml+btnHtml;
}

function closeModule(){
  saveModuleStudyTime();
  document.getElementById('moduleViewer').classList.remove('on');
  currentModuleId=null;
  moduleOpenTime=null;
  if(window._mvTimer){clearInterval(window._mvTimer);window._mvTimer=null;}
}

function completeModule(id){
  if(!currentRep)return;
  const r=reps[currentRep];
  r.completedModules=r.completedModules||[];
  if(!r.completedModules.includes(id)){
    r.completedModules.push(id);
    // Mark assignments completed
    Object.entries(assignments).forEach(([aid,a])=>{
      if(a.repId===currentRep&&a.moduleId===id){
        a.status='completed';
        db.collection('assignments').doc(aid).update({status:'completed'}).catch(e=>console.warn(e));
      }
    });
    saveState();
    // Immediate save — don't rely on debounce
    immediateSave();
    addPoints(100,'Completed module');
    renderTrain();renderHome();
  }
  closeModule();
}

function logActivity(action){
  if(!currentRep)return;
  const r=reps[currentRep];
  r.activityLog=r.activityLog||[];
  // Dedupe: skip if the most recent entry is the same action within last 5 minutes
  const last=r.activityLog[0];
  if(last&&last.action===action&&(Date.now()-new Date(last.time).getTime())<5*60*1000){
    return;
  }
  r.activityLog.unshift({action,pts:0,time:new Date().toISOString()});
  // Cap at 100 entries (matches addPoints behavior)
  if(r.activityLog.length>100)r.activityLog=r.activityLog.slice(0,100);
  saveState();
}

// ---- QUIZ PAGE ----
const TIER_INFO={
  foundation:{label:'Foundation',color:'var(--blue)',icon:'&#128218;',desc:'Basic recall & concepts'},
  advanced:{label:'Advanced',color:'var(--orange)',icon:'&#127941;',desc:'Scenario application'},
  expert:{label:'Expert',color:'var(--red)',icon:'&#128142;',desc:'Nuanced judgment calls'}
};

function getTierScore(modId,tier){
  if(!currentRep)return null;
  const r=reps[currentRep];
  const key=tier==='foundation'?modId:modId+'_'+tier;
  return r.quizScores&&r.quizScores[key]?r.quizScores[key]:null;
}

function isTierUnlocked(modId,tier){
  if(tier==='foundation')return true;
  if(tier==='advanced'){
    const s=getTierScore(modId,'foundation');
    return s&&s.best>=80;
  }
  if(tier==='expert'){
    const s=getTierScore(modId,'advanced');
    return s&&s.best>=80;
  }
  return false;
}

function renderQuizHTML(){
  let html='<div class="sec-header">Module Quizzes</div>';
  MODULES.forEach(m=>{
    if(!QUIZZES[m.id])return;
    const tiers=QUIZZES[m.id];

    // Determine highest unlocked/passed tier
    let highestPassed=null;
    ['foundation','advanced','expert'].forEach(t=>{
      const s=getTierScore(m.id,t);
      if(s&&s.best>=80)highestPassed=t;
    });

    const tierDots=['foundation','advanced','expert'].map(t=>{
      const s=getTierScore(m.id,t);
      const unlocked=isTierUnlocked(m.id,t);
      const passed=s&&s.best>=80;
      const info=TIER_INFO[t];
      const dotColor=passed?'var(--green)':unlocked?(s?'var(--orange)':'var(--gray-d)'):'var(--dark4)';
      return `<div style="width:10px;height:10px;border-radius:50%;background:${dotColor};" title="${info.label}: ${passed?s.best+'%':unlocked?'Unlocked':'Locked'}"></div>`;
    }).join('');

    const bestScore=getTierScore(m.id,'expert')||getTierScore(m.id,'advanced')||getTierScore(m.id,'foundation');
    const best=bestScore?bestScore.best:null;
    const color=best!==null?(best>=80?'var(--green)':best>=60?'var(--orange)':'var(--red)'):'var(--gray)';

    const modDone=currentRep&&(reps[currentRep].completedModules||[]).includes(m.id);
    html+=`<div class="mod-item" onclick="showQuizTiers('${m.id}')" style="${modDone?'':'opacity:.6;'}">
      <div class="mod-icon" style="background:${m.color}20;color:${m.color}">${modDone?m.icon:'&#128274;'}</div>
      <div class="mod-info">
        <div class="mod-name">${m.title}</div>
        <div class="mod-desc">${modDone?'3 tiers &middot; 30 questions':'Complete module to unlock'}</div>
        ${modDone?`<div style="display:flex;gap:4px;margin-top:4px;">${tierDots}</div>`:''}
      </div>
      <div style="text-align:right;">
        ${modDone?(highestPassed?`<div style="font-size:11px;padding:3px 8px;border-radius:10px;background:${TIER_INFO[highestPassed].color}20;color:${TIER_INFO[highestPassed].color};font-weight:700;">${TIER_INFO[highestPassed].label}</div>`:(best!==null?`<div style="font-size:14px;font-weight:700;color:${color};">${best}%</div>`:'<div style="font-size:12px;color:var(--gray);">Start</div>')):'<div style="font-size:12px;color:var(--gray-d);">&#128274;</div>'}
      </div>
    </div>`;
  });
  return html;
}

        <div class="mod-icon" style="background:${tierDisabled?'rgba(120,120,120,.15)':info.color+'20'};color:${tierDisabled?'var(--gray)':info.color};">${tierDisabled?'&#128274;':info.icon}</div>
        <div class="mod-info">
          <div class="mod-name">${info.label}</div>
          <div class="mod-desc">${tierDisabled?'Complete module to unlock':info.desc+' &middot; '+qs.length+' questions'}</div>
        </div>
        <div style="text-align:right;">
          ${tierDisabled?'<div style="font-size:12px;color:var(--gray-d);">&#128274;</div>':(passed?`<div style="font-size:16px;font-weight:700;color:var(--green);">${score.best}% &#9989;</div>`:(score?`<div style="font-size:16px;font-weight:700;color:var(--orange);">${score.best}%</div><div style="font-size:10px;color:var(--gray);">Need 80%</div>`:`<div style="font-size:12px;color:${info.color};">&#9654; Start</div>`))}
        </div>

        <div class="mod-icon" style="background:rgba(192,57,43,.15);color:var(--red);">&#128274;</div>
        <div class="mod-info">
          <div class="mod-name">${info.label}</div>
          <div class="mod-desc" style="color:var(--red-l);">Review module to unlock retake</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:14px;font-weight:700;color:var(--red);">${score.best}%</div>
          <div style="font-size:10px;color:var(--red-l);">Locked</div>
        </div>
      </div>`;

      html+=`<div class="mod-item" style="opacity:.4;cursor:not-allowed;">
        <div class="mod-icon" style="background:var(--dark4);">&#128274;</div>

          <div class="mod-name">${info.label}</div>
          <div class="mod-desc">Pass ${tier==='advanced'?'Foundation':'Advanced'} at 80%+ to unlock</div>

let quizState={};

function isQuizLocked(modId,tier){
  if(!currentRep)return false;
  const r=reps[currentRep];
  const scoreKey=tier==='foundation'?modId:modId+'_'+tier;
  const score=r.quizScores&&r.quizScores[scoreKey];
  if(!score||!score.failedAt)return false;
  // Locked if failed AND hasn't re-studied (reopened module after failing)
  return !score.restudied;
}

function startQuiz(modId,tier){
  tier=tier||'foundation';
  const tiers=QUIZZES[modId];
  if(!tiers)return;
  // Gate: must complete the module before taking any quiz
  if(currentRep){
    const r=reps[currentRep];
    if(!(r.completedModules||[]).includes(modId)){
      const mod=MODULES.find(m=>m.id===modId);
      showToast('Complete the '+mod.title+' module first','toast-streak');
      return;
    }
  }
  // Check lockout
  if(isQuizLocked(modId,tier)){
    const mod=MODULES.find(m=>m.id===modId);
    showToast('Review the '+mod.title+' module before retaking','toast-streak');
    return;
  }
  const qs=tiers[tier]||tiers.foundation||[];
  if(!qs.length)return;
  const mod=MODULES.find(m=>m.id===modId);
  quizState={modId,tier,questions:shuffle([...qs]),current:0,correct:0,answered:[],skipped:[]};
  // Switch tab first, then render the question (otherwise switchTab's renderLearn overwrites it)
  learnTab='quizzes';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-learn').classList.add('on');
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('on'));
  const btn=document.querySelector('.bnav-btn[data-tab="learn"]');
  if(btn)btn.classList.add('on');
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const s=quizState;
  // If we've gone past the end, check for skipped questions
  if(s.current>=s.questions.length){
    if(s.skipped.length){
      // Loop back to first skipped question
      s.current=s.skipped.shift();
      // Fall through to render it
    }else{
      return renderQuizResults();
    }
  }
  const q=s.questions[s.current];
  const mod=MODULES.find(m=>m.id===s.modId);
  const tierInfo=TIER_INFO[s.tier||'foundation'];
  const totalAnswered=s.answered.length;
  const totalRemaining=s.questions.length-totalAnswered-s.skipped.length;
  const skippedCount=s.skipped.length;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <button class="mv-nav-btn mv-prev" onclick="showQuizTiers('${s.modId}')">&#8592; Quit</button>
    <div style="font-size:12px;padding:3px 10px;border-radius:12px;background:${tierInfo.color}20;color:${tierInfo.color};font-weight:700;">${tierInfo.label}</div>
    <div style="font-size:13px;color:var(--gray);">Q${totalAnswered+1}/${s.questions.length}</div>
  </div>
  <div class="pbar" style="margin-bottom:20px;"><div class="pbar-fill" style="width:${(totalAnswered/s.questions.length)*100}%;background:var(--blue);"></div></div>`;
  if(skippedCount){
    html+=`<div style="font-size:11px;color:var(--orange);margin-bottom:8px;">${skippedCount} skipped — you'll come back to ${skippedCount===1?'it':'them'}</div>`;
  }
  html+=`<div class="quiz-card">
    <div class="quiz-q">${q.q}</div>
    <div id="quizOpts">`;
  q.o.forEach((opt,i)=>{
    html+=`<button class="quiz-opt" id="qopt-${i}" onclick="answerQuiz(${i})">${opt}</button>`;
  });
  html+=`</div>
  <div id="quizSkipWrap" style="text-align:center;margin-top:12px;">
    <button style="background:none;border:none;color:var(--gray);font-size:13px;cursor:pointer;padding:8px 16px;" onclick="skipQuizQuestion()">Skip for now &rarr;</button>
  </div>
  <div class="quiz-explain" id="quizExplain">${q.e}</div></div>`;
  document.getElementById('pg-learn').innerHTML=html;
}

function skipQuizQuestion(){
  const s=quizState;
  if(s.answered.includes(s.current))return;
  s.skipped.push(s.current);
  s.current++;
  renderQuizQuestion();
}

function answerQuiz(idx){
  const s=quizState;
  const q=s.questions[s.current];
  if(s.answered.includes(s.current))return;
  s.answered.push(s.current);
  const correct=idx===q.c;
  if(correct)s.correct++;
  document.getElementById('qopt-'+idx).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById('qopt-'+q.c).classList.add('correct');
  document.getElementById('quizExplain').classList.add('show');
  const skipWrap=document.getElementById('quizSkipWrap');
  if(skipWrap)skipWrap.style.display='none';
  document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');
  // Show Next button instead of auto-advancing
  const nextBtn=document.createElement('button');
  nextBtn.className='mv-complete-btn';
  nextBtn.style.cssText='width:100%;margin-top:16px;';
  nextBtn.innerHTML=s.current+1>=s.questions.length?'See Results &#8594;':'Next Question &#8594;';
  nextBtn.onclick=()=>{s.current++;renderQuizQuestion();};
  document.getElementById('quizExplain').parentElement.appendChild(nextBtn);
}

function renderQuizResults(){
  const s=quizState;
  const pct=Math.round((s.correct/s.questions.length)*100);
  const passed=pct>=80;
  const mod=MODULES.find(m=>m.id===s.modId);
  const tier=s.tier||'foundation';
  const tierInfo=TIER_INFO[tier];
  const scoreKey=tier==='foundation'?s.modId:s.modId+'_'+tier;

  if(currentRep){
    const r=reps[currentRep];
    r.quizScores=r.quizScores||{};
    if(!r.quizScores[scoreKey]||pct>r.quizScores[scoreKey].best){
      r.quizScores[scoreKey]={best:pct,last:pct,date:new Date().toISOString()};
    }else{
      r.quizScores[scoreKey].last=pct;
      r.quizScores[scoreKey].date=new Date().toISOString();
    }
    // Also update base modId score for quiz gate (use best across all tiers)
    if(tier!=='foundation'){
      const baseScore=r.quizScores[s.modId];
      if(!baseScore||pct>baseScore.best){
        r.quizScores[s.modId]={best:pct,last:pct,date:new Date().toISOString()};
      }
    }
    // Record failure lockout
    if(!passed){
      r.quizScores[scoreKey].failedAt=new Date().toISOString();
      r.quizScores[scoreKey].restudied=false;
    }else{
      // Clear any lockout on pass
      if(r.quizScores[scoreKey].failedAt){
        delete r.quizScores[scoreKey].failedAt;
        delete r.quizScores[scoreKey].restudied;
      }
    }
    saveState();
    const tierPts=tier==='expert'?75:tier==='advanced'?60:50;
    if(passed){addPoints(tierPts,tierInfo.label+' quiz passed: '+mod.title);addNotification('&#9989;',tierInfo.label+' quiz passed: '+mod.title+' ('+pct+'%)','');}
    else{addPoints(15,'Quiz attempted: '+mod.title);addNotification('&#10060;','Quiz not passed: '+mod.title+' ('+pct+'%) — need 80%','');}
    checkBadges();
    // Check for certificates
    if(passed){checkCertificates();checkQuizAssignment(s.modId,tier,true);}
  }

  const nextTier=tier==='foundation'?'advanced':tier==='advanced'?'expert':null;
  const unlockedNext=nextTier&&passed;

  let html=`<div class="quiz-score">
    <div style="font-size:64px;margin-bottom:12px;">${passed?'&#127942;':'&#128170;'}</div>
    <div style="font-size:12px;padding:4px 12px;border-radius:12px;background:${tierInfo.color}20;color:${tierInfo.color};font-weight:700;display:inline-block;margin-bottom:8px;">${tierInfo.label} Tier</div>
    <div class="quiz-score-num" style="color:${passed?'var(--green)':'var(--orange)'};">${pct}%</div>
    <div class="quiz-score-label">${s.correct} of ${s.questions.length} correct</div>
    <div style="font-size:16px;font-weight:600;color:${passed?'var(--green)':'var(--orange)'};margin-bottom:8px;">${passed?'Passed!':'Failed — review the module before retaking'}</div>
    ${unlockedNext?`<div style="font-size:14px;color:var(--gold);margin-bottom:16px;">&#128275; ${TIER_INFO[nextTier].label} tier unlocked!</div>`:''}
    ${tier==='foundation'&&passed?`<div style="font-size:12px;color:var(--green);margin-bottom:16px;">Module completion unlocked</div>`:''}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      ${passed?`<button class="mv-complete-btn" style="margin:4px;" onclick="startQuiz('${s.modId}','${tier}')">Retry ${tierInfo.label}</button>`
        :`<button class="mv-complete-btn" style="margin:4px;background:var(--blue);" onclick="openModule('${s.modId}');learnTab='modules';switchTab('learn');">&#128218; Go Study ${mod.title}</button>`}
      ${unlockedNext?`<button class="mv-complete-btn" style="margin:4px;background:${TIER_INFO[nextTier].color};" onclick="startQuiz('${s.modId}','${nextTier}')">Start ${TIER_INFO[nextTier].label} &#9654;</button>`:''}
      <button class="mv-nav-btn mv-prev" style="margin:4px;" onclick="showQuizTiers('${s.modId}')">Back to Tiers</button>
    </div>
  </div>`;
  document.getElementById('pg-learn').innerHTML=html;
}

let fcState={};

function renderFlashcardsHTML(){
  let html='<div class="sec-header">Flashcard Decks</div>';
  FLASHCARD_DECKS.forEach(d=>{
    html+=`<div class="mod-item" onclick="startFlashcards('${d.id}')">
      <div class="mod-icon" style="background:var(--dark4);">${d.icon}</div>
      <div class="mod-info">
        <div class="mod-name">${d.title}</div>
        <div class="mod-desc">${d.cards.length} cards</div>
      </div>
      <div style="font-size:13px;color:var(--gray);">&#9654;</div>
    </div>`;
  });
  return html;
}
function renderCards(){learnTab='cards';renderLearn();}

function startFlashcards(deckId){
  const deck=FLASHCARD_DECKS.find(d=>d.id===deckId);
  fcState={deckId,cards:shuffle([...deck.cards]),current:0,known:0,again:0};
  renderFlashcard();
}

function renderFlashcard(){
  const s=fcState;
  if(s.current>=s.cards.length){return renderFcResults();}
  const card=s.cards[s.current];
  const deck=FLASHCARD_DECKS.find(d=>d.id===s.deckId);
  s.flipped=false; // reset on each new card
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <button class="mv-nav-btn mv-prev" onclick="renderCards()">&#8592; Back</button>
    <div style="font-size:13px;color:var(--gray);">${deck.title}</div>
  </div>
  <div class="fc-counter">${s.current+1} of ${s.cards.length} &middot; &#9989; ${s.known} &middot; &#128260; ${s.again}</div>
  <div class="fc-card" id="fcCard" onclick="flipFcCard()">
    <div class="fc-inner">
      <div class="fc-front">
        <div class="fc-label">Question</div>
        <div class="fc-text">${card.f}</div>
        <div style="font-size:12px;color:var(--gray);margin-top:12px;">Tap to flip</div>
      </div>
      <div class="fc-back">
        <div class="fc-label">Answer</div>
        <div class="fc-text">${card.b}</div>
      </div>
    </div>
  </div>
  <div class="fc-actions" id="fcActions" style="display:none;">
    <button class="fc-btn fc-again" onclick="fcAnswer('again')">&#128260; Review Again</button>
    <button class="fc-btn fc-know" onclick="fcAnswer('know')">&#9989; Got It</button>
  </div>
  <div id="fcHint" style="text-align:center;font-size:12px;color:var(--gray);margin-top:12px;">Try to recall the answer first, then tap to flip</div>`;
  document.getElementById('pg-learn').innerHTML=html;
}

function flipFcCard(){
  const card=document.getElementById('fcCard');
  if(!card)return;
  card.classList.toggle('flipped');
  fcState.flipped=card.classList.contains('flipped');
  // Reveal answer buttons only after first flip
  if(fcState.flipped){
    const actions=document.getElementById('fcActions');
    const hint=document.getElementById('fcHint');
    if(actions)actions.style.display='';
    if(hint)hint.style.display='none';
  }
}

function fcAnswer(type){
  if(type==='know'){
    fcState.known++;
  }else{
    fcState.again++;
    // Spaced repetition: add missed card back 3-5 cards later
    const card=fcState.cards[fcState.current];
    const insertAt=Math.min(fcState.current+3+Math.floor(Math.random()*3),fcState.cards.length);
    fcState.cards.splice(insertAt,0,{...card,_retry:true});

function answerDrill(idx){
  if(drillState.answered)return;
  drillState.answered=true;

  const btn=document.getElementById('dopt-'+idx);
  const correct=btn.dataset.correct==='true';
  const explanation=btn.dataset.explain;

  // Highlight selected answer
  btn.classList.add(correct?'correct':'wrong');

  // If wrong, also highlight the correct answer
  if(!correct){
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      if(b.dataset.correct==='true')b.classList.add('correct');
    });
  }

  document.getElementById('drillExplain').textContent=explanation;
  document.getElementById('drillExplain').classList.add('show');
  document.querySelectorAll('.quiz-opt').forEach(b=>b.style.pointerEvents='none');

  if(currentRep){
    const r=reps[currentRep];
    r.drillsCompleted=(r.drillsCompleted||0)+1;
    if(correct)r.drillsPerfect=(r.drillsPerfect||0)+1;
    saveState();
    addPoints(correct?30:10,correct?'Drill correct':'Drill attempted');
    checkBadges();
    trackAssignmentProgress('drill',drillState.drill.cat);
  }

  // Add Next buttons using DOM insertion (not innerHTML+=)
  const btns=document.createElement('div');
  btns.style.cssText='text-align:center;margin-top:20px;';
  btns.innerHTML=`<button class="mv-complete-btn" style="margin:8px;" onclick="startDrill()">Next Drill</button>
    <button class="mv-nav-btn mv-prev" style="margin:8px;" onclick="practiceTab='drills';renderPractice()">Back to Drills</button>`;
  document.getElementById('pg-practice').appendChild(btns);
}

function renderRolePlay(){practiceTab='roleplay';renderPractice();}

function startRolePlay(cat){
  const pool=cat?ROLEPLAY_SCENARIOS.filter(s=>s.cat===cat):ROLEPLAY_SCENARIOS;
  rpState={scenario:pool[Math.floor(Math.random()*pool.length)],loading:false,feedback:null};
  renderRolePlay();
}

async function submitRolePlay(){
  const response=document.getElementById('rpResponse').value.trim();
  if(!response)return showToast('Type your response first','toast-streak');
  if(response.length<20)return showToast('Give a more complete response','toast-streak');

  rpState.loading=true;
  rpState.repResponse=response;
  renderRolePlay();

  try{
    const res=await fetch('/api/roleplay',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        scenario:rpState.scenario.scenario+' Context: '+rpState.scenario.context,
        repResponse:response,
        category:rpState.scenario.cat,
        discProfile:currentRep&&reps[currentRep].discResult?reps[currentRep].discResult:null,
        motivatorsProfile:currentRep&&reps[currentRep].motivatorsResult?reps[currentRep].motivatorsResult:null,
        eqProfile:currentRep&&reps[currentRep].eqResult?reps[currentRep].eqResult:null
      })
    });
    if(!res.ok)throw new Error('API error');
    rpState.feedback=await res.json();
    rpState.loading=false;

    // Award points and store result
    if(currentRep){
      const score=rpState.feedback.overall_score||0;
      const pts=score>=80?50:score>=60?30:15;
      addPoints(pts,'Role play: '+rpState.scenario.cat);
      const r=reps[currentRep];
      // Note: role-plays are tracked separately in roleplayHistory.
      // We do NOT increment drillsCompleted/drillsPerfect — those are for objection drills only.
      // Store role-play result history
      r.roleplayHistory=r.roleplayHistory||[];
      r.roleplayHistory.unshift({
        cat:rpState.scenario.cat,
        scenario:rpState.scenario.scenario.substring(0,100),
        score:score,
        scores:rpState.feedback.scores||{},
        feedback:rpState.feedback.feedback||'',
        tip:rpState.feedback.tip||'',
        date:new Date().toISOString()
      });
      if(r.roleplayHistory.length>50)r.roleplayHistory=r.roleplayHistory.slice(0,50);
      saveState();
      trackAssignmentProgress('roleplay',rpState.scenario.cat);
      checkBadges();
    }
  }catch(e){
    console.error('Role play error:',e);
    rpState.loading=false;
    rpState.feedback={error:true,feedback:'Could not get AI feedback. Check your connection and try again.'};
  }

  renderRolePlay();
}

function renderRolePlayFeedback(){
  const fb=rpState.feedback;
  if(fb.error){
    return `<div class="card"><p style="color:var(--red);">${fb.feedback}</p>
      <button class="mv-complete-btn" style="margin-top:12px;" onclick="rpState.feedback=null;rpState.loading=false;practiceTab='roleplay';renderPractice()">Try Again</button></div>`;
  }

  const score=fb.overall_score||0;
  const color=score>=80?'var(--green)':score>=60?'var(--orange)':'var(--red)';
  const border=score>=80?'rgba(39,174,96,.4)':score>=60?'rgba(230,126,34,.4)':'rgba(192,57,43,.4)';
  const label=score>=80?'Strong Response':score>=60?'Good Foundation':'Needs Work';

  let html=`<button class="mv-nav-btn mv-prev" style="margin-bottom:16px;" onclick="rpState.scenario=null;rpState.feedback=null;practiceTab='roleplay';renderPractice()">&#8592; Back to Scenarios</button>

    <div class="drill-scenario" style="opacity:.7;font-size:13px;">
      <div class="drill-cat">${rpState.scenario.cat}</div>
      <div style="color:var(--gray-l);margin-bottom:6px;">${rpState.scenario.scenario}</div>
      <div style="color:var(--gray);font-style:italic;">Your response: "${escapeHtml(rpState.repResponse)}"</div>
    </div>

    <div class="rp-feedback" style="border-color:${border};">
      <div class="rp-score-ring" style="border:4px solid ${color};color:${color};">${score}</div>
      <div style="text-align:center;font-size:16px;font-weight:700;color:${color};margin-bottom:4px;">${label}</div>

      <div class="rp-scores-grid">
        ${Object.entries(fb.scores||{}).map(([k,v])=>{
          const c=v>=4?'var(--green)':v>=3?'var(--orange)':'var(--red)';
          return `<div class="rp-score-item"><div class="num" style="color:${c}">${escapeHtml(v)}/5</div><div class="label">${escapeHtml(k)}</div></div>`;
        }).join('')}
      </div>

      <div style="font-size:14px;color:var(--gray-l);line-height:1.7;margin:16px 0;">${escapeHtml(fb.feedback||'')}</div>

      ${fb.better_response?`<div class="rp-model">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:6px;">Model Response</div>
        <div style="font-size:13px;color:var(--gray-l);line-height:1.7;font-style:italic;">${escapeHtml(fb.better_response)}</div>
      </div>`:''}

      ${fb.tip?`<div class="rp-tip">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">Pro Tip</div>
        <div style="font-size:13px;color:var(--gray-l);line-height:1.7;">${escapeHtml(fb.tip)}</div>
      </div>`:''}
    </div>

    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="mv-complete-btn" style="flex:1;" onclick="startRolePlay('${rpState.scenario.cat}')">Next Scenario</button>
      <button class="mv-nav-btn mv-prev" style="flex:1;" onclick="startRolePlay()">Random</button>
    </div>`;

  return html;
}

// ---- MOTIVATORS SURVEY ENGINE ----

let motivatorsState = null;

function startMotivatorsSurvey() {
  var cd=getAssessCooldown('motivators');
  if(cd){return showToast('Motivators retake available in '+cd+' day'+(cd!==1?'s':''),'toast-streak');}
  motivatorsState = {
    current: 0,
    answers: new Array(motivatorsQuestions.length).fill(null) // each answer: {first: idx, second: idx} or null
  };
  renderMotivatorsQuestion();
}

function renderMotivatorsQuestion() {
  if(!motivatorsState)return;
  const s = motivatorsState;
  if (s.current >= motivatorsQuestions.length) { return calculateMotivatorScores(); }
  const q = motivatorsQuestions[s.current];
  const pct = Math.round((s.current / motivatorsQuestions.length) * 100);
  const pick = s.answers[s.current]; // {first: idx, second: idx} or null

  let html = '<div style="position:sticky;top:0;background:var(--dark);padding:12px 0 8px;z-index:10;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
  html += '<div style="font-size:12px;color:var(--gray);">Question ' + (s.current + 1) + ' of ' + motivatorsQuestions.length + '</div>';
  html += '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-weight:700;">' + q.cat + '</div>';
  html += '</div>';
  html += '<div class="pbar"><div class="pbar-fill" style="width:' + pct + '%;background:#7c3aed;"></div></div>';
  html += '</div>';
  html += '<div style="font-size:18px;font-weight:700;color:var(--white);margin:20px 0 8px;line-height:1.4;">' + q.text + '</div>';
  html += '<div style="font-size:12px;color:var(--gray);margin-bottom:16px;">Tap your <strong style="color:#7c3aed;">1st choice</strong> (3 pts), then your <strong style="color:var(--gray-l);">2nd choice</strong> (1 pt)</div>';

  q.opts.forEach(function(opt, i) {
    var isFirst = pick && pick.first === i;
    var isSecond = pick && pick.second === i;
    var cls = 'disc-opt';
    var badge = '';
    var extraStyle = '';
    if (isFirst) {
      cls += ' selected';
      badge = '<span style="display:inline-block;background:#7c3aed;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-right:8px;">1st</span>';
      extraStyle = 'border-color:#7c3aed;background:rgba(124,58,237,.15);color:var(--white);';
    } else if (isSecond) {
      badge = '<span style="display:inline-block;background:var(--dark5);color:var(--gray-l);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-right:8px;">2nd</span>';
      extraStyle = 'border-color:var(--gray);background:rgba(255,255,255,.04);color:var(--white);';
    }
    html += '<button class="' + cls + '" style="' + extraStyle + '" onclick="answerMotivators(' + i + ')">' + badge + opt.text + '</button>';
  });

  var bothPicked = pick && pick.first !== null && pick.second !== null;
  html += '<div style="display:flex;justify-content:space-between;margin-top:20px;">';
  if (s.current > 0) {
    html += '<button class="mv-nav-btn mv-prev" onclick="motivatorsState.current--;renderMotivatorsQuestion()">&#8592; Back</button>';
  } else {
    html += '<div></div>';
  }
  html += '<button class="mv-nav-btn mv-next" ' + (!bothPicked ? 'disabled style="opacity:.4;cursor:not-allowed;"' : '') + ' onclick="motivatorsState.current++;renderMotivatorsQuestion()">Next &#8594;</button>';
  html += '</div>';

  document.getElementById('pg-more').innerHTML = html;
}

function answerMotivators(idx) {
  var s = motivatorsState;
  var pick = s.answers[s.current];

  if (!pick) {
    // Nothing selected yet — set as 1st
    s.answers[s.current] = { first: idx, second: null };
  } else if (pick.first === idx) {
    // Tapping the 1st choice — deselect it
    if (pick.second !== null) {
      // Promote 2nd to 1st
      s.answers[s.current] = { first: pick.second, second: null };
    } else {
      s.answers[s.current] = null;
    }
  } else if (pick.second === idx) {
    // Tapping the 2nd choice — deselect it
    s.answers[s.current] = { first: pick.first, second: null };
  } else if (pick.second === null) {
    // 1st is set, no 2nd yet — set as 2nd
    pick.second = idx;
  } else {
    // Both already set, tapping a third option — replace 2nd
    pick.second = idx;
  }

  renderMotivatorsQuestion();
}

function calculateMotivatorScores() {
  var scores = { T: 0, U: 0, A: 0, S: 0, I: 0, TR: 0 };

  motivatorsQuestions.forEach(function(q, i) {
    var pick = motivatorsState.answers[i];
    if (!pick) return;
    if (pick.first !== null) {
      var m1 = q.opts[pick.first].m;
      scores[m1] = (scores[m1] || 0) + 3;
    }
    if (pick.second !== null) {
      var m2 = q.opts[pick.second].m;
      scores[m2] = (scores[m2] || 0) + 1;
    }
  });

  var total = 0;
  for (var k in scores) total += scores[k];
  if (total === 0) total = 1;

  var pcts = {};
  for (var k in scores) pcts[k] = Math.round((scores[k] / total) * 100);

  var sorted = Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; });
  var primary = sorted[0][0];
  var secondary = sorted[1][0];

  var result = {
    primary: primary,
    secondary: secondary,
    scores: scores,
    pcts: pcts,
    completedAt: new Date().toISOString()
  };

  // Save to user
  if (currentRep) {
    reps[currentRep].motivatorsResult = result;
    saveState();
    if (currentUid) {
      db.collection('users').doc(currentUid).update({ motivatorsResult: result }).catch(function(e) { console.warn(e); });
    }
    addPoints(75, 'Completed Motivators Assessment');
    checkAssessmentAssignment('motivators');
  }

  motivatorsState.result = result;
  renderMotivatorsResults(result);
}

function viewMotivatorsResults() {
  if (!currentRep || !reps[currentRep].motivatorsResult) return;
  renderMotivatorsResults(reps[currentRep].motivatorsResult);
}

function buildMotivatorsDetailHTML(result){
  var p = motivatorProfiles[result.primary];
  var s = motivatorProfiles[result.secondary];
  var allKeys = ['T', 'U', 'A', 'S', 'I', 'TR'];
  var maxScore = 0;
  allKeys.forEach(function(k) { if (result.scores[k] > maxScore) maxScore = result.scores[k]; });
  if (maxScore === 0) maxScore = 1;
  var html = '';
  html += '<div style="padding:24px;border-radius:12px;margin:0 0 20px;text-align:center;background:' + p.color + '15;border:1px solid ' + p.color + '30;">';
  html += '<div style="font-size:48px;margin-bottom:8px;">' + p.emoji + '</div>';
  html += '<div style="font-size:24px;font-weight:800;color:' + p.color + ';">' + p.name + '</div>';
  html += '<div style="font-size:14px;color:var(--gray-l);font-style:italic;margin-top:6px;">' + p.tagline + '</div>';
  html += '<div style="font-size:12px;color:var(--gray);margin-top:8px;">Secondary: ' + s.name + ' (' + result.secondary + ') \u2014 ' + result.pcts[result.secondary] + '%</div>';
  html += '</div>';
  html += '<div class="card" style="padding:20px;">';
  html += '<div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--gray);margin-bottom:14px;">Motivator Scores</div>';
  allKeys.forEach(function(k) {
    var prof = motivatorProfiles[k];
    var pct = maxScore > 0 ? Math.round((result.scores[k] / maxScore) * 100) : 0;
    var isPrimary = k === result.primary;
    html += '<div style="margin-bottom:10px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
    html += '<div style="font-size:13px;color:' + (isPrimary ? prof.color : 'var(--gray-l)') + ';font-weight:' + (isPrimary ? '700' : '500') + ';">' + prof.emoji + ' ' + prof.name + '</div>';
    html += '<div style="font-size:13px;color:' + (isPrimary ? prof.color : 'var(--gray)') + ';font-weight:700;">' + result.pcts[k] + '%</div>';
    html += '</div>';
    html += '<div class="pbar" style="height:8px;"><div class="pbar-fill" style="width:' + pct + '%;background:' + prof.color + ';' + (isPrimary ? '' : 'opacity:.6;') + '"></div></div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="card" style="border-left:3px solid ' + p.color + ';">';
  html += '<div style="font-size:14px;color:var(--gray-l);line-height:1.7;">' + p.desc + '</div>';
  html += '<div style="font-size:13px;color:var(--gray);margin-top:10px;line-height:1.6;"><strong style="color:var(--white);">In Sales:</strong> ' + p.inSales + '</div>';
  html += '</div>';
  html += '<div class="disc-section"><div class="disc-section-title" style="color:var(--green);">&#11088; Motivators</div>';
  html += '<ul style="margin:0;padding-left:20px;color:var(--gray-l);font-size:14px;line-height:1.8;">';
  p.motivators.forEach(function(m) { html += '<li>' + m + '</li>'; });
  html += '</ul></div>';
  html += '<div class="disc-section"><div class="disc-section-title" style="color:var(--red);">&#128547; Drains</div>';
  html += '<ul style="margin:0;padding-left:20px;color:var(--gray-l);font-size:14px;line-height:1.8;">';
  p.drains.forEach(function(d) { html += '<li>' + d + '</li>'; });
  html += '</ul></div>';
  html += '<div class="disc-section" style="background:rgba(201,168,76,.08);border-left:3px solid var(--gold);">';
  html += '<div class="disc-section-title" style="color:var(--gold);">&#128218; Coaching</div>';
  html += '<ul style="margin:0;padding-left:20px;color:var(--gray-l);font-size:14px;line-height:1.8;">';
  p.coaching.forEach(function(c) { html += '<li>' + c + '</li>'; });
  html += '</ul></div>';
  return html;
}

function renderMotivatorsResults(result) {
  var html = '<button class="mv-nav-btn mv-prev" style="margin-bottom:16px;" onclick="renderAssessmentInMore()">&#8592; Back</button>';
  html += buildMotivatorsDetailHTML(result);
  html += '<div style="text-align:center;margin-top:20px;">';
  html += '<button class="mv-nav-btn mv-prev" onclick="renderAssessmentInMore()">Back to Assessments</button>';
  html += '</div>';
  document.getElementById('pg-more').innerHTML = html;
}

let eqState = null;

function startEqSurvey() {
  var cd=getAssessCooldown('eq');
  if(cd){return showToast('EQ retake available in '+cd+' day'+(cd!==1?'s':''),'toast-streak');}
  eqState = {
    current: 0,
    answers: new Array(eqQuestions.length).fill(null)
  };
  renderEqQuestion();
}

function renderEqQuestion() {
  if(!eqState)return;
  var s = eqState;
  if (s.current >= eqQuestions.length) { return calculateEqScores(); }
  var q = eqQuestions[s.current];
  var pct = Math.round((s.current / eqQuestions.length) * 100);

  var html = '<div style="position:sticky;top:0;background:var(--dark);padding:12px 0 8px;z-index:10;">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
  html += '<div style="font-size:12px;color:var(--gray);">Question ' + (s.current + 1) + ' of ' + eqQuestions.length + '</div>';
  html += '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#1e7e5a;font-weight:700;">' + eqProfiles[q.comp].name + '</div>';
  html += '</div>';
  html += '<div class="pbar"><div class="pbar-fill" style="width:' + pct + '%;background:#1e7e5a;"></div></div>';
  html += '</div>';
  html += '<div style="font-size:18px;font-weight:700;color:var(--white);margin:20px 0 6px;line-height:1.4;">' + q.text + '</div>';
  if (q.context) {
    html += '<div style="font-size:13px;color:var(--gray);font-style:italic;margin-bottom:16px;">' + q.context + '</div>';
  }

  q.opts.forEach(function(opt, i) {
    var selected = s.answers[s.current] === i;
    html += '<button class="disc-opt ' + (selected ? 'selected' : '') + '" ' + (selected ? 'style="border-color:#1e7e5a;background:rgba(30,126,90,.12);"' : '') + ' onclick="answerEq(' + i + ')">' + opt.text + '</button>';
  });

  html += '<div style="display:flex;justify-content:space-between;margin-top:20px;">';
  if (s.current > 0) {
    html += '<button class="mv-nav-btn mv-prev" onclick="eqState.current--;renderEqQuestion()">&#8592; Back</button>';
  } else {
    html += '<div></div>';
  }
  html += '<button class="mv-nav-btn mv-next" ' + (s.answers[s.current] === null ? 'disabled style="opacity:.4;cursor:not-allowed;"' : '') + ' onclick="eqState.current++;renderEqQuestion()">Next &#8594;</button>';
  html += '</div>';

  document.getElementById('pg-more').innerHTML = html;
}

function answerEq(idx) {
  eqState.answers[eqState.current] = idx;
  renderEqQuestion();
}

function calculateEqScores() {
  var compKeys = ['SA', 'SR', 'EM', 'SS', 'MO'];
  var rawScores = {};
  compKeys.forEach(function(k) { rawScores[k] = 0; });

  eqQuestions.forEach(function(q, i) {
    var ans = eqState.answers[i];
    if (ans === null) return;
    rawScores[q.comp] += q.opts[ans].score;
  });

  // Each component: 4 questions x 4 max = 16 max raw
  var scores = {};
  compKeys.forEach(function(k) {
    scores[k] = Math.round((rawScores[k] / 16) * 100);
  });

  // Overall: average of 5 component scores
  var overallSum = 0;
  compKeys.forEach(function(k) { overallSum += scores[k]; });
  var overall = Math.round(overallSum / 5);

  // Tier
  var overallTier;
  if (overall >= 80) overallTier = 'High EQ';
  else if (overall >= 60) overallTier = 'Developing EQ';
  else overallTier = 'EQ Growth Opportunity';

  // Strongest / weakest
  var sorted = Object.entries(scores).sort(function(a, b) { return b[1] - a[1]; });
  var strongest = sorted[0][0];
  var weakest = sorted[sorted.length - 1][0];

  var result = {
    overall: overall,
    overallTier: overallTier,
    scores: scores,
    strongest: strongest,
    weakest: weakest,
    completedAt: new Date().toISOString()
  };

  // Save to user
  if (currentRep) {
    reps[currentRep].eqResult = result;
    saveState();
    if (currentUid) {
      db.collection('users').doc(currentUid).update({ eqResult: result }).catch(function(e) { console.warn(e); });
    }
    addPoints(75, 'Completed EQ Assessment');
    checkAssessmentAssignment('eq');
  }

  eqState.result = result;
  renderEqResults(result);
}

function viewEqResults() {
  if (!currentRep || !reps[currentRep].eqResult) return;
  renderEqResults(reps[currentRep].eqResult);
}

function calculateDiscScores(){
  const scores={D:0,I:0,S:0,C:0};
  discQuestions.forEach((q,i)=>{
    const ans=discState.answers[i];
    if(ans===null)return;
    const s=q.opts[ans].s;
    for(const[k,v]of Object.entries(s))scores[k]=(scores[k]||0)+v;
  });
  const total=scores.D+scores.I+scores.S+scores.C;
  const pcts={D:Math.round(scores.D/total*100),I:Math.round(scores.I/total*100),S:Math.round(scores.S/total*100),C:Math.round(scores.C/total*100)};
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];
  const secondary=sorted[1][0];

  const result={primary,secondary,scores,pcts,completedAt:new Date().toISOString()};

  // Save to user
  if(currentRep){
    reps[currentRep].discResult=result;
    saveState();
    // Direct Firestore save
    if(currentUid){
      db.collection('users').doc(currentUid).update({discResult:result}).catch(e=>console.warn(e));
    }
    addPoints(75,'Completed DISC Assessment');
    checkAssessmentAssignment('disc');
  }

  discState.result=result;
  renderDiscResultsScreen(result);
}

let notifications=[];
// Whitelist of allowed notification action keys → handler functions.
// Adding ad-hoc JS strings is no longer supported (security: prevents code injection
// if Firestore notifications collection is ever tampered with).
const NOTIF_ACTIONS={
  'open-home':()=>switchTab('home'),
  'open-learn-modules':()=>{learnTab='modules';switchTab('learn');},
  'open-learn-quizzes':()=>{learnTab='quizzes';switchTab('learn');},
  'open-learn-cards':()=>{learnTab='cards';switchTab('learn');},
  'open-practice-drills':()=>{practiceTab='drills';switchTab('practice');},
  'open-practice-roleplay':()=>{practiceTab='roleplay';switchTab('practice');},
  'open-media':()=>switchTab('media'),
  'open-more':()=>switchTab('more'),
  'open-assessments':()=>{switchTab('more');renderAssessmentInMore();},
  'open-manager':()=>{switchTab('more');renderManagerInMore();}
};

function runNotifAction(actionKey){
  const fn=NOTIF_ACTIONS[actionKey];
  if(fn)try{fn();}catch(e){console.warn('Notif action failed:',e);}
}

function addNotification(icon,text,actionKey){
  // actionKey must be a key from NOTIF_ACTIONS; anything else is ignored.
  const safeAction=(actionKey&&NOTIF_ACTIONS[actionKey])?actionKey:'';
  // Dedupe: skip if the same text was added in the last 5 minutes
  const last=notifications[0];
  if(last&&last.text===text&&(Date.now()-new Date(last.time).getTime())<5*60*1000){
    return;
  }
  const n={id:Date.now(),icon,text,action:safeAction,time:new Date().toISOString(),read:false};
  notifications.unshift(n);
  if(notifications.length>50)notifications=notifications.slice(0,50);
  updateNotifBadge();
  // Save to Firestore
  if(currentUid){
    db.collection('users').doc(currentUid).update({notifications:notifications.slice(0,50)}).catch(e=>console.warn(e));
  }
}

function updateNotifBadge(){
  const unread=notifications.filter(n=>!n.read).length;
  const badge=document.getElementById('notifCount');
  if(badge){
    badge.textContent=unread;
    badge.style.display=unread>0?'flex':'none';
  }
}

function toggleNotifications(){
  const panel=document.getElementById('notifPanel');
  const overlay=document.getElementById('notifOverlay');
  const isOpen=panel.classList.contains('on');
  if(isOpen){
    panel.classList.remove('on');
    overlay.classList.remove('on');
  }else{
    renderNotifications();
    panel.classList.add('on');
    overlay.classList.add('on');
    // Mark all as read
    notifications.forEach(n=>n.read=true);
    updateNotifBadge();
    if(currentUid)db.collection('users').doc(currentUid).update({notifications}).catch(e=>console.warn(e));
  }
}

function renderNotifications(){
  const panel=document.getElementById('notifPanel');
  if(!notifications.length){
    panel.innerHTML='<div style="padding:24px;text-align:center;color:var(--gray);font-size:13px;">No notifications yet</div>';
    return;
  }
  let html='<div style="padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--border);">Notifications</div>';
  notifications.slice(0,20).forEach((n,i)=>{
    const ago=timeAgo(new Date(n.time));
    // n.icon is a known HTML entity from our code (not user input) — leave unescaped
    // n.text is user/system text — escape it
    // n.action is JS to run — store as data attr, attached via listener below (NOT inlined as onclick)
    html+=`<div class="notif-item ${n.read?'':'unread'}" data-notif-idx="${i}" style="${n.action?'cursor:pointer;':''}">
      <div class="notif-icon">${n.icon||'&#128276;'}</div>
      <div style="flex:1;">
        <div style="color:var(--gray-l);">${escapeHtml(n.text)}</div>
        <div style="font-size:10px;color:var(--gray-d);margin-top:2px;">${ago}</div>
      </div>
    </div>`;
  });
  panel.innerHTML=html;
  // Attach click listeners — only whitelisted actions can run (no eval, no Function constructor)
  panel.querySelectorAll('.notif-item').forEach(el=>{
    const idx=parseInt(el.dataset.notifIdx);
    const n=notifications[idx];
    if(n&&n.action&&NOTIF_ACTIONS[n.action]){
      el.addEventListener('click',()=>{
        runNotifAction(n.action);
        toggleNotifications();
      });
    }
  });
}

function timeAgo(date){
  const s=Math.floor((Date.now()-date)/1000);
  if(s<60)return 'Just now';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function searchModules(modules){
  if(!searchQuery.trim())return modules;
  const q=searchQuery.toLowerCase();
  return modules.filter(m=>{
    if(m.title.toLowerCase().includes(q))return true;
    if(m.desc&&m.desc.toLowerCase().includes(q))return true;
    if(m.slides&&m.slides.some(s=>s.t.toLowerCase().includes(q)||s.c.toLowerCase().includes(q)))return true;
    return false;
  });
}

// ---- ASSESSMENT RETAKE COOLDOWN ----
const ASSESS_COOLDOWN_DAYS=7;
function getAssessCooldown(type){
  if(!currentRep)return null;
  const r=reps[currentRep];
  let result=null;
  if(type==='disc')result=r.discResult;
  else if(type==='motivators')result=r.motivatorsResult;
  else if(type==='eq')result=r.eqResult;
  if(!result||!result.completedAt)return null;
  const completedAt=new Date(result.completedAt);
  const cooldownEnd=new Date(completedAt.getTime()+ASSESS_COOLDOWN_DAYS*86400000);
  const now=new Date();
  if(now>=cooldownEnd)return null; // Cooldown expired
  const daysLeft=Math.ceil((cooldownEnd-now)/86400000);
  return daysLeft;
}

let currentTrack=null;
let playlist=[];
let playlistIdx=-1;
const audioEl=()=>document.getElementById('audioEl');

function playMedia(mediaId){
  const m=MEDIA.find(x=>x.id===mediaId);
  if(!m)return;
  // Build playlist from same module
  playlist=MEDIA.filter(x=>x.moduleId===m.moduleId);
  playlistIdx=playlist.findIndex(x=>x.id===mediaId);
  loadAndPlay(m);
}

function playAllMedia(){
  // Play entire library
  playlist=[...MEDIA.filter(m=>m.type==='audio')];
  playlistIdx=0;
  if(playlist.length)loadAndPlay(playlist[0]);
}

function loadAndPlay(m){
  currentTrack=m;
  const audio=audioEl();
  // Use Firebase Storage URL if available, fallback to Google Drive
  const directUrl=m.src||('https://drive.google.com/uc?export=download&id='+m.driveId);
  audio.src=directUrl;
  audio.load();
  audio.play().catch(e=>{
    console.warn('Autoplay blocked, trying iframe fallback:',e);
    // If direct URL fails (CORS/auth), fall back to opening in new tab
  });

  // Update mini player UI
  const mp=document.getElementById('miniPlayer');
  mp.classList.add('on');
  document.getElementById('mpTitle').textContent=m.title;
  const mod=MODULES.find(x=>x.id===m.moduleId);
  document.getElementById('mpModule').textContent=mod?mod.title:'';
  document.getElementById('mpArt').innerHTML=m.type==='video'?'&#127902;':'&#127911;';
  document.getElementById('mpPlayPause').innerHTML='&#9208;';

  // Media Session API for lock screen controls
  if('mediaSession' in navigator){
    navigator.mediaSession.metadata=new MediaMetadata({
      title:m.title,
      artist:'Apex Sales Training',
      album:mod?mod.title:'Training'
    });
    navigator.mediaSession.setActionHandler('play',()=>{audio.play();document.getElementById('mpPlayPause').innerHTML='&#9208;';});
    navigator.mediaSession.setActionHandler('pause',()=>{audio.pause();document.getElementById('mpPlayPause').innerHTML='&#9654;';});
    navigator.mediaSession.setActionHandler('previoustrack',()=>prevTrack());
    navigator.mediaSession.setActionHandler('nexttrack',()=>nextTrack());
  }
}

function togglePlayPause(){
  const audio=audioEl();
  if(!currentTrack)return;
  if(audio.paused){
    audio.play();
    document.getElementById('mpPlayPause').innerHTML='&#9208;';
  }else{
    audio.pause();
    document.getElementById('mpPlayPause').innerHTML='&#9654;';
  }
}

function nextTrack(){
  if(!playlist.length)return;
  playlistIdx=(playlistIdx+1)%playlist.length;
  loadAndPlay(playlist[playlistIdx]);
}

function prevTrack(){
  if(!playlist.length)return;
  const audio=audioEl();
  // If more than 3 seconds in, restart current track
  if(audio.currentTime>3){audio.currentTime=0;return;}
  playlistIdx=(playlistIdx-1+playlist.length)%playlist.length;
  loadAndPlay(playlist[playlistIdx]);
}

function seekAudio(e){
  const audio=audioEl();
  if(!audio.duration)return;
  const bar=document.getElementById('mpProgress');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  audio.currentTime=pct*audio.duration;
}

function skipBack(){const a=audioEl();if(a)a.currentTime=Math.max(0,a.currentTime-15);}
function skipForward(){const a=audioEl();if(!a)return;const tgt=a.currentTime+30;a.currentTime=(a.duration&&isFinite(a.duration))?Math.min(a.duration,tgt):tgt;}

let playbackSpeed=1;
function cycleSpeed(){
  const speeds=[1,1.25,1.5,1.75,2,0.75];
  const idx=speeds.indexOf(playbackSpeed);
  playbackSpeed=speeds[(idx+1)%speeds.length];
  const a=audioEl();
  if(a)a.playbackRate=playbackSpeed;
  const btn=document.getElementById('speedBtn');
  if(btn)btn.textContent=playbackSpeed+'x';
}

function formatTime(s){
  if(!s||isNaN(s))return '0:00';
  const m=Math.floor(s/60);
  const sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

let expandedPlayerOpen=false;
function toggleExpandedPlayer(){
  expandedPlayerOpen=!expandedPlayerOpen;
  const el=document.getElementById('expandedPlayer');
  const mp=document.getElementById('miniPlayer');
  if(expandedPlayerOpen){
    mp.style.display='none';
    el.style.display='block';
    renderExpandedPlayer();
  }else{
    el.style.display='none';
    mp.style.display='flex';
    mp.classList.add('on');
  }
}

function renderExpandedPlayer(){
  const a=audioEl();
  const m=currentTrack;
  if(!m)return;
  const mod=MODULES.find(x=>x.id===m.moduleId);
  const el=document.getElementById('expandedPlayer');
  el.innerHTML=`
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:36px;margin-bottom:8px;">${m.type==='video'?'&#127902;':'&#127911;'}</div>
      <div style="font-size:16px;font-weight:700;color:var(--white);">${m.title}</div>
      <div style="font-size:12px;color:var(--gray);margin-top:4px;">${mod?mod.title:''}</div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="mini-player-progress" style="position:relative;height:6px;border-radius:3px;" onclick="seekAudio(event)">
        <div class="mini-player-progress-fill" id="mpProgressFill2" style="height:100%;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray);margin-top:4px;">
        <span id="mpTimeNow">${formatTime(a.currentTime)}</span>
        <span id="mpTimeTotal">${formatTime(a.duration)}</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px;">
      <button class="mini-player-btn" onclick="prevTrack()" style="font-size:22px;">&#9198;</button>
      <button class="mini-player-btn" onclick="skipBack()" style="font-size:16px;">-15</button>
      <button class="mini-player-btn" onclick="togglePlayPause()" style="font-size:36px;" id="mpPlayPause2">${a.paused?'&#9654;':'&#9208;'}</button>
      <button class="mini-player-btn" onclick="skipForward()" style="font-size:16px;">+30</button>
      <button class="mini-player-btn" onclick="nextTrack()" style="font-size:22px;">&#9197;</button>
    </div>
    <div style="display:flex;justify-content:center;gap:16px;">
      <button id="speedBtn" onclick="cycleSpeed()" style="background:var(--dark3);border:1px solid var(--border);color:var(--gray-l);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;">${playbackSpeed}x</button>
      <button onclick="toggleExpandedPlayer()" style="background:var(--dark3);border:1px solid var(--border);color:var(--gray-l);padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;">Minimize</button>
    </div>`;
}

function closePlayer(){
  const audio=audioEl();
  audio.pause();
  audio.src='';
  currentTrack=null;
  playlist=[];
  playlistIdx=-1;
  expandedPlayerOpen=false;
  document.getElementById('miniPlayer').classList.remove('on');
  document.getElementById('miniPlayer').style.display='';
  document.getElementById('expandedPlayer').style.display='none';
}

// Progress bar update
setInterval(()=>{
  const audio=audioEl();
  if(audio&&audio.duration&&!audio.paused){
    const pct=(audio.currentTime/audio.duration)*100;
    const fill1=document.getElementById('mpProgressFill');
    const fill2=document.getElementById('mpProgressFill2');
    if(fill1)fill1.style.width=pct+'%';
    if(fill2)fill2.style.width=pct+'%';
    const tn=document.getElementById('mpTimeNow');
    const tt=document.getElementById('mpTimeTotal');
    if(tn)tn.textContent=formatTime(audio.currentTime);
    if(tt)tt.textContent=formatTime(audio.duration);
  }
},500);

// Auto-advance to next track
document.addEventListener('DOMContentLoaded',()=>{
  const audio=document.getElementById('audioEl');
  if(audio){
    audio.addEventListener('ended',()=>nextTrack());
    audio.addEventListener('pause',()=>{document.getElementById('mpPlayPause').innerHTML='&#9654;';});
    audio.addEventListener('play',()=>{document.getElementById('mpPlayPause').innerHTML='&#9208;';});
  }
});

function goFullscreen(elId){
  const el=document.getElementById(elId);
  if(!el)return;
  // Try native fullscreen first (works on desktop + iPad)
  if(el.requestFullscreen){el.requestFullscreen();return;}
  if(el.webkitRequestFullscreen){el.webkitRequestFullscreen();return;}
  if(el.msRequestFullscreen){el.msRequestFullscreen();return;}
  // Fallback for iPhone: open the iframe src in a new tab
  const iframe=el.querySelector('iframe');
  if(iframe&&iframe.src)window.open(iframe.src,'_blank');
}

let _mediaUid=0;
function renderMediaPlayer(m){
  const uid='media-'+(++_mediaUid);
  if(m.type==='video'){
    // Use Firebase-hosted MP4 if available (native HTML5 video); fall back to Drive iframe embed
    if(m.src){
      return `<div style="margin-bottom:16px;">
        <div style="font-size:13px;font-weight:600;color:var(--white);margin-bottom:8px;">${m.icon} ${m.title}</div>
        <div id="${uid}" style="position:relative;width:100%;border-radius:8px;overflow:hidden;background:var(--dark3);">
          <video src="${m.src}" controls preload="metadata" style="width:100%;display:block;" playsinline></video>
          <button onclick="goFullscreen('${uid}')" style="position:absolute;bottom:8px;right:8px;z-index:5;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);">&#x26F6; Fullscreen</button>
        </div>
      </div>`;
    }
    if(m.driveId){
      const embedUrl='https://drive.google.com/file/d/'+m.driveId+'/preview';
      return `<div style="margin-bottom:16px;">
        <div style="font-size:13px;font-weight:600;color:var(--white);margin-bottom:8px;">${m.icon} ${m.title}</div>
        <div id="${uid}" style="position:relative;width:100%;padding-bottom:56.25%;border-radius:8px;overflow:hidden;background:var(--dark3);">
          <iframe src="${embedUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allow="autoplay;encrypted-media" allowfullscreen></iframe>
          <button onclick="goFullscreen('${uid}')" style="position:absolute;bottom:8px;right:8px;z-index:5;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;backdrop-filter:blur(4px);">&#x26F6; Fullscreen</button>
        </div>
      </div>`;
    }
    return `<div style="margin-bottom:16px;color:var(--gray);font-size:12px;">Video unavailable</div>`;
  }
  // Audio: play button card instead of iframe
  const isPlaying=currentTrack&&currentTrack.id===m.id;
  return `<div style="margin-bottom:10px;display:flex;align-items:center;gap:12px;padding:12px;background:var(--dark3);border-radius:8px;cursor:pointer;border:1px solid ${isPlaying?'var(--red)':'var(--border)'};" onclick="playMedia('${m.id}')">
    <div style="width:40px;height:40px;border-radius:50%;background:${isPlaying?'var(--red)':'var(--dark4)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span style="font-size:16px;color:#fff;margin-left:2px;">${isPlaying?'&#9208;':'&#9654;'}</span>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;font-weight:600;color:${isPlaying?'var(--red-l)':'var(--white)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.title}</div>
      <div style="font-size:11px;color:var(--gray);margin-top:2px;">Podcast${isPlaying?' — Now Playing':''}</div>
    </div>
    <span style="font-size:14px;color:var(--gray);">&#127911;</span>
  </div>`;
}

function renderMediaLibrary(){
  _mediaUid=0; // reset uid counter on re-render
  const audioCount=MEDIA.filter(m=>m.type==='audio').length;
  const videoCount=MEDIA.filter(m=>m.type==='video').length;
  let html=`<div class="sec-header">Media Library</div>
  <p style="font-size:12px;color:var(--gray);margin-bottom:12px;">${audioCount} podcasts, ${videoCount} video${videoCount!==1?'s':''}. Audio plays in background while you navigate.</p>
  <button onclick="playAllMedia()" style="width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;">&#9654; Play All Podcasts</button>`;

  // Group by module
  const grouped={};
  MEDIA.forEach(m=>{
    if(!grouped[m.moduleId])grouped[m.moduleId]=[];
    grouped[m.moduleId].push(m);
  });

  Object.entries(grouped).forEach(([modId,items])=>{
    const mod=MODULES.find(m=>m.id===modId);
    html+=`<div class="card">
      <div style="font-size:15px;font-weight:700;color:var(--white);margin-bottom:12px;">${mod?mod.icon+' '+mod.title:'Unknown Module'}</div>`;
    items.forEach(m=>{html+=renderMediaPlayer(m);});
    html+=`</div>`;
  });

  document.getElementById('pg-media').innerHTML=html;
}

let mgrTab='overview';
let expandedProfileRepId=null;
let selectedRepId=null;

function viewRep(id){selectedRepId=id;renderManager();}
function backToManager(){selectedRepId=null;renderManager();switchTab('more');}

function renderManager(){
  // Drill-in rep detail view
  if(selectedRepId&&reps[selectedRepId]){
    document.getElementById('pg-more').innerHTML=renderRepDetailHTML(selectedRepId);
    return;
  }

  let html=`<div class="sec-header">Manager Dashboard</div>
    <div class="mgr-tabs">
      <div class="mgr-tab ${mgrTab==='overview'?'on':''}" onclick="mgrTab='overview';renderManager()">Overview</div>
      <div class="mgr-tab ${mgrTab==='reps'?'on':''}" onclick="mgrTab='reps';renderManager()">Reps</div>
      <div class="mgr-tab ${mgrTab==='assign'?'on':''}" onclick="mgrTab='assign';renderManager()">Assign</div>
      <div class="mgr-tab ${mgrTab==='grades'?'on':''}" onclick="mgrTab='grades';renderManager()">Grades</div>
      <div class="mgr-tab ${mgrTab==='roleplay'?'on':''}" onclick="mgrTab='roleplay';renderManager()">Role-Play</div>
      <div class="mgr-tab ${mgrTab==='analytics'?'on':''}" onclick="mgrTab='analytics';renderManager()">Analytics</div>
      <div class="mgr-tab ${mgrTab==='disc'?'on':''}" onclick="mgrTab='disc';renderManager()">Profiles</div>
      <div class="mgr-tab ${mgrTab==='manage'?'on':''}" onclick="mgrTab='manage';renderManager()">Settings</div>
    </div>`;

  if(mgrTab==='overview'){
    const totalReps=Object.keys(reps).length;
    const avgPts=totalReps?Math.round(Object.values(reps).reduce((a,r)=>a+(r.points||0),0)/totalReps):0;
    const avgCompletion=totalReps?Math.round(Object.values(reps).reduce((a,r)=>a+((r.completedModules||[]).length/MODULES.length*100),0)/totalReps):0;
    const activeToday=Object.values(reps).filter(r=>getLastActive(r)===new Date().toDateString()).length;
    const now=new Date();const weekAgo=new Date(now-7*86400000);const twoWeeksAgo=new Date(now-14*86400000);

    // Pending assignments count
    const pendingAssignments=Object.values(assignments).filter(a=>a.status!=='completed').length;
    const overdueAssignments=Object.values(assignments).filter(a=>a.status!=='completed'&&a.dueDate&&new Date(a.dueDate)<now).length;

    // Assessment completion
    const discDone=Object.values(reps).filter(r=>r.discResult).length;
    const motDone=Object.values(reps).filter(r=>r.motivatorsResult).length;
    const eqDone=Object.values(reps).filter(r=>r.eqResult).length;

    html+=`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
        <div class="card" style="text-align:center;padding:10px;"><div style="font-size:24px;font-weight:700;color:var(--white);">${totalReps}</div><div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">Reps</div></div>
        <div class="card" style="text-align:center;padding:10px;"><div style="font-size:24px;font-weight:700;color:var(--green);">${activeToday}</div><div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">Active Today</div></div>
        <div class="card" style="text-align:center;padding:10px;"><div style="font-size:24px;font-weight:700;color:var(--gold);">${avgPts}</div><div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">Avg Pts</div></div>
        <div class="card" style="text-align:center;padding:10px;"><div style="font-size:24px;font-weight:700;color:var(--blue);">${avgCompletion}%</div><div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">Avg Done</div></div>
      </div>`;

    // Alerts section
    const alerts=[];
    // Inactive reps (no activity in 7+ days)
    Object.entries(reps).forEach(([id,r])=>{
      if(r.role==='manager')return;
      const la=getLastActive(r);
      const lastAct=la?new Date(la):null;
      const daysSince=lastAct?Math.floor((now-lastAct)/86400000):999;
      if(daysSince>=7)alerts.push({type:'inactive',name:r.name,id,days:daysSince,color:'var(--red)'});
    });
    // Overdue assignments
    Object.entries(assignments).forEach(([aid,a])=>{
      if(a.status==='completed')return;
      if(a.dueDate&&new Date(a.dueDate)<now){
        const rep=reps[a.repId];
        if(rep)alerts.push({type:'overdue',name:rep.name,label:a.targetLabel||'Assignment',color:'var(--orange)'});
      }
    });

    if(alerts.length){
      html+=`<div class="sec-header">&#9888; Attention Needed</div>`;
      alerts.forEach(a=>{
        if(a.type==='inactive'){
          html+=`<div class="mgr-stat" style="border-left:3px solid ${a.color};cursor:pointer;" onclick="viewRep('${a.id}')">

          <div style="font-size:14px;font-weight:600;color:var(--white);">${pendingAssignments} Active Assignment${pendingAssignments!==1?'s':''}</div>
          ${overdueAssignments?`<div style="font-size:12px;color:var(--red);">${overdueAssignments} overdue</div>`:'<div style="font-size:12px;color:var(--gray);">All on track</div>'}
        </div>
        <span style="font-size:16px;color:var(--gray);">&#8250;</span>
      </div>`;
    }

    // Assessment completion tracker
    html+=`<div class="sec-header">Assessment Completion</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
      <div class="card" style="text-align:center;padding:10px;">
        <div style="font-size:20px;font-weight:700;color:${discDone===totalReps?'var(--green)':'var(--gray-l)'};">${discDone}/${totalReps}</div>
        <div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">DISC</div>
      </div>
      <div class="card" style="text-align:center;padding:10px;">
        <div style="font-size:20px;font-weight:700;color:${motDone===totalReps?'var(--green)':'var(--gray-l)'};">${motDone}/${totalReps}</div>
        <div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">Motivators</div>
      </div>
      <div class="card" style="text-align:center;padding:10px;">
        <div style="font-size:20px;font-weight:700;color:${eqDone===totalReps?'var(--green)':'var(--gray-l)'};">${eqDone}/${totalReps}</div>
        <div style="font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;">EQ</div>
      </div>
    </div>`;

    // Team health - rep cards with status indicators
    html+=`<div class="sec-header">Team Health</div>
    <div style="font-size:11px;color:var(--gray-d);margin-bottom:8px;">Tap any rep for full detail.</div>`;
    const repEntries=Object.entries(reps).sort((a,b)=>(b[1].points||0)-(a[1].points||0));
    repEntries.forEach(([id,r])=>{
      const lvl=getLevel(r.points||0);
      const pct=Math.round((r.completedModules||[]).length/MODULES.length*100);
      const la=getLastActive(r);
      const lastAct=la?new Date(la):null;
      const daysSince=lastAct?Math.floor((now-lastAct)/86400000):999;
      const statusColor=daysSince<=1?'var(--green)':daysSince<=3?'var(--green)':daysSince<=7?'var(--orange)':'var(--red)';
      const statusText=daysSince===0?'Today':daysSince===1?'Yesterday':daysSince<=7?daysSince+'d ago':daysSince===999?'Never':''+daysSince+'d ago';

      const thisWeek=log.filter(a=>new Date(a.time)>=weekAgo).length;
      const lastWeekActs=log.filter(a=>{const d=new Date(a.time);return d>=twoWeeksAgo&&d<weekAgo;}).length;
      const trend=thisWeek>lastWeekActs?'&#9650;':thisWeek<lastWeekActs?'&#9660;':'&#9644;';

      const rpW=(r.roleplayHistory||[]).filter(rp=>new Date(rp.date)>=weekAgo).length;

      html+=`<div class="mgr-rep-row" style="cursor:pointer;" onclick="viewRep('${id}')">

            <div style="font-size:11px;color:var(--gray);">${r.points||0} pts &middot; ${pct}% &middot; <span style="color:${statusColor};">${statusText}</span></div>
            <div style="display:flex;align-items:center;gap:6px;">${rpW?`<span style="font-size:10px;color:var(--purple);">${rpW}rp</span>`:''}<span style="font-size:10px;color:var(--gray);">${thisWeek}wk</span><span style="font-size:12px;color:${trendColor};">${trend}</span></div>
          </div>
          <div class="pbar" style="margin-top:4px;height:3px;"><div class="pbar-fill" style="width:${pct}%;background:var(--blue);"></div></div>
