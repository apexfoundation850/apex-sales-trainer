        html+=`<div style="font-size:12px;color:var(--gray);margin-bottom:4px;"><strong style="color:${weakProf.color};">EQ Growth Area:</strong> ${weakProf.name} (${er.scores[er.weakest]}/100)</div>`;
      }

      // Coaching summary if all 3 present
      if(dr&&mr&&er){
        const dp=discProfiles[dr.primary];
        const mp=motivatorProfiles[mr.primary];
        const wp=eqProfiles[er.weakest];
        html+=`<div style="margin-top:8px;padding:10px;background:var(--dark3);border-radius:8px;border-left:3px solid var(--gold);">
          <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:4px;">Combined Coaching Read</div>
          <div style="font-size:12px;color:var(--gray-l);line-height:1.6;">Sells as a <strong>${dp.name}</strong> (${dr.primary}), motivated by <strong>${mp.name}</strong> values. EQ priority: develop <strong>${wp.name}</strong> (${er.scores[er.weakest]}/100).</div>
        </div>`;
      }

      // Expand/collapse button
      if(hasAny){
        html+=`<div style="margin-top:12px;"><button class="mv-nav-btn ${isExpanded?'mv-prev':'mv-next'}" style="width:100%;" onclick="toggleProfileExpand('${id}')">${isExpanded?'Collapse Full Profile':'View Full Profile'}</button></div>`;
      }

      // Expanded full detail view
      if(isExpanded){
        html+=`<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">`;
        if(dr){
          html+=`<div class="sec-header" style="margin-top:0;">DISC — Full Profile</div>`;
          html+=buildDiscDetailHTML(dr);
        }
        if(mr){
          html+=`<div class="sec-header">Motivators — Full Profile</div>`;
          html+=buildMotivatorsDetailHTML(mr);
        }
        if(er){
          html+=`<div class="sec-header">Emotional Intelligence — Full Profile</div>`;
          html+=buildEqDetailHTML(er);
        }
        html+=`</div>`;
      }

      html+=`</div>`;
    });
  }

  if(mgrTab==='manage'){
    html+=`<div class="card">
      <div class="card-title" style="margin-bottom:8px;">Team Members</div>
      <p style="font-size:12px;color:var(--gray);margin-bottom:12px;">Reps are added automatically when they sign in with Google.</p>
    </div>
    <div class="sec-header">Current Reps</div>`;
    Object.entries(reps).forEach(([id,r])=>{
      const role=r.role||'rep';
      html+=`<div class="mgr-stat">
        <div>
          <span style="font-weight:600;color:var(--white);">${escapeHtml(r.name)}</span>
          <span style="font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;background:${role==='manager'?'var(--purple)':'var(--dark4)'};color:${role==='manager'?'#fff':'var(--gray)'};">${role}</span>
        </div>
        <div>
          ${role==='rep'?`<span style="cursor:pointer;color:var(--purple);font-size:12px;margin-right:12px;" onclick="promoteToManager('${id}')">Make Manager</span>`:`<span style="cursor:pointer;color:var(--gray);font-size:12px;margin-right:12px;" onclick="demoteToRep('${id}')">Remove Manager</span>`}
          <span style="cursor:pointer;color:var(--orange);font-size:12px;margin-right:12px;" onclick="resetRep('${id}')">Reset</span>
          <span style="cursor:pointer;color:var(--red);font-size:12px;" onclick="removeRep('${id}')">Delete</span>
        </div>
      </div>`;
    });

    html+=`<div class="sec-header" style="margin-top:24px;">Cloud Sync</div>
    <div class="card">
      <p style="font-size:13px;color:var(--gray);margin-bottom:8px;"><span style="color:var(--green);">&#9679; Connected to Firebase</span></p>
      <p style="font-size:12px;color:var(--gray-d);">All progress syncs automatically across devices. Reps sign in with Google to access their data anywhere.</p>
    </div>`;

    html+=`<div class="sec-header" style="margin-top:24px;">Data Repair</div>
    <div class="card">
      <p style="font-size:12px;color:var(--gray);margin-bottom:12px;">Scans each rep's activity log and reconstructs missing data (completedModules, quizScores, points, lastActive). Use this to fix reps whose data didn't sync properly.</p>
      <button class="mv-complete-btn" style="width:100%;background:var(--orange);" onclick="repairAllData()">&#128295; Repair All Rep Data</button>
      <div id="repairLog" style="margin-top:12px;"></div>
    </div>`;
  }

  document.getElementById('pg-more').innerHTML=html;
  // Init assign options if on assign tab
  if(mgrTab==='assign'&&document.getElementById('assignOptions')){updateAssignOptions();}
}

// ---- REP DETAIL DRILL-IN ----
function renderRepDetailHTML(id){
  const r=reps[id];
  if(!r)return '<div class="card">Rep not found.</div>';
  const lvl=getLevel(r.points||0);
  const completedMods=r.completedModules||[];
  const pctComplete=Math.round(completedMods.length/MODULES.length*100);
  const qs=r.quizScores||{};
  const rpHist=r.roleplayHistory||[];
  const log=r.activityLog||[];
  const badgesEarned=r.badges||[];
  const certs=r.certificates||[];

  let html=`<button class="mv-nav-btn mv-prev" style="margin-bottom:16px;" onclick="backToManager()">&#8592; Back to Dashboard</button>`;

  // Header card
  html+=`<div class="card" style="border-left:4px solid var(--gold);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--white);">${escapeHtml(r.name)}</div>
        <div style="font-size:12px;color:var(--gray);margin-top:4px;">${r.role==='manager'?'Manager':'Rep'} &middot; Last active: ${getLastActive(r)||'Never'}</div>
      </div>
      <span class="lb-level ${lvl.cls}">${lvl.name}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;">
      <div style="text-align:center;padding:10px;background:var(--dark3);border-radius:8px;">
        <div style="font-size:20px;font-weight:700;color:var(--gold);">${r.points||0}</div>
        <div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Points</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--dark3);border-radius:8px;">
        <div style="font-size:20px;font-weight:700;color:var(--orange);">${r.streak||0}</div>
        <div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Streak</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--dark3);border-radius:8px;">
        <div style="font-size:20px;font-weight:700;color:var(--blue);">${pctComplete}%</div>
        <div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Complete</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--dark3);border-radius:8px;">
        <div style="font-size:20px;font-weight:700;color:var(--purple);">${badgesEarned.length}</div>
        <div style="font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Badges</div>
      </div>
    </div>
  </div>`;

  // Activity cadence
  const now=new Date();const weekAgo=new Date(now-7*86400000);const monthAgo=new Date(now-30*86400000);
  const last7=log.filter(a=>new Date(a.time)>=weekAgo).length;
  const last30=log.filter(a=>new Date(a.time)>=monthAgo).length;
  const rp7=rpHist.filter(rp=>new Date(rp.date)>=weekAgo).length;
  const rp30=rpHist.filter(rp=>new Date(rp.date)>=monthAgo).length;
  html+=`<div class="card">
    <div class="card-title" style="margin-bottom:8px;">Activity Cadence</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
      <div><span style="color:var(--gray);">Last 7 days:</span> <span style="color:var(--white);font-weight:600;">${last7} actions</span> <span style="color:var(--purple);">(${rp7} role-plays)</span></div>
      <div><span style="color:var(--gray);">Last 30 days:</span> <span style="color:var(--white);font-weight:600;">${last30} actions</span> <span style="color:var(--purple);">(${rp30} role-plays)</span></div>
    </div>
  </div>`;

  // Modules progress
  html+=`<div class="sec-header">Module Progress (${completedMods.length}/${MODULES.length})</div>
  <div class="card">
    <div class="pbar" style="margin-bottom:12px;"><div class="pbar-fill" style="width:${pctComplete}%;background:var(--blue);"></div></div>`;
  MODULES.forEach(m=>{
    const done=completedMods.includes(m.id);
    html+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span style="color:${done?'var(--gray-l)':'var(--gray)'};">${done?'&#9989;':'&#9711;'} ${m.title}</span>
      <span style="color:${done?'var(--green)':'var(--gray-d)'};font-size:11px;">${done?'Complete':'Pending'}</span>
    </div>`;
  });
  html+=`</div>`;

  // Quiz performance by tier
  const tierData={foundation:{scores:[],passed:0},advanced:{scores:[],passed:0},expert:{scores:[],passed:0}};
  Object.entries(qs).forEach(([key,score])=>{
    let tier='foundation';
    if(key.endsWith('_advanced'))tier='advanced';
    else if(key.endsWith('_expert'))tier='expert';
    tierData[tier].scores.push(score.best);
    if(score.best>=80)tierData[tier].passed++;
  });
  html+=`<div class="sec-header">Quiz Performance</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;">`;
  ['foundation','advanced','expert'].forEach(tier=>{
    const d=tierData[tier];
    const avg=d.scores.length?Math.round(d.scores.reduce((a,b)=>a+b,0)/d.scores.length):0;
    const color=avg>=80?'var(--green)':avg>=60?'var(--orange)':avg>0?'var(--red)':'var(--gray-d)';
    html+=`<div class="card" style="text-align:center;">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:4px;">${tier}</div>
      <div style="font-size:22px;font-weight:700;color:${color};">${d.scores.length?avg+'%':'—'}</div>
      <div style="font-size:10px;color:var(--gray);margin-top:2px;">${d.passed}/${d.scores.length} passed</div>
    </div>`;
  });
  html+=`</div>`;
  if(Object.keys(qs).length){
    html+=`<div class="card">`;
    Object.entries(qs).sort().forEach(([key,score])=>{
      let modId=key,tier='F';
      if(key.endsWith('_advanced')){modId=key.slice(0,-9);tier='A';}
      else if(key.endsWith('_expert')){modId=key.slice(0,-7);tier='E';}
      const mod=MODULES.find(m=>m.id===modId);
      const color=score.best>=80?'var(--green)':score.best>=60?'var(--orange)':'var(--red)';
      const tierColor=tier==='F'?'var(--blue)':tier==='A'?'var(--purple)':'var(--gold)';
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span style="color:var(--gray-l);"><span style="display:inline-block;width:20px;height:20px;border-radius:4px;background:${tierColor}30;color:${tierColor};font-size:10px;font-weight:700;text-align:center;line-height:20px;margin-right:8px;">${tier}</span>${mod?mod.title:modId}</span>
        <span style="font-weight:700;color:${color};">${score.best}% <span style="color:var(--gray-d);font-size:11px;font-weight:400;">(${score.attempts||1} att)</span></span>
      </div>`;
    });
    html+=`</div>`;
  }

  // Drill & Flashcard stats
  html+=`<div class="sec-header">Practice Stats</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
    <div class="card" style="text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--orange);">${r.drillsCompleted||0}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);">Drills Done</div>
    </div>
    <div class="card" style="text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--green);">${r.drillsPerfect||0}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);">Perfect Drills</div>
    </div>
    <div class="card" style="text-align:center;">
      <div style="font-size:22px;font-weight:700;color:var(--blue);">${r.fcReviews||0}</div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);">Card Reviews</div>
    </div>
  </div>`;

  // Role-play detail
  if(rpHist.length){
    const avg=Math.round(rpHist.reduce((a,rp)=>a+(rp.score||0),0)/rpHist.length);
    const avgColor=avg>=80?'var(--green)':avg>=60?'var(--orange)':'var(--red)';
    const subTotals={empathy:0,diagnosis:0,evidence:0,technique:0,close:0};
    let subCount=0;
    rpHist.forEach(rp=>{if(rp.scores){Object.entries(rp.scores).forEach(([k,v])=>{if(subTotals[k]!==undefined)subTotals[k]+=v;});subCount++;}});

    html+=`<div class="sec-header">Role-Play Detail (${rpHist.length} sessions)</div>
    <div class="card">
      <div style="text-align:center;margin-bottom:12px;">
        <div style="font-size:36px;font-weight:800;color:${avgColor};">${avg}%</div>
        <div style="font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Average Score</div>
      </div>`;
    if(subCount){
      html+=`<div style="display:flex;gap:6px;margin-bottom:12px;">`;
      ['empathy','diagnosis','evidence','technique','close'].forEach(k=>{
        const v=subTotals[k]/subCount;
        const c=v>=4?'var(--green)':v>=3?'var(--orange)':'var(--red)';
        html+=`<div style="flex:1;text-align:center;padding:8px 2px;background:var(--dark3);border-radius:6px;">
          <div style="font-size:16px;font-weight:700;color:${c};">${v.toFixed(1)}</div>
          <div style="font-size:9px;color:var(--gray);text-transform:uppercase;">${k}</div>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;

    // Full session history (all)
    html+=`<div class="card"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);margin-bottom:8px;">All Sessions — Most Recent First</div>`;
    rpHist.slice(0,20).forEach(rp=>{
      const sc=rp.score>=80?'var(--green)':rp.score>=60?'var(--orange)':'var(--red)';
      html+=`<div style="padding:10px;background:var(--dark3);border-radius:6px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:12px;color:var(--gray-l);font-weight:600;">${escapeHtml(rp.cat)}${rp.scenario?' &middot; '+escapeHtml(rp.scenario):''}</span>
          <span style="font-size:13px;font-weight:700;color:${sc};">${rp.score}%</span>
        </div>
        <div style="font-size:10px;color:var(--gray);margin-bottom:6px;">${new Date(rp.date).toLocaleString()}</div>
        <div style="font-size:12px;color:var(--gray-l);line-height:1.5;">${escapeHtml(rp.feedback||'')}</div>
        ${rp.tip?`<div style="font-size:11px;color:var(--gold);margin-top:6px;font-style:italic;">&#128161; ${escapeHtml(rp.tip)}</div>`:''}
      </div>`;
    });
    if(rpHist.length>20){
      html+=`<div style="text-align:center;font-size:11px;color:var(--gray);padding:6px;">Showing 20 most recent of ${rpHist.length}</div>`;
    }
    html+=`</div>`;
  }else{
    html+=`<div class="sec-header">Role-Play Detail</div>
    <div class="card" style="text-align:center;padding:20px;color:var(--gray);font-size:13px;">No role-play sessions yet.</div>`;
  }

  // Assessments snapshot
  html+=`<div class="sec-header">Assessments</div>`;
  const dr=r.discResult,mr=r.motivatorsResult,er=r.eqResult;
  html+=`<div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">`;
  if(dr){const p=discProfiles[dr.primary];html+=`<span class="disc-tag" style="background:${p.color}20;color:${p.color};">DISC: ${dr.primary} ${p.name}</span>`;}
  else html+=`<span class="disc-tag" style="background:var(--dark4);color:var(--gray-d);">DISC: Not taken</span>`;
  if(mr){const mp=motivatorProfiles[mr.primary];html+=`<span class="disc-tag" style="background:${mp.color}20;color:${mp.color};">Motivator: ${mp.name}</span>`;}
  else html+=`<span class="disc-tag" style="background:var(--dark4);color:var(--gray-d);">Motivator: Not taken</span>`;
  if(er){const eqColor=er.overall>=80?'var(--green)':er.overall>=60?'var(--orange)':'var(--red)';html+=`<span class="disc-tag" style="background:${eqColor}20;color:${eqColor};">EQ: ${er.overall}/100</span>`;}
  else html+=`<span class="disc-tag" style="background:var(--dark4);color:var(--gray-d);">EQ: Not taken</span>`;
  html+=`</div>`;
  if(dr||mr||er){
    html+=`<button class="mv-nav-btn mv-next" style="width:100%;margin-top:8px;" onclick="mgrTab='disc';expandedProfileRepId='${id}';selectedRepId=null;renderManager();">View Full Profile &rarr;</button>`;
  }
  html+=`</div>`;

  // Assignments
  const repAssignments=Object.entries(assignments).filter(([_,a])=>a.repId===id);
  if(repAssignments.length){
    html+=`<div class="sec-header">Assignments (${repAssignments.length})</div><div class="card">`;
    repAssignments.forEach(([aid,a])=>{
      const label=a.targetLabel||(MODULES.find(m=>m.id===a.moduleId)||{}).title||a.targetId||'Unknown';
      const typeIcon=a.type==='quiz'?'&#10068;':a.type==='drill'?'&#9889;':a.type==='roleplay'?'&#127908;':a.type==='assessment'?'&#128202;':'&#128218;';
      const progress=a.targetCount>1?` (${a.currentCount||0}/${a.targetCount})`:'';
      const status=a.status==='completed'?'<span style="color:var(--green);">&#9989; Complete</span>':(a.dueDate?`<span style="color:var(--gray);">Due: ${a.dueDate}</span>`:'<span style="color:var(--orange);">Active</span>');
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
        <span>${typeIcon} ${escapeHtml(label)}${progress}</span>
        <span style="font-size:11px;">${status}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  // Badges
  if(badgesEarned.length){
    html+=`<div class="sec-header">Badges (${badgesEarned.length}/${BADGES.length})</div>
    <div class="card" style="display:flex;flex-wrap:wrap;gap:8px;">`;
    badgesEarned.forEach(bid=>{
      const b=BADGES.find(x=>x.id===bid);
      if(!b)return;
      html+=`<div style="padding:8px 12px;background:var(--dark3);border-radius:8px;font-size:12px;"><span style="font-size:16px;">${b.icon||'&#127942;'}</span> ${b.name}</div>`;
    });
    html+=`</div>`;
  }

  // Certificates
  if(certs.length){
    html+=`<div class="sec-header">Certificates (${certs.length})</div><div class="card">`;
    certs.forEach(c=>{
      html+=`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--gray-l);">&#127941; ${c.title||c.id} <span style="color:var(--gray);font-size:11px;margin-left:8px;">${c.date||''}</span></div>`;
    });
    html+=`</div>`;
  }

  // Activity timeline
  if(log.length){
    html+=`<div class="sec-header">Activity Timeline</div><div class="card">`;
    log.slice(0,30).forEach(a=>{
      const when=new Date(a.time);
      const whenStr=when.toLocaleString();
      const ptsStr=a.pts?`<span style="color:var(--gold);font-weight:700;margin-left:8px;">+${a.pts}</span>`:'';
      html+=`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;">
        <div style="color:var(--gray-l);">${a.action}${ptsStr}</div>
        <div style="color:var(--gray-d);font-size:10px;margin-top:2px;">${whenStr}</div>
      </div>`;
    });
    if(log.length>30)html+=`<div style="text-align:center;font-size:11px;color:var(--gray);padding:6px;">Showing 30 most recent of ${log.length}</div>`;
    html+=`</div>`;
  }

  // Manager manual edit panel
  if(isManager){
    html+=`<div class="sec-header">&#9998; Edit Rep Data</div>
    <div class="card" style="border-left:3px solid var(--orange);">
      <div style="font-size:12px;color:var(--gray);margin-bottom:12px;">Manually fix this rep's data. Changes save directly to Firestore.</div>

      <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);font-weight:700;margin-bottom:8px;">Completed Modules</div>`;
    MODULES.forEach(m=>{
      const done=completedMods.includes(m.id);
      html+=`<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;">
        <input type="checkbox" ${done?'checked':''} onchange="toggleRepModule('${id}','${m.id}',this.checked)" style="width:18px;height:18px;">
        <span style="color:${done?'var(--green)':'var(--gray-l)'};">${m.title}</span>
      </label>`;
    });

    html+=`<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);font-weight:700;margin:16px 0 8px;">Quiz Scores</div>`;
    const allTiers=['foundation','advanced','expert'];
    MODULES.forEach(m=>{
      if(!QUIZZES[m.id])return;
      allTiers.forEach(tier=>{
        const key=tier==='foundation'?m.id:m.id+'_'+tier;
        const score=qs[key];
        const tierLabel=tier.charAt(0).toUpperCase()+tier.slice(1);
        const best=score?score.best:'—';
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="color:var(--gray-l);">${m.title} (${tierLabel})</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="color:${best>=80?'var(--green)':best>=60?'var(--orange)':best!=='—'?'var(--red)':'var(--gray-d)'};font-weight:600;">${best}${best!=='—'?'%':''}</span>

        <input type="number" value="${r.streak||0}" style="width:100%;padding:8px;background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:14px;" onchange="setRepField('${id}','streak',parseInt(this.value)||0)">

        <input type="number" value="${r.drillsCompleted||0}" style="width:100%;padding:8px;background:var(--dark3);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:14px;" onchange="setRepField('${id}','drillsCompleted',parseInt(this.value)||0)">

function submitAssignment(){
  const repId=document.getElementById('assignRep').value;
  const due=document.getElementById('assignDue').value;
  const type=document.getElementById('assignType').value;
  if(!repId)return showToast('Select a rep','toast-streak');

  const targetReps=repId==='__all__'?Object.keys(reps).filter(id=>!reps[id].deleted):[repId];
  let count=0;

  if(type==='module'){
    const checked=[...document.querySelectorAll('#assignModules input:checked')].map(c=>c.value);
    if(!checked.length)return showToast('Select at least one module','toast-streak');
    targetReps.forEach(rid=>{checked.forEach(modId=>{
      const mod=MODULES.find(m=>m.id===modId);
      const aid=rid+'_'+modId+'_'+Date.now();
      assignments[aid]={repId:rid,type:'module',targetId:modId,moduleId:modId,targetLabel:mod?mod.title:modId,targetCount:1,currentCount:0,dueDate:due||null,status:'pending',assigned:new Date().toISOString(),assignedBy:currentUid||null};
      db.collection('assignments').doc(aid).set(assignments[aid]).catch(e=>console.warn(e));
      count++;
    });});
  }else if(type==='quiz'){
    const modId=document.getElementById('assignQuizMod').value;
    const tier=document.getElementById('assignQuizTier').value;
    const mod=MODULES.find(m=>m.id===modId);
    const tierLabel=tier.charAt(0).toUpperCase()+tier.slice(1);
    targetReps.forEach(rid=>{
      const aid=rid+'_quiz_'+modId+'_'+tier+'_'+Date.now();
      assignments[aid]={repId:rid,type:'quiz',targetId:modId+'_'+tier,targetLabel:(mod?mod.title:modId)+' ('+tierLabel+' Quiz)',targetCount:1,currentCount:0,dueDate:due||null,status:'pending',assigned:new Date().toISOString(),assignedBy:currentUid||null};
      db.collection('assignments').doc(aid).set(assignments[aid]).catch(e=>console.warn(e));
      count++;
    });
  }else if(type==='drill'){
    const cat=document.getElementById('assignDrillCat').value;
    const num=parseInt(document.getElementById('assignDrillCount').value)||10;
    const catLabel=cat==='__any__'?'Any Category':cat;
    targetReps.forEach(rid=>{
      const aid=rid+'_drill_'+Date.now();
      assignments[aid]={repId:rid,type:'drill',targetId:cat,targetLabel:'Objection Drills ('+catLabel+')',targetCount:num,currentCount:0,dueDate:due||null,status:'pending',assigned:new Date().toISOString(),assignedBy:currentUid||null};
      db.collection('assignments').doc(aid).set(assignments[aid]).catch(e=>console.warn(e));
      count++;
    });
  }else if(type==='roleplay'){
    const cat=document.getElementById('assignRpCat').value;
    const num=parseInt(document.getElementById('assignRpCount').value)||5;
    const catLabel=cat==='__any__'?'Any Category':cat;
    targetReps.forEach(rid=>{
      const aid=rid+'_rp_'+Date.now();
      assignments[aid]={repId:rid,type:'roleplay',targetId:cat,targetLabel:'Role-Play ('+catLabel+')',targetCount:num,currentCount:0,dueDate:due||null,status:'pending',assigned:new Date().toISOString(),assignedBy:currentUid||null};
      db.collection('assignments').doc(aid).set(assignments[aid]).catch(e=>console.warn(e));
      count++;
    });
  }else if(type==='assessment'){
    const checked=[...document.querySelectorAll('#assignOptions input:checked')].map(c=>c.value);
    if(!checked.length)return showToast('Select at least one assessment','toast-streak');
    const names={disc:'DISC Profile',motivators:'Motivators',eq:'EQ Assessment'};
    targetReps.forEach(rid=>{checked.forEach(aId=>{
      const aid=rid+'_assess_'+aId+'_'+Date.now();
      assignments[aid]={repId:rid,type:'assessment',targetId:aId,targetLabel:names[aId]||aId,targetCount:1,currentCount:0,dueDate:due||null,status:'pending',assigned:new Date().toISOString(),assignedBy:currentUid||null};
      db.collection('assignments').doc(aid).set(assignments[aid]).catch(e=>console.warn(e));
      count++;
    });});
  }

  showToast(`Created ${count} assignment(s) for ${targetReps.length} rep(s)`,'toast-success');
  addNotification('&#128203;',`Assigned ${count} item(s) to ${targetReps.length} rep(s)`,'');
  renderManager();
}

// Track assignment progress for counted types (drills, role-play)
function trackAssignmentProgress(type,category){
  if(!currentRep)return;
  Object.entries(assignments).forEach(([aid,a])=>{
    if(a.repId!==currentRep||a.status==='completed'||a.type!==type)return;
    // Check category match
    if(a.targetId&&a.targetId!=='__any__'&&category&&a.targetId!==category)return;
    a.currentCount=(a.currentCount||0)+1;
    if(a.currentCount>=a.targetCount){
      a.status='completed';
      showToast('Assignment completed: '+a.targetLabel,'toast-success');
    }
    db.collection('assignments').doc(aid).update({currentCount:a.currentCount,status:a.status}).catch(e=>console.warn(e));
  });
}

// Check quiz assignment completion
function checkQuizAssignment(modId,tier,passed){
  if(!currentRep||!passed)return;
  const scoreKey=tier==='foundation'?modId:modId+'_'+tier;
  Object.entries(assignments).forEach(([aid,a])=>{
    if(a.repId!==currentRep||a.status==='completed'||a.type!=='quiz')return;
    if(a.targetId===scoreKey){
      a.status='completed';a.currentCount=1;
      db.collection('assignments').doc(aid).update({status:'completed',currentCount:1}).catch(e=>console.warn(e));
      showToast('Assignment completed: '+a.targetLabel,'toast-success');
    }
  });
}

// Check assessment assignment completion
function checkAssessmentAssignment(assessId){
  if(!currentRep)return;
  Object.entries(assignments).forEach(([aid,a])=>{
    if(a.repId!==currentRep||a.status==='completed'||a.type!=='assessment')return;
    if(a.targetId===assessId){
      a.status='completed';a.currentCount=1;
      db.collection('assignments').doc(aid).update({status:'completed',currentCount:1}).catch(e=>console.warn(e));
      showToast('Assignment completed: '+a.targetLabel,'toast-success');
    }
  });
}

function deleteAssignment(aid){
  delete assignments[aid];
  db.collection('assignments').doc(aid).delete().catch(e=>console.warn(e));
  renderManager();
}

function exportCSV(){
  const h=['Name','Role','Points','Streak','Modules','Quizzes Passed','Avg Quiz','Drills','FC Reviews','Role-Plays','Avg RP Score','DISC','Motivator','EQ','Last Active'];
  const rows=[h.join(',')];
  Object.values(reps).forEach(r=>{
    const qs=r.quizScores||{};const qk=Object.keys(qs);
    const qP=qk.filter(k=>qs[k].best>=80).length;
    const qA=qk.length?Math.round(qk.reduce((a,k)=>a+qs[k].best,0)/qk.length):0;
    const rh=r.roleplayHistory||[];
    const ra=rh.length?Math.round(rh.reduce((a,p)=>a+(p.score||0),0)/rh.length):0;
    rows.push(['"'+(r.name||'')+'"',r.role||'rep',r.points||0,r.streak||0,(r.completedModules||[]).length+'/'+MODULES.length,qP,qA,r.drillsCompleted||0,r.fcReviews||0,rh.length,ra,r.discResult?r.discResult.primary:'',r.motivatorsResult?r.motivatorsResult.primary:'',r.eqResult?r.eqResult.overall:'',getLastActive(r)||''].join(','));
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='apex_report_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
  showToast('CSV exported','toast-success');
}

// ---- DATA REPAIR ----
async function repairAllData(){
  if(!confirm('This will scan all reps\' activity logs and force-reconstruct data from their history. Continue?'))return;
  const logEl=document.getElementById('repairLog');
  let logHtml='';
  let totalFixed=0;

  // First, reload fresh data directly from Firestore
  const freshSnap=await db.collection('users').get({source:'server'}).catch(()=>db.collection('users').get());

  for(const doc of freshSnap.docs){
    const d=doc.data();
    const id=doc.id;
    if(d.deleted)continue;
    const log=d.activityLog||[];
    const fixes=[];
    const updates={};

    // 1. Always reconstruct lastActive from log if missing or stale
    const currentLA=d.lastActive||null;
    if(log.length){
      const latestTime=new Date(log[0].time);
      const derivedLA=latestTime.toDateString();
      if(!currentLA){
        updates.lastActive=derivedLA;
        fixes.push('lastActive → '+derivedLA);
      }
    }

    // 2. Recalculate points from activity log and use the higher value
    const logPoints=log.reduce((a,e)=>a+(e.pts||0),0);
    const currentPts=d.points||0;
    if(logPoints>currentPts){
      updates.points=logPoints;
      fixes.push('points ('+currentPts+'→'+logPoints+')');
    }

    // 3. Reconstruct quizScores from activity log
    const qs=d.quizScores||{};
    let qsChanged=false;
    log.forEach(entry=>{
      const a=entry.action||'';
      const passMatch=a.match(/^(Foundation|Advanced|Expert) quiz passed: (.+)$/);
      if(passMatch){
        const tier=passMatch[1].toLowerCase();
        const modTitle=passMatch[2];
        const mod=MODULES.find(m=>m.title===modTitle);
        if(mod){
          const key=tier==='foundation'?mod.id:mod.id+'_'+tier;
          if(!qs[key]||!qs[key].best||qs[key].best<80){
            qs[key]={best:80,last:80,date:entry.time};
            qsChanged=true;
          }
        }
      }
    });
    if(qsChanged){
      updates.quizScores=qs;
      fixes.push('quizScores');
    }

    // 4. Reconstruct completedModules
    const cm=[...(d.completedModules||[])];
    let cmChanged=false;
    // If they passed a Foundation quiz for a module, mark it complete
    Object.keys(qs).forEach(key=>{
      const mod=MODULES.find(m=>m.id===key);
      if(mod&&qs[key].best>=80&&!cm.includes(key)){
        cm.push(key);
        cmChanged=true;
      }
    });
    // Also check for "Completed module" entries with 100 pts
    log.forEach(entry=>{
      if(entry.action==='Completed module'&&entry.pts===100){
        // Try to find which module by checking what was opened just before
        const idx=log.indexOf(entry);
        for(let i=idx+1;i<Math.min(idx+5,log.length);i++){
          const openMatch=(log[i].action||'').match(/^Opened: (.+)$/);
          if(openMatch){
            const mod=MODULES.find(m=>m.title===openMatch[1]);
            if(mod&&!cm.includes(mod.id)){cm.push(mod.id);cmChanged=true;}
            break;
          }
        }
      }
    });
    if(cmChanged){
      updates.completedModules=cm;
      const added=cm.length-(d.completedModules||[]).length;
      fixes.push('completedModules (+'+added+')');
    }

    // 5. Reconstruct drill counts
    let drillCount=0;
    log.forEach(entry=>{
      const a=entry.action||'';
      if(a.includes('Drill correct')||a.includes('drill')||a.includes('Drill'))drillCount++;
    });
    if(drillCount>(d.drillsCompleted||0)){
      updates.drillsCompleted=drillCount;
      fixes.push('drills ('+((d.drillsCompleted)||0)+'→'+drillCount+')');
    }

    // Apply fixes
    if(Object.keys(updates).length){
      try{
        await db.collection('users').doc(id).update(updates);
        // Update local reps
        if(reps[id])Object.assign(reps[id],updates);
        totalFixed++;
        logHtml+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="color:var(--green);">&#9989;</span> <strong>${escapeHtml(d.name||id)}</strong>: ${fixes.join(', ')}
        </div>`;
      }catch(e){
        logHtml+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
          <span style="color:var(--red);">&#10060;</span> <strong>${escapeHtml(d.name||id)}</strong>: Write failed — ${e.code||e.message}
        </div>`;
      }
    }else{
      logHtml+=`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
        <span style="color:var(--gray);">&#9644;</span> <strong>${escapeHtml(d.name||id)}</strong>: No repairs needed
      </div>`;
    }
  }

  logHtml=`<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:8px;">${totalFixed} rep(s) repaired</div>`+logHtml;
  showToast(`Repaired data for ${totalFixed} rep(s)`,'toast-success');
  // Reload fresh data and re-render
  await loadAllUsers();
  renderManager();
  // Write log AFTER re-render so the repairLog div exists again
  const logEl2=document.getElementById('repairLog');
  if(logEl2)logEl2.innerHTML=logHtml;
}

// ---- MANUAL REP EDIT FUNCTIONS ----
function toggleRepModule(repId,modId,checked){
  const r=reps[repId];
  if(!r)return;
  r.completedModules=r.completedModules||[];
  if(checked&&!r.completedModules.includes(modId)){
    r.completedModules.push(modId);
  }else if(!checked){
    r.completedModules=r.completedModules.filter(m=>m!==modId);
  }
  db.collection('users').doc(repId).update({completedModules:r.completedModules}).then(()=>{
    showToast('Module updated','toast-success');
  }).catch(e=>showToast('Save failed: '+e.message,'toast-streak'));
}

function setRepQuizScore(repId,key,val){
  const r=reps[repId];
  if(!r)return;
  r.quizScores=r.quizScores||{};
  const score=parseInt(val);
  if(isNaN(score)||score<0||score>100){
    // Clear the score
    delete r.quizScores[key];
  }else{
    r.quizScores[key]={best:score,last:score,date:new Date().toISOString()};
  }
  db.collection('users').doc(repId).update({quizScores:r.quizScores}).then(()=>{
    showToast('Quiz score updated','toast-success');
  }).catch(e=>showToast('Save failed: '+e.message,'toast-streak'));
}

function setRepField(repId,field,value){
  const r=reps[repId];
  if(!r)return;
  r[field]=value;
  const update={};
  update[field]=value;
  db.collection('users').doc(repId).update(update).then(()=>{
    showToast(field+' updated','toast-success');
  }).catch(e=>showToast('Save failed: '+e.message,'toast-streak'));
}

function toggleProfileExpand(id){
  expandedProfileRepId=(expandedProfileRepId===id)?null:id;
  renderManager();
}

async function removeRep(id){
  if(id===currentUid){return showToast('Cannot delete yourself','toast-streak');}
  const name=reps[id].name;
  if(!confirm('DELETE '+name+' permanently? This removes all their data and assignments. This cannot be undone.'))return;
  if(!confirm('Are you absolutely sure? Type-check: this will permanently delete '+name+'.'))return;

  showToast(`Deleting ${name}...`,'toast-success');
  try{
    // Delete all their assignments first
    const assignmentDeletes=[];
    Object.entries(assignments).forEach(([aid,a])=>{
      if(a.repId===id){
        assignmentDeletes.push(db.collection('assignments').doc(aid).delete());
        delete assignments[aid];
      }
    });
    await Promise.all(assignmentDeletes);

    // Soft-delete: mark the user doc as deleted instead of removing it.
    // This prevents the doc from being recreated if the rep is still signed in
    // on another device (their onAuthStateChanged would otherwise recreate it).
    await db.collection('users').doc(id).update({deleted:true,deletedAt:Date.now(),deletedBy:currentUid});

    // Remove from local state
    delete reps[id];
    renderManager();
    showToast(`Deleted ${name}`,'toast-success');
  }catch(e){
    console.error('Delete failed:',e);
    alert('Failed to delete '+name+': '+(e.message||e)+'\n\nThis is likely a Firestore security rules issue. Check the browser console for details.');
    renderManager();
  }
}

// ---- UTILITIES ----
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
