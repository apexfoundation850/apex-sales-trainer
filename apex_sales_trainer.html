  {q:"The customer's spouse was not engaged during the inspection but is now sitting in on the presentation. They are hearing everything for the first time. How do you adjust?",o:["Ignore the spouse and present as normal since the original customer is already informed","Start the entire inspection process over from the beginning for the spouse's benefit","Ask the spouse to review the proposal afterward and provide their input at that time","Use the Photo Review as an opportunity to bring the spouse up to speed, spending extra time connecting each photo to the customer's original concerns and the findings"],c:3,e:"The Photo Review becomes your tool for catching up the disengaged spouse. Extra time on photos and findings brings them into the same understanding level. Ignoring them risks a post-appointment veto. Restarting wastes the engaged customer's investment."},
  {q:"During the Photo Review, the customer says, 'That crack looks like it's been there since the house was built.' How do you respond without damaging trust?",o:["Tell them they are wrong based on your professional expertise and experience","Agree with them completely to avoid any confrontation or disagreement","Tell them the age of the crack does not matter for repair purposes","Acknowledge it is possible, then show your measurement data and explain what the current measurements indicate regardless of when it started, focusing on whether it is active or stable"],c:3,e:"Never dismiss the customer's observation. Acknowledge it could be original, then shift to what the data shows today. Active vs stable matters more than original vs new. Your measurements and documentation let the evidence answer the question objectively."},
  {q:"You present a right-sized proposal and the customer says, 'I've been saving money for this. Can you add [unnecessary item] since you're already going to be here?' What do you do?",o:["Add the item since the customer is willing to pay and it increases revenue","Add the item but give them a significant discount on the additional work","Tell them you can only perform the work that is included in the current proposal","Explain that adding unnecessary work would not be honest, and describe exactly what you would recommend monitoring instead"],c:3,e:"Right-sizing means recommending exactly what the evidence supports. Adding unnecessary work for revenue violates the Trust Unlocking Moment. Explain what you found, what you recommend, and what you would monitor. This builds long-term trust and referrals."},
  ],
  expert:[
  {q:"You show normal areas first during the Photo Review and the customer says, 'Good, so it sounds like there's nothing wrong.' You actually have significant findings to present. How do you transition without making it feel like a bait-and-switch?",o:["Say 'Well, actually there are some real problems' and switch directly to the bad news","Use the normal areas as a baseline and transition with 'Now let me show you where things start to change' to create contrast naturally","Apologize for the confusion and jump immediately to the problem areas","Stop showing normal areas for the rest of the presentation completely"],c:1,e:"The phrase 'where things start to change' creates a natural transition from baseline to concern. It uses the normal areas as a reference point rather than false reassurance. The customer sees the contrast rather than feeling misled."},
  {q:"During the education phase, you explain the progression of moisture damage. The customer, who is a contractor, challenges you: 'I've seen framing at 22% that lasted 20 years with no rot.' How do you respond?",o:["Acknowledge that variables like ventilation, wood species, and exposure patterns affect timelines, while noting that the benchmark ranges represent where risk increases significantly, and their home's specific conditions matter most","Tell them they are wrong and cite the latest industry standards and research","Defer to their extensive experience since they work in construction professionally","Change the subject to avoid the confrontation and maintain a positive relationship"],c:0,e:"A knowledgeable customer is testing your depth. Acknowledging variables shows sophistication. Benchmarks are guidelines, not absolutes. Redirect to their home's specific conditions. This earns respect from a contractor without backing down from your professional assessment."},
  {q:"You are building the proposal and you believe the home needs 12 piers at roughly $800 each. However, 8 piers would address the worst areas and the remaining 4 address minor slope. The customer has expressed budget concerns. What is the right-sized proposal?",o:["Propose 8 piers to fit their stated budget and avoid the price objection","Propose 12 piers and offer a significant discount to fit their budget constraints","Propose 8 piers and mention the additional 4 as optional future upgrades","Present the full 12-pier recommendation with evidence, then clearly explain which 4 address minor slope and what the trade-off would be if they chose to defer those, giving them an informed choice"],c:3,e:"Right-sizing is not about reducing scope to fit a budget. It is about presenting the full evidence-based recommendation and then being transparent about trade-offs if the customer needs to prioritize. The customer makes an informed choice rather than a blind one."},
  {q:"The customer understood the education perfectly and says, 'I get it, the moisture is the root cause and if we don't address it the wood damage will spread. But I've also been told by a plumber that regrading the yard would fix the water issue.' How do you handle this without dismissing the plumber?",o:["Tell them the plumber is wrong and your comprehensive solution is better","Agree with the plumber completely and remove moisture-related items from your proposal","Tell them to do the grading first and call you if problems persist","Acknowledge that grading is one factor in moisture management, validate the plumber's input, and explain how your recommendation works alongside or independently of grading to address the specific conditions you documented in their crawl space"],c:3,e:"The plumber's advice may be partially valid. Dismissing it insults the customer's trusted source. Your job is to show how your solution addresses the documented conditions specifically, and how grading may complement but not replace what you are recommending. Position your scope alongside their other information, not against it."},
  {q:"You introduce financing before the number, present a $14,500 proposal, and the customer says, 'I appreciate the thoroughness but your education section scared me into thinking it's urgent. Is it really?' How do you answer honestly without losing urgency?",o:["Tell them yes, it is extremely urgent and structural failure could happen any day","Be transparent about the timeline: explain what the current readings indicate, what progression looks like over months vs years, and let them understand that while not an emergency today, the conditions will worsen and costs increase over time","Admit that it is not urgent and they can wait several years safely","Tell them the education was just for context and they should not worry"],c:1,e:"Honesty builds trust. Manufactured urgency backfires. Be transparent about the realistic timeline. Elevated moisture at 16% is not collapsing tomorrow, but it is progressing. Frame the decision as cost-of-waiting rather than panic. Customers respect honest urgency assessment and are more likely to move forward with a trustworthy advisor."},
  {q:"You present a thorough, evidence-based proposal and the customer says, 'This looks great but I want to get one more quote for comparison.' You know from experience that the competitor will likely give a much lower price with a less thorough scope. What is the MOST effective response?",o:["Match whatever price the competitor will offer to stay competitive","Respect their decision, review what makes your proposal evidence-based, leave your documentation, and suggest specific questions they should ask the next company about scope, documentation, and what is included vs excluded","Tell them the competitor will lowball them and do significantly inferior work","Offer a substantial discount if they sign the contract today"],c:1,e:"You cannot stop a customer from shopping. But you can arm them with the right questions. When they ask the competitor about documentation, scope specifics, and inclusions, the comparison reveals scope differences rather than price differences. Your thorough proposal becomes the standard they measure against."},
  {q:"During the proposal presentation, the customer notices you recommended fixing a drainage issue on the east side, but during the walk-around they told you they already have a landscaper scheduled to regrade that area next month. You missed this detail. What do you do?",o:["Acknowledge the oversight, ask for details about the landscaper's plan, and determine whether their regrading addresses the specific drainage concern you documented or if additional work is still needed","Remove the drainage line item and reduce the price without discussing it further","Keep the line item and explain that your solution is better than regrading","Apologize profusely and offer a discount on the overall proposal amount"],c:0,e:"Acknowledging the oversight shows honesty. Asking about the landscaper's plan shows thoroughness. The regrading might fully address the drainage, partially address it, or not address the specific issue you found. The right answer depends on the details, not on ego or revenue."},
  {q:"You are presenting the proposal to a couple. The wife understands the education and is ready to move forward. The husband has been quiet and suddenly says, 'I don't see why we can't just put a sump pump in and call it a day.' He is proposing a partial solution. How do you handle the split dynamic?",o:["Side with the wife since she is already on board with the proposal","Focus your efforts on convincing the husband that he is completely wrong","Offer a sump-pump-only option as a reasonable compromise between their positions","Address the husband's suggestion directly and respectfully, explain what a sump pump addresses vs what it does not, and connect back to the specific findings that require more than water removal, letting the evidence answer his question"],c:3,e:"Never take sides in a couple. Address the husband's suggestion with respect and evidence. Explain what a sump pump does and does not solve. Use your documentation to show the specific conditions that require the full scope. The evidence resolves the disagreement, not your persuasion."},
  {q:"You are mid-presentation and the power goes out in the customer's home. Your tablet with all photos and data is at 15% battery. How do you adapt?",o:["Reschedule the presentation for another day when power is restored","Rush through the remaining photos before the tablet battery dies completely","Stop the presentation and wait patiently for the power to return","Prioritize showing the most critical findings and evidence, narrate the remaining documentation from your notes, and use the printed proposal as the primary discussion tool"],c:3,e:"Adapt, do not abandon. Prioritize the most impactful evidence on the tablet while you have battery, supplement with verbal narration from your notes, and lean on the printed proposal. The customer has invested 90+ minutes. Rescheduling risks losing that investment entirely. Professional adaptability demonstrates competence."},
  {q:"A customer who perfectly understood the education phase and agreed your proposal is right-sized says: 'I believe everything you showed me. But honestly, I just can't bring myself to spend $16,000 on something nobody sees. If this were a kitchen remodel I'd write the check today.' What is the MOST effective reframe?",o:["Explain that foundation repair adds significant resale value just like a kitchen remodel","Tell them foundation problems will make any kitchen remodel pointless if floors sink","Offer a payment plan that makes the monthly cost similar to remodeling","Acknowledge the emotional reality that invisible repairs feel different, then bridge to the concept that the foundation is what protects every visible investment in the home, and that their 90-minute inspection documented exactly what that protection requires"],c:3,e:"This objection is emotional, not logical. They already understand the problem. Acknowledging the emotional truth (invisible work feels different) validates them. Then reframe: the foundation protects every visible dollar they have and will invest. The 90-minute inspection they witnessed documents that protection specifically."},
  ],
},
mod4:{
  foundation:[
  {q:"When presenting the price, should you lead with the lump sum or the monthly payment?",o:["Always lead with the lump sum for complete transparency","Present both figures simultaneously for full disclosure","Lead with the monthly payment to frame manageable terms","Let the customer specify their preferred format first"],c:2,e:"Lead with the monthly payment. It frames the investment in manageable terms rather than a large lump sum, which can trigger sticker shock."},
  {q:"What is the correct first ask after presenting the proposal?",o:["What are your initial thoughts on this proposal?","Does this pricing structure work for your budget?","How would you like to move forward today?","Would you prefer some time to review everything?"],c:2,e:"'How would you like to move forward?' assumes forward motion and invites a decision. It is direct without being pushy."},
  {q:"Why should you NEVER say 'What do you think?' after presenting the proposal?",o:["It invites deliberation instead of prompting decisive action","It makes you appear uncertain about your proposal","It sounds unprofessional to experienced buyers today","It deviates from established Apex closing protocols"],c:0,e:"'What do you think?' opens the door to deliberation, opinions, and stalling. 'How would you like to move forward?' directs the conversation toward action."},
  {q:"What should you do BEFORE attempting to diagnose an objection?",o:["Present additional discount options to overcome resistance","Ask what specifically they are still working through","Restate the key benefits of your proposed solution","Show them additional photos from the property inspection"],c:1,e:"Always diagnose first with 'What specifically are you still working through?' before responding. You need to understand whether the objection is about value, cash flow, scope, timing, or something else entirely."},
  {q:"When is it appropriate to offer a discount?",o:["As soon as the customer shows any hesitation","When competitors have presented significantly lower pricing options","Only after diagnosing objections and never before understanding","Discounts should be offered proactively to accelerate closure"],c:2,e:"Never discount before diagnosing. If the objection is cash flow, financing solves it without discounting. If it is value, re-education solves it. Discounting before diagnosing trains customers to negotiate and erodes your margins."},
  {q:"Most closes happen on which ask?",o:["The first ask when momentum is strongest","The second ask after addressing specific objections","The third ask when persistence demonstrates commitment","The fourth ask or later with experienced buyers"],c:1,e:"Most closes happen on the second ask, after the specific objection has been addressed. Many salespeople give up after the first ask, leaving deals on the table."},
  {q:"What should you leave on the kitchen table when you depart?",o:["Just your business card with handwritten contact information","The proposal with a handwritten note requesting callback","Proposal, referral book, business card, and financing terms","Nothing should be left; take all materials with you"],c:2,e:"The leave-behind package includes the proposal, referral book, business card, and financing terms. These materials continue selling after you leave and give the customer everything they need to make a decision."},
  {q:"What does 'right-sizing' mean in the context of handling objections?",o:["Reducing the total price to match available budget","Adjusting scope only with explicit trade-off communication clearly stated","Adding more line items to justify the investment","Matching the competitor's scope and pricing exactly"],c:1,e:"Right-sizing during the close means only adjusting scope when you clearly communicate the trade-off: 'We can remove this item, and here is what that means for your home.' The customer makes an informed choice."},
  {q:"What should the second ask follow?",o:["A longer pause allowing the customer processing time","Addressing the specific objection the customer just raised","Offering a reduced price or payment option","Showing additional photos from the detailed property inspection"],c:1,e:"The second ask comes after you have addressed the specific objection. Once the concern is resolved, ask again. Waiting or adding information without asking creates stalling."},
  {q:"What is a Leave-Behind's primary purpose?",o:["To remind the customer of your professional visit","To provide materials that continue selling after departure","To satisfy Apex documentation and compliance requirements","To make the customer feel valued and important"],c:1,e:"The leave-behind continues the sales conversation after you leave. The proposal shows the evidence-based plan, the referral book provides social proof, and the financing terms remove cash flow barriers."},
  ],
  advanced:[
  {q:"You present the monthly payment and the customer says, 'That monthly payment sounds reasonable, but $14,500 is just a lot of money.' What does this tell you about their objection?",o:["They are questioning the overall value proposition of the work","Their objection is about cash flow, not value, and financing is likely the solution","They cannot afford the project within their current budget constraints","They are attempting to negotiate for a lower total price"],c:1,e:"When the monthly payment sounds reasonable but the total feels high, this is a cash flow objection, not a value objection. The customer accepts the value but struggles with the lump sum. Financing directly addresses this without discounting."},
  {q:"After the first ask, the customer says, 'I need to think about it.' What is the correct diagnostic response?",o:["Schedule a follow-up call in 3-5 business days to reconnect","Create urgency by offering a limited-time same-day discount","Ask, 'Of course. What specifically are you still working through?' to diagnose the real concern","Leave the proposal materials and ask them to contact you"],c:2,e:"'I need to think about it' is not an objection, it is a shield. Behind it is a specific concern: price, scope, timing, spouse approval, or something else. Diagnosing with 'What specifically are you still working through?' uncovers the real issue."},
  {q:"The customer says, 'I got a quote from another company for $8,000 for the same work.' You know their scope is less thorough. How do you respond?",o:["Reduce your pricing to match their competitive quote immediately","Ask to see the competitor's proposal and walk through scope differences item by item, letting the customer see what is and is not included in each","Explain that the competitor will likely deliver substandard workmanship","Offer to beat their competitor's price by 10% today"],c:1,e:"Never attack competitors or engage in price wars. Ask to see the competitor's proposal and compare scope side by side. When the customer sees the difference in what is included, the price difference has context. Your itemized, evidence-based proposal makes this comparison powerful."},
  {q:"You address the customer's objection about price by explaining the financing options. They seem satisfied. What should you do next?",o:["Ask a second time: 'Great, so how would you like to move forward?'","Allow them time to process and wait for their response","Begin completing the contract paperwork and documentation immediately","Step back and give them privacy to discuss together"],c:0,e:"After addressing the objection, ask again. Most closes happen on the second ask. Do not wait for the customer to volunteer; ask directly. Hesitating after resolving the concern creates a vacuum that invites new objections."},
  {q:"The customer says, 'I want to do this but I need to talk to my financial advisor first.' How do you handle this?",o:["Respect their process and schedule a follow-up conversation","Warn them that advisors typically discourage home improvement investments","Provide a larger discount incentive to encourage immediate commitment","Acknowledge their process, ask what specific financial question they need answered, and offer to be available by phone when they speak with the advisor so you can provide any technical details"],c:3,e:"Respect their process while staying involved. Ask what specific financial question needs answering since you may be able to address it now. Offering to be available during the advisor call keeps you in the conversation rather than being shut out."},
  {q:"You are about to do the second ask and the customer says, 'We want to wait until spring since it's November.' How do you handle seasonal stalling?",o:["Agree to reconnect in spring and schedule a follow-up","Offer a winter discount to motivate immediate action","Explain that foundation problems worsen over winter, use their documented findings to show what progression could look like over 4-5 months, and offer scheduling flexibility","Create urgency by mentioning limited spring availability"],c:2,e:"Use their own documented evidence and the progression education to show what waiting costs. Moisture, freeze-thaw cycles, and ongoing settlement do not pause for seasons. Pair this with scheduling flexibility rather than manufactured urgency."},
  {q:"During the close, the customer asks, 'What happens if you start the work and find more problems?' What is the best answer?",o:["Guarantee the quoted price with no changes regardless of findings","Reassure them that additional issues are discovered infrequently","Explain your process for handling unforeseen conditions: you will communicate immediately, document any new findings, and get their approval before any scope changes with clear cost implications","Include a 20% contingency in the proposal for unexpected conditions"],c:2,e:"Customers fear hidden costs. Explain your transparent process for handling surprises: immediate communication, documentation, and customer approval before changes. This builds trust and directly addresses the fear driving the question."},
  {q:"The customer wants to move forward but says, 'Can you start next week?' Your schedule is booked for 3 weeks. How do you handle this without losing the close?",o:["Promise next week availability and resolve scheduling conflicts later","State that 3 weeks is firm and non-negotiable","Refer them to another contractor with immediate availability","Close the deal today with the 3-week timeline, explain that the wait means crews are in demand which reflects quality, and offer to lock in their spot with the agreement"],c:3,e:"Close the deal now, not later. Frame the wait positively: demand reflects quality. Locking in their spot with a signed agreement prevents them from shopping during the wait. A signed customer with a 3-week wait is better than a prospect who 'wants to think about it.'"},
  {q:"After presenting the proposal, both spouses agree the work is needed but disagree about timing. The wife wants to do it now and the husband wants to wait until after the holidays. How do you navigate this?",o:["Support the wife's position since she favors immediate action","Acknowledge both perspectives, then use the documented evidence to discuss what waiting could cost vs the holiday financial concern, and ask if scheduling the work for after the holidays while locking in today's pricing could satisfy both","Recommend they discuss privately and contact you with their decision","Offer holiday pricing to address the husband's financial concerns"],c:1,e:"Never take sides. Acknowledge both positions. Find a creative solution that addresses both concerns: scheduling post-holiday work at today's pricing. This gives the husband his timing and the wife her commitment to action. Both feel heard."},
  {q:"You close the deal and the customer signs. As you are packing up, they say, 'I hope I'm making the right decision.' How do you handle buyer's remorse in the moment?",o:["Reassure them by referencing specific findings from their inspection and remind them why the work is necessary based on the evidence they saw","Dismiss their concern since the contract is already executed","Inform them about their cancellation rights and cooling-off period","Suggest reducing the project scope to alleviate their price concerns"],c:0,e:"Post-signature doubt is normal. Reinforce the decision by anchoring it to the specific evidence they saw and understood during the process. The 90 minutes of documentation and education becomes the foundation for their confidence."},
  ],
  expert:[
  {q:"You ask 'How would you like to move forward?' and the customer responds with a counter: 'I'll move forward at $11,000 instead of $14,500.' You know the full scope is necessary. What is the BEST sequence of actions?",o:["Accept $11,000 and reduce scope accordingly","Diagnose what is behind the number: ask what about $14,500 concerns them, determine if it is value or cash flow, then either re-educate on value or solve with financing before discussing any scope adjustment with clear trade-offs","Reject the counter and hold firm at $14,500","Split the difference at $12,750"],c:1,e:"A counter-offer is a symptom, not a diagnosis. $11,000 might mean 'I can't afford $14,500' (cash flow) or 'I don't think it's worth $14,500' (value). Each requires a different response. Diagnose first, then address the root cause. Only discuss scope reduction with explicit trade-offs as a last resort."},
  {q:"The customer says, 'We want to move forward, but only if you can guarantee the problem won't come back.' You know no foundation company can guarantee against all future movement. What is the MOST honest and effective response?",o:["Guarantee the work to close the deal","Tell them no one can guarantee that and risk losing the deal","Offer an extended warranty at additional cost","Explain specifically what your warranty covers and for how long, what your solution is designed to do, and what factors are outside anyone's control, positioning your thoroughness as the best possible protection"],c:3,e:"Honesty is the only option. A false guarantee is a liability. Being vague loses trust. The best response is specific: here is what the warranty covers, here is what the solution addresses, here is what no one can control. Your thorough process and documentation position your work as the most reliable approach."},
  {q:"You have addressed the customer's price objection, done the second ask, and they say, 'We just need to sleep on it.' You have already done everything correctly. What is your best move?",o:["Accept it gracefully, confirm what specifically they want to think through, set a specific follow-up time for tomorrow, and leave the full Leave-Behind package on the kitchen table","Push for a third ask to close tonight","Offer a same-day-only discount to create final urgency","Tell them sleeping on it usually means no and ask what the real issue is"],c:0,e:"After two solid asks, pushing harder creates resistance. Accept gracefully but do not leave without: understanding what they are thinking about, a specific callback time, and the full leave-behind. The proposal, referral book, and financing terms continue working overnight. Manufactured urgency at this point damages trust."},
  {q:"The customer is ready to close but asks you to remove the vapor barrier from the proposal to lower the price. You know the vapor barrier is essential for the moisture solution to work long-term. How do you handle this right-sizing request?",o:["Remove it since the customer gets to decide their scope","Explain the specific trade-off: removing the vapor barrier means the moisture remediation lacks long-term protection, show the documented moisture readings that justify it, and let the customer make an informed decision while being clear about the consequence","Refuse to remove it and hold your full proposal","Offer to discount the vapor barrier instead of removing it"],c:1,e:"Right-sizing requires explicit trade-off communication. You cannot refuse to adjust scope, but you must ensure the customer understands exactly what they are giving up. Use the documented evidence to show why the vapor barrier is part of the solution. An informed customer who declines is better than an uninformed one who later has problems."},
  {q:"You left a complete Leave-Behind and the customer calls you 3 days later saying, 'We showed your proposal to my wife's uncle who is a contractor and he said you're overcharging by 40%.' How do you handle this remote third-party influence?",o:["Offer a 40% discount to match the uncle's assessment","Tell them the uncle is not a foundation specialist and does not know what he is talking about","Invite the uncle to a meeting to discuss the scope","Acknowledge the uncle's input, ask specifically which line items he questioned, and offer to walk through your documentation and evidence for each item so the customer can share that context with the uncle"],c:3,e:"Third-party influencers are powerful but usually lack context. Ask specifically which items were questioned. Walk through your evidence for those items. Give the customer the ammunition to educate the uncle. Your evidence-based documentation is your defense. Attacking the uncle's credibility attacks the customer's trusted source."},
  {q:"During the close, the customer says, 'If I sign today, what can you do for me on price?' This is a classic negotiation tactic. What is the Apex approach?",o:["Offer a 5% same-day discount since they are committing","Acknowledge their question, reiterate that the proposal is right-sized to their documented needs, and redirect: 'The proposal is built on exactly what your home needs. What I can do is make sure the financing works for your monthly budget. What payment range works for you?'","Tell them the price is the price, take it or leave it","Offer to throw in an additional service for free"],c:1,e:"Do not discount a right-sized proposal. Do not be adversarial either. Redirect from total price to monthly payment. This answers their question (what can you do for me) with a legitimate tool (financing) rather than a margin-eroding discount. The pivot to monthly payment reframes affordability."},
  {q:"You are on the second ask and the customer says, 'I want to do this, but my neighbor just had her foundation done by another company for much less and she says it's fine.' You know the competitor does lighter-scope work. What is the MOST effective response?",o:["Tell them the neighbor's repair will probably fail","Offer to match the competitor's price","Tell them to call the neighbor's company if price is their priority","Ask what the neighbor had done, genuinely listen, then explain that every home's needs are different and walk through your documented evidence showing what specifically their home requires and why, without disparaging the neighbor's choice"],c:3,e:"The neighbor's experience is real social proof. Dismissing it dismisses the customer's trusted source. Ask genuinely about the neighbor's scope, then redirect to YOUR home's documented needs. Different homes need different solutions. Your evidence shows what THIS home requires. Respect the neighbor's choice while differentiating your recommendation."},
  {q:"The customer signs the agreement. As you place the Leave-Behind materials on the kitchen table, the customer's adult daughter (who was not part of the appointment) walks in and says, 'Mom, you didn't sign anything did you? I told you to wait for me.' The customer looks uncertain. What do you do?",o:["Quickly pack up and leave before the situation escalates","Tell the daughter the decision has been made and the contract is binding","Tell the customer she can cancel within the rescission period if she changes her mind","Calmly offer to walk the daughter through the key findings, photos, and evidence so she has the same information her mother used to make the decision, and let the family discuss while you remain available for questions"],c:3,e:"A new influencer arriving post-close requires composure, not defensiveness. The daughter needs the information the mother received. Your evidence-based process is your strongest asset here. Walk her through the key findings briefly. If your process was sound, the evidence will support the decision."},
  {q:"A customer who was ready to close says, 'I just realized my home warranty might cover this. Let me check first.' You are fairly certain a standard home warranty will not cover foundation repair. What is the best play?",o:["Tell them home warranties never cover foundation work","Wait for them to find out on their own and call you back","Offer to call the warranty company on their behalf","Acknowledge their thought, share that in your experience most home warranties exclude foundation structural repair, suggest they check their specific policy, and ask to schedule a follow-up call for tomorrow so you can answer any questions after they review their coverage"],c:3,e:"Share your knowledge honestly without being dismissive. Most home warranties exclude foundation work, but their specific policy might be different. Encouraging them to check while scheduling a follow-up keeps the relationship warm and demonstrates confidence that the truth supports your position."},
  {q:"You have done everything right: thorough inspection, excellent education, evidence-based proposal, financing introduced properly, good first ask, diagnosed the objection, addressed it, and done the second ask. The customer still says no. What is the Apex approach to this situation?",o:["Keep asking until they say yes or ask you to leave","Leave immediately and move on to the next prospect","Offer your best possible price as a final attempt","Accept the decision professionally, ask if you can follow up in a few weeks, ensure the Leave-Behind is complete on the kitchen table, and leave the door open for future contact without pressure"],c:3,e:"Not every appointment closes, even with perfect execution. Professionalism in a loss builds long-term reputation. The leave-behind continues working. A follow-up timeline keeps the relationship alive. Many 'no' decisions become 'yes' weeks or months later when the customer is ready. Pushing past a genuine no damages trust permanently."},
  ],
},
mod5:{
  foundation:[
  {q:"How many touches are in the post-appointment follow-up system?",o:["Three structured follow-up contacts","Four sequential customer touchpoints","Five systematic follow-up interactions","Seven comprehensive contact attempts"],c:2,e:"The 5-Touch System provides structured follow-up from same-day contact through a day-21 final follow-up."},
  {q:"What is the first touch in the 5-Touch System?",o:["A follow-up phone call within business hours","An email with appointment recap details","A same-day thank-you text within 2 hours","A handwritten thank-you note by mail"],c:2,e:"Touch 1 is a same-day thank-you text sent within 2 hours of the appointment."},
  {q:"When does Touch 2 (the follow-up call) occur?",o:["Day 2 after the appointment","Same day as the appointment","Day 5 after the appointment","Day 7 after the appointment"],c:0,e:"Touch 2 is a follow-up call on day 2 after the appointment."},
  {q:"What type of message is Touch 3 on day 5?",o:["A pricing reminder with current rates","A discount offer for quick decisions","A value-add message with helpful information","A scheduling confirmation for next steps"],c:2,e:"Touch 3 on day 5 is a value-add message that provides additional helpful information to the customer."},
  {q:"After how long does a customer typically 'mentally move on' from your appointment?",o:["6 hours after the meeting","24 hours after the meeting","48 hours after the meeting","1 week after the meeting"],c:1,e:"Research shows the 24-hour follow-up window is critical. After that, customers mentally move on."},
  {q:"When is the BEST time to ask for referrals?",o:["During the initial sales appointment","30 days after job completion","After every completed install project","Only if the customer initiates discussion"],c:2,e:"Ask for referrals after every install when customer satisfaction is at its highest."},
  {q:"How do self-generated leads compare to purchased leads in close rate?",o:["Close at approximately the same rate","Close at 2-3x the conversion rate","Close at half the conversion rate","Close at 5x the conversion rate"],c:1,e:"Self-generated leads close at 2-3x the rate of purchased leads and cost a fraction."},
  {q:"Within what timeframe should you follow up on a referral?",o:["Within 1 week of receiving","Within 48 hours of receiving","Within 24 hours of receiving","Same business day as receiving"],c:2,e:"Follow up on referrals within 24 hours. The referring customer's credibility is on the line."},
  {q:"What is the most common mistake reps make with follow-up?",o:["Following up too aggressively with customers","Calling too early in the morning","Doing one follow-up then giving up","Sending too many email messages"],c:2,e:"Most reps do one follow-up then give up. The 5-Touch System prevents this by providing a structured cadence."},
  {q:"When asking for referrals, you should be specific by mentioning which types of people?",o:["Business partners and potential investors","Real estate agents and building contractors","Neighbors, family members, and coworkers","Social media followers and connections"],c:2,e:"Be specific when asking: 'Is there anyone you know — a neighbor, family member, coworker — who might be dealing with something similar?'"},
  ],
  advanced:[
  {q:"A customer seemed interested during the appointment but hasn't returned your day-2 call. It's now day 5. What should you do?",o:["Call again immediately — they might have missed it","Assume they're not interested and move on to new leads","Send a value-add message as planned in the 5-Touch System","Show up at their home unannounced to check in"],c:2,e:"Stick to the system. Day 5 is the scheduled value-add message (Touch 3). Deviating from the cadence either by skipping steps or doubling up on calls can feel pushy."},
  {q:"A pending customer says, 'I need to think about it.' What is the recommended response approach?",o:["Give them a week of silence to process the information","Ask 'What would need to happen for you to feel comfortable moving forward?'","Offer an immediate discount to close the deal now","Tell them the price increases after next week"],c:1,e:"This open-ended question surfaces specific concerns you can address, rather than guessing what's holding them back."},
  {q:"You completed an install and the homeowner is thrilled. Before asking for referrals, you should:",o:["Wait a week so they can live with the repair","Only ask if they bring up knowing someone else","Send a text asking for referrals later that evening","Ask immediately while satisfaction is highest"],c:3,e:"Ask after every install when satisfaction is highest. Waiting diminishes enthusiasm and reduces referral likelihood."},
  {q:"A customer says, 'We want to get two more quotes before deciding.' How do you create urgency honestly?",o:["Tell them your pricing expires at the end of today","Say competitors will give them misleading information about their foundation","Explain that foundation conditions won't self-correct and may worsen over time","Offer to match any lower quote they receive on the spot"],c:2,e:"Creating urgency honestly means stating the factual reality: conditions won't self-correct. Never guilt or pressure — let the truth create appropriate urgency."},
  {q:"You receive a referral from a past customer on Monday afternoon. When should you contact the referral?",o:["By Tuesday afternoon at the latest","Next Monday to give them adequate time","Within the hour of receiving the referral","After you research their property and foundation issues first"],c:0,e:"Follow up on referrals within 24 hours. Monday afternoon to Tuesday afternoon keeps you within that critical window."},
  {q:"After calling the referral, what else should you do?",o:["Nothing — the referral is now your responsibility to manage","Post about the new referral opportunity on social media","Send the referrer a gift card as appreciation","Send a thank-you to the person who referred them"],c:3,e:"Always thank the referrer by calling them back. This encourages future referrals and maintains the relationship."},
  {q:"A customer went silent after Touch 3. It's now day 10. You should:",o:["Proceed with Touch 4 check-in as scheduled","Give up — three attempts is enough professional contact","Send a strongly worded message about their foundation deteriorating","Have your manager call them instead of you"],c:0,e:"Follow the system. Touch 4 is a day-10 check-in. Most reps quit after one or two attempts — the system is designed to persist professionally."},
  {q:"You're converting a pending customer who says, 'I just can't afford it right now.' The best approach is to:",o:["Immediately offer a lower price to fit their budget","Ask what would need to happen for them to feel comfortable","Tell them they can't afford NOT to fix their foundation","Explain financing options and ask what payment structure works for their budget"],c:3,e:"While asking what they need is good, when someone specifically cites affordability, addressing the financial concern directly with financing options is the most helpful next step."},
  {q:"What makes Touch 5 (day 21) different from earlier touches?",o:["It's the first email in the communication sequence","It includes a final discount offer for consideration","It's the final professional follow-up — the last scheduled contact","It's when you ask for referrals from them"],c:2,e:"Touch 5 on day 21 is the final professional follow-up. It closes the loop respectfully whether or not the customer moves forward."},
  {q:"You just completed an install and want to ask for a referral. Which phrasing is most effective?",o:["Know anyone who needs foundation work done?","Can you post about us on your Facebook page?","Is there anyone you know — a neighbor, family member, coworker — who might be dealing with something similar?","Would you give us a five-star review online?"],c:2,e:"Being specific with categories (neighbor, family member, coworker) prompts the customer to mentally scan their network rather than giving a vague 'no.'"},
  ],
  expert:[
  {q:"A customer you met on Monday responds enthusiastically to your Touch 1 text but then goes completely dark. It's now day 10. You've followed the 5-Touch System perfectly. Your manager asks if you should drop by their house. What's the best call?",o:["Yes — showing up demonstrates genuine commitment and professional hustle that separates you from competitors","No — continue the 5-Touch System with Touch 4 as planned without deviating from the proven process","Yes — but only if you're already scheduled for other appointments in their neighborhood","No — skip directly to Touch 5 and close out this prospect to focus on warmer leads"],c:1,e:"Stick to the system. Showing up unannounced can feel intrusive and damage trust. The 5-Touch System is designed to maintain professional persistence without crossing boundaries."},
  {q:"You have a customer who said 'yes' to the repair but keeps delaying the scheduling call. They're responsive to texts but won't commit to a date. What's really happening and what should you do?",o:["They're genuinely busy with other priorities — keep sending friendly texts until they find time","They're waiting for competing quotes to arrive — offer a limited-time discount to accelerate their decision","They likely have an unvoiced concern — ask what would need to happen for them to feel comfortable","They've mentally moved on from the project — stop following up and mark them as closed-lost"],c:2,e:"Responsive but non-committal behavior signals an unaddressed concern. The key question 'What would need to happen...' surfaces the real objection rather than playing an endless scheduling game."},
  {q:"A past customer gives you a referral but says, 'Don't tell them I sent you — they're private people.' How should you handle this?",o:["Thank the referrer, contact the referral without using names, but mention working in their area","Respect their complete privacy and approach the referral as a completely cold prospect","Ignore the privacy request and use the referrer's name anyway for maximum credibility","Decline this referral opportunity since you can't leverage it effectively without the referrer's name"],c:0,e:"Respect the referrer's boundary while still leveraging proximity. Saying you've done work in the neighborhood provides credibility without violating trust. Always honor the referrer's wishes."},
  {q:"You consistently get referrals from installs but rarely from appointments that don't close. A colleague suggests asking for referrals even from no-sale appointments. Is this a good idea?",o:["No — only satisfied install customers give quality referrals that actually convert to sales","No — asking for referrals after declining your service makes you look desperate and unprofessional","Yes — anyone who experienced your professionalism may know someone needing foundation work","Yes — but limit this strategy to customers who declined for budget reasons only"],c:2,e:"Even no-sale customers experienced your expertise and professionalism. They may know someone who needs foundation work. The instruction is to ask after every install, but expanding to professional non-sale interactions can also yield results."},
  {q:"It's 11:30 PM and you just realized you forgot to send the same-day thank-you text to a customer you saw at 4 PM. What should you do?",o:["Send it immediately — the 2-hour window passed, so any same-day contact still counts","Send it at 6 AM tomorrow to catch them first thing in the morning","Wait until 8 AM tomorrow — late-night texts are unprofessional and 24-hour window applies","Skip Touch 1 entirely and begin the sequence with Touch 2 on day 2"],c:2,e:"An 11:30 PM text is unprofessional and could irritate the customer. Sending first thing in the morning still falls within the 24-hour window before they mentally move on, and preserves your professional image."},
  {q:"You've been following the 5-Touch System for 8 months and notice your day-5 value-add messages get the most responses. Should you restructure the system to send value-add messages earlier?",o:["No — the system framework is designed with intentional spacing and shouldn't be altered","Yes — move the value-add content to day 2 immediately for faster conversion rates","No — high response rates on one touch don't justify changing the entire sequence","Yes — test moving it to day 3 while keeping the rest of the cadence intact"],c:3,e:"The system provides a framework, not an immutable rule. If data shows value-add content resonates, testing a small adjustment while preserving the overall cadence is smart. Wholesale restructuring is risky, but refusing to optimize is also a mistake."},
  {q:"Two reps debate follow-up strategy. Rep A says the 24-hour window means you must close on the first visit or lose the deal. Rep B says the 5-Touch System means patience always wins. Who's right?",o:["Rep A — urgency and same-day closing pressure are everything in foundation sales","Rep B — consistent persistence and patience always beat speed in long-term relationship building","Both — the approach depends entirely on reading individual customer personalities and preferences","Neither — 24-hour window emphasizes immediate follow-up, while 5-Touch provides structure for remaining process"],c:3,e:"Rep A misinterprets urgency as same-day closing pressure. Rep B confuses patience with passivity. The truth is the 24-hour window emphasizes immediate first follow-up, and the 5-Touch System structures the rest. Speed AND persistence matter."},
  {q:"A customer from 6 months ago calls and says they're ready to move forward. You had completed all 5 touches with no response. They say your day-21 message stuck with them. What's the key lesson?",o:["Day 21 messages are the most effective touch point and should be emphasized","Follow-up pays off even when there's no immediate visible response from prospects","You should continue following up beyond the standard 5-touch system for better results","Quality customers always return eventually if your product and service are genuinely superior"],c:1,e:"This validates the entire 5-Touch System. Not every touch gets a response, but each one builds familiarity and trust. The system works even when it seems like it isn't. The lesson isn't that day 21 is magic — it's that consistent follow-up accumulates."},
  {q:"You ask a satisfied install customer for a referral and they say, 'I don't really know anyone.' You should:",o:["Accept their response graciously and move on — pushing harder would be considered rude","Say 'That's okay' then prompt with specific categories: neighbor, family member, coworker","Ask them to post about your service on social media platforms instead","Leave your business card and say 'Please call if you think of anyone'"],c:1,e:"'I don't know anyone' is usually a reflexive response, not a considered one. Prompting with specific categories (neighbor, family member, coworker) helps them mentally scan their network. This isn't pushy — it's helpful specificity."},
  {q:"Your company gives you purchased leads that close at 20%. Your self-generated referral leads close at 55%. Your manager wants you to spend more time calling purchased leads to hit volume targets. How do you handle this?",o:["Focus entirely on purchased leads — your manager understands the business better than you","Present the data and propose a balanced approach that prioritizes higher-converting referral generation","Ignore the manager's directive and continue working only your high-converting referral leads","Comply publicly but secretly spend less time and effort on the purchased leads"],c:1,e:"Data-driven advocacy is the professional approach. Self-generated leads close at 2-3x the rate and cost a fraction, but completely ignoring purchased leads or your manager isn't sustainable. Propose a balanced pipeline strategy backed by your numbers."},
  ],
},
mod6:{
  foundation:[
  {q:"According to customer psychology principles, buying decisions are:",o:["Purely rational cost-benefit analyses based on data","Based entirely on price comparisons and budgets","Emotional first, then justified rationally afterward","Random and unpredictable without clear patterns"],c:2,e:"Decisions are emotional first, then justified rationally second. Understanding this is fundamental to effective selling."},
  {q:"What does 'loss aversion' mean in customer psychology?",o:["Customers always choose the cheapest available option","People avoid making any decisions when possible","Customers hate losing arguments with salespeople","Losses are felt roughly 2x as powerfully as equivalent gains"],c:3,e:"Loss aversion means losses are felt roughly 2x as powerfully as equivalent gains. This is why cost-of-inaction framing is more motivating than benefit-of-action framing."},
  {q:"Which framing is MORE motivating due to loss aversion?",o:["Without repair, your foundation damage will worsen and cost more","Your home value will increase significantly with this repair","You'll save substantial money with our financing options","This is the best price available in the market"],c:0,e:"Cost of inaction framing is more motivating than benefit of action because losses feel roughly 2x as powerful as equivalent gains."},
  {q:"How many buyer types should you be able to identify?",o:["2","4","3","6"],c:1,e:"There are four buyer types: Analytical, Skeptic, Decisive, and Relationship-Driven. Each requires a different approach."},
  {q:"What does the Analytical buyer type want most?",o:["Quick decisions and maximum efficiency throughout the process","Personal rapport and strong local references from neighbors","Honesty and the opportunity to challenge your claims","Data, measurements, and sufficient time to process information"],c:3,e:"Analytical buyers want data, measurements, and time to process information before making a decision."},
  {q:"What is the biggest mistake you can make with different buyer types?",o:["Offering too many different options and choices","Being overly friendly and personal too quickly","Talking extensively about product technical specifications","Treating every customer exactly the same way"],c:3,e:"The biggest mistake is treating every customer the same. An Analytical needs time while a Decisive needs efficiency — a mismatch kills deals."},
  {q:"Which question helps identify a customer's primary emotional driver?",o:["What's your available budget for this project?","What's your biggest concern about this situation?","When do you want to start the work?","Who originally told you about our company?"],c:1,e:"The walk-around question 'What's your biggest concern?' identifies the customer's primary emotional driver."},
  {q:"Which of the following is one of the four emotional drivers for foundation repair customers?",o:["Getting the best possible deal on pricing","Keeping up with what neighbors are doing","Avoiding lengthy construction and installation hassles","Safety and family protection from structural issues"],c:3,e:"The four emotional drivers are: Safety/family protection, Home value/investment, Selling the home, and Quality of life."},
  {q:"How should you approach a Skeptic buyer type?",o:["Overwhelm them with detailed data and technical charts","Be quick and efficient to demonstrate your confidence","Focus on building strong personal rapport immediately","Lead with honesty and welcome their careful scrutiny"],c:3,e:"With Skeptic buyers, lead with honesty and welcome scrutiny. They respect transparency and will test your credibility."},
  {q:"How quickly should you read and adapt to a customer's buyer type?",o:["Before the appointment based on the lead source","Within the first 10 minutes of meeting them","After presenting the complete proposal and pricing","You don't need to — use the same approach for everyone"],c:1,e:"Read the customer in the first 10 minutes and adjust your approach accordingly. Early adaptation is essential to connecting with each buyer type."},
  ],
  advanced:[
  {q:"A homeowner keeps asking for engineering reports, load calculations, and warranty fine print. Which buyer type are they, and what's your best move?",o:["Skeptic — lead with complete transparency and acknowledge any project limitations","Analytical — provide comprehensive data they've requested and allow adequate review time","Decisive — they're avoiding commitment, so create urgency for immediate decision","Relationship-Driven — they're evaluating your willingness to invest in their concerns"],c:1,e:"Requesting detailed data signals an Analytical buyer. Give them the measurements, reports, and time to process. Rushing them will lose the sale."},
  {q:"A customer says, 'Just give me the bottom line — what does it cost and when can you start?' Which buyer type is this?",o:["Analytical — they want comprehensive data before making any decisions","Skeptic — they're testing your honesty with direct questions","Decisive — they prefer efficiency and want clear bottom-line information","Relationship-Driven — they're building trust through straightforward communication"],c:2,e:"Wanting the bottom line and a start date without lengthy explanation is classic Decisive behavior. Be efficient and don't over-explain."},
  {q:"You're using benefit-of-action framing: 'This repair will increase your home value.' The customer seems unmoved. Switching to loss aversion, you'd say:",o:["Consider this a smart long-term investment in your property","Without repair, damage spreads and costs significantly more later","Most neighbors have completed similar preventive maintenance projects","I can provide special pricing if we move forward today"],c:1,e:"Loss aversion framing emphasizes what the customer stands to lose through inaction, which is felt roughly 2x as powerfully as equivalent gains."},
  {q:"During the walk-around, a customer says their biggest concern is 'We're listing the house in three months.' Which emotional driver does this reveal?",o:["Safety and family protection concerns are their primary motivation","Home value and investment preservation drives their decision-making process","Selling the home successfully is their main objective and concern","Quality of life improvements will influence their repair priorities"],c:2,e:"'We're listing the house' directly reveals the selling-the-home driver. Your entire approach should center on how the repair supports a smooth, profitable sale."},
  {q:"A Relationship-Driven customer keeps asking about your family and how long you've lived in the area. You're running behind schedule. What should you do?",o:["Politely redirect conversation to inspection details since time is valuable","Invest in building rapport since this constitutes their evaluation process","Mention your tight schedule and suggest moving toward business matters","Continue conversation while simultaneously beginning your technical inspection work"],c:1,e:"For Relationship-Driven buyers, rapport IS the selling process. Cutting it short to 'get to business' signals you don't value the relationship, which is exactly what this buyer type evaluates."},
  {q:"A customer mentions water in their basement is keeping their kids from using the playroom. Which emotional driver is primary?",o:["Home value and investment protection motivates their repair decision","Selling the home successfully drives their urgency for solutions","Quality of life improvements will guide their purchasing priorities","Safety and family protection concerns are their main motivation"],c:3,e:"Kids and family safety are the key signals here. While quality of life is impacted, the mention of children triggers the safety/family protection driver as primary."},
  {q:"You identify a customer as a Skeptic. Halfway through your presentation, they say, 'I've had contractors lie to me before.' Your best response is:",o:["Our company maintains different standards than typical contractors in the industry","I understand completely. Let me show you what I observe and you verify it matches your assessment","We've earned a 4.9-star rating on Google from satisfied customers","Would you prefer to call several recent customer references right now?"],c:1,e:"Skeptics respond to transparency and involvement, not claims of being different. Inviting them to verify your findings themselves demonstrates confidence and welcomes their scrutiny."},
  {q:"You're presenting to a couple. One partner asks detailed technical questions while the other says, 'Just tell us what to do.' How do you handle this?",o:["Focus primarily on the technical partner since they're driving the decision","Focus on the decisive partner since they're ready to move forward","Address both styles — provide data for Analytical and recommendations for Decisive","Ask them to discuss privately and return with unified questions"],c:2,e:"When partners have different buyer types, you must serve both. Provide data for the Analytical and clear, efficient recommendations for the Decisive. Ignoring either risks losing the sale."},
  {q:"A customer focuses entirely on how the foundation issue affects their daily comfort — doors sticking, floors uneven, drafts. Their primary driver is most likely:",o:["Safety and family protection concerns motivate their repair decision","Home value and investment preservation drives their purchasing priorities","Selling the home successfully influences their timeline and urgency","Quality of life improvements guide their decision-making process"],c:3,e:"Daily comfort issues like sticking doors, uneven floors, and drafts point to quality of life as the primary driver. Frame your solution around restoring daily comfort and livability."},
  {q:"An Analytical buyer says they want to 'sleep on it.' What should you do?",o:["Push for immediate decision since delayed decisions typically result in lost sales","Respect their process, provide documentation for review, and schedule specific follow-up","Offer same-day discount pricing to incentivize immediate purchasing decision","Ask which specific concerns are preventing them from moving forward today"],c:1,e:"Analytical buyers genuinely need time to process. Pushing for an immediate decision contradicts their nature and will backfire. Provide materials and schedule a specific follow-up."},
  ],
  expert:[
  {q:"A homeowner shows strong Analytical traits during the inspection but switches to emotional urgency when they see a crack near their child's bedroom. How should you recalibrate?",o:["Stay Analytical — they'll revert to data-driven decision-making after the emotion passes","Switch entirely to emotional selling — the safety driver has taken over completely","Let them process the emotion silently and wait for them to re-engage analytically","Acknowledge the safety concern emotionally, then bridge back to data that supports the urgency of repair"],c:3,e:"The customer hasn't changed types — they've had an emotional trigger activate alongside their analytical nature. Acknowledge the emotion (safety/family), then provide the data they need to justify the now-urgent decision. Serve both needs."},
  {q:"You're presenting to a customer who seems Decisive — wants efficiency, asks for the bottom line. But when you present the price, they freeze and start asking detailed questions. What happened?",o:["They were never actually Decisive — you completely misread their buyer type from the start","They're stalling because they can't afford it and need time to process financially","Price triggered analytical thinking — high-stakes financial decisions often shift buyer behavior temporarily","They switched to Skeptic mode because they don't trust your pricing methodology or calculations"],c:2,e:"Price is a trigger that can temporarily shift buyer behavior. A Decisive buyer may become more analytical when the financial stakes feel high. This doesn't mean you misread them — it means you need to briefly serve their analytical need around price before returning to decisive-mode communication."},
  {q:"A customer tells you their biggest concern is 'doing the right thing for the house.' This is ambiguous. How do you identify their true emotional driver?",o:["Assume it's home value investment since they specifically mentioned 'the house' rather than family","Use home value framing initially and pivot if they don't respond positively to that approach","Ask a clarifying follow-up: 'When you say the right thing, is that about protecting the investment, making it safe for your family, or something else?'","It doesn't matter — all four drivers lead to the same recommendation anyway"],c:2,e:"Ambiguous responses require follow-up, not assumptions. Asking them to clarify 'the right thing' reveals whether they mean investment protection, family safety, resale preparation, or quality of life — each of which demands a different approach."},
  {q:"You use loss aversion framing with every customer: 'The damage will only get worse.' A colleague says you're being manipulative. Are they right?",o:["Yes — loss aversion framing is inherently manipulative regardless of the underlying truth","It depends on whether the customer specifically asks about potential future consequences","No — loss aversion framing is fine as long as the underlying claim is factually true","No — all sales techniques are manipulation, and that's perfectly acceptable in business"],c:2,e:"Loss aversion framing is a communication tool, not manipulation, as long as the underlying claim is true. Foundation damage genuinely does worsen over time. The ethical line is crossed when the claim is exaggerated or fabricated, not in the framing itself."},
  {q:"Two customers have identical foundation problems. Customer A's driver is home value; Customer B's driver is family safety. You should present the SAME repair differently. Which is the better approach for Customer B?",o:["This repair protects your $40,000 in equity and prevents further value loss over time","This is the most cost-effective solution on the market for this type of foundation issue","Most homeowners in your neighborhood have had this exact repair done within the last five years","This repair stabilizes the structure so your family is safe and the home is secure for years to come"],c:3,e:"Same repair, different framing. Customer B's safety/family protection driver means you emphasize structural stability and family security, not financial ROI. Matching your language to their emotional driver is fundamental."},
  {q:"A Skeptic buyer challenges your measurement, saying, 'Another company measured a quarter inch less settlement than you.' The best expert-level response is:",o:["Their measurements must be wrong — we use industry-standard calibrated equipment for all assessments","It doesn't really matter — either way the foundation needs repair to prevent future problems","A quarter inch difference falls within normal measurement variation. Let me show you exactly how I measured, and you're welcome to verify any point yourself","We use more advanced equipment than they do — our laser levels are more accurate"],c:2,e:"Skeptics test credibility. Dismissing the discrepancy or attacking the competitor fails. Transparently explaining measurement variation and inviting verification demonstrates confidence and honesty — exactly what a Skeptic respects."},
  {q:"You notice a customer mirrors your body language, asks about your kids, and mentions knowing your company's owner. But their questions about the repair are sharp and technically detailed. What buyer type are they?",o:["Relationship-Driven — the rapport signals are dominant and override the technical questions","A hybrid — lead with rapport since they initiated it, but be ready with data when they ask technical questions","Analytical — the technical questions reveal their true type despite the relationship-building behavior","Skeptic — they're building rapport to test whether you let your guard down on details"],c:1,e:"Real customers don't always fit one box. This person builds trust through relationships but makes decisions analytically. Lead with rapport since that's how they engage, but deliver substance when the technical questions come. Forcing them into one category is the mistake the training warns against."},
  {q:"A customer's primary driver is selling the home, but during the conversation they mention their elderly mother lives with them and tripped on an uneven floor. Should you pivot your approach?",o:["No — stay focused on their stated primary driver of selling the home quickly","Yes — completely pivot to safety and family protection as the new primary driver","Ask which concern matters more to them and let them decide the priority","Acknowledge the safety concern but keep selling-the-home as the primary frame, incorporating safety as a supporting point"],c:3,e:"The primary driver is still selling the home, but the mother's safety adds a powerful secondary dimension. Expert sellers layer multiple drivers rather than abandoning or replacing the primary one. The safety angle reinforces urgency without losing the resale focus."},
  {q:"You've been told decisions are emotional first, justified rationally. A colleague argues this means data doesn't matter — just sell emotionally. Why are they wrong?",o:["They're not wrong — emotion is all that matters in the final decision-making process","Because Analytical buyers don't have emotions and need pure data to make any decisions","Because customers still need rational justification to feel confident in their emotional decision","Because managers and spouses review the data on proposals before approving major purchases"],c:2,e:"Emotion drives the decision, but rationality seals it. Without data and logical justification, customers experience buyer's remorse, second-guess themselves, or can't justify the purchase to a spouse. Both parts of the equation matter."},
  {q:"You're 8 minutes into an appointment and can't clearly identify the buyer type. The customer is polite but guarded, gives short answers, and hasn't revealed much. What's your best move?",o:["Default to Analytical since most homeowners are Analytical and prefer data-driven presentations","Switch to a high-energy pitch to get a reaction and force them to show their true communication style","Ask 'What's your biggest concern?' to draw out their emotional driver and buyer tendencies","Assume Skeptic since guarded behavior usually means distrust and proceed with credibility-building"],c:2,e:"When you can't read the buyer type, the walk-around question 'What's your biggest concern?' is your best diagnostic tool. Their answer reveals both their emotional driver and communication style. Don't guess or default — draw them out."},
  ],
},
mod7:{
  foundation:[
  {q:"What is the close rate range for self-generated leads?",o:["15-25% conversion rate","25-35% conversion rate","40-65% conversion rate","70-85% conversion rate"],c:2,e:"Self-generated leads close at 40-65%, compared to 15-25% for purchased leads."},
  {q:"What is the close rate range for purchased leads?",o:["5-12% conversion rate","15-25% conversion rate","30-40% conversion rate","45-55% conversion rate"],c:1,e:"Purchased leads close at 15-25%, significantly lower than the 40-65% close rate for self-generated leads."},
  {q:"What percentage of their pipeline do top earners generate themselves?",o:["10-20% of total pipeline","20-30% of total pipeline","30-50% of total pipeline","60-80% of total pipeline"],c:2,e:"Top earners generate 30-50% of their own pipeline through self-generated leads."},
  {q:"When should you ask for referrals?",o:["Only after jobs exceeding $15,000 in value","After every install — make it a non-negotiable habit","Quarterly from your top 20% of customers","When customers express complete satisfaction with work"],c:1,e:"Ask for referrals after EVERY install. Make it a non-negotiable habit, regardless of job size or customer demeanor."},
  {q:"What is a referral book?",o:["A digital database of customer contact information","A binder of before/after photos from local jobs","A collection of written testimonials and reviews","A tracking system for referral commission payments"],c:1,e:"A referral book contains before/after photos from local jobs. It's the most powerful self-gen tool because it provides visual, local proof."},
  {q:"What is the neighborhood marketing strategy after a visible install?",o:["Schedule direct mail campaigns to surrounding addresses","Knock on nearby doors and mention you just finished work for their neighbor","Post project photos on local social media groups","Place temporary yard signs with contact information"],c:1,e:"After a visible install, knock on nearby doors and say 'We just finished work for your neighbor.' This leverages proximity and social proof."},
  {q:"What is the recommended referral script?",o:["'Would you be comfortable sharing our information with others?'","'Do you know anyone who might need similar work?'","'Is there anyone you know — a neighbor, family member, coworker — who might be dealing with something similar?'","'Can you think of friends who own older homes?'"],c:2,e:"The referral script uses specific categories — neighbor, family member, coworker — to help the customer mentally scan their network for potential referrals."},
  {q:"How long does it take to build a self-sustaining pipeline through consistent referrals?",o:["2-3 months of consistent effort","4-5 months of consistent effort","6 months of consistent effort","8-10 months of consistent effort"],c:2,e:"One referral per install consistently equals a self-sustaining pipeline within 6 months."},
  {q:"Why is it important to follow up on referrals within 24 hours?",o:["Quick response demonstrates professional reliability and urgency","The referring customer's credibility is on the line","Referral leads lose interest rapidly without immediate contact","Industry best practices require same-day contact attempts"],c:1,e:"When someone gives a referral, their personal credibility is on the line. Following up quickly honors that trust and reflects well on both you and the referrer."},
  {q:"Why should you thank the referrer after contacting the referral?",o:["Professional courtesy helps maintain positive customer relationships","It encourages them to give future referrals","Company policy requires acknowledgment of all referral sources","Proper documentation is needed for commission tracking purposes"],c:1,e:"Thanking the referrer by calling them back encourages future referrals. People who feel appreciated are more likely to refer again."},
  ],
  advanced:[
  {q:"You complete an install and the customer is satisfied. You forget to ask for a referral and remember in the truck. What should you do?",o:["Let it go — the moment has passed and calling later seems pushy","Call them that evening and ask while the experience is still fresh","Send a text asking for referrals the next day with a thank you message","Go back to the door immediately and ask before you leave"],c:3,e:"Go back immediately. The best time to ask is right after the install when satisfaction is highest. Walking away and calling later is less effective because the peak emotion fades."},
  {q:"You knock on a door near a completed install and the homeowner says, 'I noticed the trucks — what kind of work are you doing?' How do you respond?",o:["We just finished a foundation repair for your neighbor. Have you noticed anything similar with your home — cracks, sticking doors, uneven floors?","Foundation repair work. I can provide you with a free estimate if interested","I can't discuss the neighbor's specific work, but here's our business card","We're the leading foundation company in this area. Here's our informational brochure"],c:0,e:"Mention the neighbor connection for social proof, then transition to diagnostic questions about their home. This is neighborhood marketing at its most effective — specific and conversational."},
  {q:"You get a referral on Thursday but can't reach the person by phone. It's now Friday afternoon — the 24-hour window is closing. What do you do?",o:["Wait until Monday morning and try calling them again with fresh energy","Ask the referrer to set up a three-way call over the weekend","Show up at their house since you have the address from referrer","Send a text introducing yourself and mentioning who referred you"],c:3,e:"A text within 24 hours fulfills the urgency requirement while respecting that not everyone answers unknown calls. Include the referrer's name for credibility."},
  {q:"Your referral book has 30 before/after photo sets, but they're all from the same type of repair (helical piers). A potential customer has a drainage issue. How useful is this book?",o:["Very useful — any quality before/after photos demonstrate our professional craftsmanship standards","Useless — only show photos that match the customer's exact specific issue","Somewhat limited — you should diversify your referral book to include multiple repair types","You shouldn't use it at all — mismatched photos might confuse the customer"],c:2,e:"A referral book is most powerful when it includes before/after photos of various repair types. While pier photos still demonstrate quality, diversifying makes the book relevant to more potential customers."},
  {q:"You consistently generate 1 referral per install, but your close rate on referrals is only 30% — lower than the expected 40-65%. What should you investigate first?",o:["Your referral script — you might be getting low-quality referrals from customers","Your install quality — customers might not be fully satisfied with completed work","Your pricing strategy — referrals might expect a significant discount from normal rates","Your follow-up speed — you might be contacting referrals too slowly after receiving them"],c:3,e:"Follow-up speed is the most common referral performance killer. If you're not reaching referrals within 24 hours, the warmth of the introduction cools and close rates drop. Check timing first."},
  {q:"A customer gives you a referral but adds, 'They're probably just going to get quotes and not do anything.' Should you still follow up?",o:["No — the referrer is clearly telling you it's a waste of your valuable time","Only if it's a slow week and you desperately need appointments to fill","Yes, but lower your expectations significantly and don't prioritize this referral highly","Yes — follow up within 24 hours regardless of the referrer's prediction about outcomes"],c:3,e:"Always follow up within 24 hours. The referrer's prediction about the lead's readiness is often wrong. Your job is to run the appointment professionally — the referrer can't predict your influence on the outcome."},
  {q:"You have a strong referral pipeline but your manager wants you to also spend time on neighborhood marketing. You only have time for one approach this week. Which generates better ROI?",o:["Referral pipeline — warm introductions from satisfied customers always beat cold door knocks","It depends on whether you have recent visible installs in target neighborhoods this week","Neighborhood marketing — proximity and geographic clustering creates much more lead volume overall","They're essentially equal — both are proven self-generation strategies with similar conversion rates"],c:1,e:"Both are valuable self-gen strategies, but neighborhood marketing is most effective when you have a fresh, visible install nearby. Without that, your referral pipeline likely delivers better ROI. Context determines the answer."},
  {q:"You've been averaging 1 referral per install for 4 months. Your pipeline is growing but you're not yet self-sustaining. What should you do?",o:["Switch to purchased leads immediately — self-generation strategies are developing too slowly for business needs","Increase to 2 referrals per install to accelerate the pipeline development process significantly","Stay the course consistently — 6 months is the benchmark for a self-sustaining referral pipeline","Focus exclusively on neighborhood marketing instead of continuing with referral generation efforts"],c:2,e:"One referral per install consistently builds a self-sustaining pipeline within 6 months. At 4 months, you're on track. Patience and consistency are key — don't abandon the strategy before it matures."},
