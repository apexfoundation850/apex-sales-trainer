    {t:'What Moisture Does to a Crawl Space',c:'<p>Moisture damage is a cascade of connected consequences that compounds over time:</p><ul><li><strong>Stage 1 &mdash; Ground Moisture Evaporation:</strong> Up to 10-15 gallons of water evaporates daily from exposed soil, raising RH to 80-100% in summer.</li><li><strong>Stage 2 &mdash; Condensation on Structural Wood:</strong> Humid air contacts cooler wood surfaces. Normal wood MC is ~10%. At 12%+ warrants attention. At 16%+ mold fungus can establish. At 20%+ structural integrity begins to degrade. At 28%+ active wood rot is occurring.</li><li><strong>Stage 3 &mdash; Mold Colonization:</strong> Mold requires organic material (wood), moisture, and temperatures above 40&deg;F. Typically appears on underside of floor joists and subfloor first &mdash; invisible from above.</li><li><strong>Stage 4 &mdash; Wood Rot &amp; Structural Degradation:</strong> Sustained MC above 20% begins degrading structural integrity; above 28%, active wood-decay fungi are established. Sill plates degrade first. Advanced rot produces floors that flex, squeak, or develop soft spots.</li><li><strong>Stage 5 &mdash; Stack Effect Contamination:</strong> Mold spores, dust mite allergens, pest debris, and soil gases travel upward into living space. Indoor air quality degrades.</li></ul><div class="avoid-box"><strong>Key Thresholds:</strong> 10% normal | 12%+ attention | 16%+ mold | 20%+ structural loss | 28%+ active rot</div>',n:'Understanding the progression helps reps explain urgency accurately without resorting to scare tactics.'},
    {t:'What Doesn\\\'t Work &mdash; And Why',c:'<p>Four most common inadequate approaches:</p><ul><li><strong>6-Mil Black Plastic:</strong> Not an encapsulation system &mdash; just a partial moisture reducer. Does not seal walls, vents, or penetrations. Tears easily. Not tape-sealed at seams. Without a dehumidifier, humidity continues to rise.</li><li><strong>Opening More Vents:</strong> In the Gulf South, outdoor summer air carries more moisture than the crawl space air it replaces. Research by Building Science Corporation demonstrates venting actually increases moisture levels in hot-humid climates.</li><li><strong>Fiberglass Batt Insulation:</strong> Absorbs moisture and loses insulating effectiveness when wet. Batts become saturated, sag, fall, and create ideal mold conditions. Best practice: remove fiberglass from joist bays and insulate crawl space walls instead.</li><li><strong>Mold Treatment Only:</strong> Most expensive short-term solution &mdash; because it will be repeated. Mold returns within 1-2 seasons without moisture remediation. The mold is a symptom. The moisture is the disease.</li></ul><div class="script-box"><strong>Script:</strong> \'Think of it as putting a tarp on the floor of a room with the windows open. The floor might stay drier, but the air is still fully humid.\'</div>',n:'Most customers have tried or will consider one of these approaches. Explaining why each one fails gives customers the information they need for a confident decision.'},
    {t:'The Complete Encapsulation System',c:'<p>Six components that work together to seal the space, control humidity, and manage water:</p><ul><li><strong>01 Heavy-Duty Liner (20-mil):</strong> 20-mil reinforced polyethylene minimum; 120-mil best practice for durability. Covers entire floor and extends up foundation walls. Thinner alternatives tear under foot traffic. Seams: 12" overlap, vapor barrier tape sealed. White interior for visibility. Lifespan: 25+ years.</li><li><strong>02 Vent Sealing:</strong> All crawl space vents permanently sealed. Eliminates primary entry point for humid outdoor air. A liner without sealed vents is a floor with an open window.</li><li><strong>03 Commercial Dehumidifier:</strong> Crawl space-grade unit maintains RH below 55% &mdash; threshold above which mold cannot sustain active growth. Sized by pints/day based on square footage and conditions. Auto-drain to daylight or sump. Annual filter cleaning and service.</li><li><strong>04 Drainage System (when needed):</strong> When bulk water entry is present, perimeter drainage and sump pump are added before liner installation. Drainage manages water; liner and dehumidifier manage vapor and humidity.</li><li><strong>05 Sealed Access Door:</strong> Replaced with sealed, insulated unit preventing air infiltration. An unsealed access door is a significant humidity entry point.</li><li><strong>06 Pier Wrap &amp; Penetration Sealing:</strong> All piers, columns, and utility penetrations sealed individually. Wall terminations are mechanically fastened and foam-sealed &mdash; no termination bar is used. Standard duct tape fails under crawl space conditions.</li></ul><div class="tip-box"><strong>Competitor gap:</strong> The three most commonly missing components in competitor proposals are: properly sized dehumidifier, penetration sealing, and specific liner mil rating.</div>',n:'An encapsulation without a properly sized dehumidifier is like putting on a raincoat and leaving the hood down. The system needs active moisture management.'},
    {t:'What the Customer Should Expect',c:'<p><strong>Installation Process:</strong></p><ul><li>Clear path from entry point. Remove stored items beforehand.</li><li>Prep work first: old fiberglass, debris, existing liner removed. Mold treatment if active mold present.</li><li>Drainage first (if part of scope) &mdash; installed before liner, never after.</li><li>Liner installation: Typically 1-2 days for average crawl space.</li><li>Dehumidifier: Installed, drain line routed, and tested before crew departs.</li><li>Final walkthrough with customer explaining annual maintenance.</li></ul><p><strong>Results &amp; Timeline:</strong></p><ul><li><strong>Days 1-7:</strong> Humidity begins dropping immediately. Dehumidifier runs frequently at first.</li><li><strong>Weeks 2-4:</strong> Musty odors in living space typically diminish.</li><li><strong>Month 1-3:</strong> Wood MC drops. Floor stiffness and squeak reduction often noticed.</li><li><strong>Year 1:</strong> Energy bills reflect 10-15% reduction in HVAC costs. Pest activity decreases.</li><li><strong>Annual:</strong> Dehumidifier filter cleaning and service. Liner inspection for tears or gaps.</li></ul>',n:'Customers who know exactly what to expect are more likely to say yes and far less likely to have complaints afterward. Managing expectations is part of the sale.'},
    {t:'Technical Specifications',c:'<p><strong>Liner:</strong></p><ul><li>Thickness: 20-mil minimum; 120-mil best practice</li><li>Material: Reinforced polyethylene, multi-ply</li><li>Color: White interior for visibility and inspection</li><li>Coverage: 100% floor + walls to 6" above grade</li><li>Seams: 12" overlap, vapor barrier tape sealed</li><li>Wall attachment: Mechanical fasteners + foam seal; no termination bar</li><li>Lifespan: 25+ years with proper installation</li><li>Moisture rating: Near-zero vapor permeability</li></ul><p><strong>Dehumidifier:</strong></p><ul><li>Type: Commercial/crawl space grade only</li><li>Capacity: Sized by pints/day based on sq footage + conditions</li><li>Target humidity: Below 55% RH</li><li>Drain: Auto-drain &mdash; no manual emptying</li><li>Temperature range: Rated for 40-100&deg;F operation</li><li>Service: Annual filter cleaning + service check</li></ul><p><strong>Key Measurements:</strong></p><ul><li>Normal wood MC: ~10% (12%+ warrants attention)</li><li>Elevated wood MC: 16%+ mold fungus; 20%+ structural loss</li><li>Rot threshold: 28%+ (active wood rot)</li><li>Safe crawl RH: Below 60% (below 55% preferred)</li><li>Mold growth RH: Above 60% sustained</li><li>Daily soil vapor: 10-15 gallons per typical crawl space</li><li>Energy savings: 15%+ HVAC savings typical</li><li>Air exchange: 40-50% of 1st floor air comes from crawl space</li></ul>',n:'These specifications are what analytical customers ask about. Knowing them cold separates a rep who commands credibility from one who has to say \'I\\\'ll get back to you.\''},
    {t:'How to Talk About Encapsulation',c:'<p><strong>FEAR &amp; LOSS AVERSION:</strong></p><div class="script-box"><strong>Script:</strong> \'Based on the moisture readings I took today, your floor joists are in a range where deterioration can become active. Left unaddressed, we move from a remediation conversation to a structural repair conversation &mdash; which is a very different cost.\'</div><p><strong>PROTECTION &amp; SAFETY:</strong></p><div class="script-box"><strong>Script:</strong> \'The air your family is breathing on the first floor contains a significant percentage of air from that crawl space. What we found down there doesn\\\'t stay down there.\'</div><p><strong>FINANCIAL &amp; EQUITY:</strong></p><div class="script-box"><strong>Script:</strong> \'I\\\'ll leave you the full documentation regardless of what you decide. Having a professional inspection record &mdash; and ideally a completed encapsulation system &mdash; completely changes the conversation you\\\'ll have with buyers and their inspector.\'</div>',n:'Technical knowledge only produces closes when translated into language that connects to the customer\\\'s emotional driver.'},
    {t:'Common Customer Questions',c:'<ul><li><strong>"Is encapsulation really necessary, or is it just an upsell?"</strong> &mdash; Acknowledge skepticism directly. Lead with specific readings: \'What I can tell you is what I actually measured in your crawl space today.\' Evidence-based framing, not defensive.</li><li><strong>"We had a plastic liner put down years ago. Why isn\\\'t that enough?"</strong> &mdash; The liner reduced ground vapor but didn\\\'t seal the space. Vents still open, no dehumidifier. Like putting a tarp on the floor with the windows open.</li><li><strong>"How is this different from [Competitor\\\'s] quote?"</strong> &mdash; Ask about scope: \'Did their quote include a commercial dehumidifier? What mil liner? Did they include vent sealing?\' Let the scope comparison do the work.</li><li><strong>"My house has been fine for 40 years."</strong> &mdash; Moisture damage is cumulative. The readings and photos show the current state of the wood. Whether it\\\'s been \'fine\' is less relevant than what is measurably happening now.</li><li><strong>"What happens if I don\\\'t do anything?"</strong> &mdash; Be specific: conditions do not self-correct. Most likely progression is continued wood moisture increase through the next wet season.</li><li><strong>"Can I do part of it now and the rest later?"</strong> &mdash; Phase intelligently: drainage and liner first if water is primary issue. But liner without dehumidifier is not a complete system. Minimum complete: liner + sealed vents + dehumidifier.</li></ul>',n:'Product fluency is what separates a rep who presents evidence from a rep who presents opinions. Customers can tell the difference.'},
    {t:'Rep Knowledge Checklist',c:'<p><strong>SALES FRAMING:</strong></p><ul><li>Can explain encapsulation in one plain-language sentence</li><li>Knows the moisture cascade &mdash; 5 stages from soil vapor to structural damage</li><li>Can explain why venting fails in the Gulf South climate</li><li>Knows the 4 wrong fixes and exactly why each is inadequate</li><li>Can connect technical findings to customer\\\'s emotional driver</li></ul><p><strong>SYSTEM KNOWLEDGE:</strong></p><ul><li>Can name and explain all 6 system components</li><li>Knows why 20-mil liner vs. 6-mil or 10-mil matters</li><li>Can explain why a commercial dehumidifier is required</li><li>Understands when drainage is and is not warranted</li><li>Knows what a complete system includes &mdash; nothing omitted</li></ul><p><strong>TECHNICAL SPECS:</strong></p><ul><li>Wood MC thresholds: 10% normal, 12%+ attention, 16%+ mold, 20%+ structural, 28%+ rot</li><li>Safe crawl space RH = below 60%, mold grows above 60%</li><li>10-15 gallons/day evaporates from exposed soil</li><li>40-50% of 1st floor air comes from the crawl space</li><li>Wall attachment: mechanical fasteners + foam seal &mdash; no termination bar</li></ul><div class="tip-box"><strong>Key:</strong> Technical knowledge is trust before you open your mouth.</div>',n:'A customer sitting across from a rep who clearly understands their specific situation experiences a consultation, not a presentation.'}
  ]
},
{
  id:'jt4', section:'jobtype', title:'Poly Injection (Concrete Lifting)', icon:'&#11014;',
  desc:'Slab Leveling, Material Science, Settlement Patterns',
  slidesId:'1Z5NsP3GnTLq-DD0PxsrrliIpo8qPQXFJLQ2ZrVgDfJY',
  color:'var(--orange)', slides:[
    {t:'Poly Injection Overview',c:'<p>Polyurethane injection lifts and levels settled concrete slabs by injecting expanding structural foam beneath the slab through small drilled ports.</p><p><strong>Key advantages over mudjacking:</strong></p><ul><li>Material weight: 2-4 lbs/ft3 (vs. mudjacking at 100+ lbs/ft3)</li><li>Hole size: 5/8" penny-sized (vs. 1-2" holes for mudjacking)</li><li>Cure time: 15 minutes (vs. 24-48 hours)</li><li>Waterproof and non-erosive &mdash; won\'t wash out</li></ul><div class="avoid-box"><strong>Important:</strong> Always evaluate root cause. If the soil condition that caused the settlement hasn\'t changed, lifting without addressing the cause may result in re-settlement.</div>',n:'Mudjacking uses heavy slurry that adds weight to already failing soil. Polyurethane is a fraction of the weight and doesn\'t create additional load.'},
    {t:'Settlement Patterns',c:'<ul><li><strong>Garage floors:</strong> Most common. Typically settles toward the center where fill soil compacts.</li><li><strong>Driveways:</strong> Settlement at joints and near foundation where backfill soil meets native soil.</li><li><strong>Pool decks:</strong> Settlement away from the pool shell as surrounding soil compacts.</li><li><strong>Sidewalks:</strong> Trip hazards at joints where one section settles relative to another.</li><li><strong>Stoops/Porches:</strong> Pulling away from the house as fill soil beneath compacts.</li></ul><p><strong>Floor slope thresholds:</strong></p><ul><li>1/4" per 8 feet: Significant flag &mdash; warrants evaluation</li><li>1"+ per 8 feet: Urgent structural concern</li></ul>',n:'Always measure and document the exact settlement before proposing. "It looks uneven" is not documentation &mdash; "1.5 inches of displacement over 8 feet" is.'}
  ]
},
{
  id:'jt5', section:'jobtype', title:'Structural Piers', icon:'&#127959;',
  desc:'Helical Piers, Load Transfer, Settlement Signs, Engineer-Stamped',
  slidesId:'1aaYma6U-qGId3j_zAAdM8BYMLtVLZYCW5GDmtEOilqY',
  color:'var(--red)', slides:[
    {t:'What Are Structural Piers?',c:'<p>Structural helical piers are engineered steel shafts with welded <strong>dual-flight helical plates</strong> screwed into the earth beneath a settling foundation &mdash; bypassing unstable near-surface soil and anchoring to load-bearing strata below.</p><ul><li><strong>The Core Principle &mdash; Load Transfer:</strong> The failing soil near the surface cannot support the home\\\'s weight. Piers bypass that soil entirely, reaching competent load-bearing material that has never moved.</li><li><strong>Why Depth Matters:</strong> Near-surface soils are subject to moisture variation, erosion, shrink-swell cycles, and tree roots. Below 15-25 feet in this region, soils become more stable and less affected by surface conditions.</li><li><strong>Stabilize and Potentially Lift:</strong> Piers stop future settlement and often allow hydraulic lift back toward original grade. \'Toward\' is the honest word &mdash; degree of lift depends on settlement duration and secondary damage.</li><li><strong>A Permanent Engineering Solution:</strong> Designed to last 75+ years. Backed by engineering load calculations. Engineer-stamped on every installation. Each pier verified to <strong>84,000 lbs capacity</strong>.</li></ul><div class="tip-box"><strong>Key Specs:</strong> 3" galvanized steel shaft, dual-flight helix, 1,500 psi working stress, 84,000 lbs per pier, USA-manufactured, lifetime transferable warranty.</div>',n:'Settlement stops because the load is no longer relying on the soil that was failing. This is the fundamental concept to communicate.'},
    {t:'Why Foundations Settle',c:'<p>Settlement is progressive &mdash; it typically accelerates over time:</p><ul><li><strong>01 Weak or Poorly Compacted Fill Soil:</strong> Fill soil that was not properly compacted continues to compress under the structure, often for the first 10-20 years.</li><li><strong>02 Expansive Clay &mdash; Shrink-Swell Cycles:</strong> Clay soil expands when saturated and contracts when dry. Each cycle deepens settlement. Progressive and differential.</li><li><strong>03 Soil Erosion Beneath Foundation:</strong> Poor drainage, broken pipes, or surface water infiltrating beneath the footing. More localized, faster, and more likely to produce sudden cracking.</li><li><strong>04 Organic Decay in Soil Profile:</strong> Near coastal zones, soils containing peat or organic matter decompose over time, losing volume. Often requires piers at significantly greater spacing.</li><li><strong>05 Tree Root Desiccation:</strong> Large trees draw enormous moisture from soil. In drought conditions, clay soils shrink beneath footings. May be seasonal until cumulative deficit becomes structurally significant.</li></ul>',n:'Reps who understand the specific cause can explain urgency honestly and connect the repair to the conditions observed during inspection.'},
    {t:'Reading the Signs of Settlement',c:'<p><strong>Crack Patterns &amp; What They Mean:</strong></p><ul><li><strong>Stair-step cracks (brick/block):</strong> Classic differential settlement. Mortar joints are weakest path &mdash; cracks follow them diagonally.</li><li><strong>Diagonal cracks at door/window corners:</strong> Foundation dropping at one corner. Load redistributing through structure.</li><li><strong>Vertical cracks in poured concrete:</strong> Differential settlement pulling wall apart. Width indicates severity.</li><li><strong>Horizontal cracks in block walls:</strong> LATERAL SOIL PRESSURE &mdash; NOT settlement. Requires wall reinforcement, not piers.</li><li><strong>Cracks wider at top than bottom:</strong> Foundation is rotating. Wide end indicates area of greatest movement.</li></ul><p><strong>Other Settlement Indicators:</strong></p><ul><li>Doors sticking or swinging open/closed &mdash; frame has racked</li><li>Windows sticking or cracking at corners</li><li>Sloping floors: <strong>1" per 8 ft = significant; 2"+ per 8 ft = urgent</strong></li><li>Gaps at wall-ceiling or wall-floor junctions</li><li>Bowing or leaning walls &mdash; requires immediate professional evaluation</li></ul><div class="avoid-box"><strong>Critical Diagnostic:</strong> Horizontal cracks indicate lateral soil pressure &mdash; not settlement. Never propose only piers for horizontal cracking.</div>',n:'The most dangerous diagnostic error is recommending piers for horizontal cracking. That is a lateral pressure problem requiring wall reinforcement.'},
    {t:'The Apex Helical Pier System',c:'<p><strong>How Helical Piers Work:</strong></p><ul><li>A <strong>3" steel shaft</strong> with welded <strong>dual-flight helical plates</strong> is rotated into the ground by hydraulic torque motor. No structure weight required, no impact, no vibration.</li><li>Depth: 15-25 feet in this region, driven until required installation torque is achieved.</li><li>Capacity verification: Installation torque correlates to bearing capacity through engineering relationships. Every pier verified at <strong>84,000 lbs</strong> before moving to next location.</li><li>Lift mechanism: Once all piers in a zone are installed and bracket-connected, hydraulic jacks activate simultaneously for coordinated lift.</li></ul><p><strong>Apex System Specifications:</strong></p><ul><li>Shaft: 3" round galvanized steel, USA-manufactured. Hot-dip galvanized for corrosion resistance.</li><li>Helix: Dual-flight configuration &mdash; distributes load across larger soil contact area than single helix.</li><li>Rating: 1,500 psi working stress. Load capacity verified at 84,000 lbs per pier.</li><li>Engineering stamp: Every Apex installation is engineer-stamped. Customers receive stamped documentation.</li><li>Warranty: Lifetime transferable structural warranty.</li></ul><div class="tip-box"><strong>Competitive Differentiator:</strong> Engineer-stamped documentation + lifetime transferable warranty + USA steel + torque-verified 84,000 lb capacity.</div>',n:'Pier appointments attract the most technically sophisticated customers. These specs are what they\\\'ll ask about. Know them.'},
    {t:'The Installation Process',c:'<p>Six steps &mdash; what the crew does and why it matters:</p><ul><li><strong>01 Elevation Mapping:</strong> Zip Level or laser level maps foundation elevations around perimeter. Documents settlement pattern and establishes target lift grade.</li><li><strong>02 Excavation at Pier Locations:</strong> Small areas excavated adjacent to footing &mdash; typically 2-3 feet wide. Less disruptive than most customers expect.</li><li><strong>03 Bracket Installation:</strong> Steel bracket installed under footing at each location. Connection point between foundation and pier shaft. Quality and fit are critical.</li><li><strong>04 Pier Driving:</strong> Hydraulic torque motor rotates helical shaft through bracket into ground. Extension sections added as needed. Torque monitored continuously.</li><li><strong>05 Hydraulic Lift:</strong> All piers in zone connected to hydraulic jacks simultaneously. Coordinated lift prevents differential stress. Stopped at target grade or practical maximum.</li><li><strong>06 Lock-Off &amp; Backfill:</strong> Piers locked at achieved elevation. Soil compacted back, area graded. Some landscaping disruption is normal &mdash; discuss before work begins.</li></ul>',n:'A rep who can walk a customer through the installation before the crew arrives prevents surprises and positions Apex as a professional operation.'},
    {t:'What the Customer Should Expect',c:'<p><strong>During the Job:</strong></p><ul><li>Duration: Typically 1-3 days depending on pier count and site conditions.</li><li>Excavation: Some disruption to landscaping, mulch beds, or concrete flatwork adjacent to foundation.</li><li>Noise: Hydraulic equipment moderately loud during pier driving. Lift phase is quiet.</li><li>Cracks may shift: As foundation rises, cracks may change &mdash; some close, others open slightly. Normal and expected.</li><li>Doors/windows: Often improve noticeably after lift. Some may need adjustment.</li></ul><p><strong>Realistic Outcomes &amp; Honest Limits:</strong></p><ul><li><strong>Primary goal is stabilization</strong> &mdash; stopping further settlement. Lift is a bonus, not a guarantee.</li><li>Many foundations return close to original grade. Some recover only partially.</li><li>Cracks remain visible &mdash; piers stabilize and lift, but do not repair cracks in walls above. Crack repair is separate scope.</li><li>The repair is permanent: galvanized steel, designed for life of structure. No ongoing maintenance.</li></ul><div class="script-box"><strong>Honest Framing:</strong> \'Our primary goal is to stop the movement permanently and recover as much elevation as the structure will safely allow.\'</div>',n:'Pier installation is the most emotionally significant repair Apex performs. Precise expectation-setting is the difference between a satisfied customer and a disappointed one.'},
    {t:'Technical Specifications',c:'<p><strong>Apex Helical Pier Specs:</strong></p><ul><li>Shaft: 3" round steel &mdash; USA-manufactured</li><li>Coating: Hot-dip galvanized for corrosion resistance</li><li>Helix: Dual-flight helical plates</li><li>Working stress: 1,500 psi</li><li>Load capacity: 84,000 lbs per pier (torque-verified)</li><li>Depth range: 15-25 ft typical in Panhandle geology</li><li>Engineering: Engineer-stamped on every installation</li><li>Warranty: Lifetime transferable structural warranty</li></ul><p><strong>Installation Details:</strong></p><ul><li>Drive method: Hydraulic torque motor &mdash; no structure weight required</li><li>Capacity verification: Continuous torque monitoring &mdash; verified at 84,000 lbs</li><li>Pier spacing: 2 ft off corners; every 5 ft in affected area</li><li>Bracket: Installed under footing &mdash; works with intact or compromised footing</li><li>Lift method: Simultaneous hydraulic lift across all piers in zone</li><li>Steel origin: USA steel only</li><li>Documentation: Engineer-stamped record provided to customer</li></ul><p><strong>Diagnostic Thresholds:</strong></p><ul><li>Significant floor slope: 1" per 8 ft &mdash; warrants evaluation</li><li>Serious floor slope: 2"+ per 8 ft &mdash; urgent structural concern</li><li>Horizontal cracks: Lateral pressure &mdash; NOT piers alone</li><li>Settlement criterion: 1/2" differential over 12 ft: monitor. More: evaluate for piers.</li></ul>',n:'Know these specs cold before every appointment. Pier customers are the most technically sophisticated customers Apex sees.'},
    {t:'How to Talk About Structural Piers',c:'<p><strong>FEAR &amp; LOSS AVERSION:</strong></p><div class="script-box"><strong>Script:</strong> \'The crack pattern and floor slope I measured are consistent with active settlement &mdash; meaning this is ongoing, not something that happened and stopped. Left unaddressed, the same conditions will continue producing more movement. The good news is that piers are a permanent solution &mdash; once they\\\'re in, the movement stops.\'</div><p><strong>PROTECTION &amp; SAFETY:</strong></p><div class="script-box"><strong>Script:</strong> \'Your foundation supports everything above it. The movement I documented is affecting load paths through your walls and roof structure. Stabilizing it is protecting the structural integrity of the whole home.\'</div><p><strong>FINANCIAL &amp; EQUITY:</strong></p><div class="script-box"><strong>Script:</strong> \'An unrepaired foundation problem will either kill your sale or produce a price reduction larger than the repair cost. A repaired foundation with a lifetime transferable warranty actually becomes a selling point.\'</div>',n:'Pier appointments carry more emotional weight than any other job type. Acknowledge the emotional reality before presenting evidence.'},
    {t:'Common Customer Questions',c:'<ul><li><strong>"Do I really need piers?"</strong> &mdash; Answer with specific evidence: \'The measurement shows [X] inches of differential settlement over [Y] feet. The crack pattern is consistent with active movement.\' Evidence, not assertion.</li><li><strong>"Can I just fill the cracks?"</strong> &mdash; \'You can fill them, and they\\\'ll look better temporarily. But the same soil conditions will continue producing movement. In 12-24 months you\\\'ll be having the same conversation from a more advanced starting point.\'</li><li><strong>"Will this affect my ability to sell?"</strong> &mdash; An unrepaired problem kills sales or produces price reductions larger than repair cost. A repaired foundation with transferable lifetime warranty becomes a selling point.</li><li><strong>"How do I know the piers will hold?"</strong> &mdash; Torque is monitored continuously during installation. It correlates to bearing capacity through engineering charts. Each pier is individually verified at 84,000 lbs before moving to the next.</li><li><strong>"What if lifting causes new damage?"</strong> &mdash; Lift is incremental and monitored continuously. We stop at practical maximum. Some stress redistribution is normal. Conditions documented throughout.</li><li><strong>"Another quote was much lower."</strong> &mdash; Ask about pier count and whether it\\\'s engineer-stamped. A quote without an engineer stamp means no permanent documentation. Ask: \'Does that include a stamped engineering record and transferable lifetime warranty?\'</li></ul>',n:'The customer in a pier appointment needs an advisor, not a salesperson. Technical depth is what earns that role.'},
    {t:'Rep Knowledge Checklist',c:'<p><strong>SALES FRAMING:</strong></p><ul><li>Can explain load transfer principle in plain language</li><li>Knows the five causes of foundation settlement</li><li>Can read crack patterns and explain their structural meaning</li><li>Knows floor slope thresholds (1" and 2" per 8 feet)</li><li>Acknowledges emotional weight before presenting technical evidence</li><li>Can frame engineer stamp and warranty for resale value</li></ul><p><strong>PRODUCT KNOWLEDGE:</strong></p><ul><li>Can explain how helical piers work and why torque verifies capacity</li><li>Knows why dual-flight helix is superior to single-helix</li><li>Can walk through all 6 installation steps</li><li>Sets expectation: stabilization first, lift second</li><li>Prepares customer for crack movement during lift</li></ul><p><strong>TECHNICAL SPECS:</strong></p><ul><li>3" galvanized USA steel, dual-flight, 1,500 psi, 84,000 lbs</li><li>Depth: 15-25 ft; spacing: 2 ft off corners, every 5 ft in zone</li><li>Load verification: torque correlation &mdash; every pier individually verified</li><li>Engineer-stamped: every installation includes stamped documentation</li><li>Horizontal cracks = lateral pressure, not settlement &mdash; different repair</li></ul><div class="tip-box"><strong>Key:</strong> The rep who earns trust in a pier appointment earns it for life.</div>',n:'The customer in a pier appointment is making the most significant single repair decision of their homeownership.'}
  ]
}

  {q:"What is the primary goal of the 2-Day Call?",o:["Schedule a follow-up phone consultation","Confirm all decision-makers will be present","Give a rough price estimate over the phone","Sell the customer on financing options"],c:1,e:"Confirming all decision-makers are present is the highest-leverage action in the 2-Day Call. A missing decision-maker is a gift to your competitor."},
  {q:"How long should you tell the customer to block out for the appointment?",o:["45 minutes to 1 hour","2 to 3 hours","1 to 1.5 hours","3 to 4 hours"],c:1,e:"Setting a 2-3 hour time block ensures there is enough time for a thorough inspection and sit-down presentation without feeling rushed."},
  {q:"When should financing be first mentioned in the Apex process?",o:["During the close when presenting the total price","After the customer objects to the price","Casually during the 2-Day Call","Only if the customer asks about it"],c:2,e:"Mentioning financing casually during the 2-Day Call plants it as a standard service. Bringing it up at the close reframes it as a concession, which weakens your position."},
  {q:"How long should the 30-Minute Call last?",o:["5-7 minutes","10-15 minutes","Under 3 minutes","Exactly 30 minutes"],c:2,e:"Despite its name, the 30-Minute Call should be kept under 3 minutes. It is a brief touch-point, not a lengthy conversation."},
  {q:"Why do you ask the customer where to park during the 30-Minute Call?",o:["To avoid getting a parking ticket","To put the customer in a helper role","To confirm you have the correct address","To make sure your truck fits their driveway"],c:1,e:"Asking where to park puts the customer in a helper role and subtly shifts the dynamic. It is about orchestrating the arrival, not logistics."},
  {q:"How long should your self-introduction take during the Warm-Up?",o:["3-5 minutes maximum","Under 20 seconds","1-2 minutes typically","As long as needed for rapport"],c:1,e:"Your introduction should be under 20 seconds. The warm-up is about the customer, not about you."},
  {q:"What is the Trust Unlocking Moment?",o:["Showing the customer your company certifications","Sharing a testimonial from a previous customer","Offering a money-back guarantee upfront","Telling the customer you will be honest if you cannot help them"],c:3,e:"The Trust Unlocking Moment is when you say: 'If this isn't something we can help with, I'll tell you honestly.' This signals integrity and lowers the customer's guard."},
  {q:"What should you ask the customer after laying out the full agenda?",o:["Does that work for you today?","Do you have any questions before we start?","Are you ready to get started?","Is there anything you'd like to add?"],c:0,e:"The micro-yes 'Does that work for you today?' gets the customer to agree to the process. It is a small commitment that sets the tone for the rest of the appointment."},
  {q:"What information should you verify during the 2-Day Call?",o:["The customer's credit score and financial history","Competitor bids the customer has already received","Scope of work, decision-makers present, time block, address/access","The customer's budget range and spending limits"],c:2,e:"The 2-Day Call covers scope verification, decision-maker confirmation, setting the 2-3 hour time block, mentioning financing, and getting address/access details."},
  {q:"During the Warm-Up, what question helps you understand the customer's entry point?",o:["What is your budget for this project?","How did you find us?","Have you had other companies look at this?","How long have you lived here?"],c:1,e:"Asking 'How did you find us?' reveals the customer's entry point and helps you understand their awareness level and expectations."},

  advanced:[
  {q:"A homeowner says on the 2-Day Call: 'My husband travels for work but I handle all the house stuff.' What is the best response?",o:["Accept that she is the sole decision-maker and schedule the appointment immediately","Probe further to confirm she has full authority to make financial decisions for the household","Insist that both spouses must be present or you cannot come out to the property","Schedule the appointment and plan to leave a detailed proposal for the husband to review"],c:1,e:"Never assume. Probe further with something like 'So if we find something and the numbers work, you're comfortable moving forward that day?' A missing decision-maker is a gift to your competitor."},
  {q:"You mention financing casually on the 2-Day Call and the customer says, 'Oh we won't need financing, we'll pay cash.' What do you do?",o:["Skip financing entirely for the rest of the appointment process","Tell them financing usually gets better rates than paying cash upfront","Acknowledge it casually and move on without removing financing from your process","Ask them their exact budget so you can right-size the proposal accordingly"],c:2,e:"Acknowledge their preference but do not remove financing from your process. Many 'cash buyers' change their mind when they see the full scope. The seed has been planted and should remain available."},
  {q:"During the Warm-Up, the customer skips pleasantries and says, 'Look, I've had three companies out here already. Just tell me your price.' What is the correct Apex approach?",o:["Give a rough ballpark range to earn their respect and trust","Ask what the other companies quoted so you can beat their pricing","Acknowledge their frustration, then reset by laying out the agenda and the value of the full process","Tell them you cannot give a price without an inspection and leave immediately"],c:2,e:"Acknowledge their frustration to validate them, then professionally reset expectations by laying out the agenda. The Trust Unlocking Moment is especially powerful here."},
  {q:"What is the strategic risk of NOT asking where to park on the 30-Minute Call?",o:["You might block the driveway and upset the customer before starting","You lose an opportunity to put the customer in a helper role before you arrive","The customer may not be home when you arrive at the property","You will not know if the property is accessible for your equipment"],c:1,e:"The parking question is not about logistics. It is about shifting the customer into a cooperative, helpful mindset before you even arrive. Missing it means arriving as a stranger rather than someone they are already helping."},
  {q:"A customer on the 2-Day Call says they only have 1 hour available. How should you handle this?",o:["Accept the 1-hour window and plan to work more efficiently during the visit","Explain the process takes 2-3 hours and reschedule to a time that works","Show up and run over the time limit since they will be engaged","Do the inspection in 1 hour and email the detailed proposal later"],c:1,e:"A compressed appointment leads to a rushed inspection and weak presentation. Reschedule to a time when the customer can commit the full 2-3 hours. A proper process requires proper time."},
  {q:"Why does laying out the full agenda during the Warm-Up matter strategically?",o:["It shows the customer you are organized and professional in your approach","It gives the customer control over the appointment flow and timing decisions","It is required by Apex company policy for all residential appointments","It sets benchmarks for normal so the customer knows what to expect and commits to the full process"],c:3,e:"Laying out the agenda sets benchmarks for what a normal appointment looks like. When the customer agrees, they have committed to the full process including the sit-down presentation and discussion of numbers."},
  {q:"You arrive for an appointment and discover the homeowner's adult son is also present but was not mentioned. What is your best move?",o:["Ignore the son and focus exclusively on the homeowner who scheduled","Ask the son to leave so you can focus on the homeowner","Include the son in the process since he may be an unofficial decision-maker","Reschedule because you did not account for this family dynamic in advance"],c:2,e:"An unexpected person at the appointment is often an unofficial decision-maker or influencer. Include them in the process. Ignoring them risks having them undermine the deal after you leave."},
  {q:"The customer says on the 2-Day Call: 'I've already looked up foundation repair costs online and I know what this should cost.' What is the best approach?",o:["Ask what price they found online and offer to match it","Tell them online prices are inaccurate and they should trust your expertise","Send them your standard price list before the scheduled appointment","Acknowledge their research and explain that your process documents exactly what their home needs so the proposal is specific to their situation"],c:3,e:"Acknowledge their effort without validating or challenging the numbers. Redirect to the value of a home-specific, evidence-based proposal. This respects the customer while protecting your process."},
  {q:"What happens when financing is introduced for the first time at the close instead of during the 2-Day Call?",o:["The customer sees it as a generous offer and is more receptive","It lands as a concession rather than a standard service offering","It has no measurable impact on the customer's overall perception of value","The customer is more likely to accept financing when presented this way"],c:1,e:"When financing appears for the first time at the close, it feels like a concession or a sales tactic. When seeded early, it lands as a standard part of how Apex does business."},
  {q:"During the Warm-Up, the customer mentions they are also getting a quote from a competitor tomorrow. How should you use this information?",o:["Rush through your process to close the deal before the competitor arrives","Badmouth the competitor to discourage the homeowner from taking the second appointment","Offer a discount to close the deal today and avoid the competition","Use it as motivation to execute the full Apex process thoroughly, knowing your process IS your differentiator"],c:3,e:"The Apex process is your competitive advantage. A 2-3 hour thorough inspection and evidence-based presentation will outperform a competitor's quick bid. Execute the process, do not shortcut it."},

  expert:[
  {q:"A customer on the 2-Day Call says both spouses will be home but adds, 'My wife probably won't sit in on the whole thing.' What is the MOST effective response?",o:["Tell them you require both decision-makers present for the entire appointment","Say 'No problem, I can catch her up at the end'","Accept the situation and plan to leave detailed paperwork for the wife","Explain that the process works best when both are part of the full conversation, and frame it around making sure they both have the same information to make a decision they are comfortable with"],c:3,e:"Demanding attendance feels aggressive. Accepting absence risks a stall. The best move frames full participation around THEIR benefit: having equal information to make a comfortable decision together."},
  {q:"You are about to do the Warm-Up and the customer opens the door while on a phone call, waves you in, and mouths 'Give me a minute.' What do you do?",o:["Wait quietly until they finish, then begin the full Warm-Up and agenda","Start the inspection on your own to use the time efficiently","Begin setting up your materials at the kitchen table to signal readiness","Hand them your card and start walking the exterior"],c:0,e:"Starting without the Warm-Up and agenda means the customer has not committed to the process. Wait patiently, then execute the full opening. Skipping the Warm-Up to save time actually costs you the framework that makes the rest of the appointment work."},
  {q:"On the 30-Minute Call, the customer says, 'Actually, can you just give me a ballpark over the phone? If it's in our range we'll schedule.' What is the best play?",o:["Give a wide range like '$5,000 to $25,000 depending on what we find'","Tell them the average job is around $10,000 to set expectations","Politely decline and explain that every home is different, then redirect to the value of the in-person process","Say you are not allowed to give phone estimates per company policy"],c:2,e:"Any number you give becomes an anchor that works against you. A wide range sounds evasive. A specific number is a trap. 'Company policy' sounds bureaucratic. The best move redirects to why the in-home process produces an accurate, fair proposal specific to their home."},
  {q:"You confirm decision-makers on the 2-Day Call. At the door, the homeowner says, 'My husband got called into work but said whatever I decide is fine.' Which response demonstrates the best judgment?",o:["Do the inspection only and schedule a separate close when both are present","Reschedule because you must have both decision-makers present, no exceptions","Proceed with the full process since you have verbal confirmation of authority","Proceed with the full process but plan to call the husband during the close to confirm his buy-in"],c:3,e:"This is a judgment call. Rescheduling may lose the deal. Proceeding blindly risks a stall. The best balance is to execute the process fully and incorporate a phone call to the husband at decision time. This respects the wife's stated authority while securing genuine buy-in."},
  {q:"During the Warm-Up, you deliver the Trust Unlocking Moment and the customer responds, 'That's what the last guy said too, and then he tried to sell me $30,000 worth of work I didn't need.' What is the BEST response?",o:["Tell them you only recommend what is necessary and move on to the inspection","Apologize for their bad experience and promise you are different","Acknowledge their experience directly, then explain that your process documents everything with photos and data so THEY can see exactly what needs attention and what does not","Ask what company it was so you can differentiate yourself"],c:2,e:"The customer is testing you. Promises are cheap. The best response acknowledges their skepticism without defensiveness and redirects to the evidence-based process. Let the documentation prove your integrity, do not just claim it."},
  {q:"A customer who found you through a referral says during the Warm-Up, 'Our neighbor said you guys were great. Let's skip the walkthrough and just tell me what you'd do.' How do you handle this?",o:["Thank them for the referral, acknowledge the trust, but explain that every home is different and the full process ensures your recommendation is specific to their situation","Honor the referral relationship by being flexible and giving a quick overview","Do an abbreviated inspection and then sit down for the full presentation","Tell them the full process is mandatory and proceed without further discussion"],c:0,e:"Referral customers arrive with trust but can also arrive with shortcuts. Skipping the process means your proposal has no evidential foundation. Acknowledge the trust, then reframe the full process as respecting their home specifically rather than applying a generic solution."},
  {q:"You are on the 2-Day Call and the customer mentions they have already had a structural engineer's report done. How does this change your approach?",o:["Acknowledge the report as valuable and explain that your inspection will build on that information with specific documentation for the repair scope, then request to see the report at the appointment","Skip the inspection since the engineer's report covers everything","Tell the customer that engineering reports often miss things and your inspection is more thorough","Ask the customer to email you the report so you can prepare a proposal in advance"],c:0,e:"An engineer's report is an asset, not a threat. It adds credibility to the problem. Your inspection adds the repair-specific documentation. Dismissing the report insults the customer's investment. Using it alongside your process strengthens your position."},
  {q:"The Warm-Up agenda includes setting benchmarks for normal. Why is this MORE important than building personal rapport?",o:["Because personal rapport makes customers less likely to buy","Because benchmarks create a framework that makes the customer feel safe committing to a 2-3 hour process and prevents them from shortcutting the appointment later","It is not more important; rapport always comes first in sales","Because Apex policy requires it before you start the inspection"],c:1,e:"Rapport without structure leads to friendly conversations that do not close. Setting benchmarks creates a shared framework that the customer agrees to. When they later want to skip the sit-down or say 'just email me the quote,' you can reference the process they already agreed to."},
  {q:"On the 2-Day Call you learn there is a language barrier: the homeowner speaks limited English but their bilingual teenager will translate. What is the BEST approach?",o:["Simplify your presentation and use mostly pictures","Proceed as normal since you have a translator present","Reschedule and request an adult family member or professional translator who can handle financial discussions","Bring a bilingual colleague if available, or confirm the teenager is comfortable translating financial and technical decisions, and plan to use more visual documentation during the process"],c:3,e:"A teenager translating creates power dynamics and potential accuracy issues with financial discussions. The ideal solution is a bilingual colleague. If that is not available, confirming the teenager's comfort level AND supplementing with heavy visual documentation gives you the best chance of clear communication."},
  {q:"You plant the financing seed on the 2-Day Call. The customer says, 'We don't believe in financing, we only pay cash for everything.' You later discover during the inspection that the scope is likely $18,000+. When is the RIGHT time to re-introduce financing?",o:["Never; respect their stated preference and only present the cash price","During the presentation, immediately after building the proposal and before revealing the total number","Only if the customer brings it up again at the close","During the inspection when you realize the scope is large"],c:1,e:"Respecting their preference does not mean abandoning your process. Re-introducing financing BEFORE the number lands allows the customer to consider it as a tool rather than a lifeline. During the inspection is too early (no proposal context). At the close is too late (feels like a rescue). Never re-introducing it could cost them a solution they need."},

  {q:"What is the minimum number of photos you should take during a full inspection?",o:["Between 5-10 photos total","Between 25-30 photos total","Between 12-20 photos total","As many photos as possible"],c:2,e:"A minimum of 12-20 photos ensures you have thorough documentation for the presentation. Every photo becomes evidence that supports your proposal."},
  {q:"When should you start photographing during the inspection?",o:["After completing the full exterior inspection","Only when documenting specific problem areas","In front of customer during walk-around","While writing the final inspection report"],c:2,e:"Start photographing in front of the customer during the walk-around. This demonstrates thoroughness and begins building the evidence base they will see in the presentation."},
  {q:"What does the Door Knock transition involve?",o:["Knocking to present exterior inspection findings","Checking interior doors for sticking issues","Using specific knock pattern for identification","Knocking to show completion and request organization time"],c:3,e:"The Door Knock is a transition moment. You knock to signal completion, show your dirty clothes as physical proof of effort, and ask for 15 minutes to organize before the sit-down presentation."},
  {q:"During the exterior inspection, what should you evaluate?",o:["Paint condition, landscaping, and roof condition","Grade, drainage, downspouts, and foundation cracks","Window seals, siding material, and gutters","Soil composition, tree roots, and irrigation"],c:1,e:"The exterior inspection focuses on grade, drainage, downspouts, and cracks. These are the primary exterior indicators of foundation issues."},
  {q:"How many moisture readings should you take at minimum?",o:["Only one reading per area","Only where visible water damage exists","A minimum of 3 or more readings","Moisture readings are completely optional"],c:2,e:"Take a minimum of 3 or more moisture readings. Multiple readings create comparison data and provide documented evidence for the presentation."},
  {q:"What should you measure cracks with?",o:["Your finger width as reference point","A scale reference in the photograph","A standard tape measure only","Cracks do not require measurement"],c:1,e:"Crack measurements should include a scale reference in the photograph. This creates documented, verifiable evidence rather than subjective estimates."},
  {q:"What should you check during the interior inspection?",o:["Appliance age, electrical panels, and plumbing","Paint colors, furniture placement, and lighting","Floors, doors, and drywall conditions","Window brands, HVAC condition, and insulation"],c:2,e:"Interior inspection focuses on floors (slope), doors (sticking/gaps), and drywall (cracks). These are the visible interior symptoms of foundation problems."},
  {q:"How should you measure floor slope?",o:["By eye based on professional experience","With a standard construction level","By rolling ball across the floor","By asking customer about noticeable unevenness"],c:1,e:"Use a level to measure floor slope. This provides objective, documented data rather than subjective impressions."},
  ],
  advanced:[
  {q:"During the walk-around, the customer keeps pointing out cosmetic issues like drywall cracks and a sticking door. You suspect the real problem is in the crawl space they have not mentioned. What do you do?",o:["Tell them those are just symptoms and the real issue is underneath the house","Focus only on what they showed you since those are their primary concerns","Let them finish showing you their concerns, acknowledge each one, then transition to the full inspection which will include the crawl space","Redirect them to the crawl space immediately since that is where the real problem is located"],c:2,e:"Let the customer feel heard first. Their concerns are valid symptoms. Cutting them off to redirect undermines trust. The full inspection will naturally include the crawl space, and your documentation will connect their visible concerns to the underlying cause."},
  {q:"You are in the crawl space and find active moisture at 32% but the customer told you during the walk-around that their biggest concern is a cracked brick on the exterior. How does this affect your approach?",o:["Focus the proposal on the moisture since that is the bigger structural threat to the home","Recommend they call a mason for the brick and you handle the moisture issue separately","Focus the proposal on the brick crack since that is what they care about most","Document both thoroughly and connect them during the presentation, leading with their concern and bridging to the moisture issue as a related finding"],c:3,e:"Start with their stated concern to show you listened, then bridge to the moisture finding as connected evidence. This honors the customer's priorities while ensuring the full scope is addressed."},
  {q:"You have completed the full inspection and have 18 photos, 4 moisture readings, and detailed crack measurements. The customer says, 'Can you just email me the proposal? I have to run.' What is your response?",o:["Email the proposal since you have all the documentation you need for their review","Leave the proposal on the table and tell them to call when they have reviewed it","Quickly present the proposal in 5 minutes before they leave for their appointment","Reference the agenda they agreed to, explain the sit-down takes 15 minutes, and emphasize they will want to see the photos and data you documented"],c:3,e:"An emailed proposal almost never closes. Reference the process they committed to during the Warm-Up. A customer who saw a 90-minute inspection deserves to see the evidence. Frame the sit-down as brief and valuable."},
  {q:"Why is a customer who watched a 90-minute inspection fundamentally different from one who saw a 20-minute glance?",o:["They have witnessed the thoroughness of your work and have emotional investment in the evidence you collected","They are more tired and just want to get the process over with quickly","There is no meaningful difference if the findings and solutions are the same","They feel guilty about the time you spent and are more likely to buy out of obligation"],c:0,e:"A customer who watched 90 minutes of thorough work has witnessed your competence and has emotional investment in the process. They are buying your expertise and diligence, not just a repair. A 20-minute glance communicates that the problem is simple, which makes the price seem high."},
  {q:"During the crawl space inspection, you find moisture, water staining, and wood damage. You also notice termite damage that is outside your scope. How should you handle the termite finding?",o:["Tell the customer their termite problem is worse than the foundation issue they called about","Include termite treatment in your proposal as an add-on service for their convenience","Ignore it since it is outside your scope and focus only on foundation issues","Document it, photograph it, and mention it to the customer as something they should address separately, demonstrating your honesty"],c:3,e:"Documenting and honestly disclosing findings outside your scope builds trust. It demonstrates that you are looking out for the customer, not just selling your services. This reinforces the Trust Unlocking Moment."},
  {q:"After the Door Knock, why should you NOT clean up your dirty clothes before the sit-down?",o:["Customers prefer a casual appearance over formal business attire during home inspections","It saves time during the transition between inspection and presentation phases","Dirty clothes are physical proof of the effort you invested in their inspection","There is not enough time to change clothes without keeping the customer waiting"],c:2,e:"Dirty clothes are physical proof of effort. When you sit at the kitchen table covered in crawl space debris, the customer sees tangible evidence that you worked hard. Cleaning up erases that visual proof."},
  {q:"You are taking measurements during the walk-around and the customer says, 'The last company didn't need to measure anything. They just looked and gave me a price.' What is the best response?",o:["Speed up your measurements to match their expectation and move the process along","Tell them measurements are required by Apex policy and cannot be skipped","Acknowledge that different companies have different approaches, then explain that your measurements ensure the proposal is accurate and specific to their home","Explain that the other company was cutting corners and not doing proper work"],c:2,e:"Never badmouth competitors directly. Position your thoroughness as a benefit to the customer. Measurements ensure accuracy, which protects the customer from over- or under-scoped proposals."},
  {q:"You are doing the inspection and realize you forgot your moisture meter in the truck. The customer is following you around. What should you do?",o:["Complete the rest of the inspection and come back for moisture readings another day","Ask the customer if they have noticed any moisture issues and use their input instead","Skip the moisture readings and estimate based on visual inspection and experience","Excuse yourself professionally to grab the meter, maintaining the standard of thorough documentation"],c:3,e:"Never skip documentation to avoid minor awkwardness. Excuse yourself to grab the tool. Cutting corners on data collection weakens your proposal and credibility during the presentation."},
  {q:"The customer's crawl space has a very tight access point. You can get in but it will be difficult. The customer says, 'You don't need to go down there, just look from the opening.' What do you do?",o:["Respect their suggestion and inspect from the opening to avoid making them uncomfortable","Decline the inspection since you cannot do a thorough job from the opening","Send the customer a follow-up inspection with a camera on a pole later","Enter the crawl space fully because incomplete data leads to incomplete proposals and undermines your credibility"],c:3,e:"An incomplete inspection produces an incomplete proposal. Getting into the crawl space, even when difficult, demonstrates commitment and ensures your documentation is thorough. This is also where the most critical findings often are."},
  {q:"During the inspection, the customer asks you to explain what you are seeing as you go. How should you balance this with the Apex process?",o:["Give detailed explanations of every finding in real time to keep them engaged","Only explain the problems you find, not the normal areas that look good","Tell them you will explain everything during the presentation and stay silent during the inspection","Provide brief, factual observations without conclusions, and let them know you will connect everything during the sit-down"],c:3,e:"Brief factual observations keep the customer engaged without front-loading your presentation. Saying too much during the inspection robs the presentation of its impact. Saying nothing makes the customer feel excluded."},
  ],
  expert:[
  {q:"You complete a thorough inspection and find the home has very minor cosmetic cracking, normal moisture, and no structural concerns. The customer clearly expected significant findings. What is the BEST course of action?",o:["Find something minor to recommend so you do not waste the appointment time","Walk them through all your documentation showing what normal looks like, validate their decision to have it checked, and explain what to monitor going forward","Tell them their home is fine and schedule a follow-up in six months","Recommend preventative maintenance work to justify the inspection appointment"],c:1,e:"This is the Trust Unlocking Moment in action. Showing your documentation of normal conditions proves your integrity. This customer becomes a referral source because you did not sell them something they did not need. Walking through the data also educates them on what to watch for."},
  {q:"During the customer walk-around, the homeowner reveals their biggest concern is their home's resale value, not the structural issue itself. How should this change your inspection documentation strategy?",o:["Focus documentation on the most visible cosmetic issues since those affect resale value","It should not change anything; document using the same standard approach regardless","Take fewer photos since resale-focused customers care more about pricing than process","Ensure your documentation includes before-condition evidence that can be compared to post-repair conditions, and photograph areas that a buyer's inspector would flag"],c:3,e:"A resale-motivated customer needs documentation that tells a story for a future buyer's inspector. Before-condition photos paired with repair documentation become proof of proactive maintenance. This shifts the frame from 'cost' to 'investment in home value.'"},
  {q:"You are in the crawl space and find moisture readings of 19% on floor joists. There is no visible rot or water. The customer has no moisture complaints. How do you handle this in documentation?",o:["Note it as normal since there is no visible damage or customer complaints","Document it as a critical finding requiring immediate professional repair intervention","Skip it since 19% is borderline and might scare the customer unnecessarily","Document the elevated readings with exact locations and photos, classify them as elevated but pre-damage, and prepare to present them as a progression risk during the education phase"],c:3,e:"19% is elevated (normal is 10-12%) but below active rot (28%+). This is the progression window. Documenting it accurately lets you educate the customer on what happens if left untreated without overstating current damage. Skipping it or exaggerating it both damage credibility."},
  {q:"You finish the exterior inspection and discover a neighbor watching from their yard. They approach and ask what you are doing. What is the BEST way to handle this?",o:["Explain you are doing a foundation inspection and give them your business card","Tell them to ask the homeowner directly and walk away from the conversation","Ignore them completely and continue your inspection without acknowledging their presence","Give a brief, professional answer without disclosing specific findings about the homeowner's property, and offer your card if they have interest in their own home"],c:3,e:"The neighbor is a potential lead, but the homeowner's privacy comes first. A brief, professional response that does not disclose specific findings protects your customer while leaving the door open for a future opportunity."},
  {q:"During the inspection, you find evidence of a previous repair by another company that was done incorrectly. The customer does not know it was done wrong. How do you handle this?",o:["Photograph it objectively, document what you observe factually, and plan to present it during education as 'what we found' without making it about the competitor","Skip it since calling out another company's work looks petty and unprofessional","Tell the customer immediately that the previous repair was botched and needs redoing","Photograph it and plan to use it in the presentation to show why the competitor failed"],c:0,e:"Document factually without editorializing. During the presentation, present what you found and what it means for the home. Let the evidence speak. Attacking the competitor looks petty. Skipping it means you are not addressing a real issue. Blurting it out during the inspection robs the presentation of structure."},
  {q:"The customer follows you during the entire exterior inspection but says they will not go into the crawl space with you. After the crawl space inspection, they seem disengaged. What happened and how do you recover?",o:["They got bored waiting outside. Speed up the rest of the inspection process.","They lost interest in the project. Ask if they want to reschedule the presentation.","Their engagement broke when they could not witness the work. Use the Door Knock to re-engage them by showing your dirty clothes, the photos, and expressing urgency about getting them the 15-minute sit-down.","Nothing significant happened. Proceed normally with the standard presentation format."],c:2,e:"A customer who watches 90 minutes of work is emotionally invested. When they cannot see the crawl space portion, that investment pauses. The Door Knock with dirty clothes and a preview of findings re-establishes the connection and transitions their engagement to the presentation."},
  {q:"You are measuring floor slope with a level and the customer says, 'My husband already measured that and it is half an inch off.' Do you trust their measurement or take your own?",o:["Trust their measurement to save time and show respect for their effort","Tell them homeowner measurements are unreliable and take your own professional reading","Take your own measurement but do not contradict theirs if the numbers are close","Take your own measurement, document it, and if it differs, present both data points respectfully and explain how you measured"],c:3,e:"Always document your own measurements for accuracy and liability. If the numbers differ, presenting both respectfully shows transparency. The customer sees you are thorough without dismissing their effort. Your professional measurement becomes the documented standard for the proposal."},
  {q:"During the inspection, you realize the scope is much larger than what was discussed on the 2-Day Call. The customer seems to expect a small job. At what point do you recalibrate their expectations?",o:["During the inspection as you find each individual issue throughout the process","Wait until the full presentation when you have all evidence properly organized","On the phone before coming back for the presentation to avoid surprises","Drop hints during the inspection but save the full recalibration for the presentation's education phase where you can connect all findings systematically"],c:3,e:"Dumping bad news during the inspection creates anxiety without context. Waiting for the presentation risks sticker shock. The best approach is to let small observations during the inspection start shifting their frame, then use the education phase to connect everything. This builds understanding gradually rather than hitting them with a surprise."},
  {q:"You complete the inspection with 20 photos, 5 moisture readings, and detailed measurements. Your findings are moderate: some elevated moisture, minor cracking, slight floor slope. A less experienced inspector might call this a big job or a small job depending on interpretation. How should you approach documentation?",o:["Document conservatively to avoid overselling and maintain customer trust throughout the process","Document aggressively to ensure the customer takes the situation seriously and acts quickly","Document the worst-case interpretation to protect yourself legally from future liability issues","Document exactly what you found with precise measurements and readings, and let the data speak during the presentation without interpreting it optimistically or pessimistically"],c:3,e:"Precise, unbiased documentation is the foundation of credibility. When findings are moderate, the temptation is to shade them one direction. Let the numbers and photos speak. During the education phase, benchmarks (like 10-12% normal moisture) give the customer the context to interpret the data themselves."},
  {q:"You are photographing the exterior and the customer says, 'Don't take pictures of the backyard, it's a mess and I don't want anyone to see it.' Your inspection requires documenting the backyard grading and drainage. What do you do?",o:["Skip the backyard photos and note your findings verbally in the report instead","Take the photos anyway without discussing it further since it is necessary documentation","Ask them to clean up the backyard before you photograph the drainage areas","Explain that the photos are only used for their proposal and inspection report, are not shared publicly, and that backyard drainage is a critical factor in foundation health"],c:3,e:"Address the concern directly. The customer's worry is about embarrassment, not the inspection itself. Explaining the photos' purpose (private documentation) and the backyard's importance (drainage affects the foundation) resolves the concern without skipping critical evidence."},
  ],
},
mod3:{
  foundation:[
  {q:"During the Photo Review, which areas should you show the customer FIRST?",o:["The areas with the most serious problems identified","The areas that are normal and in good condition","The areas the customer mentioned during the walk-around inspection","The most expensive repair areas requiring immediate attention"],c:1,e:"Show normal areas first. This builds credibility by proving you are objective and not just looking for problems. When you then show concerns, the customer trusts your assessment."},
  {q:"What is the purpose of the Education Before Proposal phase?",o:["To help the customer understand the mechanism, progression, and solution approach before seeing numbers","To impress the customer with comprehensive technical knowledge and expertise","To establish timeline expectations and project scheduling requirements","To demonstrate superior methodology compared to competitor approaches"],c:0,e:"Education covers what causes the problem, what happens if nothing is done, and how the solution works. A customer who understands buys the solution. A customer who does not understand negotiates on price."},
  {q:"What is considered a normal moisture reading?",o:["0-5% moisture content in structural wood components","10-12% moisture content in structural wood components","19-25% moisture content in structural wood components","28%+ moisture content in structural wood components"],c:1,e:"Normal moisture in wood is 10-12%. Elevated is 16%+, and active rot begins at 28%+. These benchmarks are critical for the education phase."},
  {q:"At what moisture level does active rot begin?",o:["15% moisture content in wood structural elements","19% moisture content in wood structural elements","25% moisture content in wood structural elements","28%+ moisture content in wood structural elements"],c:3,e:"Active rot begins at 28%+ moisture. This is a critical benchmark for helping customers understand progression from elevated moisture to structural damage."},
  {q:"Every line item in the proposal should be tied to what?",o:["Industry standard pricing structures and established market rates","Documented evidence from the inspection with photographic proof","Competitor recommendations and typical scope approaches","Customer's stated budget parameters and financial constraints"],c:1,e:"Every line item must be tied to documented evidence. 'This is here because of photo #4' makes each item defensible and prevents the customer from viewing any item as unnecessary."},
  {q:"When should you introduce financing during the presentation?",o:["Only after the customer objects to the total price","Before revealing the total number to the customer","After presenting the complete total price breakdown","Financing should not be discussed during sales presentations"],c:1,e:"Introduce financing BEFORE revealing the total number. This ensures the customer has the payment tool in mind before they see the price, preventing sticker shock."},
  {q:"What does 'right-sizing' the proposal mean?",o:["Making the proposal as large as possible to maximize revenue potential","Matching the proposal scope to the customer's stated budget parameters","Making the proposal smaller to facilitate easier closing and acceptance","Recommending exactly what the evidence supports, not over- or under-scoping"],c:3,e:"Right-sizing means the proposal matches the documented evidence. Over-scoping damages trust. Under-scoping leaves the customer with unresolved problems. Every item should be justified by evidence."},
  {q:"Why should you use the customer's own language when reviewing photos?",o:["It helps the customer feel heard and creates connection between their concerns and your findings","It makes you sound less technical and more approachable to customers","It simplifies the presentation flow and reduces confusion during review","Customers typically do not understand complex technical terminology"],c:0,e:"Using the customer's language shows you listened during the walk-around and creates a direct connection between what they told you they were worried about and what you found."},
  {q:"What is the key difference between a customer who understands the problem and one who does not?",o:["The one who understands typically asks more detailed technical questions","The one who understands buys the solution; the one who does not negotiates on price","The one who understands usually wants a more comprehensive scope","There is no meaningful difference in their purchasing behavior patterns"],c:1,e:"A customer who understands the mechanism, progression, and solution buys the solution because they see its value. A customer who does not understand has only the price to evaluate, so they negotiate."},
  {q:"What three things does the Education phase cover?",o:["Price breakdown, project timeline, and warranty coverage details","Mechanism, progression, and solution approach for the problem","Materials required, labor costs, and necessary permit requirements","Competitor analysis, customer reviews, and company certifications"],c:1,e:"The Education phase covers: mechanism (what causes the problem), progression (what happens if nothing is done), and solution approach (how you fix it). This framework creates understanding that supports the proposal."},
  ],
  advanced:[
  {q:"During the Photo Review, you show a normal area first and the customer says, 'Why are you showing me things that are fine? Get to the problems.' How do you handle this?",o:["Skip to the problem areas immediately since the customer is clearly impatient and wants efficiency","Tell them this is standard process protocol and they need to be patient while you complete it","Show them all the problem photos at once in rapid succession to satisfy their sense of urgency","Briefly explain that showing normal areas establishes a baseline so they can see the contrast when you show the areas of concern, then transition to the findings"],c:3,e:"Explain the reason briefly: normal areas create a baseline that makes the problems meaningful. Then move forward. Do not abandon the approach, but do not belabor it either. The customer needs to understand the method, not sit through a lecture about it."},
  {q:"You are presenting moisture benchmarks and the customer says, 'My reading was 19%. That doesn't sound that bad.' How do you use the progression framework?",o:["Explain that 16% is elevated above normal (10-12%), and while not yet at active rot (28%+), it represents the progression window where damage accelerates if the moisture source is not addressed","Agree that 16% is not critical and minimize the finding to maintain customer comfort","Tell them 19% is very bad and needs immediate attention to prevent catastrophic failure","Show them a detailed chart of moisture damage costs over time with industry statistics"],c:0,e:"The progression framework is key here. 19% is elevated, not catastrophic. Minimizing it loses the sale. Exaggerating it damages credibility. Placing it on the progression spectrum educates the customer about trajectory and creates urgency without dishonesty."},
  {q:"You are building the proposal and realize one line item is not clearly supported by a specific photo or measurement. What should you do?",o:["Include it anyway since you know it is needed based on your professional experience","Remove it from the proposal entirely since you cannot tie it to documented evidence","Add it to the proposal and hope the customer does not question the reasoning","Go back and document the evidence you need, or note it as a professional recommendation based on related findings, with clear explanation"],c:3,e:"Every line item should ideally be tied to specific evidence. If you missed documenting something, go get the evidence or at minimum clearly explain the professional reasoning that connects it to documented findings. Unsupported line items invite objections."},
  {q:"The customer understands the problem and the solution, but when you present the proposal they say, 'That's more line items than I expected.' What is the best response?",o:["Offer to remove some line items to simplify the proposal and make it more manageable","Explain that foundation repair is inherently complex and requires multiple coordinated steps to be effective","Walk through each line item and connect it back to the specific evidence that justifies it","Combine multiple line items together to make the proposal appear shorter and less overwhelming"],c:2,e:"The strength of an evidence-based proposal is that every line item has a reason. Walking through each one with 'this is here because of photo #4, this addresses the drainage we saw on the east side' transforms a long proposal into a thorough, justified plan."},
  {q:"During the education phase, the customer keeps asking about DIY solutions they found online. How should you handle this?",o:["Dismiss the DIY solutions as ineffective and potentially dangerous for foundation work","Tell them they are welcome to try DIY approaches but you cannot guarantee the results","Show them examples of failed DIY foundation work you have encountered in the past","Acknowledge what they found, explain why the specific conditions in their home require professional-grade solutions, and use their findings as a bridge to the mechanism and progression education"],c:3,e:"Never dismiss a customer's research. Acknowledge it, then bridge to why their specific situation needs professional intervention. Their research actually shows engagement; redirect that energy into understanding the full mechanism and progression."},
  {q:"You present the proposal and the customer says, 'The company yesterday gave me a much simpler proposal with just one number.' What is the strategic advantage of your detailed approach?",o:["Your itemized proposal shows transparency and allows the customer to see exactly what they are paying for and why, making it harder to compare on price alone","You have no real advantage; simpler proposals are actually easier for customers to accept","Your proposal appears more professional and polished than basic single-number estimates","Your detailed proposal automatically justifies a higher price point through perceived complexity"],c:0,e:"A single-number proposal is a black box that invites price comparison. An itemized, evidence-based proposal shows the customer exactly what each dollar covers and why. This shifts the comparison from price to value and scope."},
  {q:"You are about to reveal the total number. How should you frame the transition from education to price?",o:["Say 'Now for the hard part' and present the number directly to manage expectations","Present the number quickly before the customer loses interest or becomes distracted","Ask the customer to guess what they think the total cost will be","Summarize the findings, confirm the customer understands the scope, re-introduce financing as a payment tool, then present the number"],c:3,e:"The transition should feel natural: summarize what you found and what it needs, confirm understanding, ensure financing is in play as a tool, then present the number. This sequence means the number arrives in context rather than in a vacuum."},
